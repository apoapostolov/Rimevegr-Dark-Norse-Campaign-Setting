- id: GEO_FOREST_015
  name: Aldreik
  type: ancient_tree
  region: forest
  nearest_settlement: Feldwick
  distance_hours: 5
  terrain: old_growth
  description: 'An oak — the only oak in the Black Pine — standing alone in a natural gap in the pine canopy where lightning
    or disease killed the surrounding trees a century ago. The oak is immense: its trunk would take six men to encircle, its
    bark ridged deep as plough-furrows, its lowest branches as thick as the mast-pines of the surrounding forest. It should
