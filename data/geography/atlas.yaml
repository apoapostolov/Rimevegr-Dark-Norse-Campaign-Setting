    is bare earth — not needle-covered, not mossy, just grey clay packed hard and dry as bone. No birds sing here. No insects
    hum. The silence is architectural, the kind that makes the ears ring, and the air tastes of old metal. Dead birds lie
    at the grove's edge in various stages of decay, always facing inward as though they flew toward the centre and fell. The
    trees at the perimeter are healthy; the trees inside are not dead but have stopped growing, their bark gone smooth and
    grey and cold to the touch.
  elevation: low
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: not_applicable
  hazards:
