- id: GEO_FOREST_012
  name: Blóðnálar
  type: battlefield
  region: forest
  nearest_settlement: Vargheim
  distance_hours: 4
  terrain: forest_floor
  description: 'A long depression between two ridges where the pine trees grow stunted and thin, their needles yellow-brown
