- id: GEO_MTN_011
  name: Hornvörðr
  type: ruin
  region: mountain
  nearest_settlement: Raven's Perch
  distance_hours: 4
  terrain: granite_peak
  description: The remains of a stone watchtower on a horn-shaped peak east of the main ridge — three walls still standing
    to twice a man's height, the fourth collapsed into the gorge below, the interior filled with rubble and wind-blown grit.
    The tower predates Raven's Perch and was built from a different stone — darker, closer-grained, hauled up from somewhere
    the current inhabitants cannot identify. Arrow-loops face west and north. A collapsed stone stair in the northwest corner
    once gave access to a second storey that no longer exists. The surviving walls provide the only effective wind-break on
    the eastern ridge, and scouts use it as a bivouac despite the rubble and the unnerving sense that the remaining walls
    lean inward slightly more each year.
  elevation: high
  seasonal_access:
    spring: false
    summer: true
    autumn: true
    winter: false
  tidal_access: not_applicable
  hazards:
  - The surviving walls lean inward — structural collapse is a matter of when, not whether
  - The rubble floor conceals the original flooring, which has gaps; a man can break through into a hollow beneath
  - Wind eddies inside the ruin are unpredictable — fire and smoke behave strangely
  - The exposed position on the horn peak makes the ruin a lightning target; the walls are scorched
  resources:
  - Wind-sheltered bivouac — the three surviving walls block prevailing wind from three directions
  - The arrow-loops provide observation of the western approaches and the northern ridge
  - Cut stone blocks from the collapse can be salvaged; the dark stone is harder than local granite
  lore_hooks:
  - The tower stone is not local — no quarry in the Rimevegr produces that dark, fine-grained rock; theories include trade,
    magic, or a people who are gone
  - The hollow beneath the rubble floor has never been fully explored; scouts who pried up flagstones reported a dry space
    extending beyond torchlight
  - Dagný considers the Hornvörðr the most valuable ruin in the range and has discussed rebuilding it; the cost and effort
    at this altitude have stopped every plan
