  description: The main trade pass through the Black Pine Range — a grinding switchback trail that climbs from the coastal
    lowlands through twenty-three hairpin turns to a narrow summit gap, then descends equally steeply to the interior. The
    trail is wide enough for two pack-horses abreast at its broadest and barely a single file at the summit. Cairns mark each
