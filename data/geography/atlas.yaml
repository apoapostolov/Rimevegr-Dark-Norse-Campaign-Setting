- id: GEO_MTN_012
  name: Ísgilsfoss
  type: waterfall
  region: mountain
  nearest_settlement: Raven's Perch
  distance_hours: 3
  terrain: gorge
  description: A waterfall dropping ninety feet from a granite lip into the gorge that Vindbrú spans — the primary water source
    for the gorge river and the loudest thing in the mountains. The falls emerge from a crack in the rock face where snowmelt
    channels converge, a single heavy column of water in summer that splits into ribbons in autumn as the flow drops. In winter
    the falls freeze into a pillar of blue-white ice that cracks and groans but holds until the spring thaw, when the ice-pillar
    collapses in a single catastrophic break that echoes off every peak in the range. The spray zone extends thirty feet in
    every direction and coats everything in a fine ice-rime even in summer. The pool at the base is unreachable from above
    without ropes.
  elevation: high
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: false
  tidal_access: not_applicable
  hazards:
  - The spray zone is perpetually slick — rocks near the falls are coated in ice-rime that no footwear grips
  - The winter ice-pillar collapse in spring is violent and unpredictable; debris is thrown hundreds of feet
  - The noise near the falls makes communication impossible — a man cannot hear a shout at ten paces
  - Mist from the falls creates localized fog that reduces visibility to arm's length at the gorge edge
  resources:
  - Reliable water source — the falls run even in late autumn when other streams are dry
  - The mist feeds moss and alpine herb growth near the spray zone — rare medicinal plants grow here
  - Ice from the frozen pillar is dense and slow-melting; cut blocks can be hauled to Raven's Perch for water storage
  lore_hooks:
  - The spring collapse of the ice-pillar is treated as a festival marker in Raven's Perch; Dagný posts watchers to report
    the exact moment
  - A scout swears she saw something large move behind the waterfall curtain — a cave mouth, possibly, hidden by the flow
  - The gorge pool at the base of the falls is rumored to be bottomless; stones thrown in return no echo
