locations:
- id: GEO_COAST_001
  name: Kolvik Breakwater
  type: harbour
  region: coastal
  nearest_settlement: Kolvik
  distance_hours: 0
  terrain: harbour_approach
  description: A curved arm of piled basalt boulders stretching forty paces into the grey water, built by hands older than
    Kolvik's oldest family. Barnacles crust every stone below the high-water mark, and the weed-slick tops stink of rotting
    bladderwrack in summer. Four longships moor in its lee, hulls knocking against tarred fenders of bundled rope. At low
    tide the landward end stands dry and the harbour-master's tally-post is visible — a salt-bleached oak carved with trade-marks
    and cargo weights.
  elevation: tidal
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: always
  hazards:
  - Weed-slick boulders cause broken ankles and drownings every season — two men fell in last autumn
  - At spring tides the breakwater is submerged to knee depth and waves crash over the mooring posts
  - Raiders have used the breakwater as a boarding ramp twice in living memory
  resources:
  - Mooring for trade vessels and longships — Eadric charges a half-mark per hull per week
  - 'Shellfish cling to the submerged stones: mussels, limpets, and occasionally oysters'
  - Driftwood collects against the inner face after storms
  lore_hooks:
  - Harbour-Master Eadric insists the breakwater predates the settlement by centuries — the stonework is not Norse, and no
    one claims it
  - Fishermen report that something large scrapes against the outer boulders on moonless nights — barnacles are stripped clean
    by morning
  - A trade dispute with a Frostfjord merchant ended with a body wedged between the breakwater stones; Eadric ruled it an
    accident
  associated_barrows:
  - BAR_012
  associated_npcs:
  - Eadric
  associated_chains: []
  image_prompt: A curved stone breakwater jutting into a grey northern sea, barnacle-crusted boulders, four dark longships
    moored in its lee, tarred rope fenders, a carved oak tally-post, overcast sky, gulls wheeling. Norse harbour, dark fantasy
    atmosphere.
- id: GEO_COAST_002
  name: The Tide-Teeth
  type: standing_stone
  region: coastal
  nearest_settlement: Kolvik
  distance_hours: 1
  terrain: tidal_flat
  description: Three granite pillars standing in a line on the tidal flat south of Kolvik, each the height of a man's chest.
    At high water only their tips break the surface like the teeth of something buried beneath the sand. At low tide the full
    stones are revealed — salt-crusted, wound with black kelp, carved on their seaward faces with spirals that the sea is
    slowly grinding away. The mud around them smells of brine and decay, and crabs scatter from the pools at their bases.
  elevation: tidal
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: false
  tidal_access: low_tide_only
  hazards:
  - The tidal flat floods fast — an incoming tide covers the stones in under half an hour and the mud turns to quicksand
  - Sea fog rolls in without warning and the stones become invisible from shore
  - The carvings attract practitioners of old rites; not everyone found at the stones at dawn is friendly
  resources:
  - Shellfish beds surround the stones — cockles and razor clams in the mud
  - The spiral carvings are older than any known settlement and scholars pay silver to study them
  lore_hooks:
  - Elder fishermen say the Tide-Teeth once stood on dry land — the sea has been swallowing the coast for generations
  - A Kolvik woman drowned here last spring; her body was found at the base of the middle stone with her fingers dug into
    the carvings
  - Skaldhaven's Lore-Keeper Audun believes the spirals are a sea-ward warning marker — not a shrine but a boundary
  associated_barrows: []
  associated_npcs:
  - Audun
  associated_chains: []
  image_prompt: Three salt-encrusted granite pillars on a grey tidal flat at low tide, black kelp wound around their bases,
    spiral carvings on seaward faces, tidal pools, distant grey sea, overcast sky. Norse standing stones, dark coastal atmosphere.
- id: GEO_COAST_003
  name: Vigdis-Steinn
  type: standing_stone
  region: coastal
  nearest_settlement: Stonebay
  distance_hours: 0
  terrain: sea_cliff
  description: A single tall menhir of dark basalt standing on the cliff-edge above Stonebay, leaning seaward at an angle
    that suggests the cliff is slowly surrendering it to the drop. Salt-spray has bleached its windward face white. The leeward
    side bears a crude carving of a whale — Stonebay's mark — and beneath it notches for every whale taken in a season. Elder
    Vigdis ties a strip of red wool to the stone each spring before the first hunt. The wind shreds the wool to threads within
    a week.
  elevation: high
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: always
  hazards:
  - The cliff-edge is undercut and crumbling — the stone itself may topple within a generation
  - Wind gusts along the cliff top can knock a man off his feet in autumn storms
  - The path to the stone is a boot-width track along the cliff edge with no railing
  resources:
  - The whale-notch tally records Stonebay's hunting history — valuable to anyone studying the settlement's economy
  - The cliff-top vantage gives a clear sightline south along the coast toward Skaldhaven
  lore_hooks:
  - Elder Vigdis claims the stone predates Stonebay and that whoever raised it was marking a whale-run path, not a grave
  - The whale carving has more notches than Stonebay's living memory accounts for — someone carved false tallies, or the settlement
    is older than anyone admits
  - On still nights, Stonebay folk hear a low hum from the stone — wind through the cliff cracks, Vigdis says, though she
    does not sound convinced
  associated_barrows:
  - BAR_013
  associated_npcs:
  - Vigdis
  associated_chains: []
  image_prompt: A dark basalt menhir leaning toward the sea on a crumbling cliff edge, its windward face bleached white with
    salt, a crude whale carving visible, a strip of red wool fluttering from the top, grey sea far below, overcast sky. Norse
    coastal standing stone, dark atmosphere.
- id: GEO_COAST_004
  name: Drengr's Needle
  type: standing_stone
  region: coastal
  nearest_settlement: Kolvik
  distance_hours: 2
  terrain: rocky_shore
  description: A thin natural pillar of sea-stack basalt standing alone on a rocky shelf south of Kolvik, twice the height
    of a tall man and barely wider than a shield. The rock is columnar-jointed and looks as if it could snap in a strong gale.
    Tide pools surround its base at all times, and salt-spray keeps the stone perpetually wet. Someone — long ago — chiselled
    a single rune into the north face at eye height. The rune is too eroded to read with certainty, though three different
    skalds have offered three different translations, all of them ominous.
  elevation: sea_level
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: false
  tidal_access: high_tide_dangerous
  hazards:
  - The rocky shelf is wave-washed at high tide — standing water to waist depth with strong pull
  - The basalt joints shed fragments in frost; stone-fall is a winter risk
  - A bull seal has claimed the shelf and charges anyone who approaches in breeding season
  resources:
  - The tide pools hold sea urchins, anemones, and small crabs — modest foraging
  - The single rune draws scholars and rune-carvers who pay for rubbing access
  lore_hooks:
  - A Kolvik fisherman swears the Needle was taller when his grandfather was young — the sea is wearing it down or something
    broke the top
  - 'The rune''s three competing translations: ''here fell a warrior'', ''this marks the deep road'', and ''do not anchor
    here'''
  - BAR_014 — the Drowned Jarl's Cairn — is visible from the Needle's base at low tide, across the channel
  associated_barrows:
  - BAR_014
  associated_npcs: []
  associated_chains: []
  image_prompt: A thin, impossibly tall basalt pillar on a wave-washed rocky shelf, columnar-jointed stone, tide pools at
    the base, a single weathered rune carved at eye height, grey sea and spray, dark overcast sky. Norse sea-stack standing
    stone, grim atmosphere.
- id: GEO_COAST_005
  name: Skerjaholm
  type: island
  region: coastal
  nearest_settlement: Kolvik
  distance_hours: 3
  terrain: rocky_shore
  description: A low, treeless islet a quarter-mile offshore, reachable by a shingle causeway that surfaces for two hours
    either side of low tide. The island is bare rock and coarse grass, maybe eighty paces across, rising to a hump at the
    centre where a ring of stacked stones marks an old fire-pit. Seal colonies occupy the southern shore. The smell — fish
    guts, guano, and seal musk — hits before you reach the causeway. Eadric uses the island as a quarantine anchorage for
    plague-suspect trade vessels.
  elevation: low
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: false
  tidal_access: low_tide_only
  hazards:
  - The causeway vanishes fast — misjudge the tide and you swim or drown
  - Bull seals are territorial and a charging bull outweighs three men
  - Plague quarantine vessels sometimes anchor here; approaching without Eadric's permission invites a crossbow bolt
  resources:
  - Seal hunting ground — fat, hides, and bone if you can manage the bulls
  - Sea-bird eggs on the northern rocks in spring
  - The old fire-pit stones are heat-cracked granite, useful for nothing but shelter from wind
  lore_hooks:
  - Eadric quarantined a Frostfjord knarr here last autumn; the crew vanished overnight and the ship was found empty, moored
    and intact
  - The fire-pit ring on the island summit is older than Kolvik — someone used this island as a camp or signal station
  - Stonebay whalers claim they have seen lights on the island at night during winter, when no one should be there
  associated_barrows: []
  associated_npcs:
  - Eadric
  associated_chains: []
  image_prompt: A low treeless islet connected to the mainland by a shingle causeway at low tide, bare rock and coarse grass,
    seal colonies on the shore, a stacked stone fire-ring at the summit, grey northern sea, gulls overhead. Norse island,
    dark fantasy.
- id: GEO_COAST_006
  name: Gannet Sker
  type: sea_stack
  region: coastal
  nearest_settlement: Stonebay
  distance_hours: 1
  terrain: open_sea
  description: A sheer-sided column of layered sandstone rising thirty feet from the waves, two hundred yards off the Stonebay
    cliffs. Its flat top is caked white with gannet droppings and the birds wheel around it in a shrieking cloud from spring
    through autumn. The stack is climbable from the south face where wave-action has carved hand-holds, but the rock is rotten
    and every handhold may be the last. Whalers use the stack as a bearing-mark — when Gannet Sker lines up with Vigdis-Steinn
    on the cliff, you are over the deep channel where the whales run.
  elevation: mid
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: false
  tidal_access: always
  hazards:
  - Reachable only by boat — the surrounding water has strong currents and submerged rocks
  - The sandstone is friable; climbing holds crumble without warning
  - Gannets attack anyone approaching the nesting colony — beaks draw blood and eyes are targets
  resources:
  - Gannet eggs and chicks in season — rich food if you can survive the climb and the birds
  - Guano deposits are nitrogen-rich and valuable for coastal gardens
  - Navigation landmark for the whaling fleet
  lore_hooks:
  - A Stonebay boy climbed the stack on a dare last summer and found a sealed bone-tube wedged in a crevice at the top — he
    will not say what was inside
  - The stack is visibly shorter than it was a generation ago; winter storms are breaking it down
  - Whalers swear the deep channel below the stack is where the largest things surface — not all of them whales
  associated_barrows: []
  associated_npcs:
  - Vigdis
  associated_chains: []
  image_prompt: A sheer sandstone sea-stack rising from grey waves, its flat top white with gannet droppings, a shrieking
    cloud of seabirds, dark cliffs visible behind, rough northern sea. Norse sea-stack, dark fantasy coastal atmosphere.
- id: GEO_COAST_007
  name: Járnnes
  type: headland
  region: coastal
  nearest_settlement: Kolvik
  distance_hours: 2
  terrain: sea_cliff
  description: The Iron Headland — a blunt prow of dark volcanic rock jutting into the sea between Kolvik and Stonebay, streaked
    with orange rust where iron-bearing seams weep in the rain. The cliff face drops sheer a hundred feet to a churning mess
    of foam and submerged boulders. No path descends. The top is wind-scoured grass and nothing grows taller than your ankle.
    On clear days you can see both Kolvik harbour to the north and the Stonebay cliff-line to the south. On foul days you
    cannot see your own feet for the fog.
  elevation: high
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: always
  hazards:
  - Cliff-edge is undercut and invisible in fog — people have walked off it
  - Wind funnels around the headland with enough force to stagger a loaded mule
  - The iron seams attract lightning in storms; the grass is burn-scarred in patches
  resources:
  - Iron-bearing rock could be quarried but the cliff is too dangerous to work
  - Strategic vantage point — guards Kolvik's southern approach by sea
  - Wind-dried grass and low scrub for emergency tinder
  lore_hooks:
  - Eadric posts a lookout on Járnnes when he expects trouble from the south — the headland gives a full hour's warning of
    approaching ships
  - The rust-streaks on the cliff face shift pattern with the seasons; Audun of Skaldhaven says they form a map if you know
    how to read them
  - A section of cliff collapsed last winter, revealing a cavity in the rock face — too high to reach from below, too dangerous
    to descend to from above
  associated_barrows: []
  associated_npcs:
  - Eadric
  - Audun
  associated_chains: []
  image_prompt: A blunt volcanic headland jutting into a churning grey sea, dark cliff face streaked with orange rust, sheer
    drop to white foam below, wind-scoured grass on top, overcast sky. Norse iron headland, grim coastal atmosphere.
- id: GEO_COAST_008
  name: Hvalbein Cliff
  type: cliff
  region: coastal
  nearest_settlement: Stonebay
  distance_hours: 0
  terrain: sea_cliff
  description: The Whalebone Cliff — Stonebay's twenty-three souls live on its top, and the cliff itself is their larder,
    their graveyard, and their defence. The pale limestone face is layered with darker bands that look, from the sea, like
    the ribcage of some vast buried creature — hence the name. Iron stakes driven into the cliff-top support rope-and-plank
    stages where whalers butcher their catch, lowering blubber in nets to boats below. The air at the cliff-base is thick
    with the stench of old rendering. Whale bones are stacked in a midden against the southern face.
  elevation: high
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: always
  hazards:
  - The butchering stages are slick with fat and blood — a fall from the cliff is fatal
  - 'Whale offal attracts scavengers: gulls by day, and larger things by night'
  - The cliff-face is unstable near the midden; the weight of bones is undermining the base
  resources:
  - Whale bone, blubber, baleen, and rendered oil — Stonebay's entire economy
  - Limestone can be quarried from the cliff for building, though Vigdis forbids it near the settlement
  - The midden contains decades of bone useful for carving, tool-making, and trade
  lore_hooks:
  - BAR_013 — the Stonebay Cliff-Tomb — is carved into the cliff face itself, accessible only by the butchering stages
  - The dark bands in the limestone are not geological — Audun claims they are compressed layers of ancient sea-bed creatures,
    vast beyond reckoning
  - Something has been feeding on the whale offal at the cliff-base at night; the bones left behind are cracked open for marrow
    by jaws wider than a man
  associated_barrows:
  - BAR_013
  associated_npcs:
  - Vigdis
  associated_chains: []
  image_prompt: A pale limestone cliff with dark horizontal bands resembling a vast ribcage, iron stakes and rope butchering
    stages on the cliff-top, whale bones stacked at the base, grey sea below, a small cliff-top settlement visible. Norse
    whaling cliff, dark fantasy atmosphere.
- id: GEO_COAST_009
  name: The Maw
  type: tidal_cave
  region: coastal
  nearest_settlement: Stonebay
  distance_hours: 1
  terrain: rocky_shore
  description: A sea-cave at the base of the cliffs south of Stonebay, its mouth a ragged oval ten feet high and twice as
    wide, visible only at low tide. At high water the cave floods completely and the pressure of trapped air makes a rhythmic
    booming that carries for miles — Stonebay children grow up calling it the coast breathing. Inside, the cave runs back
    fifty paces into total darkness, the floor shin-deep in cold saltwater even at the lowest tide. The walls are slick with
    orange bacterial mat and the ceiling drips constantly. The air tastes of iron and brine.
  elevation: tidal
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: false
  tidal_access: low_tide_only
  hazards:
  - A rising tide fills the cave in minutes — anyone inside when the water turns will drown
  - The bacterial mat on the walls is slippery enough to make footing impossible on the return slope
  - The booming at high tide is disorienting underwater and has confused divers into swimming deeper instead of out
  resources:
  - Unusual shellfish and crustaceans found nowhere else on the coast cling to the inner walls
  - The orange bacterial mat, dried and powdered, is used by Stonebay folk as a wound-packing — it stings but prevents rot
  lore_hooks:
  - The cave does not end at fifty paces — it narrows to a crack too small for a man, but air moves through it, suggesting
    passages beyond
  - BAR_014 is said to connect to The Maw through submerged tunnels; the Drowned Jarl chose his cairn for the escape route
    to the sea
  - A Stonebay whaler entered The Maw at low tide and emerged claiming he heard voices deeper in — not echoes, but speech
    in a language he did not know
  associated_barrows:
  - BAR_014
  associated_npcs: []
  associated_chains: []
  image_prompt: A ragged sea-cave mouth at the base of dark cliffs at low tide, cold saltwater on the cave floor, orange bacterial
    mat on slick walls, darkness receding inward, grey sea and rocky shore outside. Norse tidal cave, grim dark fantasy.
- id: GEO_COAST_010
  name: The Keel of Ulfvár
  type: shipwreck
  region: coastal
  nearest_settlement: Kolvik
  distance_hours: 3
  terrain: shingle_beach
  description: The broken spine of a longship half-buried in shingle on a grey beach between Kolvik and Járnnes. The keel
    and six ribs are all that remain above the stones — blackened oak, the iron rivets rusted to orange threads. The wreck
    has been here long enough that the shingle has swallowed the hull to the waterline. At low tide you can see where the
    strakes rotted away, leaving the rivet-holes like a row of blind eyes. Local tradition names the ship after Ulfvár Seacoat,
    a raider who failed to make Kolvik harbour in a storm three generations back. No one has excavated the buried hull.
  elevation: sea_level
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: high_tide_dangerous
  hazards:
  - Rusted iron rivets and splintered oak protrude from the shingle — barefoot or careless approach draws blood
  - The buried hull creates a sinkhole effect in the shingle; heavy loads (or men in armour) can break through into the rotting
    hold
  - High tide covers the wreck entirely and the undertow here is vicious — the hull disrupts the current
  resources:
  - Salvageable iron rivets — corroded but workable if re-forged
  - Oak timber from the keel is salt-hardened and dense, prized by carvers
  - Whatever Ulfvár carried in his hold is still buried in the shingle beneath the ribs
  lore_hooks:
  - Ulfvár Seacoat was not a simple raider — Eadric's harbour records mention a cargo of 'sealed chests, contents unrecorded'
    that never reached Kolvik
  - A Kolvik child playing near the wreck last summer pulled a bone from the shingle that was not whale, not seal, and not
    fish
  - The wreck shifts position after heavy storms — not much, but enough that the oldest fishermen say the ship is trying to
    sail again
  associated_barrows: []
  associated_npcs:
  - Eadric
  associated_chains: []
  image_prompt: A half-buried longship keel and ribs on a grey shingle beach, blackened oak and rusted rivets, stones swallowing
    the hull, grey sea and overcast sky, no living thing nearby. Norse shipwreck, desolate coastal atmosphere.
- id: GEO_COAST_011
  name: Eldvörðr Tower
  type: ruin
  region: coastal
  nearest_settlement: Stonebay
  distance_hours: 2
  terrain: sea_cliff
  description: The stump of a signal tower on a cliff-shelf between Stonebay and Skaldhaven — three courses of dry-stone wall
    still standing to shoulder height, the rest collapsed into a rubble skirt. The tower was round, maybe twelve feet across,
    with a fire-pit at the centre now choked with nettles and sea-campion. The stonework is older than either settlement and
    the mortar — where it survives — contains crushed shell and a binding agent no local mason recognizes. Wind howls through
    the gaps in the remaining wall. The view south toward Skaldhaven is unobstructed.
  elevation: high
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: always
  hazards:
  - The remaining walls are unstable; leaning on them risks collapse
  - The rubble skirt hides a cistern pit — a fall through the covering stones drops you ten feet onto broken rock
  - The exposed cliff-shelf offers no shelter from storms and attracts lightning
  resources:
  - Cut stone from the collapse is pre-shaped and salvageable for building
  - The fire-pit could be cleared and relit — the tower's sightline to both Stonebay and Skaldhaven still works
  - Nettles choking the ruin are edible in spring and useful for cordage
  lore_hooks:
  - The shell-mortar binding agent matches material found in the breakwater at Kolvik — the same unknown builders raised both
  - Audun of Skaldhaven believes the tower was one of a chain of signal stations along the coast, now all ruined or lost to
    cliff-collapse
  - Scratched into the inner wall at knee height — a tally of ships, drawn in a style that predates Norse settlement of the
    Rimevegr
  associated_barrows: []
  associated_npcs:
  - Audun
  associated_chains: []
  image_prompt: A ruined round signal tower stump on a cliff shelf, three courses of dry-stone wall standing, rubble skirt,
    nettles in the fire-pit, grey sea visible beyond, wind-swept and desolate. Norse coastal ruin, dark fantasy.
- id: GEO_COAST_012
  name: Kolvik Light
  type: beacon
  region: coastal
  nearest_settlement: Kolvik
  distance_hours: 1
  terrain: sea_cliff
  description: A squat iron basket on a stone plinth at the northern approach to Kolvik harbour, built on a cliff-shelf fifteen
    feet above the high-water mark. The basket holds a pitch-and-tallow fire that Eadric's harbour-hands light at dusk and
    feed through the night when trade vessels are expected. The stone plinth is blackened with decades of soot and the surrounding
    rock is heat- cracked. An iron chain bolted to the cliff anchors the keeper against wind. The light is visible three miles
    out to sea on clear nights. On foggy nights it is visible from nowhere.
  elevation: mid
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: always
  hazards:
  - The cliff-shelf is narrow and soot-greased; the keeper works chained to the rock for good reason
  - Sparks from the beacon basket have set the keeper's clothing alight twice in the last decade
  - False lights — someone lit a fire on the wrong cliff-shelf last winter, and a knarr grounded on rocks
  resources:
  - Pitch and tallow stores are kept in a sealed chest at the plinth base — valuable fuel
  - The keeper position pays a half-mark per night and includes harbour-hand status under Eadric
  lore_hooks:
  - The false light that wrecked the knarr last winter was deliberate — Eadric suspects someone wanted the cargo, but no wreckage
    was salvaged
  - The keeper claims he has seen a second light answering from far out to sea on moonless nights — not a ship's lamp, too
    steady and too green
  - Eadric wants to build a proper stone lighthouse but lacks the silver; the current beacon is one bad storm from destruction
  associated_barrows: []
  associated_npcs:
  - Eadric
  associated_chains: []
  image_prompt: A squat iron fire-basket on a soot-blackened stone plinth on a narrow cliff shelf, burning with pitch fire
    at night, an iron chain anchoring a cloaked keeper, dark sea below, harbour lights in the distance. Norse coastal beacon,
    dark atmosphere.
- id: GEO_COAST_013
  name: Drekavágr
  type: cove
  region: coastal
  nearest_settlement: Skaldhaven
  distance_hours: 1
  terrain: shingle_beach
  description: The Dragon Inlet — a narrow cove south of the Eldvörðr ruin where the cliffs pinch to a gap barely wide enough
    for a single longship. Inside, a crescent of dark shingle shelves steeply into deep water. The cove faces east and is
    sheltered from the prevailing westerlies, making it dead calm when the open coast is in turmoil. The water is unnervingly
    clear — you can see the bottom at three fathoms, the stones on the sea-floor sharp- edged and dark. Skaldhaven folk use
    the cove for small-boat launching but avoid it after dark. The shingle crunches underfoot like breaking teeth.
  elevation: sea_level
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: always
  hazards:
  - The narrow entrance creates a funnel current at tidal change — small boats can be pinned against the cliff walls
  - The deep clear water conceals depth — the shingle shelf drops off sharply and a wading man is suddenly swimming
  - Something large lives in the deep water at the cove's centre; fish avoid it and nets come up torn
  resources:
  - Sheltered anchorage for small craft — the only reliable calm-water launch south of Kolvik
  - The clear water allows diving for sea urchins and abalone on the cove walls
  - Dark shingle contains occasional pieces of jet, tradeable for its carving quality
  lore_hooks:
  - Skaldhaven skalds tell of a dragon-prowed longship that sailed into the cove in a fog and never sailed out — the cove
    is named for it
  - Divers report carved stonework on the sea-floor at depth — walls or foundations of something now submerged
  - Audun forbids night-fishing in Drekavágr; he does not explain why, and no one in Skaldhaven presses him
  associated_barrows: []
  associated_npcs:
  - Audun
  associated_chains: []
  image_prompt: A narrow cove between dark pinching cliffs, deep clear water over dark sharp-edged stones, a crescent of dark
    shingle beach, sheltered from wind, eerily calm, overcast sky. Norse dragon inlet, dark fantasy coastal atmosphere.
- id: GEO_COAST_014
  name: Beinastrand
  type: beach
  region: coastal
  nearest_settlement: Stonebay
  distance_hours: 1
  terrain: shingle_beach
  description: The Bone Beach — a long curve of pale shingle south of Stonebay where the current deposits everything the sea
    takes. Whale bones, driftwood, kelp-mats, dead seabirds, lost cargo, and things less identifiable accumulate on the tide-line
    in a reeking windrow. The shingle is mixed with fragments of bone ground smooth by the waves — whale, seal, fish, and
    occasionally human. The beach is fully exposed to the open sea and the undertow here is murderous; no one swims at Beinastrand.
