  description: The main entrance to Deepholm's underground works — a dwarven-cut archway three men wide and two men tall,
    framed by basalt blocks fitted so tightly that the joins have weathered into hairline shadows. Beyond the arch, the surface
    road becomes a flagstone ramp descending at a gentle grade into the mountain. Daylight reaches perhaps fifty paces inside
    before the passage turns and torches take over. A wooden toll-booth stands just inside the entrance, staffed by the Council's
    customs clerk. The ground outside is packed earth worn bare by cart-wheels and boot-traffic, scattered with coal dust
