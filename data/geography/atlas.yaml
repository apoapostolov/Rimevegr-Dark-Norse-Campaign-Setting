- id: GEO_MTN_014
  name: Skjóldalr Hut
  type: shelter
  region: mountain
  nearest_settlement: Raven's Perch
  distance_hours: 6
  terrain: alpine_scree
  description: 'A low stone hut with a turf roof built into a sheltered hollow on the eastern descent of Járnskarð — the only
    reliable shelter between the pass summit and the interior lowlands. The hut is four paces square, windowless, with a smoke-hole
    in the roof and a door that faces away from the prevailing wind. Inside: a stone sleeping platform along one wall, a fire-pit
    with an iron tripod, and a sealed wooden chest containing emergency supplies restocked by Dagný''s scouts each summer
    — dried fish, salt, tinder, a wool blanket, and a tallow candle. The hut smells of smoke, damp wool, and every person
    who has ever sheltered here. Scratched into the wall above the door: the Raven''s Perch signal marks for ''safe'' and
    ''occupied.'''
  elevation: mid
  seasonal_access:
    spring: true
    summer: true
    autumn: true
    winter: true
  tidal_access: not_applicable
  hazards:
  - The hut is a known shelter — anyone caught in a storm heads here, including people you may not want to share a four-pace
    room with
  - The turf roof leaks in heavy rain and sags under snow load; it has collapsed before and been rebuilt
  - The smoke-hole drafts poorly in certain wind directions, filling the interior with choking smoke
  - Emergency supplies are sometimes found already used — not everyone restocks what they take
  resources:
  - Life-saving shelter — the hut is the difference between survival and death for travelers caught by weather on the eastern
    descent
  - 'Emergency supplies in the sealed chest: dried fish, salt, tinder, wool blanket, tallow candle'
  - The fire-pit and iron tripod enable cooking and warmth; fuel must be carried in, as the hollow is above the treeline
  - The 'safe/occupied' signal marks allow scouts to check habitation status without approaching
  lore_hooks:
  - A tradition holds that anyone who uses the supplies must leave something in return — the chest contains odd items (dice,
    a comb, a copper ring) left by grateful travelers
  - Dagný treats supply theft from the hut as a serious offense; she once tracked a man two days to the interior to recover
    a blanket
  - 'Scratched messages on the interior walls form a crude guest-book spanning decades — names, dates, weather complaints,
    and one repeated phrase: ''the mountain remembers'''
