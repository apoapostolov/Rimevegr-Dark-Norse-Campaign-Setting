  region: deepholm
  nearest_settlement: Deepholm
  distance_hours: 3
  terrain: stone_ravine
  description: An underground river emerging from a fissure in the deep rock, dropping three body-lengths into a natural basin
    before continuing through a low passage toward the flooded lower levels. The water is black with dissolved minerals and
    ice-cold. The falls create a constant roar that drowns conversation within ten paces and fills the chamber with a fine
    mist that coats everything in slick mineral film. The basin is deep enough that no one has touched bottom. Dwarven cut-marks
