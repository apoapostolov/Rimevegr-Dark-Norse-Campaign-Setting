- id: GEO_ICE_010
  name: Helvörðr
  type: standing_stone
  region: ice
  nearest_settlement: Icebreak
  distance_hours: 9
  terrain: snowfield
  description: 'The largest standing stone in the Rimevegr — a monolith of black basalt twice the height of a man, standing
    alone on an open snowfield with no geological source for the stone within fifty miles. Every face is covered in rune-work
    cut so deep the grooves hold ice year-round, and the runes glow in three colors: blue on the south face, white on the
