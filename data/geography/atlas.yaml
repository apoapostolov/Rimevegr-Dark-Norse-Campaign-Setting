- id: GEO_MTN_015
  name: Urðarbrekkur
  type: avalanche_zone
  region: mountain
  nearest_settlement: Raven's Perch
  distance_hours: 4
  terrain: alpine_scree
  description: A massive scree field and avalanche chute on the north face of the range — a mile-wide slope of loose stone,
    shattered granite, and seasonal snow that has buried the old northern trail three times in living memory. The scree is
    unstable from top to bottom; a kicked stone triggers a chain that can move the whole face. In winter, snow loads on the
    upper slopes until the angle defeats adhesion and the whole mass slides — the roar carries to Raven's Perch and the dust-cloud
    is visible for hours. In summer the scree is dry and ankle- twisting, every step uncertain. Dagný has marked a narrow
    path along the eastern edge with painted stones, but the path is frequently buried by minor slides. The Avalanche Barrow
    (BAR_023) sits at the base of the chute, half- buried in debris that has piled against it for centuries.
  elevation: mid
  seasonal_access:
    spring: false
    summer: true
    autumn: true
    winter: false
  tidal_access: not_applicable
  hazards:
  - Avalanche — winter snow releases in unpredictable slides that bury everything at the base; spring cornices can release
    without warning
  - Scree instability — a single kicked stone can trigger a moving sheet of rock that carries a man downslope
  - Ankle injuries are near-certain on the loose stone; the scree shifts underfoot with every step
  - The buried northern trail tempts travelers into crossing the chute center, where the scree is deepest and most unstable
  resources:
  - The painted-stone path along the eastern edge provides a marginally safe route past the chute in summer and autumn
  - Shattered granite in the scree includes useful stone types — flint nodules and quartz for tool-making and fire-starting
  - The avalanche debris at the base occasionally uncovers items buried by previous slides — tools, bones, fragments of the
    old trail
  lore_hooks:
  - The Avalanche Barrow (BAR_023) at the chute base has been buried and uncovered repeatedly; each burial adds a new layer
    of debris that the barrow's builders never intended
  - Dagný's painted-stone path must be re-marked every summer because minor slides bury the markers; the duty is called 'painting
    ghosts' because the stones disappear again within months
  - An entire trade caravan was buried in the great slide of Y298 — fourteen years ago, and pieces still surface after each
    winter's melt; the merchants' names are scratched on a stone at the base
  associated_barrows:
  - BAR_023
  associated_npcs: []
  associated_chains: []
