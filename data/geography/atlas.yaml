    after stumbling in
  - The dead birds suggest something kills living things that enter too deep; no animal tracks cross the bare clay
  - Compass iron reportedly corrodes faster after exposure to the grove; blacksmiths in Feldwick call it 'grove-rot'
  resources:
  - The grey clay is unusually pure and hardens well — Feldwick potters have used it, though they dislike the source
  - Dead birds at the perimeter include species not normally found in the forest — useful for naturalists
  - Firewood from the grove's edge burns longer than normal pine, with a blue-white flame
  lore_hooks:
  - Elder Brynhild has placed the Stillvǫllr under taboo — no Feldwick resident may enter, though she will not say what she
