  - Old Brokk believes the river connects to a deep aquifer that the dwarves mapped but the maps were lost or hidden
  - The mineral deposits around Svartfoss contain traces of gold — not enough to mine profitably, but enough to start rumors
  - A miner who fell into the basin and survived reported seeing carved walls beneath the water surface before the current
