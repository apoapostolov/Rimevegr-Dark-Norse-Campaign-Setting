    below. Things are visible through the shimmer: a landscape that is not this one, grey and flat and populated by shapes
    that move with purpose. They see you. They stop and watch. If you step forward, the shimmer parts. No one who has stepped
    through has come back. The ice beneath your feet vibrates with the same frequency as the crevasse at Jǫkullsundr, but
    stronger — felt in the bones, in the spine, in the back of the skull. There is no sound here except a continuous low tone,
    like a bell struck once and never allowed to stop ringing.'
