- id: GEO_FOREST_009
  name: Fornhǫll
  type: ruin
  region: forest
  nearest_settlement: Feldwick
  distance_hours: 4
  terrain: old_growth
  description: The stone foundation and one standing gable-wall of a longhouse buried in the deep forest between the two settlements.
    The hall was substantial — forty feet long, its foundation stones dressed and fitted, not dry-stacked peasant work. A
    pine has grown through the hearthstone, splitting the central firepit into halves that still show soot-blackening. The
