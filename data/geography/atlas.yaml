- id: GEO_FOREST_006
  name: Kolbrannssléttan
  type: clearing
  region: forest
  nearest_settlement: Feldwick
  distance_hours: 1
  terrain: pine_clearing
  description: The main charcoal-burning flat east of the deep forest, a clearing hacked and burned into the treeline over
    decades of Feldwick labour. The ground is black to a depth of three inches — layered ash and crushed charcoal compacted
    into a surface hard as flagstone. Three earth-mound kilns stand in a row at the clearing's north edge, their clay caps
