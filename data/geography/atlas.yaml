- id: GEO_FOREST_008
  name: Svartkelda
  type: spring
  region: forest
  nearest_settlement: Vargheim
  distance_hours: 2
  terrain: forest_stream
  description: A spring that rises from under a house-sized boulder in a depression between two ridges, feeding a stream that
    runs east toward Feldwick. The water is ice-cold and tinted dark by tannins from the pine-needle bed it filters through
    — not dirty, but black as ale in cupped hands. The spring-head is ringed by ferns that grow nowhere else in the Black
    Pine, their fronds impossibly green against the brown and grey of the forest floor. The boulder itself is split down the
    centre, and the water emerges from the crack with a constant low hiss like breath through clenched teeth. Vargheim draws
