- id: GEO_FOREST_014
  name: Djúpgil
  type: ravine
  region: forest
  nearest_settlement: Vargheim
  distance_hours: 5
  terrain: canopy_dark
  description: A narrow ravine cut through the bedrock by a seasonal stream, twenty feet deep and barely wide enough for two
