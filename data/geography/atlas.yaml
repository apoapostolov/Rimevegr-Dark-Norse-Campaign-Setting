    person at a time, leading into chambers carved by meltwater over centuries. The walls glow from within: light enters through
    the ice above and arrives blue, diffuse, and directionless. Sound behaves wrong — a whisper carries a hundred paces, but
    a shout dies within arm''s reach. The deepest chamber contains a frozen waterfall, arrested mid-flow, with something dark
    suspended inside the ice column. It might be a body. The proportions are wrong for a human but not wrong enough to be
    certain.'
  elevation: mid
  seasonal_access:
    spring: false
    summer: true
    autumn: false
    winter: false
  tidal_access: not_applicable
  hazards:
  - Ice collapse — the ceiling shifts seasonally and calves slabs without warning; a direct hit is fatal
  - Disorientation — the directionless blue light and inverted acoustics strip navigational instinct within minutes
  - The frozen waterfall chamber registers colder than the outside air by a significant margin — breath freezes mid-exhale
  - Those who touch the ice column around the dark shape report hearing a heartbeat — slow, irregular, huge
  resources:
  - Pure ice — the glacial ice is crystal-clear and free of sediment, superior for meltwater
  - Shelter from wind — the cave interior is still air, which in the ice region is a meaningful survival advantage
  - The frozen waterfall chamber contains ancient air pockets; alchemists would pay well for sealed samples
  lore_hooks:
  - Ragnhild has visited the cave and refuses to discuss the dark shape inside the frozen waterfall
  - The inverted acoustics suggest the cave was shaped deliberately — natural melt-caves do not behave this way
  - An Icebreak fisher claims to have heard singing from the cave entrance in midwinter when the cave should be sealed by
    ice — a single voice, no words, just a note held far longer than human lungs allow
