- id: GEO_MTN_013
  name: Blóðegg
  type: knife_edge
  region: mountain
  nearest_settlement: Raven's Perch
  distance_hours: 5
  terrain: knife_ridge
  description: A half-mile knife-edge ridge connecting two peaks north of Raven's Perch — the spine of rock is barely wider
    than a man's shoulders for most of its length, with drops of several hundred feet on both sides. The granite here is fractured
    into sharp plates that cut hands and shred boot leather. Wind is constant and colder than anywhere else on the ridge because
    neither side provides shelter — the air comes from both directions at once, meeting at the spine in unpredictable gusts.
    Crossing takes two hours on a calm day. On a windy day it takes longer, because a man must crawl. Dagný has lost three
    scouts on the Blóðegg in living memory, all to wind-push on days that started calm.
  elevation: summit
  seasonal_access:
    spring: false
    summer: true
    autumn: false
    winter: false
  tidal_access: not_applicable
  hazards:
  - The ridge is barely shoulder-width — wind from either side pushes directly toward the opposite drop
  - Sharp granite plates cut hands and knees during crawling sections; blood makes the stone slick
  - Weather changes without warning at summit altitude — a calm approach can become a death-trap in minutes
  - The fractured rock shifts underfoot; plates can break free and slide, carrying a man's footing with them
  resources:
  - Direct route between the northern peaks — the only alternative is a two-day descent and re-ascent through the gorge system
  - Unmatched observation — the entire northern Rimevegr is visible from the ridge on clear days
  - Wind-exposed mineral veins in the fractured granite contain iron-pyrite; emergency fire-starting material
  lore_hooks:
  - The name means 'blood-edge' — it earned it; the stone is permanently stained dark in the crawling sections
  - Dagný forbids solo crossings and requires rope-linkage for any party attempting the ridge; she herself has crossed it
    nine times
  - The three scouts lost here are commemorated with iron spikes driven into the ridge at the points they fell — one spike
    for each
  associated_barrows: []
  associated_npcs: []
  associated_chains: []
