  name: Ísbrú
  type: ice_bridge
  region: ice
  nearest_settlement: Icebreak
  distance_hours: 5
  terrain: ice_field
  description: A natural ice bridge spanning a crevasse forty paces wide and of unknown depth — the bottom is not visible,
    only darkness and the faint sound of water running far below. The bridge itself is three paces wide at its narrowest,
    glazed smooth by wind, and sagging visibly at the center. Crossing takes less than a minute but feels longer. The ice
