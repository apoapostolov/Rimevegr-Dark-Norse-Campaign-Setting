    summer: fair
    winter: poor
  trade_traffic: moderate
  military_patrols: Deepholm silver-guard escorts (paid, not regular)
  lore_notes: Deepholm's silver reaches the outside world through Kolvik's harbour. This road is the reason Kolvik matters.
