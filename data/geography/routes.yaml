    description: South from Feldwick along the forest boundary. Cleared pasture on one side, dense trees on the other. Sheep
      graze the cleared land.
  - terrain: open_grassland
    distance_km: 25
    description: Rolling grassland between forest and moor. The trail is beaten flat by wool wagons. Ruts fill with water
      in rain but the ground is firm beneath.
  - terrain: moor_approach
    distance_km: 20
    description: The grass thins to heather as the ground rises toward Thornwall. Peat smoke and the sound of the stronghold's
      work carry on the wind.
  seasonal_access:
    spring: passable
    summer: good
    autumn: good
    winter: passable
  hazards:
  - type: ambush
    description: Wool wagons are easy targets. The grassland offers little cover for travellers but the forest edge provides
      it for bandits.
