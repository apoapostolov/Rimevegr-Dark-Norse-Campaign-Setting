- id: RTE_041
  name: Griptvegr (The Relic Road)
  from_settlement: Ashmark
  to_settlement: Skaldhaven
  distance_km: 65
  travel_days_summer: 4
  travel_days_winter: 7
  terrain_segments:
  - terrain: forest_path
    distance_km: 20
    description: West from Ashmark through mixed forest. The trail follows an old track — wider than it needs to be, as if
      once built for traffic that no longer comes.
  - terrain: barrow_field
    distance_km: 20
    description: An expanse of low burial mounds at the forest's western edge. Relic hunters dig here illegally. Fresh excavation
      pits scar the landscape.
  - terrain: fjord_descent
    distance_km: 25
    description: Long descent through scrub and rock toward the fjord. Skaldhaven's mead-halls and archives are visible below,
      built into the cliff.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: dangerous
  hazards:
  - type: supernatural
    description: The barrow field. Relic hunters who dig too deep report cold hands gripping their ankles from below. Two
      were found dead in a pit last summer — no marks on them.
    chance_percent: 15
  - type: ambush
    description: Relic hunters are jealous of their finds. Parties have been attacked by other diggers over promising excavation
      sites.
    chance_percent: 15
  landmarks:
  - GEO_FOREST_018
  - GEO_COAST_011
  shelters: []
  foraging:
    summer: fair
    winter: poor
  trade_traffic: low
  military_patrols: none
  lore_notes: Ashmark's smelters occasionally turn up old metalwork — bronze, not iron. Skaldhaven's scholars pay well for
    barrow-finds and pre-settlement artifacts. This road exists because dead men's treasure is still treasure.
  image_prompt: Old wide forest track, barrow mounds with fresh excavation pits, scattered bronze artifacts, fjord descent
    toward cliff-built mead-halls, relic-hunter atmosphere.
- id: RTE_042
  name: Útflutningsvegr (The Export Road)
  from_settlement: Deepholm
  to_settlement: Kolvik
  distance_km: 65
  travel_days_summer: 4
  travel_days_winter: 7
  terrain_segments:
  - terrain: tunnel_south_exit
    distance_km: 8
    description: Through Deepholm's lower trade tunnels — wider and better-lit than the mining levels. Mule carts loaded with
      finished metalwork and silver ingots form queues at the exit.
  - terrain: foothill_trail
    distance_km: 30
    description: Winding trail through rocky foothills. Stream crossings every few kilometres. The path is rutted from trade
      traffic but maintained by neither settlement.
  - terrain: coastal_lowland
    distance_km: 27
    description: The foothills flatten into salt-grass lowlands. Kolvik's harbour masts are visible. The smell of fish and
      tar.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: dangerous
  hazards:
  - type: ambush
    description: Silver wagons attract attention. The foothill section has blind curves where ambushers wait. Merchants hire
      guards or travel in convoy.
    chance_percent: 20
  - type: terrain
    description: Foothill stream crossings wash out after storms. A loaded cart stuck in a swollen ford is a day's delay and
      an invitation to thieves.
    chance_percent: 15
  landmarks:
  - GEO_DEEP_018
  - GEO_COAST_017
  shelters:
