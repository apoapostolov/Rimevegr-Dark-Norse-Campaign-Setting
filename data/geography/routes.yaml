routes:
- id: RTE_001
  name: Beinvegr (The Bone Road)
  from_settlement: Frostfjord Hollow
  to_settlement: Ashen Reach
  distance_km: 45
  travel_days_summer: 2
  travel_days_winter: 4
  terrain_segments:
  - terrain: fjord_ridge
    distance_km: 15
    description: Exposed ridge above the fjord. Wind hammers from the west. Whale bone markers line the path — old navigational
      posts driven into the rock by hands no one remembers.
  - terrain: pine_slope
    distance_km: 20
    description: Descent through sparse pine. The soil is thin and the roots grip bare rock. Slippery in rain, treacherous
      in frost.
  - terrain: open_approach
    distance_km: 10
    description: Open ground approaching Ashen Reach. Visible from the walls for the last two miles. No cover.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: dangerous
  hazards:
  - type: ambush
    description: Ashen Reach scouts watch the ridgeline. Patrols run twice daily in summer.
    chance_percent: 25
  - type: weather
    description: The exposed ridge catches every storm off the fjord. Driving rain or snow can halt travel for hours.
    chance_percent: 30
  landmarks:
  - GEO_FROST_012
  - GEO_FROST_006
  shelters:
  - name: Ridge Overhang
    capacity: 8
    quality: poor
    distance_from_start_km: 12
  foraging:
    summer: fair
    winter: poor
  trade_traffic: low
  military_patrols: Ashen Reach scouts
  lore_notes: Named for the whale bones lining the first ridge — old navigational markers. Frostfjord and Ashen Reach have
    feuded over this corridor for three generations. Blood has been spilled here more than once.
  image_prompt: Wind-blasted ridge path above a dark fjord, whale bone markers driven into grey rock, sparse pines below,
    overcast sky, a distant walled settlement on open ground.
- id: RTE_002
  name: Fjörðskuggaleið (The Fjord-Shadow Path)
  from_settlement: Frostfjord Hollow
  to_settlement: Skaldhaven
  distance_km: 30
  travel_days_summer: 1.5
  travel_days_winter: 3
  terrain_segments:
  - terrain: fjord_shore
    distance_km: 12
    description: Narrow path cut into the cliff face above the fjord. At high tide the lowest sections are wet with spray.
      One stumble and it is a long fall into black water.
  - terrain: sea_cliff
    distance_km: 10
    description: Climbing traverse along the outer cliff. The path widens here but the wind is relentless. Gulls nest in the
      rock face.
  - terrain: cliff_descent
    distance_km: 8
    description: Switch-back descent to Skaldhaven's harbour shelf. Rope-holds are driven into the rock at the steepest points.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: dangerous
  hazards:
  - type: terrain
    description: The cliff path is narrow and crumbles. Rockfalls after heavy rain. Two travellers were lost last autumn.
    chance_percent: 15
  - type: weather
    description: Sea fog rolls in without warning. On the cliff face, visibility drops to arm's length.
    chance_percent: 25
  landmarks:
  - GEO_FROST_004
  - GEO_FROST_013
  - GEO_COAST_008
  shelters:
  - name: Cliff-Niche Camp
    capacity: 5
    quality: poor
    distance_from_start_km: 14
  foraging:
    summer: fair
    winter: poor
  trade_traffic: low
  military_patrols: Skaldhaven cliff-watchers
  lore_notes: The fjord shadow falls across the path for most of the day. Locals say the Drowned God watches anyone who walks
    this road. Skald tradition holds that a poem composed on this path carries the sea's weight.
  image_prompt: Narrow cliff path above a dark fjord, spray from black water below, rope-holds in grey rock, sea fog approaching,
    distant sea-cliff settlement.
- id: RTE_003
  name: Ekkjubraut (The Widow's Crossing)
  from_settlement: Ashen Reach
  to_settlement: Thornwall
  distance_km: 55
  travel_days_summer: 3
  travel_days_winter: 5
  terrain_segments:
  - terrain: forest_edge
    distance_km: 10
    description: The first stretch follows the burnt treeline north of Ashen Reach. Charred stumps and new growth. The tar-works
      smoke is visible behind.
  - terrain: open_moor
    distance_km: 30
    description: Flat moor. No trees, no shelter. The wind comes from every direction. In rain the ground turns to black mud
      that sucks at boots and wheels. Track-markers are cairns of piled stone, half of them toppled.
  - terrain: bog_crossing
    distance_km: 8
    description: A belt of soft ground before the moor rises toward Thornwall. Plank walkways laid in the worst sections,
      but they shift and rot.
  - terrain: moor_rise
    distance_km: 7
    description: The final rise to Thornwall's gate. The stronghold is visible from two miles out — squat, dark, and unwelcoming.
  seasonal_access:
    spring: dangerous
    summer: passable
    autumn: passable
    winter: dangerous
  hazards:
  - type: terrain
    description: Bog crossing. The plank walkways rot faster than they are replaced. Pack animals have been swallowed.
    chance_percent: 20
  - type: weather
    description: Open moor — no shelter from storms. Lightning strikes the cairns.
    chance_percent: 30
  - type: ambush
    description: Outlaws use the featureless moor. A band can approach from any direction and vanish into the fog.
    chance_percent: 15
  landmarks:
  - GEO_MOOR_004
  - GEO_MOOR_007
  shelters:
  - name: Cairn-Ring Shelter
    capacity: 6
    quality: poor
    distance_from_start_km: 22
  foraging:
    summer: poor
    winter: poor
  trade_traffic: moderate
  military_patrols: Thornwall warband outriders
  lore_notes: Named after the Pale Widow of Ashen Reach, who walks this route in person — always with guards. The crossing
    is flat but the moor swallows the careless. Thornwall patrols ride it in summer to keep the route open for trade.
  image_prompt: Flat dark moor stretching to the horizon, cairn markers half-toppled, rotting plank walkway over black bog,
    distant squat stronghold on a rise, grey sky.
- id: RTE_004
  name: Askstígr (The Charred Trail)
  from_settlement: Ashen Reach
  to_settlement: Ashmark
  distance_km: 35
  travel_days_summer: 2
  travel_days_winter: 3
  terrain_segments:
  - terrain: burnt_clearing
    distance_km: 8
    description: Through the controlled burn-zones east of Ashen Reach. Blackened ground, new grass pushing through. The tar-workers
      use this area.
  - terrain: mixed_forest
    distance_km: 18
    description: Old forest. The canopy closes overhead and the light dims. The trail is marked by axe-blazes on birch trunks,
      but some have grown over.
  - terrain: forest_border
    distance_km: 9
    description: The trees thin and the ground changes — rock shows through the soil. Ashmark's smelter smoke is visible before
      the settlement is.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: passable
  hazards:
  - type: predator
    description: Wolves in the deep section of the forest. They follow travellers but rarely attack groups larger than three.
    chance_percent: 20
  - type: ambush
    description: Bandits work the mid-forest where visibility is lowest. A favourite spot is the stream crossing at the old
      axe-blaze.
    chance_percent: 15
  landmarks:
  - GEO_FOREST_006
  - GEO_FOREST_002
  shelters:
  - name: Charcoal-Burner's Hut
    capacity: 4
    quality: fair
    distance_from_start_km: 10
  - name: Stream-Ford Lean-To
    capacity: 6
    quality: poor
    distance_from_start_km: 24
  foraging:
    summer: good
    winter: fair
  trade_traffic: moderate
  military_patrols: Ashen Reach woodcutters (armed)
  lore_notes: The trail follows the line of old forest fires — both accidental and deliberate. Ashen Reach burns sections
    of forest for tar production; the charred ground is their signature. Ashmark smelters depend on charcoal ferried along
    this route.
  image_prompt: Forest trail through charred and regrown woodland, axe-blazed birch trunks, thin light through canopy, distant
    smelter smoke, dark atmospheric.
- id: RTE_005
  name: Mosavegr (The Moss Way)
  from_settlement: Thornwall
  to_settlement: Moor's End
  distance_km: 40
  travel_days_summer: 2
  travel_days_winter: 4
  terrain_segments:
  - terrain: heath_moor
    distance_km: 15
    description: Open heather moor south of Thornwall. The ground is spongy but firm enough for cart traffic in summer. Curlews
      call from the hummocks.
  - terrain: peat_hags
    distance_km: 15
    description: Deep peat country. The trail winds between head-high banks of cut peat. Disorienting in fog — every turning
      looks the same.
  - terrain: moor_basin
    distance_km: 10
    description: The moor drops into a shallow basin where Moor's End sits. Smoke from the settlement's fires pools in the
      low ground on still days.
  seasonal_access:
    spring: dangerous
    summer: passable
    autumn: passable
    winter: dangerous
  hazards:
  - type: terrain
    description: Peat hags conceal sinkholes. The ground looks solid until it gives way. A laden mule was lost here in spring.
    chance_percent: 20
  - type: weather
    description: Fog fills the peat cuttings. Travellers have walked in circles for hours before finding the trail again.
    chance_percent: 25
  landmarks:
  - GEO_MOOR_006
  - GEO_MOOR_009
  shelters:
  - name: Peat-Cutter's Bothy
    capacity: 4
    quality: fair
    distance_from_start_km: 18
  foraging:
    summer: poor
    winter: poor
  trade_traffic: none
  military_patrols: None — too remote
  lore_notes: Moor's End is barely worth the journey. Thirty-one souls scratching a living from sheep and peat. The Moss Way
    exists because Thornwall needs peat for fuel, not because anyone wants to visit.
  image_prompt: Heather moor with head-high peat banks, narrow winding trail, fog pooling in low ground, distant thin smoke
    from a tiny settlement, desolate sky.
- id: RTE_006
  name: Hrímheiðarvegr (The Rime-Moor Road)
  from_settlement: Thornwall
  to_settlement: Grimholt
  distance_km: 60
  travel_days_summer: 3
  travel_days_winter: 6
  terrain_segments:
  - terrain: moor_plateau
    distance_km: 20
    description: High moor north-east of Thornwall. The ground is hard and the grass is short. Rime coats everything in autumn
      mornings — ice crystals on every blade and stone.
  - terrain: rime_moor
    distance_km: 25
    description: The moor changes character. The soil darkens, the vegetation thins to lichen and moss. Iron-stained water
      seeps from the ground. Cairns mark the way but the stones are blackened with oxidation.
  - terrain: grimholt_approach
    distance_km: 15
    description: The ground rises toward Grimholt. Slag deposits and old mine tailings litter the final stretch. The air tastes
      of metal.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: dangerous
  hazards:
  - type: weather
    description: Rime-fog. The moor generates its own weather — freezing mist that coats everything in ice and reduces visibility
      to nothing.
    chance_percent: 35
  - type: supernatural
    description: Travellers report lights on the rime-moor at night. Pale flickering that moves against the wind. The locals
      avoid travel after dark.
    chance_percent: 10
  - type: predator
    description: Rime-wolves range the open moor in winter. Larger and bolder than forest wolves.
    chance_percent: 15
  landmarks:
  - GEO_MOOR_001
  - GEO_GRIM_002
  - GEO_GRIM_006
  shelters:
  - name: Stone Shepherd's Hut
    capacity: 6
    quality: fair
    distance_from_start_km: 22
  - name: Cairn-Hollow
    capacity: 4
    quality: poor
    distance_from_start_km: 42
  foraging:
    summer: poor
    winter: poor
  trade_traffic: moderate
  military_patrols: Grimholt iron-guard outriders
  lore_notes: The rime-moor has its own rules. The transition from Thornwall's moor to Grimholt's rime-moor is gradual but
    unmistakable — the ground changes colour, the air changes taste, and the silence deepens. Old hands say the moor decides
    who crosses safely.
  image_prompt: Bleak moor plateau coated in rime ice, iron-stained water, blackened cairn markers, pale fog, lichen and moss,
    distant slag heaps, dark oppressive sky.
- id: RTE_007
  name: Járnvegr (The Iron Road)
  from_settlement: Grimholt
  to_settlement: Deepholm
  distance_km: 50
  travel_days_summer: 2
  travel_days_winter: 4
  terrain_segments:
  - terrain: slag_road
    distance_km: 10
    description: Compacted slag and crushed rock — the best-maintained road surface in the Rimevegr. Wagon ruts are deep and
      well-worn. Iron-guard checkpoints at both ends.
  - terrain: mine_valley
    distance_km: 25
    description: The road follows the valley between Grimholt's surface mines and Deepholm's underground works. Cart traffic
      is constant in summer. Ore wagons, charcoal loads, trade goods. The road is wide enough for two carts to pass.
  - terrain: deepholm_descent
    distance_km: 15
    description: The final descent to Deepholm's main gate. The road cuts into the hillside in a series of switchbacks. Lanterns
      are mounted on iron posts — the only road in the Rimevegr with artificial light.
  seasonal_access:
    spring: good
    summer: good
    autumn: good
    winter: passable
  hazards:
  - type: ambush
    description: Bandits target ore wagons on the mid-valley stretch. Iron-guard patrols have reduced attacks but not eliminated
      them.
    chance_percent: 10
  - type: terrain
    description: Rockslides in the descent section after heavy rain. The switchbacks are carved from unstable ground.
    chance_percent: 10
  landmarks:
  - GEO_GRIM_004
  - GEO_GRIM_005
  - GEO_DEEP_001
  shelters:
  - name: Iron-Guard Way-Station
    capacity: 20
    quality: good
    distance_from_start_km: 18
  - name: Valley Rest House
    capacity: 12
    quality: fair
    distance_from_start_km: 35
  foraging:
    summer: poor
    winter: poor
  trade_traffic: heavy
  military_patrols: Grimholt iron-guard — regular patrols, armed and mounted
  lore_notes: The busiest road in the Rimevegr and the only one that resembles civilisation. Iron and silver flow south from
    Deepholm; food, timber, and goods flow north. The iron-guard maintain it because their livelihood depends on it. Toll
    stations at both ends extract payment from every wagon.
  image_prompt: Wide compacted slag road through a mine valley, deep wagon ruts, ore carts, iron-post lanterns along switchback
    descent, iron-guard checkpoint, industrial dark fantasy.
- id: RTE_008
  name: Markaleið (The Border Trail)
  from_settlement: Grimholt
  to_settlement: Ashmark
  distance_km: 30
  travel_days_summer: 1.5
  travel_days_winter: 3
  terrain_segments:
  - terrain: rime_moor_edge
    distance_km: 12
    description: The western fringe of Grimholt's rime-moor. The ground is hard and the vegetation sparse. Iron-stained streams
      cross the trail in shallow fords.
  - terrain: border_scrub
    distance_km: 10
    description: Transition zone between moor and forest. Stunted birch and hawthorn. The trail is poorly marked — a line
      of cairns that could be natural rockfall.
  - terrain: forest_clearing
    distance_km: 8
    description: The trees begin and the trail enters Ashmark's territory. Smelter smoke and the sound of hammering carry
      through the woods.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: passable
  hazards:
  - type: ambush
    description: The border scrub provides cover. Thieves and deserters hide in the stunted trees and rob solo travellers.
    chance_percent: 20
  - type: predator
    description: Wolves follow the border-line where moor meets forest. Easy hunting — domestic animals cross here.
    chance_percent: 15
  landmarks:
  - GEO_GRIM_014
  - GEO_GRIM_008
  shelters:
  - name: Ford-Shelter
    capacity: 6
    quality: poor
    distance_from_start_km: 15
  foraging:
    summer: fair
    winter: poor
  trade_traffic: low
  military_patrols: Occasional Grimholt outriders
  lore_notes: Neither settlement claims this trail or maintains it. Grimholt says it ends at the border; Ashmark says it begins
    there. The result is a path that nobody repairs. Useful primarily for charcoal haulers and smugglers avoiding Iron Road
    tolls.
  image_prompt: Scrubby border land between dark moor and forest edge, stunted birch, iron-stained stream ford, poorly marked
    cairn trail, grey overcast.
- id: RTE_009
  name: Námuvegr (The Mine Road)
  from_settlement: Deepholm
  to_settlement: Ashmark
  distance_km: 25
  travel_days_summer: 1
  travel_days_winter: 2
  terrain_segments:
  - terrain: tunnel_exit
    distance_km: 5
    description: The road begins at Deepholm's western gate — a low arch in the rock face. Mule trains queue here at dawn.
      The air changes from underground mineral damp to open wind in fifty paces.
  - terrain: ravine_path
    distance_km: 12
    description: A narrow road following the bottom of a rocky ravine. Old mine tailings form grey banks on both sides. Water
      runs through the centre after rain.
  - terrain: forest_approach
    distance_km: 8
    description: The ravine opens out and scattered trees begin. Ashmark's stockade is visible through the last stretch of
      birch.
  seasonal_access:
    spring: passable
    summer: good
    autumn: good
    winter: passable
  hazards:
  - type: terrain
    description: The ravine floods in heavy rain. Water rises fast and the road becomes a stream. A mule train was caught
      last spring — three animals drowned.
    chance_percent: 15
  - type: ambush
    description: The ravine walls provide elevation for attackers. Arrows from above, nowhere to run.
    chance_percent: 10
  landmarks:
  - GEO_DEEP_012
  - GEO_DEEP_013
  shelters: []
  foraging:
    summer: poor
    winter: poor
  trade_traffic: moderate
  military_patrols: Deepholm mule-guard escorts
  lore_notes: Short but vital. Ashmark's smelters process ore that Deepholm mines. The mule trains run daily in summer. Deepholm's
    mule-guard escorts the loads — not out of courtesy, but because stolen ore means lost profit.
  image_prompt: Rocky ravine road with grey mine tailings, mule train emerging from a low stone arch, scattered birch, distant
    stockade, industrial Norse atmosphere.
- id: RTE_010
  name: Himinstígr (The Sky Climb)
  from_settlement: Deepholm
  to_settlement: Raven's Perch
  distance_km: 40
  travel_days_summer: 3
  travel_days_winter: 6
  terrain_segments:
  - terrain: upper_tunnels
    distance_km: 8
    description: The route begins inside Deepholm, climbing through the upper mining levels. Lantern-light gives way to grey
      sky at the northern exit — a crack in the mountain face.
  - terrain: mountain_switchback
    distance_km: 22
    description: Exposed switchback trail carved into the mountain. The grade is punishing. Pack animals balk at the steeper
      sections. Loose scree under every step.
  - terrain: ridge_approach
    distance_km: 10
    description: Above the treeline. The trail follows a bare rock ridge to Raven's Perch. Wind is constant and brutal. On
      clear days, half the Rimevegr is visible below.
  seasonal_access:
    spring: dangerous
    summer: passable
    autumn: dangerous
    winter: impassable
  hazards:
  - type: terrain
    description: Scree slopes and loose rock. A stumble on the switchbacks means a fall of fifty yards or more.
    chance_percent: 20
  - type: weather
    description: Above the treeline, storms arrive without warning. Freezing wind, hail, whiteout conditions even in summer.
    chance_percent: 30
  - type: predator
    description: Eagles and ravens are harmless. The mountain cats are not. Solitary, silent, and they favour the switchbacks
      where prey is trapped.
    chance_percent: 10
  landmarks:
  - GEO_MTN_004
  - GEO_MTN_002
  - GEO_DEEP_014
  shelters:
  - name: Switchback Cave
    capacity: 8
    quality: fair
    distance_from_start_km: 18
  - name: Ridge Cairn Windbreak
    capacity: 4
    quality: poor
    distance_from_start_km: 33
  foraging:
    summer: poor
    winter: poor
  trade_traffic: none
  military_patrols: Raven's Perch lookouts descend to the switchback cave in summer
  lore_notes: Only the determined or the desperate climb to Raven's Perch. The lookout garrison resupplies through Deepholm's
    tunnels when weather permits. In winter, the Perch is cut off entirely — the garrison survives on stored food and stubbornness.
  image_prompt: Brutal mountain switchback trail carved into grey rock, exposed scree, distant peak lookout, clouds below,
    wind-stripped ridge, dark Norse mountain atmosphere.
- id: RTE_011
  name: Svartfuruvegr (The Black Pine Way)
  from_settlement: Vargheim
  to_settlement: Feldwick
  distance_km: 55
  travel_days_summer: 3
  travel_days_winter: 5
  terrain_segments:
  - terrain: deep_pine
    distance_km: 25
    description: The heart of the Black Pine. The canopy is so thick that noon looks like dusk. The trail is a foot-beaten
      line of packed needles. Sound travels strangely — voices carry, but direction is lost.
  - terrain: pine_thinning
    distance_km: 18
    description: The forest thins gradually. Birch mixes with pine. Light increases. The undergrowth thickens where sunlight
      reaches the floor.
  - terrain: forest_edge
    distance_km: 12
    description: The last trees give way to open ground. Feldwick's damaged palisade is visible across a sheep-cropped field.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: dangerous
  hazards:
  - type: predator
    description: Wolf packs in the deep pine. Vargheim's hunters know them by name — the Scar Pack, the Grey Bitch's litter.
      They are bolder in winter.
    chance_percent: 25
  - type: ambush
    description: Visibility in the deep pine is ten paces. Anyone could be behind the next trunk.
    chance_percent: 15
  - type: supernatural
    description: The deep forest has sounds that do not belong to any known animal. Scratching in the canopy. Breathing where
      nothing should breathe.
    chance_percent: 5
  landmarks:
  - GEO_FOREST_001
  - GEO_FOREST_005
  - GEO_FOREST_010
  shelters:
  - name: Hunter's Lean-To
    capacity: 6
    quality: fair
    distance_from_start_km: 14
  - name: Birch-Ring Camp
    capacity: 8
    quality: poor
    distance_from_start_km: 38
  foraging:
    summer: good
    winter: fair
  trade_traffic: low
  military_patrols: Vargheim wolf-hunters patrol the first ten miles
  lore_notes: The Black Pine is Vargheim's domain and outsiders are not welcome without cause. The wolf-hunters know every
    trail, every den, every ambush point. They let travellers pass — but they watch.
  image_prompt: Dense black pine forest, near-dark under thick canopy, foot-beaten needle path, shafts of pale light, distant
    wolf silhouette, oppressive atmosphere.
- id: RTE_012
  name: Úlfavegr (The Wolf Road)
  from_settlement: Vargheim
  to_settlement: Ashmark
  distance_km: 45
  travel_days_summer: 2.5
  travel_days_winter: 5
  terrain_segments:
  - terrain: deep_pine
    distance_km: 15
    description: Through Vargheim's outer forest. Axe-blazes mark the way on pine trunks, refreshed each spring by the wolf-hunters.
  - terrain: mixed_forest
    distance_km: 20
    description: The pine gives way to mixed woodland — oak, birch, ash. Undergrowth is thick. Old charcoal-burning clearings
      dot the route, some still in use.
  - terrain: forest_border
    distance_km: 10
    description: The forest thins to scattered trees and rocky ground. Ashmark's smelter glow is visible at night from the
      last ridge.
  seasonal_access:
    spring: passable
    summer: good
    autumn: passable
    winter: dangerous
  hazards:
  - type: predator
    description: Wolves. The road is named for them. In winter, packs follow travellers at a distance. They attack the weak,
      the slow, and the alone.
    chance_percent: 25
  - type: ambush
    description: Deserters and outlaws camp in the abandoned charcoal clearings. They prey on small groups.
    chance_percent: 15
  landmarks:
  - GEO_FOREST_003
  - GEO_FOREST_008
  shelters:
  - name: Old Charcoal Camp
    capacity: 10
    quality: fair
    distance_from_start_km: 20
  foraging:
    summer: good
    winter: fair
  trade_traffic: low
  military_patrols: None regular — Vargheim wolf-hunters range this far occasionally
  lore_notes: The wolf road is older than either settlement. Vargheim's founders followed wolf trails to find their clearing.
    The wolves were here first, and their claim on this forest is older and stronger than any human's.
  image_prompt: Forest road through dark mixed woodland, axe-blazes on pine trunks, old charcoal clearing, wolf tracks in
    mud, scattered trees giving way to rocky ground.
- id: RTE_013
  name: Austrvegr (The Eastern Approach)
  from_settlement: Feldwick
  to_settlement: Ashen Reach
  distance_km: 30
  travel_days_summer: 1.5
  travel_days_winter: 3
  terrain_segments:
  - terrain: sheep_fields
    distance_km: 8
    description: Open grazing land east of Feldwick. Low stone walls divide the fields. The ground is firm and the walking
      easy. Sheep scatter at the sight of armed travellers.
  - terrain: scrub_moor
    distance_km: 12
