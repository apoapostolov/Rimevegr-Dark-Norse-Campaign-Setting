# Iron Ledger — Names, Language, and Kennings Database
# Project: Iron Ledger -- Mercenaries of the Rimevegr
# Purpose: Structured tables for random generation and prose reference.
#   Covers personal names, bynames, kennings, oaths, curses, insults,
#   greetings, farewells, battle cries, proverbs, mercenary slang,
#   settlement etymologies, and place-name building blocks.
# Cross-reference: 06_DICTIONARY_OF_NORSE_TERMS.md for prose definitions.
#   This file is structured YAML for tooling and quick lookup.

names_and_language:
  # -------------------------------------------------------------------
  # 1. MALE NAMES (30)
  # -------------------------------------------------------------------
  male_names:
    description: >
      Norse masculine names common in the Rimevegr. Drawn from Old Norse
      roots, adapted for readability. Regional notes indicate where a name
      is more likely heard — not exclusive, just flavour.
    entries:
      - name: "Arnbjorn"
        meaning: "Eagle-bear"
        usage: "Common in mountain settlements. A sturdy, old-fashioned name."
      - name: "Bjarn"
        meaning: "Bear"
        usage: "Short, blunt. Favoured in the Black Pine."
      - name: "Dagr"
        meaning: "Day"
        usage: "Ironic in the Rimevegr's eternal twilight. Parents who name a son Dagr are hopeful or cruel."
      - name: "Egil"
        meaning: "Edge of a sword"
        usage: "Common among warriors. Thane Egil Raven-Eye of Raven's Perch carries it."
      - name: "Eirik"
        meaning: "Eternal ruler"
        usage: "A jarl's name. Sounds ambitious on a common man."
      - name: "Fenris"
        meaning: "Fen-dweller"
        usage: "Moor settlements. Carries a whiff of the wolf-myth."
      - name: "Grimr"
        meaning: "Masked one"
        usage: "The Aesrgrim's shadow in the name. Common in devout families."
      - name: "Gunnar"
        meaning: "War-warrior"
        usage: "Widespread. A fighting man's name that promises nothing subtle."
      - name: "Hadric"
        meaning: "War-ruler"
        usage: "Germanic root. Hadric the Younger leads the Three Wolves."
      - name: "Halfdan"
        meaning: "Half-Dane"
        usage: "Old bloodline name. Implies mixed southern ancestry."
      - name: "Hjalti"
        meaning: "Hilt (of a sword)"
        usage: "Coastal settlements. A name that grips."
      - name: "Hroald"
        meaning: "Famous ruler"
        usage: "Fjord jarls. Formal, high-born."
      - name: "Hrothgar"
        meaning: "Famous spear"
        usage: "Jarl of Frostfjord Hollow. A name that expects things of its bearer."
      - name: "Ivar"
        meaning: "Bow-warrior"
        usage: "Common everywhere. Short enough for a shout."
      - name: "Keld"
        meaning: "Spring, well"
        usage: "River settlements. Quiet name, quiet men."
      - name: "Ketil"
        meaning: "Cauldron, helmet"
        usage: "Suggests endurance. Common in the moors."
      - name: "Leif"
        meaning: "Heir, descendant"
        usage: "Old families. Implies someone worth inheriting from."
      - name: "Magnus"
        meaning: "Great"
        usage: "Rare. A name that invites mockery if the man does not match it."
      - name: "Njal"
        meaning: "Champion"
        usage: "Coastal and fjord settlements. Old saga name."
      - name: "Orm"
        meaning: "Serpent"
        usage: "Common. No one thinks of actual serpents."
      - name: "Ragnar"
        meaning: "Army-counsel"
        usage: "A leader's name. Not given to second sons."
      - name: "Sigurd"
        meaning: "Victory-guardian"
        usage: "Widespread. The most common heroic name in the Rimevegr."
      - name: "Skaldr"
        meaning: "Poet, skald"
        usage: "Rare as a given name. Usually earned. Skaldhaven takes its root from this."
      - name: "Steinn"
        meaning: "Stone"
        usage: "Mountain settlements. Blunt and immovable."
      - name: "Thorvald"
        meaning: "Thurr's ruler"
        usage: "Thunder-god's name. Common in families that still sacrifice to Thurr."
      - name: "Torsten"
        meaning: "Thurr's stone"
        usage: "Reeve Torsten of Ashmark. A dependable, unglamorous name."
      - name: "Ulf"
        meaning: "Wolf"
        usage: "Jarl Ulf Vargson of Vargheim. Wolf-names cluster in the Black Pine."
      - name: "Varg"
        meaning: "Wolf, outlaw"
        usage: "Dangerous name. A varg is an outlaw hunted like a wolf."
      - name: "Vidar"
        meaning: "Wide warrior"
        usage: "Old saga name. Suggests patience and silence."
      - name: "Yngvar"
        meaning: "Ing's warrior"
        usage: "Southern bloodline name. Rare in the deep Rimevegr."

  # -------------------------------------------------------------------
  # 2. FEMALE NAMES (20)
  # -------------------------------------------------------------------
  female_names:
    description: >
      Norse feminine names in the Rimevegr. Women hold property, run
      settlements, practice seidr, and command bands. A woman's name
      carries the same weight as a man's.
    entries:
      - name: "Agna"
        meaning: "Edge, point"
        usage: "Sharp name. Given to girls born during storms."
      - name: "Astrid"
        meaning: "Divine beauty"
        usage: "Old-fashioned. The Pale Widow's birth name, never used."
      - name: "Brosa"
        meaning: "To smile"
        usage: "Elder Brosa of Moor's End. Ironic — she never smiles."
      - name: "Dalla"
        meaning: "Valley"
        usage: "Common. The band's cook carries it."
      - name: "Fraeja"
        meaning: "The lady (divine)"
        usage: "Never given to mortal women. Blasphemous to use."
      - name: "Gudrun"
        meaning: "God's secret wisdom"
        usage: "Old saga name. Implies cunning."
      - name: "Helga"
        meaning: "Holy, blessed"
        usage: "Jarl Helga Thornwall. A name that expects piety or power."
      - name: "Hild"
        meaning: "Battle"
        usage: "Short, hard. A fighter's daughter or a fighter herself."
      - name: "Inga"
        meaning: "Protected by Ing"
        usage: "Harbour-Master Inga of Kolvik. Coastal name."
      - name: "Jorun"
        meaning: "Horse-lover"
        usage: "Moor settlements where horses matter."
      - name: "Katla"
        meaning: "Cauldron, kettle"
        usage: "Practical name. Women who brew, cook, or smith."
      - name: "Liv"
        meaning: "Life, protection"
        usage: "Given to sickly infants as a prayer. Sometimes it works."
      - name: "Ragnhild"
        meaning: "Battle-counsel"
        usage: "Hermit Ragnhild of Icebreak. A seidr-worker's name."
      - name: "Sigrid"
        meaning: "Victory-beauty"
        usage: "Common. Sigrid Blackwine leads the Iron Tide Remnant."
      - name: "Sigrun"
        meaning: "Victory-secret"
        usage: "Jarl Sigrun Deepholm. A name that holds things close."
      - name: "Solveig"
        meaning: "Sun-strength"
        usage: "Painfully hopeful in the Rimevegr. Given by mothers who remember light."
      - name: "Sura"
        meaning: "Sour"
        usage: "Pack-Elder Sura of the Bone Pack. Honest name."
      - name: "Thora"
        meaning: "Thurr's gift"
        usage: "Thunder-god families. Strong women who hit things."
      - name: "Torunn"
        meaning: "Thurr's love"
        usage: "Rare. Implies devotion to the thunder-god's violent mercy."
      - name: "Ylva"
        meaning: "She-wolf"
        usage: "Black Pine families. A name with teeth."

  # -------------------------------------------------------------------
  # 3. BYNAMES AND EPITHETS (25)
  # -------------------------------------------------------------------
  bynames_and_epithets:
    description: >
      Descriptive names earned through deeds, appearance, skill, origin,
      or irony. A byname replaces a family name in common speech. You do
      not choose your byname. Others choose it for you.
    entries:
      - name: "Blackwine"
        type: "deed"
        meaning: "Poisoned an enemy's wine at a feast."
        example: "Sigrid Blackwine — leader of the Iron Tide Remnant."
      - name: "Raven-Eye"
        type: "appearance"
        meaning: "One eye black and watchful as a raven's."
        example: "Thane Egil Raven-Eye of Raven's Perch."
      - name: "Red Jaw"
        type: "appearance"
        meaning: "Blood-stained beard from close kills."
        example: "Hadric the Younger — 'Red Jaw' — leader of the Three Wolves."
      - name: "Coldhand"
        type: "skill"
        meaning: "Kills cleanly, without heat or hesitation."
        example: "Duve 'Coldhand' Orn of the Silent Oar."
      - name: "Iron-Grip"
        type: "deed"
        meaning: "Held the gate at Grimholt alone for an hour."
        example: "Warchief Ordovast the Iron-Grip."
      - name: "Pale Widow"
        type: "appearance"
        meaning: "White-skinned, recently widowed, and cold as sea-fog."
        example: "The Pale Widow of Ashen Reach."
      - name: "Ash-born"
        type: "origin"
        meaning: "Born out of catastrophe. Survived a hall-burning."
        example: "Thorne Ash-born — the band's second."
      - name: "Half-tongue"
        type: "appearance"
        meaning: "Lost part of the tongue. Speaks thickly."
        example: "Keld Half-tongue, a commons man with a short temper."
      - name: "Worm-biter"
        type: "deed"
        meaning: "Bit the head off a snake on a dare. The story grew."
        example: "Njal Worm-biter, scout for the Bone Pack."
      - name: "Three-Fingers"
        type: "appearance"
        meaning: "Lost two fingers. Everyone can count."
        example: "Orm Three-Fingers, smith's apprentice at Deepholm."
      - name: "Stormcrow"
        type: "ironic"
        meaning: "Brings bad news. Some men are just unlucky messengers."
        example: "Vidar Stormcrow, a rider nobody wants to see coming."
      - name: "Quiet"
        type: "skill"
        meaning: "Moves without sound. Kills the same way."
        example: "Hild the Quiet — night-work specialist."
      - name: "Coin-bite"
        type: "skill"
        meaning: "Tests every coin with his teeth. Cheats no one and trusts no one."
        example: "Gest Coin-bite — the band's quartermaster."
      - name: "Mud-walker"
        type: "origin"
        meaning: "From the moors. Walks through bogs others sink in."
        example: "Fenris Mud-walker, a pathfinder from Moor's End."
      - name: "Spit-oath"
        type: "ironic"
        meaning: "Broke an oath once. The name followed forever."
        example: "Halfdan Spit-oath — no one contracts with him twice."
      - name: "The Lamp"
        type: "ironic"
        meaning: "Opposite of bright. Or: lights the way to the grave."
        example: "'The Lamp' Merric of the Three Wolves."
      - name: "Barrow-drunk"
        type: "deed"
        meaning: "Drank mead found in a barrow. Survived. Changed."
        example: "Ragnar Barrow-drunk, who hears things others do not."
      - name: "Cookpot"
        type: "ironic"
        meaning: "A man whose plans always boil over."
        example: "Steinn Cookpot, a sergeant whose ambitions exceed his skill."
      - name: "Whalebone"
        type: "appearance"
        meaning: "Tall, pale, and rigid. Built like carved ivory."
        example: "Gunnar Whalebone — you see him from across a field."
      - name: "Salt-lip"
        type: "origin"
        meaning: "Coastal-born. Tastes of brine."
        example: "Inga Salt-lip of Kolvik."
      - name: "Vargson"
        type: "origin"
        meaning: "Son of the wolf. Clan name in the Black Pine."
        example: "Jarl Ulf Vargson of Vargheim."
      - name: "Night-hand"
        type: "skill"
        meaning: "Works best in darkness. Thief, scout, or killer."
        example: "Fang Night-hand of the Bone Pack."
      - name: "Twice-dead"
        type: "deed"
        meaning: "Survived something that should have killed him. Twice."
        example: "Ivar Twice-dead, who walks with a limp and a reputation."
      - name: "Oakblood"
        type: "appearance"
        meaning: "Skin browned and weathered like old oak."
        example: "Torsten Oakblood, a forester who never comes indoors."
      - name: "Frost-tongue"
        type: "skill"
        meaning: "Words that cut colder than a blade. A negotiator or a cruel man."
        example: "Eirik Frost-tongue, who talks jarls out of their silver."

  # -------------------------------------------------------------------
  # 4. KENNINGS (50 total across 9 categories)
  # -------------------------------------------------------------------
  kennings:
    description: >
      Poetic compound metaphors from the skaldic tradition. In the
      Rimevegr, kennings survive in everyday speech as fossils — people
      use them without thinking of them as literary devices. Each kenning
      should be deployable in prose without explanation.
    categories:
      battle: # 8 entries
        - kenning: "sword-rain"
          meaning: "A hail of blows in combat."
          usage_example: "The sword-rain fell on the shield-wall and men died standing."
        - kenning: "shield-thunder"
          meaning: "The crash of shields meeting in a charge."
          usage_example: "Shield-thunder rolled across the moor."
        - kenning: "spear-storm"
          meaning: "A volley of thrown spears."
          usage_example: "They walked into the spear-storm and half did not walk out."
        - kenning: "blade-song"
          meaning: "The sound of swords in sustained combat."
          usage_example: "The blade-song lasted until dark."
        - kenning: "iron-harvest"
          meaning: "The aftermath of battle — dead stripped of weapons."
          usage_example: "We gathered the iron-harvest before the ravens took the rest."
        - kenning: "war-tide"
          meaning: "The momentum of a charge, unstoppable once begun."
          usage_example: "The war-tide broke over the palisade."
        - kenning: "axe-weather"
          meaning: "A day fit for killing. Clear, cold, no excuses."
          usage_example: "Axe-weather, Voss said, and the band formed up."
        - kenning: "shield-bite"
          meaning: "The moment a blade finds the gap between shields."
          usage_example: "He took a shield-bite in the ribs and fought another minute before he fell."

      sea: # 6 entries
        - kenning: "whale-road"
          meaning: "The open sea."
          usage_example: "No ship rides the whale-road in the Long Dark."
        - kenning: "wave-horse"
          meaning: "A longship."
          usage_example: "The wave-horse bucked and rolled, and the oarsmen cursed."
        - kenning: "salt-plain"
          meaning: "The sea viewed from shore — flat, grey, endless."
          usage_example: "Beyond the salt-plain, nothing."
        - kenning: "storm-anvil"
          meaning: "The horizon where sea-storms are born."
          usage_example: "Dark clouds piled on the storm-anvil."
        - kenning: "fjord-serpent"
          meaning: "A longship seen from above, winding through a fjord."
          usage_example: "The fjord-serpent slid between the cliff walls."
        - kenning: "oar-thunder"
          meaning: "The rhythmic splash of coordinated rowing."
          usage_example: "The oar-thunder brought the harbour-folk to the walls."

      death: # 8 entries
        - kenning: "corpse-road"
          meaning: "The path to death. Also the literal track to a burial site."
          usage_example: "Every march is a corpse-road for someone."
        - kenning: "raven's feast"
          meaning: "A battlefield after the fight."
          usage_example: "We left a raven's feast behind us."
        - kenning: "Hael's chair"
          meaning: "Death itself. Hael waits with an empty seat."
          usage_example: "He took Hael's chair before dawn."
        - kenning: "bone-harvest"
          meaning: "A mass killing. The dead collected like sheaves."
          usage_example: "The Three Wolves left a bone-harvest at Feldwick."
        - kenning: "sleep-sword"
          meaning: "A killing blow so clean the victim seems to sleep."
          usage_example: "She gave him the sleep-sword. He never woke."
        - kenning: "cold-road"
          meaning: "Dying slowly from exposure or wounds."
          usage_example: "He walked the cold-road for three days before it ended."
        - kenning: "shadow-drink"
          meaning: "Poison. Death swallowed unknowing."
          usage_example: "The shadow-drink was in the second cup."
        - kenning: "last-breath-price"
          meaning: "The final cost — everything a man has."
          usage_example: "Grimholt demanded the last-breath-price."

      wealth: # 5 entries
        - kenning: "arm-fire"
          meaning: "Gold. It gleams on the arm like flame."
          usage_example: "He wore arm-fire from wrist to elbow."
        - kenning: "hack-silver"
          meaning: "Chopped pieces of silver used as currency."
          usage_example: "Pay me in hack-silver. I have no use for promises."
        - kenning: "ring-giver"
          meaning: "A generous lord. A captain who pays well."
          usage_example: "Sigrun is a ring-giver, not a throne-sitter."
        - kenning: "purse-worm"
          meaning: "A miser. Silver that never leaves the pouch."
          usage_example: "The purse-worm of Frostfjord pays half what he owes."
        - kenning: "debt-chain"
          meaning: "Obligation measured in silver. Binds tighter than iron."
          usage_example: "The debt-chain holds him to Ordovast."

      blood: # 5 entries
        - kenning: "wound-sea"
          meaning: "A quantity of blood. Enough to drown in."
          usage_example: "He knelt in the wound-sea and could not stand."
        - kenning: "battle-sweat"
          meaning: "Blood drawn in combat. Warm and honest."
          usage_example: "Battle-sweat ran down the blade."
        - kenning: "wound-dew"
          meaning: "Blood. The oldest kenning, used without thinking."
          usage_example: "Wound-dew on his hands and nothing in his eyes."
        - kenning: "vein-river"
          meaning: "A mortal wound that will not stop bleeding."
          usage_example: "The vein-river emptied him in minutes."
        - kenning: "life-tide"
          meaning: "Blood as the measure of remaining life."
          usage_example: "His life-tide ebbed with every step."

      winter: # 5 entries
        - kenning: "frost-giant's breath"
          meaning: "The killing cold. Wind that freezes flesh."
          usage_example: "The frost-giant's breath turned the dead rigid."
        - kenning: "ice-hammer"
          meaning: "A sudden hard freeze after thaw. Kills livestock and crops."
          usage_example: "The ice-hammer fell on the third day."
        - kenning: "snow-shroud"
          meaning: "Deep snowfall that buries everything. A world in white death."
          usage_example: "The snow-shroud covered the trail and the men who walked it."
        - kenning: "rime-veil"
          meaning: "The ever-present frost-mist of the Rimevegr."
          usage_example: "Through the rime-veil, shapes that might be men."
        - kenning: "cold-forge"
          meaning: "Winter that hardens survivors. What does not kill, shapes."
          usage_example: "The Long Dark is the cold-forge. You come out harder or not at all."

      weapons: # 6 entries
        - kenning: "wound-bee"
          meaning: "An arrow. Small, fast, and it stings."
          usage_example: "The wound-bee found the gap in his mail."
        - kenning: "blood-worm"
          meaning: "A sword. Long, sinuous, hungry."
          usage_example: "He drew the blood-worm and the talking stopped."
        - kenning: "skull-splitter"
          meaning: "A war-axe. Does exactly what the name says."
          usage_example: "The skull-splitter was not a subtle weapon."
        - kenning: "shield-biter"
          meaning: "An axe designed to hook and split shields."
          usage_example: "The shield-biter took three planks and the arm behind them."
        - kenning: "iron-tooth"
          meaning: "A spear point. The sharp end of any argument."
          usage_example: "Iron-tooth settled the dispute at Bleakwater."
        - kenning: "whisper-edge"
          meaning: "A knife. The quiet weapon. Close work."
          usage_example: "The whisper-edge found his throat before he could shout."

      body: # 4 entries
        - kenning: "thought-forge"
          meaning: "The mind. Where plans are hammered into shape."
          usage_example: "His thought-forge worked faster than his tongue."
        - kenning: "bone-house"
          meaning: "The body. A cage of bone holding everything alive."
          usage_example: "The bone-house broke, and what was inside came out."
        - kenning: "word-gate"
          meaning: "The mouth. What opens and closes determines a man's fate."
          usage_example: "Keep your word-gate shut until you know the room."
        - kenning: "sight-stones"
          meaning: "The eyes. Windows that show too much."
          usage_example: "His sight-stones were flat and dead."

      fire: # 3 entries
        - kenning: "hunger-flame"
          meaning: "A fire burning out of control. Eats everything."
          usage_example: "The hunger-flame took the hall in an hour."
        - kenning: "hearth-heart"
          meaning: "The central fire. Life itself in winter."
          usage_example: "Without the hearth-heart, a settlement is a grave."
        - kenning: "ember-blood"
          meaning: "The deep red glow of coals. The fire's last life."
          usage_example: "By ember-blood light, he counted the dead."

  # -------------------------------------------------------------------
  # 5. OATHS (15)
  # -------------------------------------------------------------------
  oaths:
    description: >
      Formal and informal oaths of the Rimevegr. Weight matters — a light
      oath broken costs reputation. A sacred oath broken costs everything.
      The gods referenced are silent, but breaking their oaths still
      carries social and (possibly) supernatural consequences.
    entries:
      - id: "OTH_001"
        text: "By Thurr's burning hand, I swear it."
        register: "formal"
        context: "Binding oath at a thing or before witnesses."
        weight: "heavy"
      - id: "OTH_002"
        text: "On Odynn's rope, I am bound."
        register: "formal"
        context: "The strongest oath. Unbreakable by social convention. Seals contracts."
        weight: "sacred"
      - id: "OTH_003"
        text: "By the Aesrgrim, it is done."
        register: "formal"
        context: "Invokes all five gods. Used to seal alliance pacts."
        weight: "sacred"
      - id: "OTH_004"
        text: "My blood on it."
        register: "common"
        context: "Casual oath sealed with a pricked thumb. Common between soldiers."
        weight: "moderate"
      - id: "OTH_005"
        text: "I give my word and my weapon-hand."
        register: "formal"
        context: "Mercenary contract oath. Breaking it means losing the use of the hand — literally, by custom."
        weight: "heavy"
      - id: "OTH_006"
        text: "By the Grief-Bride's tears."
        register: "common"
        context: "Women's oath invoking Fraeja. Carries weight among seidr practitioners."
        weight: "heavy"
      - id: "OTH_007"
        text: "If I lie, let Hael's chair find me standing."
        register: "formal"
        context: "Oath of truthfulness. To die standing — as a draugr — is the worst fate."
        weight: "heavy"
      - id: "OTH_008"
        text: "Silver and steel on it."
        register: "mercenary"
        context: "A contract oath. The silver is the pay, the steel is the consequence of breaking it."
        weight: "moderate"
      - id: "OTH_009"
        text: "On my name and my father's name."
        register: "common"
        context: "Family honour oath. Meaningless for kinless men, which is most of the band."
        weight: "moderate"
      - id: "OTH_010"
        text: "I swear by what I eat and what I carry."
        register: "mercenary"
        context: "A poor man's oath. Everything he owns is the guarantee."
        weight: "light"
      - id: "OTH_011"
        text: "By the Crack-Handed's thunder."
        register: "common"
        context: "Thurr's epithet invoked casually. Mild oath of emphasis."
        weight: "light"
      - id: "OTH_012"
        text: "Hael take me if I break it."
        register: "profane"
        context: "Surrendering one's afterlife as collateral. Taken seriously even by cynics."
        weight: "heavy"
      - id: "OTH_013"
        text: "I stake my place at the fire."
        register: "mercenary"
        context: "In a svarthird, your place at the fire is your membership. Staking it is serious."
        weight: "heavy"
      - id: "OTH_014"
        text: "Spit and shake, then."
        register: "profane"
        context: "Informal agreement. Spit on the palm, clasp hands. Common between commons."
        weight: "light"
      - id: "OTH_015"
        text: "Let the One-Hung see. Let the rope remember."
        register: "formal"
        context: "Odynn invoked as witness. Used in thing-judgments and blood-price settlements."
        weight: "sacred"

  # -------------------------------------------------------------------
  # 6. CURSES (12)
  # -------------------------------------------------------------------
  curses:
    description: >
      What men say when they want the world to hear their hatred. Curses
      range from casual profanity to genuine maledictions that invoke the
      gods. In the Rimevegr, where the Veil is thin, spoken curses carry
      an uneasy weight.
    entries:
      - id: "CUR_001"
        text: "May Hael's left hand find you in the dark."
        severity: "devastating"
        context: "Hael's left side is the rotted side. Her left hand takes the soul."
        weight: "sacred"
      - id: "CUR_002"
        text: "Lopt sew your mouth as he sewed his own."
        severity: "severe"
        context: "A curse of silence. Wishes the target mute and mocked."
        weight: "heavy"
      - id: "CUR_003"
        text: "Walk the cold-road and find no fire."
        severity: "severe"
        context: "Die alone in winter. The worst death in the Rimevegr."
        weight: "heavy"
      - id: "CUR_004"
        text: "Your blood on the snow and your name in no saga."
        severity: "devastating"
        context: "Death without remembrance. Obliteration."
        weight: "sacred"
      - id: "CUR_005"
        text: "Thurr's hands on your children."
        severity: "severe"
        context: "Thurr breaks things. This wishes destruction on a man's line."
        weight: "heavy"
      - id: "CUR_006"
        text: "May your axe find your own shin."
        severity: "mild"
        context: "A woodcutter's curse. Embarrassing, not mortal."
        weight: "light"
      - id: "CUR_007"
        text: "Drown in your own wound-sea."
        severity: "moderate"
        context: "Choke on your own blood. Said after a betrayal."
        weight: "moderate"
      - id: "CUR_008"
        text: "Your fire go out and your bread go mouldy."
        severity: "mild"
        context: "Domestic ruin. Everything slowly falls apart."
        weight: "light"
      - id: "CUR_009"
        text: "The ravens know your name already."
        severity: "moderate"
        context: "You are already marked for death. Fatalistic threat."
        weight: "moderate"
      - id: "CUR_010"
        text: "May you die owing silver."
        severity: "moderate"
        context: "In the Rimevegr, a man who dies in debt has failed at the only arithmetic that matters."
        weight: "moderate"
      - id: "CUR_011"
        text: "Odynn hang you twice and teach you nothing."
        severity: "severe"
        context: "Odynn hangs to gain wisdom. This curse wishes suffering without growth."
        weight: "heavy"
      - id: "CUR_012"
        text: "Feed the Veil."
        severity: "devastating"
        context: "Short. Final. Wishes the target swallowed by the rime-mist."
        weight: "sacred"

  # -------------------------------------------------------------------
  # 7. INSULTS (12)
  # -------------------------------------------------------------------
  insults:
    description: >
      What men say when they want to start a fight. Rimevegr insults
      target cowardice, incompetence, kinlessness, poverty, and
      unmanliness. A good insult is specific enough to stick.
    entries:
      - id: "INS_001"
        text: "You fight like a man who learned from his mother's stories."
        target: "combat skill"
        severity: "moderate"
        context: "Implies training from hearsay, not experience."
      - id: "INS_002"
        text: "I have seen braver sheep on the moor."
        target: "courage"
        severity: "mild"
        context: "Comparing a warrior to livestock. Effective in front of an audience."
      - id: "INS_003"
        text: "You carry your sword like a walking stick."
        target: "weapon skill"
        severity: "moderate"
        context: "The weapon is ornament, not tool."
      - id: "INS_004"
        text: "Your father's seed was clearly watered down."
        target: "lineage"
        severity: "severe"
        context: "Attacks bloodline and manhood simultaneously. Fight-starting."
      - id: "INS_005"
        text: "Even the thralls won't drink after you."
        target: "status"
        severity: "severe"
        context: "Below slave-rank. The lowest a free man can be placed."
      - id: "INS_006"
        text: "Go home to your hearth. If you have one."
        target: "kinlessness"
        severity: "moderate"
        context: "Reminds a landless mercenary he has nothing to go back to."
      - id: "INS_007"
        text: "The only thing sharp about you is your smell."
        target: "general"
        severity: "mild"
        context: "Barracks insult. Gets a laugh."
      - id: "INS_008"
        text: "I would not trust you to guard a cookpot."
        target: "reliability"
        severity: "moderate"
        context: "Useless for the simplest task."
      - id: "INS_009"
        text: "Your oath is worth less than a mouthful of ale-mist."
        target: "honour"
        severity: "severe"
        context: "Ale-mist is the cheapest, weakest drink. Your word is worthless."
      - id: "INS_010"
        text: "You bleed easily for a man who talks so much."
        target: "boasting"
        severity: "moderate"
        context: "All words, no steel. Said to a man nursing a wound."
      - id: "INS_011"
        text: "Lopt's mouth with Thurr's brains."
        target: "intelligence"
        severity: "severe"
        context: "A liar too stupid to lie well. Thurr hits; he does not think."
      - id: "INS_012"
        text: "Your shield-arm shakes like a grandmother's knitting hand."
        target: "combat skill"
        severity: "moderate"
        context: "Physical cowardice on display. Devastating in a shield-wall."

  # -------------------------------------------------------------------
  # 8. GREETINGS (8)
  # -------------------------------------------------------------------
  greetings:
    description: >
      How people address each other in the Rimevegr. Register varies by
      relationship, rank, and intent. A greeting sets the tone for
      everything that follows.
    entries:
      - id: "GRT_001"
        text: "Hail, and name yourself."
        register: "formal"
        context: "Standard challenge at a settlement gate. Demands identification."
      - id: "GRT_002"
        text: "The fire is lit. You may enter."
        register: "formal"
        context: "Granting hearth-right. A binding gesture of hospitality."
      - id: "GRT_003"
        text: "What news from the road?"
        register: "common"
        context: "Standard opening between travellers. Information is currency."
      - id: "GRT_004"
        text: "You still breathe, then."
        register: "casual"
        context: "Between soldiers who expected each other to be dead. Affection disguised as observation."
      - id: "GRT_005"
        text: "Steel or silver?"
        register: "mercenary"
        context: "Are we fighting or trading? Cuts straight to the point."
      - id: "GRT_006"
        text: "The gods did not take you. Their loss."
        register: "casual"
        context: "Dark humour. A welcome between old comrades."
      - id: "GRT_007"
        text: "Name your business or name your weapon."
        register: "hostile"
        context: "A settlement guard to an armed stranger. No middle ground."
      - id: "GRT_008"
        text: "Well met, if we are met well."
        register: "cautious"
        context: "A greeting that is also a warning. Conditional welcome."

  # -------------------------------------------------------------------
  # 9. FAREWELLS (6)
  # -------------------------------------------------------------------
  farewells:
    description: >
      How people part in the Rimevegr. Every farewell acknowledges
      the real possibility that the next meeting is in Hael's hall.
    entries:
      - id: "FRW_001"
        text: "Gods keep you, if the gods keep anyone."
        register: "common"
        context: "Standard farewell. The caveat is the Rimevegr's signature doubt."
      - id: "FRW_002"
        text: "Die well."
        register: "mercenary"
        context: "Between soldiers. Not a wish for death — a wish for a death worth having."
      - id: "FRW_003"
        text: "Keep your fire lit."
        register: "common"
        context: "Stay alive. In the Rimevegr, fire is life."
      - id: "FRW_004"
        text: "Until the road turns."
        register: "casual"
        context: "We will meet again, somewhere on the road."
      - id: "FRW_005"
        text: "Odynn see what I cannot."
        register: "formal"
        context: "A prayer for the traveller's safety. Invokes Odynn's one remaining eye."
      - id: "FRW_006"
        text: "Walk fast. The cold does not wait."
        register: "practical"
        context: "Not sentimental. Literally: move or freeze."

  # -------------------------------------------------------------------
  # 10. BATTLE CRIES (10)
  # -------------------------------------------------------------------
  battle_cries:
    description: >
      War-shouts for different situations. A battle cry is not poetry —
      it is adrenaline compressed into syllables. Some rally, some
      terrify, some mock. All are loud.
    entries:
      - id: "CRY_001"
        text: "THURR! THURR! THURR!"
        type: "rallying"
        context: "The thunder-god's name hammered like an axe. The default battle-shout."
      - id: "CRY_002"
        text: "SHIELDS! HOLD THE LINE!"
        type: "defensive"
        context: "Formation command turned war-cry. Discipline over fury."
      - id: "CRY_003"
        text: "BLOOD AND SILVER!"
        type: "mercenary"
        context: "Svarthird war-cry. What they fight for, in that order."
      - id: "CRY_004"
        text: "THE BLACK AXES!"
        type: "rallying"
        context: "Voss's band identification. Shout your name so the enemy knows who killed them."
      - id: "CRY_005"
        text: "NO QUARTER! NO MERCY!"
        type: "terrifying"
        context: "When the band means to leave no survivors. Psychological warfare."
      - id: "CRY_006"
        text: "HAEL WAITS! SEND HER GUESTS!"
        type: "terrifying"
        context: "Death-goddess invoked as host. The enemy is the offering."
      - id: "CRY_007"
        text: "FOR THE FIRE! FOR THE BREAD!"
        type: "desperate"
        context: "When the band fights for survival, not profit. No glory — just food and warmth."
      - id: "CRY_008"
        text: "COME DIE, THEN!"
        type: "mocking"
        context: "Invitation to attack. Contempt as a weapon."
      - id: "CRY_009"
        text: "BONES AND ASH!"
        type: "terrifying"
        context: "What remains after the Bone Pack is finished. Their signature cry."
      - id: "CRY_010"
        text: "ONE MORE STEP! ONE MORE!"
        type: "desperate"
        context: "A retreating force rallied by a sergeant. Not heroic — frantic."

  # -------------------------------------------------------------------
  # 11. PROVERBS (15)
  # -------------------------------------------------------------------
  proverbs:
    description: >
      Rimevegr folk wisdom. Dark, practical, shaped by centuries of cold,
      violence, and compromise. These are what people say when they have
      nothing left but the truth.
    entries:
      - id: "PRV_001"
        text: "A full belly forgives much."
        meaning: "Feed people before asking them for anything."
        context: "Negotiation wisdom. Gest's favourite saying."
      - id: "PRV_002"
        text: "The axe does not care who swings it."
        meaning: "Violence is impersonal. Do not take it personally."
        context: "Said after fighting former allies."
      - id: "PRV_003"
        text: "Trust the man who shows you his back in a shield-wall."
        meaning: "Real trust is tested in combat, not in conversation."
        context: "Mercenary proverb. Character is what you do when iron falls."
      - id: "PRV_004"
        text: "Silver rusts slower than honour."
        meaning: "Money outlasts reputation. Cynical but observed."
        context: "Quartermaster wisdom."
      - id: "PRV_005"
        text: "The fire does not ask if you deserve warmth."
        meaning: "Survival is not a moral question."
        context: "Said when sheltering enemies or cowards."
      - id: "PRV_006"
        text: "Dead men own nothing, not even their names."
        meaning: "Legacy is for the living to decide."
        context: "Mercenary fatalism."
      - id: "PRV_007"
        text: "A man with one road walks it. A man with two roads stands still."
        meaning: "Too many choices paralyse. Pick one and commit."
        context: "Command wisdom."
      - id: "PRV_008"
        text: "The Veil takes the clever and the stupid alike."
        meaning: "The supernatural does not respect intelligence."
        context: "Said near barrows or standing stones."
      - id: "PRV_009"
        text: "Feed the smith before the skald."
        meaning: "Tools before stories. Practical work before glory-telling."
        context: "Settlement priority wisdom."
      - id: "PRV_010"
        text: "A debt unpaid is a blade unwatched."
        meaning: "Outstanding debts are active threats."
        context: "Financial proverb. Applies to silver and blood-price."
      - id: "PRV_011"
        text: "Winter forgives nothing."
        meaning: "Nature has no mercy mechanism."
        context: "The Rimevegr's fundamental truth."
      - id: "PRV_012"
        text: "The second lie costs less than the first."
        meaning: "Dishonesty gets easier. Be careful who you start lying to."
        context: "Lopt's shadow in everyday speech."
      - id: "PRV_013"
        text: "Hear the ice before you walk on it."
        meaning: "Assess the danger before committing. Listen more than you talk."
        context: "Scout's proverb."
      - id: "PRV_014"
        text: "Every hall was forests once."
        meaning: "Everything built can be returned to nothing."
        context: "Said after watching a settlement burn."
      - id: "PRV_015"
        text: "The man who eats last trusts most."
        meaning: "Eating last in a mercenary camp means trusting others not to poison or short you."
        context: "Camp hierarchy observation."

  # -------------------------------------------------------------------
  # 12. MERCENARY SLANG (15)
  # -------------------------------------------------------------------
  mercenary_slang:
    description: >
      The professional dialect of the svarthird bands. Developed over
      three centuries of contract violence, these terms are shorthand
      for the business of killing, eating, and getting paid. An outsider
      would understand half of it and misunderstand the rest.
    entries:
      - id: "SLG_001"
        term: "captain's cut"
        meaning: "The 40% share of contract payment that goes to the band's captain."
        usage_example: "Captain's cut first. Then the Named Men. Then whatever falls to the floor."
      - id: "SLG_002"
        term: "floor-silver"
        meaning: "The common soldiers' share of pay. What falls after the captain and Named Men take theirs."
        usage_example: "Floor-silver's thin this month."
      - id: "SLG_003"
        term: "wet work"
        meaning: "Assassination or targeted killing. Blood-work done quietly."
        usage_example: "That is wet work. Costs double."
      - id: "SLG_004"
        term: "dry contract"
        meaning: "A contract that does not require killing. Escort, guarding, labour."
        usage_example: "Dry contract at Thornwall. Sheep-guarding. Boring but safe."
      - id: "SLG_005"
        term: "red contract"
        meaning: "A contract that explicitly requires combat or killing."
        usage_example: "Red contract from Grimholt. Ordovast wants a village burned."
      - id: "SLG_006"
        term: "ale-price"
        meaning: "What a settlement charges for quartering the band. Negotiated at the gate."
        usage_example: "What is the ale-price? We need three days."
      - id: "SLG_007"
        term: "Hael's half"
        meaning: "The share of supplies reserved for wastage, spoilage, and loss."
        usage_example: "Always account for Hael's half, or you starve on week three."
      - id: "SLG_008"
        term: "shield-tax"
        meaning: "Protection money demanded from a settlement. Extortion by another name."
        usage_example: "The Three Wolves collect shield-tax from Feldwick every month."
      - id: "SLG_009"
        term: "named man"
        meaning: "A senior warrior with a reputation. Has a place at the captain's fire."
        usage_example: "Named Men eat first, fight first, and die first."
      - id: "SLG_010"
        term: "commons"
        meaning: "Rank-and-file soldiers. No special reputation, no special share."
        usage_example: "Twelve commons and three Named Men. Standard warband."
      - id: "SLG_011"
        term: "ledger-clean"
        meaning: "No outstanding debts, contracts, or blood-feuds. Ready for a new contract."
        usage_example: "We are ledger-clean after Kolvik. What is next?"
      - id: "SLG_012"
        term: "blood-price"
        meaning: "Compensation paid for killing someone's kin. Prevents a feud — in theory."
        usage_example: "The blood-price for a jarl's son is more silver than we carry."
      - id: "SLG_013"
        term: "bone-count"
        meaning: "Casualty report after a fight."
        usage_example: "Bone-count: three dead, two bleeding, one who will not walk again."
      - id: "SLG_014"
        term: "fire-right"
        meaning: "Invitation to sit at a settlement's fire. Temporary guest status."
        usage_example: "We have fire-right for two nights. After that, we pay or leave."
      - id: "SLG_015"
        term: "ghost-march"
        meaning: "Moving the band at night or in the Veil to avoid detection."
        usage_example: "Ghost-march tonight. No torches. No talking."

  # -------------------------------------------------------------------
  # 13. SETTLEMENT NAMES (15)
  # -------------------------------------------------------------------
  settlement_names:
    description: >
      Etymology and meaning for all 15 canonical settlements of the
      Rimevegr. Names are compound Norse forms adapted for readability.
      Each tells you what the place is before you arrive.
    entries:
      - settlement: "Frostfjord Hollow"
        norse_root: "frost + fjörðr + holr"
        meaning: "The sheltered place at the frozen inlet."
        character: "Dried cod, cold rain, and Jarl Hrothgar's calculating silence."
      - settlement: "Ashen Reach"
        norse_root: "askr (ash tree) + reki (reach, extent)"
        meaning: "The extent of the ash-tree forest."
        character: "Pine tar smoke, the Pale Widow's cold authority, iron kilns."
      - settlement: "Feldwick"
        norse_root: "feld (field) + vík (bay, inlet)"
        meaning: "The field-bay. Flat ground near water."
        character: "Sheep pens, mud, and the smell of occupation."
      - settlement: "Stonebay Hamlet"
        norse_root: "steinn + bær (farmstead)"
        meaning: "The stone farmstead by the sea."
        character: "Salt wind, empty nets, and silence."
      - settlement: "Grimholt"
        norse_root: "grímr (masked one) + holt (wood, grove)"
        meaning: "The masked grove. Or: the grim forest."
        character: "Iron, war-drums, and Ordovast's shadow over everything."
      - settlement: "Raven's Perch"
        norse_root: "hrafn (raven) + pershaz (perch)"
        meaning: "Where the ravens sit. A mountain lookout."
        character: "Stone walls, thin air, and birds that watch too closely."
      - settlement: "Vargheim"
        norse_root: "vargr (wolf, outlaw) + heimr (home)"
        meaning: "Wolf-home. The outlaws' settlement."
        character: "Charcoal, wolf-song at night, Jarl Ulf's hard law."
      - settlement: "Kolvik"
        norse_root: "kol (charcoal/coal) + vík (bay)"
        meaning: "Charcoal bay. Or: the dark bay."
        character: "Salt fish, ship tar, Harbour-Master Inga's practical rule."
      - settlement: "Moor's End"
        norse_root: "mór (moor) + endi (end)"
        meaning: "Where the moor stops. The last flat ground."
        character: "Standing stones, sheep, peat smoke, and humming at night."
      - settlement: "Ashmark"
        norse_root: "askr (ash tree) + mörk (borderland forest)"
        meaning: "The ash-tree borderlands."
        character: "Pine tar, herbs, neutral ground where enemies trade."
      - settlement: "Deepholm"
        norse_root: "djúpr (deep) + holmr (island, raised ground)"
        meaning: "The deep island. Raised ground with mines beneath."
        character: "Iron gates, market noise, Jarl Sigrun's wealth and pragmatism."
      - settlement: "Bleakwater Landing"
        norse_root: "bleikr (pale, bleak) + vatn (water) + lending (landing)"
        meaning: "The pale-water landing. A river crossing."
        character: "Mud, ferry tolls, Ferryman Olaf's silence, and a corpse downstream."
      - settlement: "Skaldhaven"
        norse_root: "skáld (poet) + höfn (harbour)"
        meaning: "Poet's harbour. Where knowledge ships to shore."
        character: "Fjord cliffs, rune archives, Lore-Keeper Audun's careful eyes."
      - settlement: "Thornwall"
        norse_root: "þorn (thorn) + vallr (wall, rampart)"
        meaning: "The thorn rampart. Nature as fortification."
        character: "Sheep markets, wool bales, Jarl Helga's iron spine."
      - settlement: "Icebreak"
        norse_root: "ís (ice) + brek (break, edge)"
        meaning: "Where the ice breaks. The edge of the habitable world."
        character: "Ice caves, silence, Hermit Ragnhild's blood-price divinations."

  # -------------------------------------------------------------------
  # 14. PLACE NAME ELEMENTS (15)
  # -------------------------------------------------------------------
  place_name_elements:
    description: >
      Common Old Norse elements for generating place names. Combine a
      prefix (terrain/feature) with a suffix (settlement type) to
      produce plausible Rimevegr locations. Not all combinations work —
      use judgment.
    entries:
      - element: "-heim"
        meaning: "Home, settlement."
        position: "suffix"
        examples: ["Vargheim (wolf-home)", "Steinheim (stone-home)"]
      - element: "-holt"
        meaning: "Wood, grove, small forest."
        position: "suffix"
        examples: ["Grimholt (grim-grove)", "Birkholt (birch-grove)"]
      - element: "-vik"
        meaning: "Bay, inlet, creek."
        position: "suffix"
        examples: ["Kolvik (coal-bay)", "Feldwick (field-bay)"]
      - element: "-borg"
        meaning: "Fortification, stronghold."
        position: "suffix"
        examples: ["Steinborg (stone-fort)", "Jarnborg (iron-fort)"]
      - element: "-fell"
        meaning: "Mountain, rocky hill."
        position: "suffix"
        examples: ["Rimefell (frost-mountain)", "Ravnfell (raven-mountain)"]
      - element: "-mark"
        meaning: "Borderland, forest."
        position: "suffix"
        examples: ["Ashmark (ash-borderland)", "Svarmark (black-borderland)"]
      - element: "-stead"
        meaning: "Place, farmstead."
        position: "suffix"
        examples: ["Greystead (grey-farm)", "Kolstead (coal-farm)"]
      - element: "-haven"
        meaning: "Harbour, sheltered place."
        position: "suffix"
        examples: ["Skaldhaven (poet-harbour)", "Frosthaven (frost-harbour)"]
      - element: "Frost-"
        meaning: "Ice, cold. The Rimevegr's defining feature."
        position: "prefix"
        examples: ["Frostfjord (frost-inlet)", "Frosthaven (frost-harbour)"]
      - element: "Svart-"
        meaning: "Black, dark."
        position: "prefix"
        examples: ["Svartheim (black-home)", "Svartvik (dark-bay)"]
      - element: "Stein-"
        meaning: "Stone, rock."
        position: "prefix"
        examples: ["Steinborg (stone-fort)", "Steinheim (stone-home)"]
      - element: "Ravn-"
        meaning: "Raven. Odynn's bird. Ill omen and wisdom."
        position: "prefix"
        examples: ["Ravnfell (raven-mountain)", "Ravnholt (raven-grove)"]
      - element: "Jarn-"
        meaning: "Iron. Wealth, war, industry."
        position: "prefix"
        examples: ["Jarnborg (iron-fort)", "Jarnvik (iron-bay)"]
      - element: "Bleak-"
        meaning: "Pale, exposed, windswept."
        position: "prefix"
        examples: ["Bleakwater (pale-water)", "Bleakholm (pale-island)"]
      - element: "Dyr-"
        meaning: "Dear, precious. Or: animal, beast."
        position: "prefix"
        examples: ["Dyrheim (beast-home)", "Dyrmark (wild-borderland)"]
