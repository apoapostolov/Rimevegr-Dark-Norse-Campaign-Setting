# --- Travel Network ---
# Node-based route system for mercenary travel planning.
# Positions are grid coordinates (1 unit = ~10 km).
# All routes are bidirectional. Travel days assume healthy band,
# no wagons, in Long Dark conditions. Summer travel: multiply by 0.7.
# Rime Storm / Driving Snow: multiply by 1.5-2.0.
# Bypasses allow avoiding settlements (outlawry, danger) at cost of
# longer travel through wilderness with no resupply.

settlement_positions:
  "Frostfjord Hollow": { x: 2, y: 8 }
  "Skaldhaven": { x: 1, y: 6 }
  "Kolvik": { x: 3, y: 5 }
  "Stonebay Hamlet": { x: 1, y: 3 }
  "Feldwick": { x: 4, y: 6 }
  "Ashen Reach": { x: 5, y: 9 }
  "Vargheim": { x: 6, y: 7 }
  "Ashmark": { x: 7, y: 6 }
  "Bleakwater Landing": { x: 8, y: 8 }
  "Grimholt": { x: 10, y: 8 }
  "Raven's Perch": { x: 11, y: 9 }
  "Moor's End": { x: 9, y: 5 }
  "Deepholm": { x: 11, y: 6 }
  "Thornwall": { x: 10, y: 4 }
  "Icebreak": { x: 12, y: 12 }

travel_routes:
  # --- Inner Fjords Coast (west) ---
  - from: "Frostfjord Hollow"
    to: "Skaldhaven"
    distance_km: 25
    travel_days: 2
    terrain: coast_path
    road_quality: fair # worn trail along cliffs
    hazards:
      - "Exposed to sea-wind; rime storm = impassable"
      - "Tidal sections — check tide before crossing"

  - from: "Skaldhaven"
    to: "Kolvik"
    distance_km: 20
    travel_days: 1
    terrain: coast_path
    road_quality: good # regular trade traffic
    hazards:
      - "Fisher boats sometimes blocked by ice"

  - from: "Kolvik"
    to: "Stonebay Hamlet"
    distance_km: 25
    travel_days: 2
    terrain: coast_path
    road_quality: poor # barely a trail south of Kolvik
    hazards:
      - "Remote — no shelter between settlements"
      - "Sea-fog hides cliff edges"

  # --- Main Trade Road (Frostfjord — Ashen Reach) ---
  - from: "Frostfjord Hollow"
    to: "Ashen Reach"
    distance_km: 35
    travel_days: 3
    terrain: forest_road
    road_quality: good # main trade artery, cart-width
    hazards:
      - "Rune-stones along route (see EVT_007)"
      - "Three Wolves patrol this road"
      - "Wolf territory in deep stretches"

  # --- Fjord to Moors ---
  - from: "Frostfjord Hollow"
    to: "Feldwick"
    distance_km: 30
    travel_days: 2
    terrain: moor_track
    road_quality: fair # sheep drovers' path
    hazards:
      - "Open ground — no cover from weather or ambush"
      - "Boggy sections after rain"

  - from: "Feldwick"
    to: "Skaldhaven"
    distance_km: 35
    travel_days: 2
    terrain: moor_coast
    road_quality: poor # goat paths
    hazards:
      - "Cliff-edge sections in fog"

  # --- Forest Belt ---
  - from: "Ashen Reach"
    to: "Vargheim"
    distance_km: 25
    travel_days: 2
    terrain: forest_path
    road_quality: fair # charcoal-burners' trail
    hazards:
      - "Wolf pack territory (Vargheim wolves)"
      - "Dense canopy — navigation by landmarks only"

  - from: "Vargheim"
    to: "Ashmark"
    distance_km: 15
    travel_days: 1
    terrain: forest_path
    road_quality: fair # tar-workers' road
    hazards:
      - "Bone Pack camps in this stretch"

  - from: "Kolvik"
    to: "Ashmark"
    distance_km: 40
    travel_days: 3
    terrain: mixed_coast_forest
    road_quality: poor # infrequent use
    hazards:
      - "River crossing (no bridge — ford or swim)"
      - "Bandit risk in forest approaches"

  # --- River Crossroads ---
  - from: "Ashen Reach"
    to: "Bleakwater Landing"
    distance_km: 30
    travel_days: 2
    terrain: forest_river
    road_quality: fair # follows river downstream
    hazards:
      - "River flooding in thaw"
      - "Frozen corpses downstream (check for plague)"

  - from: "Vargheim"
    to: "Bleakwater Landing"
    distance_km: 25
    travel_days: 2
    terrain: forest_river
    road_quality: poor # game trails
    hazards:
      - "Easy to lose trail at river bends"

  # --- Mountain Approaches ---
  - from: "Bleakwater Landing"
    to: "Grimholt"
    distance_km: 20
    travel_days: 2
    terrain: mountain_road
    road_quality: good # Ordovast maintains his supply route
    hazards:
      - "Ordovast's patrols check all traffic"
      - "Steep final approach — wagons struggle"

  - from: "Grimholt"
    to: "Raven's Perch"
    distance_km: 15
    travel_days: 1
    terrain: mountain_path
    road_quality: fair # narrow but maintained
    hazards:
      - "Single-file approach — ambush chokepoint"
      - "Avalanche risk in Long Dark"

  - from: "Grimholt"
    to: "Deepholm"
    distance_km: 25
    travel_days: 2
    terrain: mountain_road
    road_quality: good # main mountain highway, Sigrun's engineers
    hazards:
      - "Mountain pass — blocked 20+ days per winter"
      - "Garrison toll: 1 silver per fighter"

  - from: "Deepholm"
    to: "Thornwall"
    distance_km: 25
    travel_days: 2
    terrain: mountain_moor
    road_quality: fair # descending switchbacks then open moor
    hazards:
      - "Exposed transition zone — no shelter for 15 km"
      - "Red Tide spotted on eastern approaches"

  # --- Moors ---
  - from: "Ashmark"
    to: "Moor's End"
    distance_km: 20
    travel_days: 2
    terrain: forest_moor
    road_quality: poor # sheep tracks
    hazards:
      - "Standing stones — avoid at night"
      - "Bog pools hidden by heather"

  - from: "Moor's End"
    to: "Thornwall"
    distance_km: 15
    travel_days: 1
    terrain: moor_track
    road_quality: fair # sheep drovers' highway
    hazards:
      - "Open ground — weather is the main enemy"

  - from: "Feldwick"
    to: "Moor's End"
    distance_km: 50
    travel_days: 4
    terrain: moor_track
    road_quality: poor # faint path, easy to lose
    hazards:
      - "No shelter for entire route"
      - "Peat bogs dangerous in fog"
      - "Three Wolves may patrol from Feldwick"

  # --- Northern Ice-Reach ---
  - from: "Raven's Perch"
    to: "Icebreak"
    distance_km: 50
    travel_days: 5
    terrain: mountain_ice
    road_quality: none # no path — navigation by stars and cairns
    hazards:
      - "Lethal in rime storm — guaranteed death"
      - "No foraging — carry all supplies"
      - "Red Tide raiding territory"
      - "Veil-Thinning permanent at destination"

  # --- Cross-Links ---
  - from: "Deepholm"
    to: "Raven's Perch"
    distance_km: 35
    travel_days: 3
    terrain: mountain_path
    road_quality: poor # ridge trail
    hazards:
      - "Exposed ridge — wind tears at gear"
      - "Iron Tide uses this path in winter"

  - from: "Ashmark"
    to: "Bleakwater Landing"
    distance_km: 20
    travel_days: 1
    terrain: forest_river
    road_quality: fair # follows riverbank
    hazards:
      - "Muddy in all seasons"

# --- Bypass Routes (Wilderness — Skip Settlement Nodes) ---
# Use when outlawed, avoiding feuds, or evading pursuit.
# No resupply. Must carry full food. Higher encounter risk.
bypass_routes:
  - name: "The Bone Road"
    skips: ["Ashen Reach"]
    from: "Frostfjord Hollow"
    to: "Bleakwater Landing"
    distance_km: 55
    travel_days: 5
    terrain: deep_forest
    road_quality: none
    hazards:
