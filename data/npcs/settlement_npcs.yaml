    associated_chains: ["waking_barrows", "iron_grip"]
    image_prompt: "Broad-shouldered tar-smith with soot-black nails, copper-ringed sleeves, smoking pine tar pits, iron tools glowing low red, muted brown-black palette."

  - id: "NPC_SET_006"
    name: "Dalla Mist-Tongue"
    call_name: "Hall Listener"
    role: "spy"
    settlement: "Ashen Reach"
    description: "Dalla shaves one side of her head and keeps the other braided with raven thread. Her lips are split from winter winds, and she carries wax tablets tucked inside her boot leather."
    stats:
      MIG: 3
      NIM: 6
      TOU: 4
      WIT: 6
      WIL: 6
      WYR: 3
    skills:
      - name: "Stealth"
        rank: 4
      - name: "Deceive"
