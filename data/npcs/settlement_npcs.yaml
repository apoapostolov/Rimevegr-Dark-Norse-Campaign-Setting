    call_name: "Tar Forge Master"
    role: "smith"
    settlement: "Ashen Reach"
    description: "Grimvi's fingernails are permanently black from tar and iron scale. He keeps his sleeves stitched with copper rings to ward burns and works beside open pine pits that smoke day and night."
    stats:
      MIG: 5
      NIM: 4
      TOU: 5
      WIT: 5
      WIL: 4
      WYR: 1
