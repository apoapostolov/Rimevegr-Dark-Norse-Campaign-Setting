npcs:
  - id: "NPC_SET_001"
    name: "Hrothgar Stenborn"
    call_name: "Jarl Hrothgar"
    role: "notable"
    settlement: "Frostfjord Hollow"
    description: "He keeps his beard braided with fishbone pins and wears a seal-hide cloak polished with cod oil. A pale scar runs from his left ear to the corner of his mouth, and he taps an amber counting ring against the arm of his chair when he lies."
    stats:
      MIG: 4
      NIM: 3
      TOU: 4
      WIT: 7
      WIL: 6
      WYR: 1
    skills:
      - name: "Command"
        rank: 3
      - name: "Bargain"
        rank: 4
      - name: "Intimidate"
        rank: 2
    personality: "Hrothgar is patient in public and vicious in private bargaining. He smiles while he measures what your death is worth in silver."
    agenda: "Secure exclusive cod routes to Kolvik before winter tolls strangle Frostfjord trade."
    secret: "[CJK_PENDING] Hrothgar has been paying both the Pale Widow and Ordovast for different promises and cannot satisfy both debts."
    relationships:
      - target: "Astrid Veilborn"
        type: "rival"
        note: "Mutual blackmail disguised as diplomacy."
      - target: "Voss"
        type: "debt"
        note: "Still owes Voss half-payment from the southern barrow contract."
    associated_chains: ["widows_web", "waking_barrows"]
    image_prompt: "Late-middle-aged Norse jarl in seal-hide cloak, fishbone beard pins, amber signet ring, long scar on cheek, dark timber hall, frost on beams, muted iron-blue palette."

  - id: "NPC_SET_002"
    name: "Yrsa Net-Mother"
    call_name: "Net-Mother"
    role: "merchant"
    settlement: "Frostfjord Hollow"
    description: "Yrsa has wrists roped with old net scars and wears a patched wool apron stiff with brine. She keeps a bronze hook at her belt and limps from a hip healed crooked after an ice-fall."
    stats:
      MIG: 3
      NIM: 4
      TOU: 5
      WIT: 5
      WIL: 5
      WYR: 1
    skills:
      - name: "Bargain"
        rank: 3
      - name: "Weather-sense"
        rank: 2
      - name: "Navigate"
        rank: 2
    personality: "She pretends to be blunt, but every insult she throws is a test. Yrsa remembers prices, favors, and funerals with equal accuracy."
    agenda: "Form a women-run fish convoy that bypasses Hrothgar's tithe clerks."
    secret: "[CJK_PENDING] She is storing Red Tide contraband in bait barrels to force Olaf into a ferry partnership."
    relationships:
      - target: "Olaf Reedson"
        type: "ally"
        note: "Shared smuggling lane by night river."
      - target: "Hrothgar Stenborn"
        type: "fear"
        note: "He can revoke her dock rights in one decree."
    associated_chains: ["fjord_compact", "red_tide"]
    image_prompt: "Older fisher-matriarch with brine-stiff apron, scarred wrists, bronze fishhook knife, weather-beaten stance on icy pier, muted slate and sea-green tones."

  - id: "NPC_SET_003"
    name: "Keld Ironhand"
    call_name: "The Bellows Ox"
    role: "smith"
    settlement: "Frostfjord Hollow"
    description: "Keld's right forearm is wrapped in old burn leather and his beard is singed short from years over a shallow forge. He works in a smoke-dark shed with one cracked anvil and a door chained from inside after dusk."
    stats:
      MIG: 6
      NIM: 3
      TOU: 6
      WIT: 4
      WIL: 4
      WYR: 1
    skills:
      - name: "Smithing"
        rank: 3
      - name: "Brawl"
        rank: 2
      - name: "Shelter"
        rank: 1
    personality: "He speaks little and listens too well, which unsettles drunk warriors. Keld's temper is slow to rise and impossible to stop once lit."
    agenda: "Acquire Deepholm steel dies to upgrade Frostfjord from basic to reliable arms-work."
    secret: "[CJK_PENDING] He once forged shackles for Wulfgar and recognizes Red Tide iron marks on seized chains."
    relationships:
