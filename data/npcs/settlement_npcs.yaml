    image_prompt: "Heavy Norse smith with burn-wrapped forearm, singed beard, soot-black forge room, cracked anvil, chain-locked door, dark charcoal palette with dull orange sparks."

  - id: "NPC_SET_004"
    name: "Astrid Veilborn"
    call_name: "The Pale Widow"
    role: "notable"
    settlement: "Ashen Reach"
    description: "Her skin is paper-white and her grey wool dress never seems wet even in sleet. She wears no jewelry except a bone needle at the throat, and her breath ghosts cold in warm rooms."
    stats:
      MIG: 2
      NIM: 4
      TOU: 3
      WIT: 8
      WIL: 9
      WYR: 8
    skills:
      - name: "Wyrd-reading"
        rank: 5
      - name: "Deceive"
        rank: 4
      - name: "Persuade"
        rank: 4
      - name: "Spirit-lore"
        rank: 4
    personality: "She speaks softly and never repeats herself. People leave her hall believing they chose what she already decided."
    agenda: "Complete a hidden chain of anchor-sites linking Ashen Reach, Kolvik, and Raven's Perch."
    secret: "[CJK_PENDING] Her body is sustained by three hidden anchor stones; destroy them and she can truly die."
    relationships:
      - target: "Ordovast Karr"
        type: "rival"
        note: "Each feeds the other curated intelligence."
      - target: "Dalla Mist-Tongue"
        type: "ally"
        note: "Primary seidr courier in the inner circle."
    associated_chains: ["widows_web", "waking_barrows"]
    image_prompt: "Pale Norse sorceress in grey wool, bone needle clasp, black reflective eyes, frost-hazed stone hall, subtle threadlike veils in air, muted ash-grey palette."

  - id: "NPC_SET_005"
