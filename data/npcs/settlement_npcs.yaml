      - name: "Wyrd-reading"
        rank: 2
      - name: "Navigate"
        rank: 2
    personality: "She laughs too quickly when afraid, then goes silent for hours. Dalla can mimic accents from five settlements and forgets none of what she hears."
    agenda: "Place listening caches in Thornwall before Helga seals the spring roads."
    secret: "[CJK_PENDING] She has started hearing voices from the standing stones and cannot tell which orders are human."
    relationships:
      - target: "Astrid Veilborn"
        type: "ally"
        note: "Bound by blood-oath and leverage."
      - target: "Helga Thornsdottir"
        type: "fear"
        note: "Caught once in Thornwall and still carries the lash marks."
    associated_chains: ["widows_web", "red_tide"]
    image_prompt: "Lean female spy with half-shaved hair, raven-thread braid, cracked lips, wax tablets hidden in boot, shadowed timber corridor, muted blue-black palette."

