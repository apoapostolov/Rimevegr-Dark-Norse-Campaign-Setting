        rank: 1
      - name: "Intimidate"
        rank: 2
    personality: "He is proud of practical work and contemptuous of courtly talk. Grimvi trusts tools more than people and prices both harshly."
    agenda: "Produce pitch-proof lamellar for a winter campaign contract from Ordovast's quartermasters."
    secret: "[CJK_PENDING] He is quietly forging altered spearheads for the Grave Wardens to test against barrow-flesh."
    relationships:
