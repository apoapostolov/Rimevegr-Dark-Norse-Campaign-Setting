npcs:
  - id: "NPC_TRV_001"
    name: "Torsten Salt-Hide"
    call_name: "Packmaster Torsten"
    role: "merchant"
    travel_region: "coast"
    description: "Torsten is thick through the shoulders, with cracked lips and a beard stiff with salt. His cloak smells of tar, fish oil, and wet rope, and his ox-cart is wrapped in patched sailcloth against sea rain. He keeps one thumb on his scale chain whenever silver changes hands."
    stats:
      MIG: 4
      NIM: 3
      TOU: 5
      WIT: 6
      WIL: 4
      WYR: 3
    skills:
      - name: "Bargain"
        rank: 3
      - name: "Navigate"
        rank: 3
      - name: "Weather-sense"
        rank: 2
      - name: "Persuade"
        rank: 2
    personality: "Practical and dry-humored, he values predictable profit over glory. He never raises his voice unless someone touches his scales. He respects mercenaries who pay on time and keep roads open."
    agenda: "Secure a winter convoy contract between Stonebay and inland markets before the passes close."
    secret: "He carries sealed Iron Grip messages hidden inside tallow barrels and pretends not to know their contents."
    services: "Buys fish oil, furs, and iron scraps; sells salt blocks, lamp oil, rope, and preserved cod."
    encounter_conditions:
      terrain: ["road", "coast", "market"]
      season: ["spring", "summer", "autumn"]
    relationships:
      - target: "NPC_TRV_027"
        type: "ally"
        note: "Audun reforges his broken wagon axles for reduced rates."
    associated_chains: ["coastal_crisis"]
    image_prompt: "Broad Norse trader with salt-stiff beard, tar-dark cloak, ox-cart under sailcloth, iron balance in hand. Wind-beaten face, muted blue-grey coastal palette."

  - id: "NPC_TRV_002"
    name: "Edda Amber-Thread"
    call_name: "Scale-Edda"
    role: "merchant"
    travel_region: "fjords"
    description: "Edda is lean and sharp-eyed, with amber beads braided into iron-grey hair. Her fingers are permanently stained from dyes and crushed lichen. She travels with two mules loaded in waxed bundles of cloth, resin, and dried herbs."
    stats:
      MIG: 3
      NIM: 4
      TOU: 4
      WIT: 6
      WIL: 5
      WYR: 3
    skills:
      - name: "Bargain"
        rank: 4
      - name: "Persuade"
        rank: 3
      - name: "Navigate"
        rank: 2
      - name: "Forage"
        rank: 2
    personality: "Courteous in public, ruthless in negotiation. She remembers every debt and every slight. She prefers quiet threat over loud argument."
    agenda: "Corner the trade in amber resin and rare dyes between Raven's Perch and Frostfjord routes."
    secret: "Her trade weights are subtly shaved; she cheats strangers but not repeat customers."
    services: "Sells dyed wool, resin, beeswax, and high-value cloth; buys antler, hides, and medicinal roots."
    encounter_conditions:
      terrain: ["road", "fjords", "market"]
      season: ["spring", "summer", "autumn"]
    relationships:
      - target: "NPC_TRV_006"
        type: "rival"
        note: "Orm's relic trade disrupts her legal caravan routes."
    associated_chains: ["fjord_compact"]
    image_prompt: "Lean Norse woman trader with amber beads in grey braid, dye-stained hands, waxed bundles on mules. Cold fjord light, muted green-brown palette."

  - id: "NPC_TRV_003"
    name: "Kolbein Drift-Market"
    call_name: "Reed-Cart Kolbein"
    role: "merchant"
    travel_region: "moors"
    description: "Kolbein wears layered wool under a rain-black cloak that drips peat water even in dry weather. His cart wheels are wrapped in leather to mute sound on night roads. His smile is friendly, but his eyes keep counting exits."
    stats:
      MIG: 4
      NIM: 4
      TOU: 4
      WIT: 5
      WIL: 4
      WYR: 3
    skills:
      - name: "Bargain"
        rank: 3
      - name: "Deceive"
        rank: 4
      - name: "Stealth"
        rank: 3
      - name: "Navigate"
        rank: 3
    personality: "He speaks like an old friend five breaths after meeting you. He avoids direct lies when half-truths will do. His loyalty lasts exactly as long as the margin."
    agenda: "Expand his moonlit smuggling lane through the moors without attracting a formal crackdown."
    secret: "He moves people as cargo, including wanted outlaws and escaped thralls, for triple fee."
    services: "Sells restricted imports, forged waybills, and hidden transport; buys contraband and silence."
    encounter_conditions:
      terrain: ["road", "moors", "camp"]
      season: ["summer", "autumn", "winter"]
    relationships:
      - target: "NPC_TRV_019"
        type: "debt"
        note: "Pays Hakon monthly silver to avoid inspections."
    associated_chains: ["smugglers_route"]
    image_prompt: "Wiry moor trader in rain-black cloak, leather-wrapped cart wheels, peat-streaked boots, sly smile. Night road, muted charcoal and moss tones."

  - id: "NPC_TRV_004"
    name: "Samir ibn Faruq"
    call_name: "Southwind Samir"
    role: "merchant"
    travel_region: "all"
    description: "Samir is olive-skinned and clean-bearded, wearing layered southern linen under a heavy northern fur cloak. Brass rings hang from his pack frames beside spice satchels and glass vials. His accent marks him as foreign at once, and every hall stares when he enters."
    stats:
      MIG: 3
      NIM: 4
      TOU: 4
      WIT: 7
      WIL: 5
      WYR: 3
    skills:
      - name: "Bargain"
        rank: 4
      - name: "Persuade"
        rank: 3
      - name: "Navigate"
        rank: 4
      - name: "Weather-sense"
        rank: 2
    personality: "Elegant, patient, and impossible to hurry. He treats insults as a tax on doing business in cold lands. He is polite to everyone and trusts almost no one."
    agenda: "Open a permanent overland spice and glass route from southern ports into the Rimevegr interior."
    secret: "He quietly maps defensible passes and harbor depths for distant investors with military interests."
    services: "Sells spice, lamp glass, bronze needles, and citrus salts; buys amber, furs, and worked iron."
    encounter_conditions:
      terrain: ["road", "market", "coast"]
      season: ["spring", "summer", "autumn"]
    relationships:
      - target: "NPC_TRV_019"
        type: "ally"
        note: "Hakon's patrol markers keep his caravans from vanishing in the hills."
    associated_chains: ["foreign_trade"]
    image_prompt: "Foreign southern trader in fur over fine linen, brass-ringed packs with spice satchels and glass vials. Dark Norse market backdrop, muted steel and saffron accents."

  - id: "NPC_TRV_005"
    name: "Yngvild Tallow-Hands"
    call_name: "Candle-Cart Yngvild"
    role: "merchant"
    travel_region: "forest"
    description: "Yngvild is broad-faced and soot-smudged, with wrists slick from rendered tallow and resin. She travels with low, sturdy carts that smell of beeswax, smoke, and pine pitch. Even in rain she keeps a dry coal nest for relighting lamps."
    stats:
      MIG: 4
      NIM: 3
      TOU: 5
      WIT: 5
      WIL: 5
      WYR: 3
    skills:
      - name: "Bargain"
        rank: 3
      - name: "Shelter"
        rank: 2
      - name: "Forage"
        rank: 2
      - name: "Weather-sense"
        rank: 3
    personality: "Motherly until crossed, then hard as kiln brick. She feeds hungry children before counting coin. She hates waste and remembers who stole from her carts."
    agenda: "Supply every remote shrine and watchtower with winter lamp stock before first hard freeze."
    secret: "She buys battlefield fat from grave-robbers through intermediaries and never asks whose bodies were cut."
    services: "Sells candles, lamp wicks, pitch torches, and rendered grease; can relight wet camp gear quickly."
    encounter_conditions:
      terrain: ["road", "forest", "camp"]
      season: ["autumn", "winter", "spring"]
    relationships:
      - target: "NPC_TRV_018"
        type: "ally"
        note: "Maret receives wax and clean cloth in exchange for field medicines."
    associated_chains: ["winter_hunger"]
    image_prompt: "Soot-marked Norse woman with tallow-slick hands beside low candle cart, pine-pitch torches stacked under hide cover. Wet forest road, muted amber and grey tones."

  - id: "NPC_TRV_006"
    name: "Orm Gravepurse"
    call_name: "Barrow-Broker"
    role: "merchant"
    travel_region: "mountains"
    description: "Orm is narrow-shouldered and always wrapped to the chin, as if cold lives in his bones. Bone charms and old silver fragments clink beneath his cloak when he walks. He smells faintly of old dust and damp stone."
    stats:
      MIG: 3
      NIM: 4
      TOU: 3
      WIT: 6
      WIL: 4
      WYR: 4
    skills:
      - name: "Bargain"
        rank: 4
      - name: "Deceive"
        rank: 4
      - name: "Rune-lore"
        rank: 2
      - name: "Stealth"
        rank: 3
    personality: "Soft-spoken and unnervingly calm around graves and ruins. He flatters greed in others while keeping his own hidden. He never camps in the same place two nights in a row."
    agenda: "Acquire and move high-value barrow relics before Grave Wardens lock down old mounds."
    secret: "He broke a sealed chamber near Raven's Perch and took a stone that now whispers in sleep."
    services: "Buys and sells illicit relics, old silver, rune stones, and burial goods; can identify likely fakes."
    encounter_conditions:
      terrain: ["road", "mountains", "barrow_hills"]
      season: ["summer", "autumn", "winter"]
    relationships:
      - target: "NPC_TRV_013"
        type: "rival"
        note: "Thora publicly curses his grave-trade whenever she finds proof."
    associated_chains: ["waking_barrows"]
    image_prompt: "Gaunt relic dealer in layered dark wool, hidden bone charms, old silver fragments at belt. Standing near snow-wet barrow stones, muted bone-grey palette."

  - id: "NPC_TRV_007"
    name: "Leif Crow-Voice"
    call_name: "Road-Skald Leif"
    role: "skald"
    travel_region: "all"
    description: "Leif is long-limbed and weathered, with a raven-feather cloak pin and a travel harp patched with gut string. His voice is rough as gravel at first, then carries clear over wind and fire crackle. Ink-stained fingers mark him as both singer and collector of names."
    stats:
      MIG: 3
      NIM: 4
      TOU: 4
      WIT: 6
      WIL: 5
      WYR: 3
    skills:
      - name: "Sagas"
        rank: 4
      - name: "Persuade"
        rank: 3
      - name: "Navigate"
        rank: 2
      - name: "Weather-sense"
        rank: 2
    personality: "Curious, patient, and hard to offend. He listens longer than most men can stay silent. He treats rumor as raw ore and songs as forged steel."
    agenda: "Compose a full war-road cycle covering every major contract band in the Rimevegr."
    secret: "He keeps two versions of certain verses: one for halls, one for buyers who pay in private."
    services: "Shares road news, faction gossip, settlement moods, and recent deaths in exchange for coin or protection."
    encounter_conditions:
      terrain: ["road", "camp", "market"]
      season: ["spring", "summer", "autumn", "winter"]
    relationships:
      - target: "NPC_TRV_011"
        type: "ally"
        note: "Bragi feeds him harbor rumors and sailor chants."
    associated_chains: ["rimevegr_legends"]
    image_prompt: "Lean wandering skald with patched travel harp, raven-feather brooch, wind-burned face and ink-stained fingers. Campfire glow, dark Norse muted palette."

  - id: "NPC_TRV_008"
    name: "Runa Veil-Touched"
    call_name: "The Veil Scholar"
    role: "seidr_practitioner"
    travel_region: "forest"
    description: "Runa is gaunt and pale, with one clouded blue eye and one dark brown eye that never blinks at the same time. Her white hair hangs in rough ropes, and black rune soot stains both hands to the knuckles. She moves like someone listening to voices behind walls."
    stats:
      MIG: 3
      NIM: 3
      TOU: 3
      WIT: 7
      WIL: 6
      WYR: 4
    skills:
      - name: "Rune-lore"
        rank: 4
      - name: "Wyrd-reading"
        rank: 4
      - name: "Spirit-lore"
        rank: 4
      - name: "Heal"
        rank: 2
    personality: "Not hostile, but deeply strange, she answers questions in spirals and symbols. She is patient with sincere seekers and cruelly dismissive of braggarts. She is a scholar, not a fighter, and avoids open violence whenever possible."
    agenda: "Map every Veil-thin point around Raven's Perch before the next solstice disturbance."
    secret: "She knows several world-level Achilles heels and withholds parts of them until trust is proven."
    services: "Reads Veil traces, interprets barrow signs, identifies supernatural weaknesses, and treats curse-sick wounds."
    encounter_conditions:
      terrain: ["forest", "barrow_hills", "camp"]
      season: ["autumn", "winter", "spring"]
    relationships:
      - target: "NPC_TRV_012"
        type: "ally"
        note: "Vesa carves her field runes and receives forbidden notes in return."
    associated_chains: ["waking_barrows", "veil_collapse"]
    image_prompt: "Gaunt veil-touched Norse woman with mismatched eyes, white matted hair, black-stained rune hands, layered undyed wool. Raven's Perch barrow stones in mist, muted blue-grey tones."

  - id: "NPC_TRV_009"
    name: "Haldis Honey-Tongue"
    call_name: "Hallfire Haldis"
    role: "skald"
    travel_region: "coast"
    description: "Haldis is small and fox-quick, with copper hair braided close and a travel lyre slung under her arm. Her smile is warm enough to disarm guards and drunks alike. Fine boots and better cloaks than a poor skald should own follow her from hall to hall."
    stats:
      MIG: 3
      NIM: 5
      TOU: 3
      WIT: 6
      WIL: 5
      WYR: 3
    skills:
      - name: "Sagas"
        rank: 3
      - name: "Deceive"
        rank: 4
      - name: "Persuade"
        rank: 3
      - name: "Stealth"
        rank: 3
    personality: "Charming, playful, and always watching reactions from the edge of her eye. She flatters first and tests loyalties second. She never gets truly drunk in public."
    agenda: "Keep her cover as a harmless road-skald while building a complete map of faction loyalties."
    secret: "She is a paid intelligence runner using skald travel rights as perfect spy cover."
    services: "Brings curated news, introduces buyers discreetly, and can pass coded messages between distant halls."
    encounter_conditions:
      terrain: ["road", "hall", "market"]
      season: ["spring", "summer", "autumn", "winter"]
    relationships:
      - target: "NPC_TRV_010"
        type: "rival"
        note: "Ketil's fearsome songs complicate her quiet information work."
    associated_chains: ["widows_web", "iron_grip"]
    image_prompt: "Compact copper-haired skald with close braids and polished travel lyre, sharp fox-like eyes and expensive boots. Mead hall doorway at dusk, muted firelit palette."

  - id: "NPC_TRV_010"
    name: "Ketil Nith-Singer"
    call_name: "Tongue-Breaker Ketil"
    role: "skald"
    travel_region: "all"
    description: "Ketil is tall, hollow-cheeked, and scarred across the throat, as if someone once tried to cut his song out. He carries a carved ash staff instead of an instrument. When he performs, even confident jarls stop smiling."
    stats:
      MIG: 4
      NIM: 3
      TOU: 4
      WIT: 7
      WIL: 5
      WYR: 4
    skills:
      - name: "Sagas"
        rank: 5
      - name: "Intimidate"
        rank: 4
      - name: "Persuade"
        rank: 3
      - name: "Wyrd-reading"
        rank: 2
    personality: "Cold, precise, and merciless toward hypocrisy. He does not shout; he cuts reputations with calm lines and witnesses. He believes shame is a cleaner weapon than steel."
    agenda: "Break three protected reputations that he claims are poisoning the Rimevegr."
    secret: "He keeps written proof behind his worst verses, making his reputation-killing songs hard to deny."
    services: "Can spread fame or ruin across routes, verify rumors publicly, and pressure oath-breakers through song."
    encounter_conditions:
      terrain: ["road", "hall", "thing_field"]
      season: ["spring", "summer", "autumn", "winter"]
    relationships:
      - target: "NPC_TRV_007"
        type: "rival"
        note: "Leif calls him necessary; Ketil calls Leif too soft."
    associated_chains: ["political_collapse"]
    image_prompt: "Tall gaunt skald with throat scar, ash staff, severe eyes, weather-dark cloak. Silent hall crowd behind him, muted iron and ember palette."

  - id: "NPC_TRV_011"
    name: "Bragi Oar-Rhyme"
    call_name: "Wave-Bragi"
    role: "skald"
    travel_region: "fjords"
    description: "Bragi is broad-nosed and sea-burned, with broken capillaries across his cheeks from years of cold wind. He carries a small drum of stretched seal hide and keeps rhythm on wagon rails and shield rims. Salt and old ale follow him."
    stats:
      MIG: 4
      NIM: 4
      TOU: 5
      WIT: 5
      WIL: 4
      WYR: 3
    skills:
      - name: "Sagas"
        rank: 3
      - name: "Weather-sense"
        rank: 3
      - name: "Persuade"
        rank: 2
      - name: "Navigate"
        rank: 2
    personality: "Loud in company, unexpectedly gentle with frightened travelers. He hates bullies and adores sailors' gossip. He will trade a true weather warning for food when coin is thin."
    agenda: "Collect coastal storm lore into one profitable winter hall performance."
    secret: "He once deserted a doomed ship and hides the captain's ring in his drum frame."
    services: "Provides harbor rumors, route timing advice, weather calls, and morale songs for long marches."
    encounter_conditions:
      terrain: ["road", "fjords", "camp"]
      season: ["spring", "summer", "autumn"]
    relationships:
      - target: "NPC_TRV_023"
        type: "ally"
        note: "He shares food and news with Inga's displaced family camp."
    associated_chains: ["coastal_crisis"]
    image_prompt: "Sea-worn Norse skald with seal-hide drum, wind-burnt cheeks and salt-stained cloak. Fjord road campfire, muted slate-blue and amber tones."

  - id: "NPC_TRV_012"
    name: "Vesa Knot-Bones"
    call_name: "Knot-Carver"
    role: "seidr_practitioner"
    travel_region: "moors"
    description: "Vesa is small and bent at the spine, with rows of carved bone tags hanging from a willow frame pack. Her nails are black with ink and peat. She mutters rune counts under her breath as she walks."
    stats:
      MIG: 3
      NIM: 4
      TOU: 3
      WIT: 6
      WIL: 5
      WYR: 4
    skills:
      - name: "Rune-lore"
        rank: 4
      - name: "Spirit-lore"
        rank: 3
      - name: "Wyrd-reading"
        rank: 3
      - name: "Forage"
        rank: 2
    personality: "Suspicious, exacting, and offended by sloppy questions. She values patience and proper offerings. Beneath her prickly manner, she is protective of children and fools."
    agenda: "Complete a full traveling catalog of broken ward marks across abandoned moor shrines."
    secret: "One of her charm knots binds a resentful dead child that whispers names at night."
    services: "Carves ward knots, diagnoses cursed objects, and reads whether a trail is spirit-touched."
    encounter_conditions:
      terrain: ["moors", "road", "ruins"]
      season: ["autumn", "winter", "spring"]
    relationships:
      - target: "NPC_TRV_008"
        type: "ally"
        note: "Runa shares Veil notes in exchange for rune-carved travel wards."
    associated_chains: ["waking_barrows"]
    image_prompt: "Bent rune-carver woman with bone-tag frame pack, black-inked nails, peat-stained wool layers. Misty moor shrine stones, muted grey-green palette."

  - id: "NPC_TRV_013"
    name: "Thora Mist-Mother"
    call_name: "Thora of the White Breath"
    role: "seidr_practitioner"
    travel_region: "mountains"
    description: "Thora is tall and raw-boned, with frostbitten ears and long white braids tied in copper wire. She wears wolfskin over undyed wool and carries a rune-scratched antler staff. Cold vapor curls from her mouth even when the air is warm."
    stats:
      MIG: 4
      NIM: 3
      TOU: 4
      WIT: 6
      WIL: 6
      WYR: 5
    skills:
      - name: "Wyrd-reading"
        rank: 4
      - name: "Spirit-lore"
        rank: 4
      - name: "Rune-lore"
        rank: 3
      - name: "Survival"
        rank: 3
    personality: "Severe and ritual-minded, she demands clear promises before she helps. She fears little except broken ritual sequence. She respects people who keep watch duty without complaint."
    agenda: "Find and train a successor before winter takes her knees completely."
    secret: "She foresaw her own death at a mountain cairn and is steering events to choose who stands beside her there."
    services: "Interprets omens, blesses crossings, performs spirit appeasement rites, and gives mountain hazard warnings."
    encounter_conditions:
      terrain: ["mountains", "road", "cairn_fields"]
      season: ["autumn", "winter", "spring"]
    relationships:
      - target: "NPC_TRV_006"
        type: "rival"
        note: "She seeks proof that Orm disturbed protected mountain barrows."
    associated_chains: ["mountain_omens"]
    image_prompt: "Tall frost-marked völva with white braids and antler staff carved in runes, wolfskin over pale wool. Snowy cairn ridge, muted blue-white mountain palette."

  - id: "NPC_TRV_014"
    name: "Arn Ketillson"
    call_name: "Ash-Rune Arn"
    role: "seidr_practitioner"
    travel_region: "forest"
    description: "Arn is a narrow man with burned eyebrows, ash-grey stubble, and a travel satchel full of bark tablets. One forearm is etched with old rune scars from failed bindings. He smells of charcoal, nettle smoke, and fear-sweat."
    stats:
      MIG: 3
      NIM: 4
      TOU: 4
      WIT: 6
      WIL: 5
      WYR: 4
    skills:
      - name: "Rune-lore"
        rank: 4
      - name: "Spirit-lore"
        rank: 3
      - name: "Deceive"
        rank: 2
      - name: "Stealth"
        rank: 2
    personality: "Nervous, sharp, and always expecting repayment from fate. He is helpful when treated fairly and venomous when cornered. He speaks quickly when scared and forgets to breathe."
    agenda: "Erase old witch-hunter records tying his name to forced rune interrogations."
    secret: "He was once paid to mark innocent people as seidr-tainted and now destroys his own paper trail."
    services: "Inspects cursed gear, carves temporary anti-spirit marks, and deciphers damaged runic fragments."
    encounter_conditions:
      terrain: ["forest", "road", "camp"]
      season: ["spring", "summer", "autumn"]
    relationships:
      - target: "NPC_TRV_016"
        type: "rival"
        note: "Eirik's prophecies publicly accuse Arn of past crimes."
    associated_chains: ["witch_hunts"]
    image_prompt: "Thin rune-worker with ash-stubbled jaw, rune-scarred forearm, bark tablets and charcoal satchel. Pine-dark roadside camp, muted black-green palette."

  - id: "NPC_TRV_015"
    name: "Bjorn One-Oath"
    call_name: "Gate-Fallen Bjorn"
    role: "hermit"
    travel_region: "mountains"
    description: "Bjorn is heavy-jawed and iron-grey, with a flattened nose and old shield scars across both forearms. He wears patched mail under a shepherd's cloak and carries a spear haft without a head. His camp is always uphill, with sightlines on the pass."
    stats:
      MIG: 5
      NIM: 3
      TOU: 5
      WIT: 4
      WIL: 5
      WYR: 3
    skills:
      - name: "Spears"
        rank: 3
      - name: "Survival"
        rank: 3
      - name: "Shelter"
        rank: 2
      - name: "Track"
        rank: 2
    personality: "Quiet, ashamed, and fiercely disciplined in routine. He avoids halls and refuses praise. He will still stand watch for strangers if wolves are near."
    agenda: "Repay a broken duty by keeping one pass safe through one full winter."
    secret: "He abandoned a gate post years ago; the settlement behind it was overrun that same night."
    services: "Provides pass warnings, safe bivouac advice, and emergency escort through mountain choke points."
    encounter_conditions:
      terrain: ["mountains", "road", "pass"]
      season: ["autumn", "winter", "spring"]
    relationships:
      - target: "NPC_TRV_019"
        type: "debt"
        note: "Hakon once spared him from warrant hunters in exchange for winter watch reports."
    associated_chains: ["winter_hunger"]
    image_prompt: "Scarred former huskarl in patched mail beneath rough shepherd cloak, spear-haft in hand on a snowy pass overlook. Stark stone and snow, muted iron palette."

  - id: "NPC_TRV_016"
    name: "Eirik Reed-Mouth"
    call_name: "The Bog Prophet"
    role: "hermit"
    travel_region: "moors"
    description: "Eirik is gaunt and mud-streaked, with long hair clotted by marsh water and reed seeds. His eyes drift off-center as if watching unseen processions. He wraps his feet in woven rushes instead of boots."
    stats:
      MIG: 3
      NIM: 3
      TOU: 4
      WIT: 5
      WIL: 4
      WYR: 4
    skills:
      - name: "Wyrd-reading"
        rank: 3
      - name: "Forage"
        rank: 3
      - name: "Survival"
        rank: 3
      - name: "Spirit-lore"
        rank: 2
