      armor:
        torso: "Padded wool coat with leather patching"
        head: "None"
    personality: "Odr is cautious to the point of being called cowardly by men who never buried family. He follows orders because his wife and son are held in Hadric's orbit. Every fight looks to him like a debt collector."
    trigger: "If he confirms his family has been moved or killed, he turns on Hadric regardless of consequence."
    agenda: "Survive long enough to buy his kin free with captured iron and quiet favors."
    loyalty: 1
    secret: "He has hidden a sharpened file under Hadric's wagon axle and waits for one night of heavy rain to stage an accident."
    relationships:
