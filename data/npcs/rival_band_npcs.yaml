    call_name: "Bent-Knee"
    role: "fighter"
    band: "The Three Wolves"
    description: "Odr limps on a badly healed knee that clicks in cold weather. His beard is neatly trimmed despite camp filth, and his hands are those of a former smith: burnt, thick, deliberate. He carries his shield as if it were a burden he still has not accepted."
