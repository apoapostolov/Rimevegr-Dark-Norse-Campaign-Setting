npcs:
  - id: "NPC_BND_001"
    name: "Dalla Fenriksdottir"
    call_name: "Moss-Hand"
    role: "healer"
    band: "Voss's Black Axes"
    description: "Dalla is narrow-shouldered and rope-hard, with smoke-dark hair braided tight against her skull. Her fingertips are permanently stained green from crushed leaves, and a scar at her jaw shines pale when the fire catches it. She smells of pine pitch, boiled linen, and old blood scrubbed from wool."
    stats:
      MIG: 4
      NIM: 5
      TOU: 5
      WIT: 8
      WIL: 6
      WYR: 2
    skills:
      - name: "Heal"
        rank: 3
      - name: "Forage"
        rank: 2
      - name: "Survival"
        rank: 2
      - name: "Spirit-lore"
        rank: 1
    gear:
      weapons:
        - name: "Bone-hilt seax"
          type: "blade"
          base_damage: 4
        - name: "Ash walking staff"
          type: "club"
          base_damage: 2
      armor:
        torso: "Quilted wool gambeson under patched leather jerkin"
        head: "None"
    personality: "Dalla speaks little and never wastes words on men who want comfort instead of truth. She keeps count of herbs, bandages, and lives in the same tone she uses for weather. Her mercy is practical, not soft."
    trigger: "If Voss orders wounded men abandoned while there is still a chance to move them, she turns on command."
    agenda: "Build a hidden herb cache line along the Rimevegr so the Black Axes can survive winter contracts."
    loyalty: 4
    secret: "She keeps a wrapped packet of dried monkshood and plans to use it on whichever captain sells Black Axes wounded into thrall chains."
    relationships:
      - target: "Gest Ledger"
        type: "ally"
        note: "She trusts him to keep medical stores off the captain's sale list."
      - target: "Svala White-Hand"
        type: "ally"
        note: "Heard of Red Tide's captive healer and wants her extracted alive."
    image_prompt: "Lean Norse field healer with herb-stained hands, jaw scar, layered wool and leather, muted pine-green and ash-gray palette, cold wind, dark fantasy realism."

  - id: "NPC_BND_002"
    name: "Rurik Alvisson"
    call_name: "Harefoot"
    role: "scout"
    band: "Voss's Black Axes"
    description: "Rurik is all tendon and quick joints, with a fox-brown beard and a split left ear. His boots are always freshly stitched and caked with peat from places others never notice. He carries himself like a man already halfway to the treeline."
    stats:
      MIG: 5
      NIM: 8
      TOU: 5
      WIT: 6
      WIL: 5
      WYR: 1
    skills:
      - name: "Track"
        rank: 3
      - name: "Stealth"
        rank: 3
      - name: "Navigate"
        rank: 2
      - name: "Bows"
        rank: 2
    gear:
      weapons:
        - name: "Short yew bow"
          type: "bow"
          base_damage: 5
        - name: "Narrow seax"
          type: "blade"
          base_damage: 4
      armor:
        torso: "Dark wool tunic over light leather vest"
        head: "Fur-lined hood"
    horse:
      has_horse: true
      name: "Bog-Thread"
      breed: moor_runner
      sex: gelding
      age: 8
      age_class: prime
      role: scout_mount
      condition: steady
      mood: watchful
      rider_stability: 72
      fatigue: 8
      bond_rider: Rurik Harefoot
      speed: 5
      wind: 4
      foot: 3
      nerve: 2
      load: 2
      sense: 3
      traits:
        - fast_break
        - long_stride
        - hard_to_catch
      tricks:
        - come_to_whistle
        - sidepass
      bloodline_tags:
        - deep_wind
        - fast_break
      active_conditions: []
      tack:
        saddle: scout_saddle
        bridle: rawhide_hackamore
        shoes: light_shod
      ownership: band
      notes:
        - Built for long moor sweeps and messenger work
        - Runs hotter in shield-noise than Rurik admits
    personality: "He jokes fast and vanishes faster, but his eyes never stop measuring distance. Rurik likes people in small doses and forests in every dose. He hates camp songs because they drown useful sounds."
    trigger: "If ordered to burn a woods camp with children still inside, he deserts the same night."
    agenda: "Map a hidden goat path over the ridge to outflank the Three Wolves."
    loyalty: 3
    secret: "He has been trading route scraps to a ferryman in exchange for letters from his younger sister."
    relationships:
      - target: "Kell Hook"
        type: "ally"
        note: "Runs knife drills with Kell when scouts return."
      - target: "Ivor Fen-Eye"
        type: "rival"
        note: "Each has tracked the other by boot pattern twice."
    image_prompt: "Wiry Norse scout with split ear, fox-brown beard, peat-stained boots, short bow and hooded silhouette, misty conifer backdrop, muted browns and cold greens."

  - id: "NPC_BND_003"
    name: "Einar Broksson"
    call_name: "Green-Split"
    role: "fighter"
    band: "Voss's Black Axes"
    description: "Einar is broad through the chest but still carries a boy's face under fresh stubble. A crooked collarbone lifts his right shoulder where an old training break healed wrong. His shield is new, his knuckles are not."
    stats:
      MIG: 6
      NIM: 5
      TOU: 6
      WIT: 4
      WIL: 5
      WYR: 1
    skills:
      - name: "Axes"
        rank: 2
      - name: "Shields"
        rank: 2
      - name: "Brawl"
        rank: 1
    gear:
      weapons:
        - name: "Bearded hand axe"
          type: "axe"
          base_damage: 5
        - name: "Round shield, limewood"
          type: "shield"
          base_damage: 2
      armor:
        torso: "Thick wool and boiled leather shoulder plates"
        head: "Iron cap"
    personality: "He pushes too hard to be seen as grown and fearless. Praise makes him reckless; shame makes him stubborn. Einar watches Petra like a pupil watches a patient teacher."
    trigger: "If Petra Shepherd is executed or sold, he attacks whoever gave the order regardless of odds."
    agenda: "Earn first pick of captured steel before winter by proving himself in shield-line work."
    loyalty: 4
    secret: "He forged a false age mark in the band ledger two winters ago; he joined before he was of fighting years."
    relationships:
      - target: "Petra Shepherd"
        type: "ally"
        note: "She patched his shoulder and taught him to hold line instead of chase kills."
      - target: "Leif Torch-Son"
        type: "rival"
        note: "Competes with Leif for notice from Voss."
    image_prompt: "Young broad-shouldered Norse axeman with crooked right shoulder, new round shield, iron cap, damp wool and leather, grim campfire lighting, dark realistic style."

  - id: "NPC_BND_004"
    name: "Signe Arnsdottir"
    call_name: "Pot-Knife"
    role: "specialist"
    band: "Voss's Black Axes"
    description: "Signe has burn scars across both forearms and a flattened nose from an old brawl. She wears a soot-black apron over armor and keeps a butcher's blade sharper than most swords. Her laugh is short and usually followed by someone obeying."
    stats:
      MIG: 6
      NIM: 5
      TOU: 6
      WIT: 6
      WIL: 5
      WYR: 1
    skills:
      - name: "Blades"
        rank: 2
      - name: "Forage"
        rank: 2
      - name: "Shelter"
        rank: 2
      - name: "Intimidate"
        rank: 1
    gear:
      weapons:
        - name: "Long butcher seax"
          type: "blade"
          base_damage: 5
        - name: "Iron spit-staff"
          type: "spear"
          base_damage: 4
      armor:
        torso: "Layered wool, leather apron, and stitched hide sleeves"
        head: "None"
    personality: "Signe runs cookfires like a quartermaster runs coin. She feeds grudges last and scouts first, then claims it is chance. She is patient with hunger and merciless with waste."
    trigger: "If officers sell food stock to buy drink, she poisons their ale with purge herbs and leaves."
    agenda: "Secure enough salt and dried fish to keep the Black Axes independent through first thaw."
    loyalty: 3
    secret: "She has hidden two sealed grain sacks for a breakaway march if Voss loses command."
    relationships:
      - target: "Gest Ledger"
        type: "ally"
        note: "They run quiet audits on food theft."
      - target: "Skarn Chain-Keeper"
        type: "grudge"
        note: "Skarn once stole her stores when both worked the same winter port."
    image_prompt: "Scarred Norse camp cook-warrior with soot-dark apron over leather, butcher seax at hip, steam and embers around her, muted charcoal and rust tones."

  - id: "NPC_BND_005"
    name: "Leif Jorundsson"
    call_name: "Torch-Son"
    role: "fighter"
    band: "Voss's Black Axes"
    description: "Leif is narrow-faced with pale lashes singed short from a pitch fire mishap. He keeps tar under his nails and carries coils of wick on his belt beside a spear. Smoke clings to him even after river washing."
    stats:
      MIG: 5
      NIM: 6
      TOU: 5
      WIT: 5
      WIL: 5
      WYR: 1
    skills:
      - name: "Spears"
        rank: 2
      - name: "Survival"
        rank: 2
      - name: "Shelter"
        rank: 1
      - name: "Intimidate"
        rank: 1
    gear:
      weapons:
        - name: "Ash spear with fire-hardened spare shaft"
          type: "spear"
          base_damage: 5
        - name: "Pitch torch bundle"
          type: "special"
          base_damage: 2
      armor:
        torso: "Wool gambeson with leather shoulder cape"
        head: "Boiled leather skullcap"
    personality: "Leif wants to be remembered and mistakes noise for legend. He listens hardest when veterans speak about defeats, not victories. He fears dying nameless more than dying young."
    trigger: "If Voss orders a retreat that leaves band banners behind, Leif disobeys and goes back for them."
    agenda: "Win a contract raid where his torch crews decide the outcome."
    loyalty: 3
    secret: "He keeps letters from a priest of the south who is also his father, a truth that would ruin his standing with half the band."
    relationships:
      - target: "Einar Green-Split"
        type: "rival"
        note: "Both race for first blood and first notice."
      - target: "Thorne Ash-Born"
        type: "fear"
        note: "Thorne warned him once and burned his sleeve to prove a point."
    image_prompt: "Young Norse spearman with singed lashes, tar-stained hands, torch wicks on belt, smoke-hazed cloak, cold blue night and ember orange highlights."

