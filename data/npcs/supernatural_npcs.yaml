      MIG: 7
      NIM: 4
      TOU: 7
      WIT: 5
      WIL: 8
      WYR: 3
    hp: 19
    abilities:
      - "Ash Oath: weapons that harmed her in life glow faintly near her"
      - "Murder-Scent: can identify bloodline kin of her killers by smell"
    personality: "In life she was patient and diplomatic; in death she is direct, bitter, and precise. She still honors sworn words and will pause for truth, but lies trigger immediate violence."
    can_communicate: true
    communication_method: "speech"
    agenda: "Find proof of her murder and force weregild from the guilty line before she can rest."
    knowledge: "Knows where the murder happened, who carried her body, and which family records were altered afterward."
    danger_level: "hostile"
    interaction_hooks:
      - "She appears when mercenaries dig old oath-posts near BAR_010."
      - "She offers safe passage through her chamber if the band brings her a named confession."
    secret: "Her younger brother ordered the ambush, not the rival clan blamed in local songs."
