npcs:
  - id: "NPC_SUP_001"
    name: "Eydis Hearth-Ash"
    true_name: "Eydis Sigurdsdottir"
    type: "named_draugr"
    bound_location: "BAR_010 - Grimholt Barrow"
    description: "A tall dead woman in blackened mail with half her jaw split by an old axe-cut. Ash still clings inside her ribcage, and when she speaks, smoke leaks between her teeth."
