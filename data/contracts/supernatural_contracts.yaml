    advance_silver: 20
    duration_days: 7
    risk: "moderate"
    band_size_min: 4
    skills_valued: ["rune_lore", "lore", "track"]
    supernatural_elements:
      veil_proximity: "moderate"
      undead_types: []
      seidr_useful: true
      curse_risk: "moderate"
    political_conditions:
      requires_faction: null
