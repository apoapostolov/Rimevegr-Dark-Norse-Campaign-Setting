# Iron Ledger — Supernatural Contracts
# 18 contracts tied to the waking_barrows chain, Veil phenomena,
# and supernatural escalation across Y312–Y315.
# Schema matches contracts_available.yaml + extended supernatural_elements block.
# IDs: CONT_SUP_001 through CONT_SUP_018.

contracts:
  # ============================================================
  # YEAR 312 — ISOLATED INCIDENTS (5 contracts)
  # ============================================================

  # --- Barrow Clearing ---
  - id: "CONT_SUP_001"
    type: "barrow_clear"
    title: "Clear the Kolvik Dead-Ground"
    employer: "Harbour-Master Inga of Kolvik"
    settlement: "Kolvik"
    region: "coastal"
    season: "autumn"
    year_range: [312, 313]
    min_reputation: 2
    payment_silver: 100
    bonus: "Free ship repair (3 days)"
    advance_silver: 30
    duration_days: 5
    risk: "high"
    band_size_min: 6
    skills_valued: ["rune_lore", "spears"]
    supernatural_elements:
      veil_proximity: "moderate"
      undead_types: ["UND_DRAUGR_01", "UND_DRAUGR_02"]
      seidr_useful: true
      curse_risk: "low"
    political_conditions:
      requires_faction: null
      requires_event: "EVT_312_SUP_001"
    consequences:
      success:
        reputation_change: 1
        standing_change: { "Kolvik": 2 }
        unlocks: ["CONT_SUP_002", "CONT_SUP_005"]
        narrative_consequence: "Word spreads — other settlements begin seeking barrow-clearers"
      failure:
        reputation_change: -1
        standing_change: { "Kolvik": -1 }
        supernatural_consequence: "Barrow activity intensifies; nearby settlements hear scraping beneath the earth at night"
    narrative_hook: >-
      Inga's cattle are dying near the old mound. The ground shakes at dusk.
      She wants it stopped before the fishing fleet refuses to dock. The
      herdsman Erling vanished there a season ago. His wife still lights
      a candle for him every night. Nobody expects to find him alive.
    notes: "Entry point to waking_barrows chain. Small barrow — 3 chambers. Cold, tight, stinking of wet earth."

