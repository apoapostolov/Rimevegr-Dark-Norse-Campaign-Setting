        reputation_change: -2
        standing_change: { "Raven's Perch": -3 }
        supernatural_consequence: "The Barrow-King's power grows. BOS_SUPER_01 begins commanding draugr beyond its barrow. Raven's Perch is besieged by the dead."
    narrative_hook: >-
      Egil Raven-Eye has watched the ravens gather above his barrow for
      three years. Now the dead walk out at solstice and stand in his
      fields. His people bolt their doors. His warriors refuse to go near
      the mound. He has heard the band clears barrows. He offers everything
      he can scrape together and says plainly: if this is not dealt with,
      Raven's Perch will be a ghost settlement by next winter. The barrow
      is large — twelve chambers, a throne room, and something that sits
      on the throne and remembers being king.
    notes: "Major boss encounter — BOS_SUPER_01 Barrow-King. The map stone reward is critical for the endgame chain."

