      barefoot on frozen ground, and says she needs to see what Thorne felt
      at Kolvik. She offers no silver — seidr women deal in stranger currencies.
      The journey to Kolvik through midwinter ice is brutal. She does not
      complain. She does not explain.
    notes: "The divination reward is powerful — a true answer about one barrow or supernatural matter. Ragnhild is WYR 5."

