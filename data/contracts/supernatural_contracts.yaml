      Ordovast recovered items from the Iron Barrow before it was sealed —
      rune-carved bronze plates, a jawbone set with silver teeth, and a
      stone tablet too heavy for one man that hums when touched. He wants
      them delivered to Deepholm's archive for study. The road between
      Grimholt and Deepholm passes through bandit territory and open moor.
      The relics are heavy, and the stone tablet makes the pack-horse
      skittish. On the second night, the jawbone's silver teeth begin to
      chatter on their own.
    notes: "Cursed cargo escort. The relics attract supernatural attention — random undead encounters increase along the route."

