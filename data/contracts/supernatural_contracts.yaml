      undead_types: ["UND_DRAUGR_01", "UND_DRAUGR_02", "UND_DRAUGR_03"]
      seidr_useful: true
      curse_risk: "high"
    political_conditions:
      requires_faction: null
      requires_event: null
      requires_item: "Barrow-King's map stone from CONT_SUP_015 or Grave Wardens' archive from CONT_SUP_011"
    consequences:
      success:
        reputation_change: 2
        standing_change: { "Skaldhaven": 3 }
        unlocks: ["CONT_SUP_017", "CONT_SUP_018"]
        lore_reward: "The First Barrow's location is confirmed. The Barrow Anchor Stone is inside."
        narrative_consequence: "The endgame is visible. The band now knows what must be done to prevent the Barrow Tide — and how impossible it sounds."
      failure:
        reputation_change: -1
        standing_change: {}
        supernatural_consequence: "The band is lost in Veil-distorted terrain for d6 days. Each day, one member must pass WIL test or gain a permanent fear of barrows."
    narrative_hook: >-
      The Grave Wardens' records and the Barrow-King's map stone agree:
      there is a First Barrow, older than any other, three miles behind
      where the Barrow Tide will form. Inside it is the Barrow Anchor
      Stone — the thing that connects every dead man in the Rimevegr to
      every other dead man. Audun says destroying it is the only way to
      prevent what is coming. The problem: no one knows exactly where it
      is. The map and the records give clues, not coordinates. The terrain
      between here and there is thick with Veil distortion — directions
      lie, distances change, the dead stand in the fog and watch.
    notes: "Exploration/pathfinding contract through supernatural terrain. The journey is the danger."

  # --- Ghost-Laying Ritual (endgame) ---
  - id: "CONT_SUP_017"
    type: "ritual"
    title: "Sever the Barrow Anchor"
    employer: "Coalition — Ragnhild, Audun, and Dalla"
    settlement: null
    region: "the First Barrow"
    season: "winter"
    year_range: [315, 315]
    min_reputation: 5
    payment_silver: 0
    bonus: "The Rimevegr survives."
    advance_silver: 0
    duration_days: 1
    risk: "extreme"
    band_size_min: 10
    skills_valued: ["seidr", "rune_lore", "spears", "command", "swords"]
    supernatural_elements:
      veil_proximity: "critical"
      undead_types: ["UND_DRAUGR_05"]
      boss_present: "WBS_01"
      seidr_useful: true
      curse_risk: "high"
    political_conditions:
      requires_faction: null
      requires_event: null
      requires_items:
        - "Binding texts from CONT_SUP_007"
        - "Grave Wardens' archive from CONT_SUP_011"
        - "First Barrow location from CONT_SUP_016"
      requires_band_members: ["Dalla"]
    consequences:
      success:
        reputation_change: 5
        standing_change: { "all_settlements": 3 }
        narrative_consequence: >-
          The Anchor Stone shatters. The Barrow Tide collapses. The dead fall
          where they stand, empty again. The ground goes still. Dalla screams
          and collapses — her connection to the dead severed like a cut rope.
          Ragnhild ages ten years in an hour. The Veil seals. Not forever.
          But long enough.
      failure:
        reputation_change: -3
        standing_change: { "all_settlements": -2 }
        supernatural_consequence: >-
          The Barrow Tide cannot be stopped. WBS_01 reaches the populated
          settlements. The band flees with the survivors. The Rimevegr
          as they knew it is over.
    narrative_hook: >-
      The ground shakes. The barrows are open — all of them, every mound
      from Frostfjord to Deepholm, the dead pouring out in rivers of bone
      and iron. The Barrow Tide is forming. Ragnhild says there are hours,
      not days. Audun has the ritual. Dalla has the sight. The band has the
      arms. A small party must reach the First Barrow while the Tide walks
      and destroy the Anchor Stone before the core entity reaches Frostfjord.
      Six Ancient Draugr guard the deep chamber. They did not join the march.
      They are waiting.
    notes: "Campaign climax. The band must reach and destroy the Anchor Stone (40 HP, immune to all except consecrated weapons or fire) while WBS_01 advances on the settlements. The six Ancient Draugr are the final obstacle."

  # --- Barrow Clearing (final) ---
  - id: "CONT_SUP_018"
    type: "barrow_clear"
    title: "Hold the Line at Frostfjord"
    employer: "Jarl Hrothgar of Frostfjord (desperate)"
    settlement: "Frostfjord Hollow"
    region: "fjord"
    season: "winter"
    year_range: [315, 315]
    min_reputation: 3
    payment_silver: 300
    bonus: "Whatever silver Hrothgar has left — he empties his chest on the table"
    advance_silver: 0
    duration_days: 1
    risk: "extreme"
    band_size_min: 12
    skills_valued: ["command", "spears", "shields", "swords", "intimidate"]
    supernatural_elements:
      veil_proximity: "critical"
      undead_types:
        [
          "UND_DRAUGR_01",
          "UND_DRAUGR_02",
          "UND_DRAUGR_03",
          "UND_DRAUGR_04",
          "UND_DRAUGR_05",
        ]
      boss_present: "WBS_01"
      seidr_useful: true
      curse_risk: "high"
    political_conditions:
      requires_faction: null
      requires_event: null
    consequences:
      success:
        reputation_change: 4
        standing_change: { "Frostfjord Hollow": 5, "all_settlements": 2 }
        narrative_consequence: >-
          The palisade holds. Barely. The dead pile against the walls like
          driftwood and the living fight until their arms are numb. If the
          Anchor Stone strike team succeeded (CONT_SUP_017), the Tide breaks
          and the living survive. If not — the line holds long enough for
          the civilians to evacuate by sea.
      failure:
        reputation_change: -2
        standing_change: { "Frostfjord Hollow": -5 }
        supernatural_consequence: "Frostfjord falls. The dead walk the streets. The fjord freezes black."
    narrative_hook: >-
      Hrothgar is not a man who begs. He is begging now. The Barrow Tide
      is visible from Frostfjord's watchtower — a dark line moving across
      the moors, too wide for an army and too slow for a storm. It will
      reach the palisade by nightfall. He needs every sword, every spear,
      every body that can hold a shield. This is not a contract. This is
      the end of the world arriving on foot, and the only question is
      whether anyone survives the night.
    notes: "Defensive siege contract. Runs concurrently with CONT_SUP_017 — the band splits or commits to one. The outcome depends on both."
