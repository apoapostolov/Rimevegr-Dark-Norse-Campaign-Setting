      The Pale Widow does not beg. She states facts: the ring of black frost
      around the barrow outside Ashen Reach is growing. Water from the frost
      smells of rot. Dogs refuse to cross it. She wants someone to dig at the
      frost line, take soil samples, and report what they find. Her tone
      suggests she already suspects the answer and wants confirmation.
    notes: "The Widow's real interest is leverage — she wants to know if barrow phenomena can be weaponised politically."

