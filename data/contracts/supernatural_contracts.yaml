    bonus: "If sealed: Helga's lasting trust. If looted: 200 silver in burial goods."
    advance_silver: 30
    duration_days: 8
    risk: "high"
    band_size_min: 8
    skills_valued: ["spears", "rune_lore", "command"]
    supernatural_elements:
      veil_proximity: "high"
      undead_types:
        ["UND_DRAUGR_01", "UND_DRAUGR_02", "UND_DRAUGR_03", "UND_HAUG_01"]
      seidr_useful: true
      curse_risk: "high"
    political_conditions:
      requires_faction: null
      requires_event: null
    moral_choice:
      option_a:
        action: "Seal the barrow with the dead inside"
        payment: 90
        reputation_change: 1
        standing_change: { "Thornwall": 3 }
        narrative: "Helga is satisfied. The Hush stops. The moor smells clean again. But whatever was in the barrow is still in the barrow."
      option_b:
        action: "Loot the barrow before sealing"
        payment: 290
        reputation_change: 0
        standing_change: { "Thornwall": -1 }
        curse_gained: "Barrow-thief's Mark — nightmares for d6 weeks, -1 WIL during that time"
        narrative: "The burial goods are valuable. The dead noticed they were taken. The nightmares start on the third night."
    consequences:
      success:
        unlocks: ["CONT_SUP_013"]
        narrative_consequence: "The band gains a reputation as barrow specialists — for better or worse."
      failure:
        reputation_change: -2
        standing_change: { "Thornwall": -3 }
        supernatural_consequence: "The haugbui escapes the barrow. Thornwall's sheep begin dying at night. Helga's hall is cold by morning."
    narrative_hook: >-
      Helga's people have not slept properly since the Hush. The barrow on
      the eastern moor — the one the grandmothers said to leave alone — is
      open. The capstone has shifted. Cold air pours from the gap, and the
      sheep refuse to graze within a hundred paces. Helga wants it sealed.
      She does not mention the burial goods inside, but everyone knows the
      old moor-lords were buried rich. The question is whether the silver is
      worth what comes with taking it.
    notes: "First major moral choice. Looting triggers curse mechanics. Sealing earns trust but leaves the threat contained, not eliminated."

