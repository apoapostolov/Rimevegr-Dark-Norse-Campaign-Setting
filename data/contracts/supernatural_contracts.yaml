    advance_silver: 0
    duration_days: 5
    risk: "moderate"
    band_size_min: 4
    skills_valued: ["stealth", "rune_lore", "bargain"]
    supernatural_elements:
      veil_proximity: "high"
      undead_types: []
      seidr_useful: false
      curse_risk: "moderate"
    political_conditions:
      requires_faction: null
      requires_event: null
    consequences:
      success:
        reputation_change: 0
        standing_change: { "Frostfjord Hollow": -1, "Icebreak": 2 }
        unlocks: ["CONT_SUP_012"]
        lore_reward: "The binding texts describe the iron-stake ritual that holds the Draugr-Jarl (BOS_SUPER_02). The rite can be repeated — if the stakes hold."
        narrative_consequence: "Hrothgar learns the band was digging in his cellar. He is furious — or terrified. Hard to tell."
      failure:
        reputation_change: -1
        standing_change: { "Frostfjord Hollow": -2 }
        supernatural_consequence: "Disturbance in the cellar accelerates the Draugr-Jarl's awakening by months."
    narrative_hook: >-
      Ragnhild says the binding rite for the thing beneath Frostfjord was
      recorded on hide scrolls kept in the mead-hall cellar. Three generations
      of elders safeguarded them. The last elder died with the secret. The
      scrolls are still there — somewhere beneath Hrothgar's floor. Hrothgar
      does not know what he sits on. Getting the scrolls means getting into
      the cellar without permission, or convincing Hrothgar to let strangers
      dig under his hall. Neither option is comfortable.
    notes: "Social/stealth contract, not combat. Hrothgar's trust is fragile. The cellar is freezing — unnaturally so."

  # --- Barrow Clearing (moral choice: seal or loot) ---
  - id: "CONT_SUP_008"
    type: "barrow_clear"
    title: "The Thornwall Barrow: Seal or Strip"
    employer: "Jarl Helga Thornwall"
    settlement: "Thornwall"
    region: "moors"
    season: "summer"
    year_range: [313, 313]
    min_reputation: 2
