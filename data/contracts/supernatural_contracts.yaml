      Audun sends a runner with ink-stained fingers and a sealed letter.
      The rune-stones at Icebreak are glowing. He wants rubbings of every
      symbol, measurements of the stone circle, and soil samples from the
      barrow mouth. He pays modestly but the knowledge he offers is worth
      more than silver to anyone who plans to enter barrows again.
    notes: "Knowledge reward, not wealth. The rubbings reveal that the barrows are networked — same rune-language across sites."

