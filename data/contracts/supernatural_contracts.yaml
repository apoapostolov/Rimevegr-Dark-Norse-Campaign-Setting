      Sigrun's scholars studied the Grimholt relics and found references to
      a Grave Wardens' archive sealed in a vault beneath Deepholm's oldest
      mine-shaft. The vault was sealed for a reason — the previous Jarl
      bricked up the entrance after three miners went mad. Sigrun wants the
      archive recovered. She is pragmatic enough to hire expendable outsiders
      for the work. The vault is cold. The air inside has not moved in decades.
      Something has been breathing it anyway.
    notes: "The archive is the key to understanding the Barrow Tide. Getting it is the hard part."

  # --- Ghost-Laying Ritual ---
  - id: "CONT_SUP_012"
    type: "ritual"
    title: "Re-Bind the Draugr-Jarl Beneath Frostfjord"
    employer: "Hermit Ragnhild"
    settlement: "Frostfjord Hollow"
    region: "fjord"
    season: "summer"
    year_range: [314, 314]
    min_reputation: 3
    payment_silver: 0
    bonus: "Survival. Ragnhild owes the band a life-debt (future seidr assistance guaranteed)."
    advance_silver: 0
    duration_days: 3
    risk: "extreme"
    band_size_min: 8
    skills_valued: ["rune_lore", "seidr", "spears", "command"]
    supernatural_elements:
      veil_proximity: "critical"
      undead_types: ["UND_DRAUGR_01", "UND_DRAUGR_02", "UND_DRAUGR_05"]
      boss_present: "BOS_SUPER_02"
      seidr_useful: true
      curse_risk: "high"
    political_conditions:
      requires_faction: null
      requires_event: null
      requires_item: "Binding texts from CONT_SUP_007"
    consequences:
      success:
        reputation_change: 3
        standing_change: { "Frostfjord Hollow": 5, "Icebreak": 3 }
        unlocks: ["CONT_SUP_017"]
        narrative_consequence: "The Draugr-Jarl is re-bound. Frostfjord's cellar warms. Ragnhild says the binding will hold — for a generation, perhaps. Not forever."
      failure:
        reputation_change: -2
        standing_change: { "Frostfjord Hollow": -3 }
        supernatural_consequence: "The Draugr-Jarl breaks free. BOS_SUPER_02 becomes active. Frostfjord Hollow is evacuated within the week."
    narrative_hook: >-
      The iron stakes are failing. Hrothgar's mead freezes in the cup.
      Ragnhild arrives with the binding texts and a face like stone. She
      says the rite requires her voice, the old iron, and strong arms to
      hold the thing down while she works. There is no pay because there
      is nothing to pay with — this is survival. The band must descend into
      the deepest barrow beneath Frostfjord and hold a five-hundred-year-old
      corpse to a stone slab while a seidr woman screams words of power in
      a language that makes the teeth ache. If the stakes hold, it sleeps
      again. If not, everyone in Frostfjord dies.
    notes: "No silver payment — this is existential. The ritual takes three rounds. Each round, the band must pass group combat checks to hold the Draugr-Jarl down while Ragnhild works."

