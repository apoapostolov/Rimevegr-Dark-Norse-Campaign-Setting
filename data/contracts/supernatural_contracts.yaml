        reputation_change: 0
        standing_change: { "Skaldhaven": 2 }
        unlocks: ["CONT_SUP_006"]
        lore_reward: "Barrow connection map — reveals linked barrow sites across the Rimevegr"
        narrative_consequence: "Audun begins correlating the rune-stone patterns with barrow awakenings"
