  - id: "CONT_SUP_007"
    type: "retrieval"
    title: "Recover the Binding Texts from Frostfjord's Cellar"
    employer: "Hermit Ragnhild"
    settlement: "Frostfjord Hollow"
    region: "fjord"
    season: "spring"
    year_range: [313, 313]
    min_reputation: 2
