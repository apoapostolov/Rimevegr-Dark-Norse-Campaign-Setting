      Audun unfolds the copy of Dalla's map beside his rune-stone rubbings
      and goes quiet for a long time. Then he says the unnamed barrows on
      her map correspond to blank spaces in the oldest records — places
      deliberately left unmarked. He wants the band to visit each site with
      Dalla present. He wants to know what she sees when she stands above
      the dead. He does not ask how she knows where they are buried.
    notes: "Requires Dalla specifically — her seidr is the compass. Three weeks crossing dangerous terrain between barrow sites."

