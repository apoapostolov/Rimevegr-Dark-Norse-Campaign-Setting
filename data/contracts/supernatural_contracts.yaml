    narrative_hook: >-
      Tree roots have grown into the barrow and the barrow has grown into
      the roots. The dead inside are tangled with the forest itself — bark
      over bone, soil through ribcage. Ulf's wolf-wardens found the entrance
      when a storm uprooted an ancient pine and exposed a stone lintel
      carved with faces. The wolves will not go near it. An Ancient Draugr
      sits in the deepest chamber, its throne grown through with living wood.
      It has been feeding on the forest's strength for centuries.
    notes: "Large barrow — 7 chambers. The Ancient Draugr (UND_DRAUGR_05) is the mini-boss. Tree-root terrain complicates movement."

