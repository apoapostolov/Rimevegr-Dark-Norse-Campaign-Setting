    band_size_min: 6
    skills_valued: ["spears", "rune_lore", "axes"]
    supernatural_elements:
      veil_proximity: "high"
      undead_types: ["UND_DRAUGR_01", "UND_DRAUGR_02", "UND_DRAUGR_04"]
      seidr_useful: true
      curse_risk: "high"
    political_conditions:
      requires_faction: null
      requires_event: null
    moral_choice:
      option_a:
        action: "Destroy the standing stones to collapse the barrow permanently"
        payment: 50
        reputation_change: 1
        standing_change: { "Moor's End": 2 }
        narrative: "The barrow is gone. The standing stones shatter. Moor's End sleeps in silence for the first time in months. But the stones were the oldest things in the Rimevegr, and their destruction sends a shudder through every other barrow site."
        supernatural_consequence: "Destroying the standing stones accelerates veil-thinning at three other sites"
      option_b:
        action: "Loot the barrow's bronze hoard and leave it open"
        payment: 350
        reputation_change: -1
        standing_change: { "Moor's End": -3 }
        curse_gained: "Moor-dead's Grudge — the band is haunted by whispering for d8 weeks"
        narrative: "The bronze is ancient and valuable. The dead remember the theft. Moor's End never forgives."
    consequences:
      success:
        unlocks: []
        narrative_consequence: "Either the barrow is destroyed or looted — both have lasting consequences for the region."
      failure:
        reputation_change: -1
        standing_change: { "Moor's End": -2 }
        supernatural_consequence: "The barrow vomits its dead onto the moor. Moor's End is abandoned within the month."
    narrative_hook: >-
      Brosa is an old man with hands that shake and a voice that does not.
      He says the standing stones hum so loud at night that the children
      cannot sleep. The barrow beneath them has opened on its own — the
      earth split like a wound. Bloated things crawl out after dark and
      stand in the fields until dawn. He can offer fifty silver. He knows
      it is not enough. He asks anyway, because his people have nowhere
      else to go and no one else to ask.
    notes: "Second moral choice. Option A has hidden consequences — destroying the stones damages the wider barrow network's containment. Option B is greedy and cursed."

