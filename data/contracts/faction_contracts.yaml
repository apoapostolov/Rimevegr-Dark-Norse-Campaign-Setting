  # ============================================================

  - id: "CONT_FAC_001"
    type: "war_band"
    title: "March with the Iron Host"
    employer: "Warchief Ordovast"
    faction: "The Iron Grip"
    settlement: "Grimholt"
    region: "grimholt"
    season: "summer"
    year_range: [313, 314]
    min_reputation: 3
    payment_silver: 200
    bonus: "Iron Grip sworn status"
    advance_silver: 50
    duration_days: 60
    risk: "extreme"
    band_size_min: 12
    skills_valued: ["command", "shields", "axes"]
    political_conditions:
      requires_faction: null
      requires_feud_max: null
      requires_event: "EVT_313_U02_027" # after Ordovast marches south
      blocks_factions: ["The Fjord Compact", "The Whispering Circle"]
    consequences:
      success:
        reputation_change: 2
        standing_change: { "Grimholt": 2, "The Iron Grip": 3 }
        unlocks: ["CONT_FAC_002", "CONT_FAC_004"]
