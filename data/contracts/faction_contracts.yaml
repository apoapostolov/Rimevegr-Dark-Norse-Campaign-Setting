    narrative_hook: >-
      Ordovast is marching. He wants every sword that can hold a line. The pay
      is generous — two hundred silver for a summer campaign. The implication is
      that refusing will be remembered. His recruiters do not ask twice.
    forces_choice: true
    notes: "Cannot be active simultaneously with Fjord Compact defense contracts."

