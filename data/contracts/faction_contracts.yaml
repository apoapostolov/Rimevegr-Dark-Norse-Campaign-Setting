# Iron Ledger — Faction Contracts
# 22 contracts issued by union/faction leaders that advance the political timeline.
# These force the band into factional alignment or demand dangerous neutrality.
# Loaded by contract_manager.py alongside contracts_available.yaml.

contracts:
