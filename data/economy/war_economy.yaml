# ==========================================================================
# CASCADE RULES
# Events trigger follow-on events. Roll or apply these when indicated.
# ==========================================================================
cascade_rules:
  - trigger_event_category: "blockades"
    if_duration_exceeds_weeks: 4
    follow_on:
      - category: "famine_and_shortage"
        chance_percent: 40
        note: "Prolonged blockade starves dependent settlements"
      - category: "refugee_influx"
        chance_percent: 20
        note: "People flee settlements that cannot feed them"

  - trigger_event_category: "burned_granaries"
    if_severity: "catastrophic"
    follow_on:
      - category: "refugee_influx"
        chance_percent: 60
        note: "Destroyed food stores force evacuation"
      - category: "war_taxes"
        chance_percent: 30
        note: "Jarls demand emergency contributions from neighbors"

  - trigger_event_category: "raided_caravans"
    if_count_per_season_exceeds: 2
    follow_on:
      - category: "trade_disruption"
        chance_percent: 50
        note: "Merchants refuse routes after repeated attacks"
      - category: "famine_and_shortage"
        chance_percent: 25
        note: "Specific goods stop reaching inland settlements"

  - trigger_event_category: "famine_and_shortage"
    if_severity: "major"
    follow_on:
      - category: "war_taxes"
        chance_percent: 35
        note: "Jarls squeeze remaining resources"
      - category: "economic_opportunity"
        chance_percent: 30
        note: "Shortage creates profit opportunity for suppliers"
      - category: "refugee_influx"
        chance_percent: 20
        note: "Starving populations move toward food sources"

  - trigger_event_category: "war_taxes"
    if_duration_exceeds_weeks: 6
    follow_on:
      - category: "trade_disruption"
        chance_percent: 25
        note: "Overtaxed merchants seek alternative routes or quit"
      - category: "refugee_influx"
        chance_percent: 15
        note: "Crushed populations flee taxation"

  - trigger_event_category: "trade_disruption"
    if_severity: "major"
    follow_on:
      - category: "famine_and_shortage"
        chance_percent: 40
        note: "Broken trade routes mean missing essentials"
      - category: "economic_opportunity"
        chance_percent: 35
        note: "Disruption always creates openings for the bold"

# ==========================================================================
# SEASONAL MODIFIERS
# Adjust chance_per_season by these multipliers based on current season.
# ==========================================================================
seasonal_modifiers:
  thaw:
    blockades: 0.8       # snow melting opens passes
    raided_caravans: 1.0
    burned_granaries: 0.7  # less fire risk in wet season
    refugee_influx: 1.2   # people move when travel resumes
    war_taxes: 1.0
    famine_and_shortage: 1.3  # end-of-winter stores lowest
    trade_disruption: 0.8
    economic_opportunity: 1.0
  long_sun:
    blockades: 1.2        # war season — contested routes
    raided_caravans: 1.3  # peak trade = peak raiding
    burned_granaries: 1.1  # dry conditions
    refugee_influx: 0.8
    war_taxes: 1.2        # jarls fund summer campaigns
    famine_and_shortage: 0.6  # growing season
    trade_disruption: 0.8
    economic_opportunity: 1.3  # most commerce happening
  harvest:
    blockades: 1.0
    raided_caravans: 1.2  # loaded harvest wagons are targets
    burned_granaries: 1.5  # stakes highest — destroy the harvest
    refugee_influx: 1.0
    war_taxes: 1.3        # tithe collection season
    famine_and_shortage: 0.8
    trade_disruption: 1.0
    economic_opportunity: 1.2  # surplus creates deals
  long_dark:
    blockades: 0.6        # fewer travelers to block
    raided_caravans: 0.7  # less trade traffic
    burned_granaries: 1.2  # desperate raiders target stores
    refugee_influx: 1.3   # flee or freeze
    war_taxes: 0.8
    famine_and_shortage: 1.5  # winter is the killer
    trade_disruption: 1.2  # what trade remains is fragile
    economic_opportunity: 0.7  # fewer deals, but desperate ones
