      economic_effects:
        - "Ship repair unavailable — damaged vessels rot at anchor"
        - "Dried fish supply halted to inland settlements"
        - "Kolvik weekly income drops to 2-4 silver"
        - "Stonebay Hamlet loses its only trade partner"
      mercenary_opportunities:
        - "Hired to run the harbour chain at night (8 silver + cargo share)"
        - "Guard the chain for Harbour-Master Inga (5 silver/week)"
        - "Escort fishing boats to Stonebay Hamlet (+3 silver/trip)"
      severity: "moderate"
      seasons: ["thaw", "long_sun", "harvest"]
      chance_per_season: 6

    - id: "WAR_BLK_003"
