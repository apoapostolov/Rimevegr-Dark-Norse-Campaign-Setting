# Iron Ledger — War Economy Events Database
# Random table / triggered events for economic disruption across the Rimevegr.
# 15 settlements, 7 rival bands, 3 political unions.
# Currency: 1 silver = 10 copper.
# Seasons: thaw, long_sun, harvest, long_dark.
# Player band: Voss's Black Axes.
#
# Usage: roll d100 per season per category, or trigger by campaign events.
# Events cascade — blockades cause shortages, shortages cause famine.

war_economy_events:

  # ==========================================================================
  # BLOCKADES (10 events)
  # ==========================================================================
  blockades:
    - id: "WAR_BLK_001"
      name: "Mountain Pass Sealed"
      trigger: "Ordovast-Sigrun feud escalates"
      affected_routes: ["Járnvegr (Iron Road)"]
      affected_settlements: ["Grimholt", "Deepholm", "Raven's Perch"]
      duration_weeks: "2-6"
      economic_effects:
        - "Iron trade halts between Grimholt and Deepholm"
        - "Weapon prices +50% in Deepholm"
        - "Grimholt food prices +30% (cut off from southern grain)"
        - "Iron Road toll revenue drops to zero"
      mercenary_opportunities:
        - "Escort ore wagons through Markaleið bypass (+15 silver/run)"
        - "Hired to break the blockade (combat contract, 40-60 silver)"
        - "Smuggling iron through forest via Ashmark (risky, +20 silver)"
      severity: "major"
      seasons: ["any"]
      chance_per_season: 8

    - id: "WAR_BLK_002"
