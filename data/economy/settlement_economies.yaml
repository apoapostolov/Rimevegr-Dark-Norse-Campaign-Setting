    production:
      - good: "ferry_service"
        quantity_weekly: "low"
        trade_good_id: "TG_SERVICE_002"
        notes: "Ferryman Olaf runs the only river crossing for 30 miles. 2 copper per man, 5 copper per horse."
      - good: "river_fish"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_001"
        notes: "Eel, pike, and trout. Net-fishing from the bank."
      - good: "reed_thatch"
        quantity_weekly: "low"
        trade_good_id: "TG_MATERIAL_002"
        notes: "Cut from the riverbank. Local roofing material, occasionally traded."

    imports:
      - good: "iron_tools"
        source: "Deepholm or Ashmark"
        urgency: "high"
        notes: "Ferry maintenance requires nails, chain-links, and rope fittings."
      - good: "grain"
        source: "Ashmark or Vargheim"
        urgency: "high"
        notes: "Riverside soil is too wet for crops. All food is traded or fished."
      - good: "rope"
        source: "Frostfjord Hollow or Kolvik"
        urgency: "medium"
        notes: "Ferry hawser wears through every two seasons. Replacement is expensive."

    exports:
      - good: "ferry_service"
        destinations: ["all travellers"]
        volume: "low"
      - good: "river_fish"
        destinations: ["Ashmark"]
        volume: "low"

    strategic_resources:
      - resource: "river crossing"
        military_value: "Only ford or ferry for 30 miles. Controlling Bleakwater controls east-west movement across the river. Destroying the ferry adds days to any march."
      - resource: "river intelligence"
        military_value: "Olaf sees everyone who crosses. He knows more about regional troop movements than most jarls — if he can be made to talk."

    market:
      market_day: "no regular market"
      stall_count: 0
      visiting_traders: "none"
      exotic_goods: false
      price_modifier: 1.5
      notes: "No market. Olaf trades fish for supplies with anyone who crosses. The frozen corpse found downstream suggests the landing is not as safe as it appears."

    economic_vulnerabilities:
      - "One ferry — if Olaf's raft is damaged, the crossing is gone"
      - "18 people cannot defend against any military force"
      - "Frozen corpse suggests criminal activity — may deter travellers"
      - "Spring flooding submerges the landing for weeks"

    trade_routes:
      - to: "Ashmark"
        goods_flow: "river fish out, tools and grain in"
        frequency: "monthly"
      - to: "Vargheim"
        goods_flow: "ferry service, fish out"
        frequency: "as needed"

    wartime_impact:
      food_security: "poor"
      siege_endurance_weeks: 0
      essential_imports_at_risk: ["iron_tools", "grain", "rope"]
      notes: "Bleakwater cannot be besieged because there is nothing to besiege. A warband takes it in an hour. Its value is the crossing point — burn the ferry and move on, or garrison it and control traffic."

  # ─────────────────────────────────────────────
  # 13. SKALDHAVEN — Fjord knowledge village
  # ─────────────────────────────────────────────
  - settlement: "Skaldhaven"
    population: 110
    size: "village"
