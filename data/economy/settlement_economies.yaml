        volume: "medium"
      - good: "ink_and_vellum"
        destinations: ["Deepholm"]
        volume: "low"

    strategic_resources:
      - resource: "Hall of Sagas"
        military_value: "Historical records of every feud, oath, and alliance in the Rimevegr. Intelligence value is immense — if the records can be accessed."
