        military_value: "Sealed after an apprentice disappeared. Contains galdr-knowledge that most settlements lack. A conquering force that opens the archive gains magical advantage."
      - resource: "sea-cliff approach"
        military_value: "Natural defense. The palisade guards the landward approach; the cliffs guard the sea-side. Attackers must come single-file."
      - resource: "skald network"
        military_value: "Skalds travel everywhere and hear everything. Audun's network is an informal intelligence operation. Controlling Skaldhaven means controlling the narrative."

    market:
      market_day: "every Sunnadag"
      stall_count: 3
      visiting_traders: "occasional"
      exotic_goods: false
      price_modifier: 1.1
      notes: "Small market trading fish, minor crafts, and knowledge services. Skalds from other settlements visit for training. Audun does not tax trade but expects a saga-gift from every trader — a story, a rumour, a piece of news."

    economic_vulnerabilities:
      - "Knowledge economy is fragile — if Audun dies, the settlement loses its primary value"
      - "Sealed rune archive represents lost income and lost knowledge"
      - "Cliff access limits trade volume — no pack-mule trains can reach the harbour easily"
      - "Dependent on external food and iron for survival"

    trade_routes:
      - to: "Frostfjord Hollow"
        route_id: "RTE_002"
        goods_flow: "rune-craft and sagas out, cod in"
        frequency: "monthly"
      - to: "Kolvik"
        route_id: "RTE_015"
        goods_flow: "fish out, salt and tools in"
        frequency: "weekly"

    wartime_impact:
      food_security: "moderate"
      siege_endurance_weeks: 2
      essential_imports_at_risk: ["timber", "iron_tools", "grain"]
      notes: "Skaldhaven's real defense is that nobody wants to be the jarl who burned the Hall of Sagas. Destroying Skaldhaven is a reputation-destroying act. But an ambitious warlord who does not care about skalds' opinions could take it with thirty men."

