      - good: "ink_and_vellum"
        quantity_weekly: "low"
        trade_good_id: "TG_CRAFT_002"
        notes: "Iron-gall ink and prepared calfskin. Required for saga-recording and rune-work."

    imports:
      - good: "timber"
