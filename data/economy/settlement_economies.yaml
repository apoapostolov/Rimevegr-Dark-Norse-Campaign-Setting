# Iron Ledger — Settlement Economic Profiles
# Detailed production, trade, market, and wartime data for all 15 settlements.
# Prices relative to base (1.0 = standard). Currency: 1 silver = 10 copper.
# Common mercenary retainer: 2 silver/week.
# Cross-references: settlements.yaml, geography/routes.yaml

settlement_economies:
  # ─────────────────────────────────────────────
  # 1. FROSTFJORD HOLLOW — Fjord fishing village
  # ─────────────────────────────────────────────
  - settlement: "Frostfjord Hollow"
    population: 87
    size: "village"
    terrain: "fjord"

    production:
      - good: "dried_cod"
        quantity_weekly: "medium"
        trade_good_id: "TG_FOOD_002"
        notes: "Primary export. Fleet of 12 small boats, salt-curing sheds on the quay."
      - good: "rope"
        quantity_weekly: "low"
        trade_good_id: "TG_TOOL_004"
        notes: "Rope-walk near harbour. Walrus-hide and seal-gut cordage."
      - good: "whale_oil"
        quantity_weekly: "low"
        trade_good_id: "TG_FUEL_002"
        notes: "Rendered from drift-whale carcasses. Unreliable — depends on beachings."
      - good: "salt_fish"
        quantity_weekly: "medium"
        trade_good_id: "TG_FOOD_005"
        notes: "Herring and flatfish. Lesser quality than dried cod but cheaper."

    imports:
      - good: "iron_ingot"
        source: "Grimholt or Deepholm"
        urgency: "high"
        notes: "No local iron. Dependent on mountain trade for tools and nails."
      - good: "timber"
        source: "Ashen Reach or Vargheim"
        urgency: "high"
        notes: "Fjord has few trees. Boat repair consumes most supply."
      - good: "grain"
        source: "Thornwall or Ashen Reach"
        urgency: "medium"
        notes: "Cannot grow enough locally. Porridge grain lasts three weeks in store."
      - good: "wool_cloth"
        source: "Feldwick or Thornwall"
        urgency: "low"
        notes: "Local weaving is poor. Imports supplement winter clothing."

    exports:
      - good: "dried_cod"
        destinations: ["Grimholt", "Deepholm", "Ashen Reach"]
        volume: "high"
      - good: "salt_fish"
        destinations: ["Skaldhaven", "Kolvik"]
        volume: "medium"
      - good: "rope"
        destinations: ["Kolvik", "Skaldhaven"]
        volume: "low"

    strategic_resources:
      - resource: "deep-water harbour"
        military_value: "Ships can dock and shelter. Blockade-vulnerable from the fjord mouth."
      - resource: "fishing fleet"
        military_value: "12 boats. Can be conscripted for coastal patrol, troop transport, or supply runs."
      - resource: "salt stores"
        military_value: "Curing salt for preserving rations. Worth seizing for a long campaign."

    market:
      market_day: "every Thorsdag"
      stall_count: 4
      visiting_traders: "occasional"
      exotic_goods: false
      price_modifier: 1.1
      notes: "Small quayside market. Hrothgar taxes visiting traders 10%. Fish is cheap, everything else is marked up."

    economic_vulnerabilities:
      - "Fishing fleet dependent on calm fjord waters — winter storms halt production"
      - "Single trade road to Ashen Reach (Beinvegr) — easily blockaded"
      - "No smithy skilled enough for weapon production — only basic tool repair"
      - "Hrothgar's 10% trader tax discourages visiting merchants"

    trade_routes:
      - to: "Ashen Reach"
        route_id: "RTE_001"
        goods_flow: "cod and salt fish out, timber and tar in"
        frequency: "weekly"
      - to: "Skaldhaven"
        route_id: "RTE_002"
        goods_flow: "cod and rope out, rune-craft and saga services in"
        frequency: "monthly"

    wartime_impact:
      food_security: "moderate"
      siege_endurance_weeks: 2
      essential_imports_at_risk: ["iron_ingot", "timber", "grain"]
      notes: "Can fish from harbour even under land siege, but iron and timber run out within two weeks. Palisade repairs impossible without wood imports."

  # ─────────────────────────────────────────────
  # 2. ASHEN REACH — Forest industrial village
  # ─────────────────────────────────────────────
  - settlement: "Ashen Reach"
    population: 142
    size: "large_village"
    terrain: "forest"

    production:
      - good: "pine_tar"
        quantity_weekly: "high"
        trade_good_id: "TG_CRAFT_001"
        notes: "Tar-works east of settlement. Controlled forest burns feed production. Regional monopoly."
      - good: "iron_bloom"
        quantity_weekly: "medium"
        trade_good_id: "TG_METAL_003"
        notes: "Local bog-iron smelter. Lower quality than Grimholt ore but steady output."
      - good: "timber"
        quantity_weekly: "high"
        trade_good_id: "TG_WOOD_001"
        notes: "Vast pine forest. Logging crews work year-round. Export-grade planks and beams."
      - good: "charcoal"
        quantity_weekly: "medium"
        trade_good_id: "TG_FUEL_001"
        notes: "By-product of tar-works and forest clearing. Feeds the smelter and trades outward."

    imports:
      - good: "dried_cod"
        source: "Frostfjord Hollow"
        urgency: "medium"
        notes: "Forest provides game but fish protein needed to supplement diet."
      - good: "salt"
        source: "Kolvik or coastal traders"
        urgency: "medium"
        notes: "Required for preserving meat through winter. No local source."
      - good: "wool_cloth"
        source: "Thornwall or Feldwick"
        urgency: "low"
        notes: "Forest folk prefer leather but need wool for winter layers."

    exports:
      - good: "pine_tar"
        destinations: ["Kolvik", "Frostfjord Hollow", "Deepholm"]
        volume: "high"
      - good: "timber"
        destinations: ["Frostfjord Hollow", "Kolvik", "Skaldhaven"]
        volume: "high"
      - good: "iron_bloom"
        destinations: ["Feldwick", "Thornwall"]
        volume: "medium"
      - good: "charcoal"
        destinations: ["Ashmark", "Grimholt"]
        volume: "medium"

    strategic_resources:
      - resource: "tar-works"
        military_value: "Pine tar is essential for ship maintenance and fire-defence. Controlling this settlement controls naval readiness for the whole fjord."
      - resource: "iron smelter"
        military_value: "Produces low-grade iron suitable for tools, nails, and arrowheads. Not weapon-quality but vital for resupply."
      - resource: "deep forest"
        military_value: "Near-infinite concealment. A warband could hide in the Black Pine for weeks without detection."
      - resource: "skilled woodcutters"
        military_value: "Can build siege works, palisades, and rafts on short notice. The Pale Widow has used them as sappers."

    market:
      market_day: "every Tyrsdag and Freyjudag"
      stall_count: 8
      visiting_traders: "regular"
      exotic_goods: false
      price_modifier: 1.0
      notes: "Largest market after Deepholm. The Pale Widow encourages trade — no tax on resident merchants, 5% on visitors. Twice-weekly market draws from Ashmark, Feldwick, and occasionally Thornwall."

    economic_vulnerabilities:
      - "Tar-works are a fire risk — an arson attack could destroy the primary industry"
      - "Bog-iron smelter depends on charcoal supply from the forest"
      - "Hostile relationship with Frostfjord Hollow threatens the cod supply"
      - "The Pale Widow's intrigue drives away cautious traders"

    trade_routes:
      - to: "Frostfjord Hollow"
        route_id: "RTE_001"
        goods_flow: "tar and timber out, cod and rope in"
        frequency: "weekly"
      - to: "Thornwall"
        route_id: "RTE_003"
        goods_flow: "iron and tar out, wool and mutton in"
        frequency: "fortnightly"
      - to: "Ashmark"
        route_id: "RTE_004"
        goods_flow: "charcoal and tar out, herbs and smelted goods in"
        frequency: "weekly"
      - to: "Feldwick"
        route_id: "RTE_013"
        goods_flow: "iron tools out, wool in"
        frequency: "fortnightly"

    wartime_impact:
      food_security: "moderate"
      siege_endurance_weeks: 3
      essential_imports_at_risk: ["dried_cod", "salt"]
      notes: "Forest provides game and forage. Can survive without imports longer than most, but salt shortage means preserved meat runs out by week four. The Pale Widow has stockpiled grain in hidden caches."

  # ─────────────────────────────────────────────
  # 3. FELDWICK — Occupied moor village
  # ─────────────────────────────────────────────
  - settlement: "Feldwick"
    population: 61
    size: "village"
    terrain: "moors"

    production:
      - good: "sheep_wool"
        quantity_weekly: "medium"
        trade_good_id: "TG_CLOTH_001"
        notes: "Primary livelihood. Flocks of ~200 sheep on the moors. Shearing twice a year."
      - good: "root_vegetables"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_003"
        notes: "Turnips, parsnips, and beetroot. Thin soil limits yield."
      - good: "mutton"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_006"
        notes: "Slaughtered for the Three Wolves occupiers. Flock is shrinking."

    imports:
      - good: "iron_tools"
        source: "Ashen Reach"
        urgency: "high"
        notes: "No smithy. Every knife, axe, and shearing blade comes from outside."
      - good: "salt"
        source: "Kolvik via Ashen Reach"
        urgency: "high"
        notes: "Needed for cheese-making and meat preservation. Supply disrupted by occupation."
      - good: "grain"
        source: "Ashen Reach or Thornwall"
        urgency: "medium"
        notes: "Cannot grow cereals on moorland soil."

    exports:
      - good: "sheep_wool"
        destinations: ["Ashen Reach", "Thornwall"]
        volume: "medium"
      - good: "root_vegetables"
        destinations: ["Ashen Reach"]
        volume: "low"

    strategic_resources:
      - resource: "sheep flocks"
        military_value: "Walking rations. An occupying force can feed itself from the flocks — which is exactly what the Three Wolves are doing."
      - resource: "moorland position"
        military_value: "Open terrain with long sight-lines. Hard to approach unseen. Also hard to defend with 61 people."

    market:
      market_day: "no regular market"
      stall_count: 0
      visiting_traders: "none"
      exotic_goods: false
      price_modifier: 1.8
      notes: "Occupation has killed trade. The Three Wolves confiscate anything valuable. Villagers barter among themselves. Prices for imported goods — when available at all — are extortionate."

    economic_vulnerabilities:
      - "Occupation by Three Wolves — economy is collapsing"
      - "Flock shrinking as occupiers slaughter sheep faster than breeding"
      - "No smithy — tools wear out and cannot be replaced"
      - "Damaged palisade deters traders even if occupation ends"
      - "Population may drop below survival threshold if occupation continues through winter"

    trade_routes:
      - to: "Ashen Reach"
        route_id: "RTE_013"
        goods_flow: "wool out, iron tools and salt in — currently disrupted"
        frequency: "suspended"
      - to: "Vargheim"
        route_id: "RTE_011"
        goods_flow: "wool out, furs and charcoal in — currently disrupted"
        frequency: "suspended"
      - to: "Kolvik"
        route_id: "RTE_016"
        goods_flow: "wool out, salt fish in — currently disrupted"
        frequency: "suspended"

    wartime_impact:
      food_security: "poor"
      siege_endurance_weeks: 1
      essential_imports_at_risk: ["iron_tools", "salt", "grain"]
      notes: "Already under occupation. Food stores looted. Villagers subsist on root vegetables and whatever the Three Wolves leave behind. Liberation would require immediate resupply."

  # ─────────────────────────────────────────────
  # 4. STONEBAY HAMLET — Remote fishing hamlet
  # ─────────────────────────────────────────────
  - settlement: "Stonebay Hamlet"
    population: 23
    size: "hamlet"
    terrain: "coast"

    production:
      - good: "fresh_fish"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_001"
        notes: "Subsistence fishing from two boats. Some surplus in summer."
      - good: "dried_kelp"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_008"
        notes: "Harvested from rocks at low tide. Used as animal feed and poor man's food."
      - good: "seabird_eggs"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_009"
        notes: "Seasonal. Cliff-nesting birds. Dangerous to collect."

    imports:
      - good: "iron_tools"
        source: "Kolvik"
        urgency: "high"
        notes: "Fish hooks, knives, boat-nails. Replacement rate: one trip to Kolvik per season."
      - good: "grain"
        source: "Kolvik"
        urgency: "medium"
        notes: "Cannot grow anything on cliff-shelf. Trade fish for barley."

    exports:
      - good: "fresh_fish"
        destinations: ["Kolvik"]
        volume: "low"

    strategic_resources:
      - resource: "hidden cove"
        military_value: "Small boats can shelter unseen from the cliff-top. Useful for smuggling or coastal raiding parties."
      - resource: "cliff-top lookout"
        military_value: "Clear view of the coast for miles. Early warning against seaborne raids."

    market:
      market_day: "no regular market"
      stall_count: 0
      visiting_traders: "none"
      exotic_goods: false
      price_modifier: 1.4
      notes: "No market. Barter only. A visiting trader is a rare event — the cliff descent deters most."

    economic_vulnerabilities:
      - "Single cliff-path access — one rockfall isolates the hamlet completely"
      - "Two boats is the entire fleet — losing one halves the food supply"
      - "No healer, no smithy, no resources to repair anything complex"
      - "Too small to interest traders or defend against any threat"

    trade_routes:
      - to: "Kolvik"
        route_id: "RTE_014"
        goods_flow: "fish out, tools and grain in"
        frequency: "monthly"

    wartime_impact:
      food_security: "moderate"
      siege_endurance_weeks: 1
      essential_imports_at_risk: ["iron_tools", "grain"]
      notes: "Can fish indefinitely if boats survive, but no stored grain. Nobody would bother besieging Stonebay — there is nothing to take."

  # ─────────────────────────────────────────────
  # 5. GRIMHOLT — Mountain iron stronghold
  # ─────────────────────────────────────────────
  - settlement: "Grimholt"
    population: 118
    size: "large_village"
    terrain: "mountain"

    production:
      - good: "iron_ore"
        quantity_weekly: "high"
        trade_good_id: "TG_METAL_001"
        notes: "Surface mines. Raw ore exported to Deepholm smelters and Ashmark for processing."
      - good: "iron_ingot"
        quantity_weekly: "medium"
        trade_good_id: "TG_METAL_002"
        notes: "Local smelting for tools and weapons. Skilled smithy but below Deepholm quality."
      - good: "weapons"
        quantity_weekly: "low"
        trade_good_id: "TG_WEAPON_001"
        notes: "Axes, spear-heads, knife-blades. Functional quality. Ordovast keeps most production for his warband."
      - good: "slag_gravel"
        quantity_weekly: "high"
        trade_good_id: "TG_MATERIAL_001"
        notes: "By-product of smelting. Used to surface the Iron Road. No trade value but strategic for road maintenance."

    imports:
      - good: "grain"
        source: "Thornwall"
        urgency: "high"
        notes: "Mountain soil grows nothing. Entirely dependent on moor agriculture."
      - good: "timber"
        source: "Ashmark or Vargheim"
        urgency: "high"
        notes: "Mine supports, building material, charcoal production. Above treeline — no local wood."
      - good: "dried_cod"
        source: "Frostfjord Hollow"
        urgency: "medium"
        notes: "Protein supplement. Mountain diet is otherwise game and goat."
      - good: "charcoal"
        source: "Ashmark or Ashen Reach"
        urgency: "high"
        notes: "Feeds smelting operations. Cannot produce locally — no forest."

    exports:
      - good: "iron_ore"
        destinations: ["Deepholm", "Ashmark"]
        volume: "high"
      - good: "iron_ingot"
        destinations: ["Thornwall", "Ashen Reach", "Kolvik"]
        volume: "medium"
      - good: "weapons"
        destinations: ["Thornwall"]
        volume: "low"

    strategic_resources:
      - resource: "iron mines"
        military_value: "Primary iron source in the Rimevegr. Whoever holds Grimholt controls weapon production for the region."
      - resource: "stone fortification"
        military_value: "Defensibility 4. Strong walls, watchtower, and narrow approach. Can withstand a siege by any force in the region short of Deepholm's full garrison."
      - resource: "Ordovast's warband"
        military_value: "Standing force of ~25 armed men. Brutal, experienced, and loyal to Ordovast personally."
      - resource: "iron-guard patrols"
        military_value: "Mounted outriders patrol the Iron Road and Rime-Moor Road. Intelligence network for eastern Rimevegr."

    market:
      market_day: "every Odinsdag"
      stall_count: 6
      visiting_traders: "regular"
      exotic_goods: false
      price_modifier: 1.0
      notes: "Iron trade draws merchants regularly. Ordovast takes a 15% cut on all transactions. Weapons sales are controlled — outsiders cannot buy without Ordovast's seal."

    economic_vulnerabilities:
      - "Entirely dependent on food imports — a blockade of the Rime-Moor Road and Iron Road starves Grimholt in three weeks"
      - "Charcoal shortage halts smelting within days"
      - "Ordovast's expansionism alienates potential trade partners"
      - "Mine output declining — deeper seams require timber supports they cannot source locally"

    trade_routes:
      - to: "Deepholm"
        route_id: "RTE_007"
        goods_flow: "iron ore out, finished goods and food in"
        frequency: "twice weekly"
      - to: "Ashmark"
        route_id: "RTE_008"
        goods_flow: "iron ore out, charcoal and timber in"
        frequency: "weekly"
      - to: "Thornwall"
        route_id: "RTE_006"
        goods_flow: "iron ingots out, grain and wool in"
        frequency: "weekly"

    wartime_impact:
      food_security: "poor"
      siege_endurance_weeks: 3
      essential_imports_at_risk: ["grain", "timber", "charcoal"]
      notes: "Strong walls buy time but the mountain grows no food. Ordovast stockpiles 25 days of grain — after that, his warband eats the goats, and after that, the settlement starves. The iron mines are worthless without charcoal to smelt."

  # ─────────────────────────────────────────────
  # 6. RAVEN'S PERCH — Mountain lookout village
  # ─────────────────────────────────────────────
  - settlement: "Raven's Perch"
    population: 74
    size: "village"
    terrain: "mountain"

    production:
      - good: "goat_hides"
        quantity_weekly: "medium"
        trade_good_id: "TG_HIDE_001"
        notes: "Mountain goat herds. Hides tanned locally — rough quality but durable."
      - good: "iron_ore"
        quantity_weekly: "low"
        trade_good_id: "TG_METAL_001"
        notes: "Small surface seam. Lower yield than Grimholt but independent supply."
      - good: "mountain_herbs"
        quantity_weekly: "low"
        trade_good_id: "TG_HERB_002"
        notes: "High-altitude herbs valued by healers. Grows only above the treeline."
      - good: "raven_feathers"
        quantity_weekly: "low"
        trade_good_id: "TG_MISC_001"
        notes: "Gathered from the rookery. Ritual and decorative value. Skaldhaven buys them."

    imports:
      - good: "grain"
        source: "Deepholm"
        urgency: "high"
        notes: "Cannot grow food at altitude. Resupply via Deepholm tunnels."
      - good: "timber"
        source: "Deepholm or Ashmark"
        urgency: "medium"
        notes: "Above treeline. All building wood must be carried up the switchbacks."
      - good: "salt"
        source: "Deepholm"
        urgency: "medium"
        notes: "For hide-curing and food preservation."

    exports:
      - good: "goat_hides"
        destinations: ["Deepholm", "Grimholt"]
        volume: "medium"
      - good: "iron_ore"
        destinations: ["Deepholm"]
        volume: "low"
      - good: "mountain_herbs"
        destinations: ["Deepholm", "Skaldhaven"]
        volume: "low"

    strategic_resources:
      - resource: "mountain lookout"
        military_value: "Overlooks the eastern valley. On clear days, half the Rimevegr is visible. Unmatched early-warning position."
      - resource: "narrow approach"
        military_value: "Defensibility 4. The switchback trail (RTE_010) allows a handful of defenders to hold against a much larger force."
      - resource: "raven rookery"
        military_value: "Trained ravens used as message carriers. Thane Egil maintains contact with Deepholm and Grimholt even when trails are closed."

    market:
      market_day: "no regular market"
      stall_count: 1
      visiting_traders: "none"
      exotic_goods: false
      price_modifier: 1.3
      notes: "Single trade-stall by Egil's tower. Everything must be carried up the mountain — prices reflect the effort. Barter preferred."

    economic_vulnerabilities:
      - "Winter isolation — the Sky Climb (RTE_010) is impassable for up to four months"
      - "Entirely dependent on Deepholm for grain and timber"
      - "Small iron seam may exhaust within a few years"
      - "Raven population decline reported — cause unknown"

    trade_routes:
      - to: "Deepholm"
        route_id: "RTE_010"
        goods_flow: "goat hides and ore out, grain and timber in"
        frequency: "monthly (summer only)"

    wartime_impact:
      food_security: "poor"
      siege_endurance_weeks: 1
      essential_imports_at_risk: ["grain", "timber", "salt"]
      notes: "Can survive on goat milk and stored meat short-term, but grain runs out in days. The switchback approach is a natural defense — but also a trap if supplies are cut. In winter, the garrison either survives on stores or dies."

  # ─────────────────────────────────────────────
  # 7. VARGHEIM — Forest wolf-hunter village
  # ─────────────────────────────────────────────
  - settlement: "Vargheim"
    population: 165
    size: "large_village"
    terrain: "forest"

    production:
      - good: "charcoal"
        quantity_weekly: "high"
        trade_good_id: "TG_FUEL_001"
        notes: "Multiple kilns in the Black Pine. Primary export. Feeds smelters across the region."
      - good: "wolf_pelts"
        quantity_weekly: "medium"
        trade_good_id: "TG_HIDE_003"
        notes: "Wolf-wardens hunt year-round. Premium pelts fetch twice the price of common fur."
      - good: "furs"
        quantity_weekly: "medium"
        trade_good_id: "TG_HIDE_002"
        notes: "Fox, marten, beaver. Trapped in the deep pine."
      - good: "timber"
        quantity_weekly: "medium"
        trade_good_id: "TG_WOOD_001"
        notes: "Logging secondary to charcoal. Lumber crews work the forest edge."
      - good: "cured_game"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_007"
        notes: "Venison, boar, and hare. Smoked over charcoal kilns."

    imports:
      - good: "iron_tools"
        source: "Grimholt or Ashmark"
        urgency: "high"
        notes: "Axes, trap-parts, and knife-blades wear out fast in forest work."
      - good: "grain"
        source: "Thornwall or Ashen Reach"
        urgency: "medium"
        notes: "Forest clearings grow some barley but not enough for 165 people."
      - good: "salt"
        source: "Kolvik"
        urgency: "medium"
        notes: "For curing pelts and preserving meat."

    exports:
      - good: "charcoal"
        destinations: ["Grimholt", "Ashmark", "Deepholm"]
        volume: "high"
      - good: "wolf_pelts"
        destinations: ["Deepholm", "Thornwall"]
        volume: "medium"
      - good: "furs"
        destinations: ["Deepholm", "Ashen Reach", "Kolvik"]
        volume: "medium"
      - good: "timber"
        destinations: ["Ashen Reach", "Kolvik"]
        volume: "low"

    strategic_resources:
      - resource: "Black Pine forest"
        military_value: "Near-impenetrable concealment. Vargheim wolf-hunters operate as guerrilla scouts — they know every trail and den."
      - resource: "wolf-warden kennel"
        military_value: "Trained hunting wolves. Used for tracking, scouting, and intimidation. Cannot be replicated elsewhere."
      - resource: "charcoal kilns"
        military_value: "Control charcoal supply and you control every smelter in the Rimevegr. Destroying Vargheim's kilns would cripple iron production region-wide."

    market:
      market_day: "every Freyjudag"
      stall_count: 5
      visiting_traders: "occasional"
      exotic_goods: false
      price_modifier: 1.05
      notes: "Fur market draws trappers from the surrounding forest. Jarl Ulf takes a modest 5% share. Outsiders are watched but not taxed extra."

    economic_vulnerabilities:
      - "Wolf pack raiding livestock — currently an active problem"
      - "Forest fire would destroy kilns and timber reserves simultaneously"
      - "Single-resource economy — charcoal demand decline would hollow out the settlement"
      - "Deep forest isolation makes resupply slow in emergencies"

    trade_routes:
      - to: "Feldwick"
        route_id: "RTE_011"
        goods_flow: "furs and charcoal out, wool in"
        frequency: "fortnightly"
      - to: "Ashmark"
        route_id: "RTE_012"
        goods_flow: "charcoal and timber out, iron tools in"
        frequency: "weekly"

    wartime_impact:
      food_security: "good"
      siege_endurance_weeks: 4
      essential_imports_at_risk: ["iron_tools", "grain", "salt"]
      notes: "Forest provides game, water, and concealment. Vargheim is functionally impossible to besiege — the defenders melt into the Black Pine and return at will. Weakness is iron — without imported tools, the charcoal operation degrades within a month."

  # ─────────────────────────────────────────────
  # 8. KOLVIK — Coastal shipwright village
  # ─────────────────────────────────────────────
  - settlement: "Kolvik"
