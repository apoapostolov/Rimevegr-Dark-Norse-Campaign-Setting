        volume: "medium"
      - good: "dried_fish"
        destinations: ["Skaldhaven", "Feldwick"]
        volume: "medium"
      - good: "salt"
        destinations: ["Vargheim", "Ashen Reach", "Feldwick"]
        volume: "low"
      - good: "rope"
        destinations: ["Frostfjord Hollow", "Skaldhaven"]
        volume: "low"

    strategic_resources:
      - resource: "dry-dock"
        military_value: "The only facility capable of repairing warships. Controlling Kolvik means controlling naval power in the region."
      - resource: "harbour chain"
        military_value: "Iron chain across the harbour mouth. Can block vessel entry. Low wall provides minimal land defense."
      - resource: "coastal position"
        military_value: "Central coast location. Can observe and intercept sea traffic between Frostfjord and Stonebay."

    market:
      market_day: "every Odinsdag"
      stall_count: 5
      visiting_traders: "regular"
      exotic_goods: false
      price_modifier: 1.0
      notes: "Harbour market. Ship crews and coastal traders pass through regularly. Inga charges a 2-copper harbour fee per vessel but no trade tax."

    economic_vulnerabilities:
      - "No smithy — entirely dependent on imported iron and nails"
      - "Dry-dock handles one vessel at a time — bottleneck during storm season"
      - "Low wall defense — vulnerable to land attack"
      - "Pine tar supply dependent on Ashen Reach — political disruption upstream halts ship repair"

    trade_routes:
      - to: "Skaldhaven"
        route_id: "RTE_015"
        goods_flow: "fish and salt out, knowledge services and rope in"
        frequency: "weekly"
      - to: "Stonebay Hamlet"
        route_id: "RTE_014"
        goods_flow: "tools and grain out, fish in"
        frequency: "monthly"
      - to: "Feldwick"
        route_id: "RTE_016"
        goods_flow: "salt and fish out, wool in"
        frequency: "fortnightly"

    wartime_impact:
      food_security: "moderate"
      siege_endurance_weeks: 2
      essential_imports_at_risk: ["timber", "pine_tar", "iron_nails"]
      notes: "Can fish from the harbour, but the dry-dock is the real target. A raider who takes Kolvik does not need to hold it — burning the dry-dock is enough to cripple regional shipping for years."

  # ─────────────────────────────────────────────
  # 9. MOOR'S END — Isolated moor hamlet
  # ─────────────────────────────────────────────
  - settlement: "Moor's End"
    population: 31
    size: "hamlet"
    terrain: "moors"

    production:
      - good: "sheep_wool"
        quantity_weekly: "low"
        trade_good_id: "TG_CLOTH_001"
        notes: "Small flock of ~60 moor sheep. Hardy breed, coarse wool."
      - good: "peat"
        quantity_weekly: "medium"
        trade_good_id: "TG_FUEL_003"
        notes: "Cut from the surrounding bog. Primary fuel for Thornwall. Hard, dirty work."
      - good: "mutton"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_006"
        notes: "Surplus animals culled before winter. Not enough for export after feeding the hamlet."

    imports:
      - good: "iron_tools"
        source: "Thornwall"
        urgency: "high"
        notes: "Peat-cutting irons, sheep-shears, knives. One delivery per season."
      - good: "grain"
        source: "Thornwall"
        urgency: "high"
        notes: "Cannot grow cereals in boggy soil. Porridge barley is the lifeline."
      - good: "salt"
        source: "Thornwall"
        urgency: "medium"
        notes: "For mutton preservation. Small quantities traded with Thornwall's market."

    exports:
      - good: "peat"
        destinations: ["Thornwall"]
        volume: "medium"
      - good: "sheep_wool"
        destinations: ["Thornwall"]
