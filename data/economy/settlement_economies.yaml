    market:
      market_day: "no regular market"
      stall_count: 0
      visiting_traders: "none"
      exotic_goods: false
      price_modifier: 1.3
      notes: "No market. Barter with Thornwall's peat-carts is the only commerce. Elder Brosa handles all trade negotiations personally."

    economic_vulnerabilities:
      - "Entirely dependent on Thornwall for tools, grain, and salt"
      - "Standing stones unnerve the population — some families have considered leaving"
      - "Peat-cutting is seasonal — winter halts production"
      - "Too small to survive if Thornwall's supply line is cut"

    trade_routes:
      - to: "Thornwall"
        route_id: "RTE_005"
        goods_flow: "peat and wool out, tools and grain in"
        frequency: "fortnightly"

    wartime_impact:
      food_security: "poor"
      siege_endurance_weeks: 1
      essential_imports_at_risk: ["iron_tools", "grain", "salt"]
      notes: "Moor's End survives because nobody wants what it has — except peat. If Thornwall falls or is blockaded, Moor's End starves within two weeks."

  # ─────────────────────────────────────────────
  # 10. ASHMARK — Forest smelter village
  # ─────────────────────────────────────────────
  - settlement: "Ashmark"
    population: 82
    size: "village"
    terrain: "forest"

    production:
      - good: "pine_tar"
        quantity_weekly: "medium"
        trade_good_id: "TG_CRAFT_001"
        notes: "Tar pit east of settlement. Smaller operation than Ashen Reach but closer to Grimholt buyers."
      - good: "medicinal_herbs"
        quantity_weekly: "low"
        trade_good_id: "TG_HERB_001"
        notes: "Healer's lodge gathers from the forest. Woundwort, feverfew, and birch-bark tonic."
      - good: "smelted_iron"
        quantity_weekly: "low"
        trade_good_id: "TG_METAL_004"
        notes: "Processes Grimholt and Deepholm ore using local charcoal. Small output but valued — neutral ground means no political strings."
      - good: "charcoal"
        quantity_weekly: "low"
        trade_good_id: "TG_FUEL_001"
        notes: "Supplementary production. Most charcoal consumed by the local smelter."

    imports:
      - good: "iron_ore"
        source: "Grimholt or Deepholm"
        urgency: "high"
        notes: "Smelter depends on imported ore. Local deposits are exhausted."
      - good: "grain"
        source: "Thornwall or Ashen Reach"
        urgency: "medium"
        notes: "Forest clearings produce some food but not enough."
      - good: "dried_fish"
        source: "Kolvik"
        urgency: "low"
        notes: "Protein supplement for smelter workers."

    exports:
      - good: "pine_tar"
        destinations: ["Grimholt", "Kolvik"]
        volume: "medium"
      - good: "medicinal_herbs"
        destinations: ["Deepholm", "Grimholt", "Ashen Reach"]
        volume: "low"
      - good: "smelted_iron"
        destinations: ["Ashen Reach", "Vargheim"]
        volume: "low"

    strategic_resources:
      - resource: "neutral ground"
        military_value: "Ashmark sits between Ashen Reach and Grimholt territories. Both sides trade here. Burning Ashmark harms everyone."
      - resource: "healer's lodge"
        military_value: "Best healer between Deepholm and the coast. Wounded fighters from any faction seek treatment here."
      - resource: "iron smelter"
        military_value: "Processes ore from either mountain settlement. An alternative supply chain if Deepholm or Grimholt is blockaded."

    market:
      market_day: "every Tyrsdag"
      stall_count: 3
      visiting_traders: "occasional"
      exotic_goods: false
      price_modifier: 1.05
      notes: "Small but honest market. Reeve Torsten enforces fair dealing — no taxes but cheats are expelled permanently. Attracts traders who want to avoid Grimholt's and Ashen Reach's political games."

    economic_vulnerabilities:
      - "Bone Pack mercenaries demanding winter shelter — may escalate to extortion"
      - "Ore supply depends on goodwill from both Grimholt and Deepholm"
      - "Neutrality is fragile — one political shift and Ashmark becomes a target"
      - "No dedicated defense force — palisade is basic"

    trade_routes:
      - to: "Ashen Reach"
        route_id: "RTE_004"
        goods_flow: "herbs and smelted iron out, charcoal and tar in"
        frequency: "weekly"
      - to: "Grimholt"
        route_id: "RTE_008"
        goods_flow: "charcoal and tar out, iron ore in"
        frequency: "weekly"
      - to: "Deepholm"
        route_id: "RTE_009"
        goods_flow: "charcoal out, iron ore and finished goods in"
        frequency: "weekly"
      - to: "Vargheim"
        route_id: "RTE_012"
        goods_flow: "iron tools out, charcoal and timber in"
        frequency: "fortnightly"

    wartime_impact:
      food_security: "moderate"
      siege_endurance_weeks: 2
      essential_imports_at_risk: ["iron_ore", "grain"]
      notes: "Ashmark's value is as a neutral processing hub. Any faction that burns it harms its own supply chain. This is the settlement's best defence — and its greatest vulnerability if someone decides to make a point."

  # ─────────────────────────────────────────────
  # 11. DEEPHOLM — Mountain trade town
  # ─────────────────────────────────────────────
  - settlement: "Deepholm"
    population: 520
    size: "small_town"
    terrain: "mountain"

    production:
      - good: "iron_ingot"
        quantity_weekly: "high"
        trade_good_id: "TG_METAL_002"
        notes: "Underground mining halls. Deepest and richest deposits in the Rimevegr."
      - good: "bronze"
        quantity_weekly: "medium"
        trade_good_id: "TG_METAL_005"
        notes: "Tin imported from unknown southern source. Bronze-work is a Deepholm specialty."
      - good: "weapons_masterwork"
        quantity_weekly: "low"
        trade_good_id: "TG_WEAPON_002"
        notes: "Masterwork smithy. Named blades, pattern-welded axes, reinforced byrnies. Months-long waiting list."
      - good: "galdr_services"
        quantity_weekly: "low"
        trade_good_id: "TG_SERVICE_003"
        notes: "Galdr workshop provides rune-enchantment and divination services. Expensive."
      - good: "tools"
        quantity_weekly: "medium"
        trade_good_id: "TG_TOOL_001"
        notes: "Standard iron tools exported region-wide. Reliable quality."

    imports:
      - good: "grain"
        source: "Thornwall"
        urgency: "high"
        notes: "520 mouths to feed and no arable land. Grain convoys from Thornwall are Deepholm's lifeline."
      - good: "timber"
        source: "Ashmark or Vargheim"
        urgency: "high"
        notes: "Mine supports, construction, charcoal. Enormous demand."
      - good: "charcoal"
        source: "Vargheim, Ashmark, Ashen Reach"
        urgency: "high"
        notes: "Smelting operations consume charcoal faster than any single supplier can provide."
      - good: "dried_fish"
        source: "Frostfjord Hollow, Kolvik"
        urgency: "medium"
        notes: "Protein for miners and garrison. Steady demand."

    exports:
      - good: "iron_ingot"
        destinations:
          ["Grimholt", "Ashmark", "Kolvik", "Thornwall", "Ashen Reach"]
        volume: "high"
      - good: "bronze"
        destinations: ["Grimholt", "Thornwall", "Skaldhaven"]
        volume: "medium"
      - good: "weapons_masterwork"
        destinations: ["any buyer who can pay"]
        volume: "low"
      - good: "tools"
        destinations: ["all settlements"]
        volume: "high"

    strategic_resources:
      - resource: "underground mining halls"
        military_value: "Deep tunnels serve as shelters during siege. Garrison of 40 can hold the iron gate indefinitely. Assault requires mining or starvation."
      - resource: "masterwork smithy"
        military_value: "Only site in the Rimevegr capable of producing pattern-welded steel and reinforced armour. A conquering force that preserves the smithy gains regional military superiority."
      - resource: "galdr workshop"
        military_value: "Rune-enchantment and divination. Sigrun's galdr-speaker provides intelligence and magical support that no other settlement can match."
      - resource: "garrison"
        military_value: "40 professional soldiers. Well-armed, well-fed, and stationed behind stone walls with an iron gate. The strongest permanent military force in the Rimevegr."
      - resource: "barrow archive"
        military_value: "Historical records and rune-stone catalogues. Intelligence value — knowledge of barrow locations and their contents."

    market:
      market_day: "daily"
      stall_count: 20
      visiting_traders: "frequent"
      exotic_goods: true
      price_modifier: 0.9
      notes: "The only daily market in the Rimevegr. Competition keeps prices low. Foreign traders occasionally appear with southern luxuries — glass beads, spices, fine cloth. Sigrun levies a 5% trade tax and enforces standardised weights. Black market exists in the lower tunnels."

    economic_vulnerabilities:
      - "Food dependency — 520 people on imported grain. A two-week supply interruption causes riots."
      - "Charcoal dependency — three separate suppliers needed to keep smelters running"
      - "Bronze production depends on tin from an unreliable southern source"
      - "Rivalry with Grimholt could escalate to trade war — Ordovast wants Deepholm's market share"
      - "Lower tunnel black market undermines Sigrun's tax revenue"

    trade_routes:
      - to: "Grimholt"
        route_id: "RTE_007"
        goods_flow: "finished goods out, raw ore in"
        frequency: "twice weekly"
      - to: "Ashmark"
        route_id: "RTE_009"
        goods_flow: "tools and ingots out, charcoal in"
        frequency: "daily (mule trains)"
      - to: "Raven's Perch"
        route_id: "RTE_010"
        goods_flow: "grain and supplies out, goat hides and ore in"
        frequency: "monthly (summer only)"

    wartime_impact:
      food_security: "moderate"
      siege_endurance_weeks: 6
      essential_imports_at_risk: ["grain", "timber", "charcoal"]
      notes: "45 days of stored food means Deepholm can outlast any siege in the region. The garrison is professional and the walls are stone. The weakness is not military — it is logistical. Cut the grain supply and Sigrun must choose between feeding civilians and feeding soldiers. She will choose soldiers."

  # ─────────────────────────────────────────────
  # 12. BLEAKWATER LANDING — River ferry hamlet
  # ─────────────────────────────────────────────
  - settlement: "Bleakwater Landing"
