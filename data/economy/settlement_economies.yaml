      stall_count: 10
      visiting_traders: "regular"
      exotic_goods: false
      price_modifier: 0.95
      notes: "Second-largest market after Deepholm. Sheep market on Thorsdag, general market on Sunnadag. Helga taxes traders 8% but keeps the roads patrolled. Wool exchange sets regional fleece prices."

