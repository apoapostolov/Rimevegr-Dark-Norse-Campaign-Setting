    size: "village"
    terrain: "coast"

    production:
      - good: "ship_repair"
        quantity_weekly: "medium"
        trade_good_id: "TG_SERVICE_001"
        notes: "Only shipwright between Frostfjord and Grimholt. Dry-dock handles one vessel at a time."
      - good: "dried_fish"
        quantity_weekly: "medium"
        trade_good_id: "TG_FOOD_002"
        notes: "Smoking sheds on the harbour. Cod, herring, and mackerel."
      - good: "salt"
        quantity_weekly: "low"
        trade_good_id: "TG_FOOD_010"
        notes: "Sea-salt evaporation pans. Small scale but consistent."
      - good: "rope"
        quantity_weekly: "low"
        trade_good_id: "TG_TOOL_004"
        notes: "Ship-grade cordage. Higher quality than Frostfjord's output."

    imports:
      - good: "timber"
        source: "Ashen Reach or Vargheim"
        urgency: "high"
        notes: "Ship repair consumes large quantities of quality planking."
      - good: "pine_tar"
        source: "Ashen Reach"
        urgency: "high"
        notes: "Essential for waterproofing hulls. No local substitute."
      - good: "iron_nails"
        source: "Grimholt or Deepholm"
        urgency: "high"
        notes: "Boat-nails are specialist items. No local smithy — Harbour-Master Inga has petitioned for one."
      - good: "wool_cloth"
        source: "Feldwick or Thornwall"
        urgency: "low"
        notes: "Sailcloth repairs and winter clothing."

    exports:
      - good: "ship_repair"
