        volume: "medium"
      - good: "mutton"
        destinations: ["Grimholt", "Deepholm", "Moor's End"]
        volume: "medium"
      - good: "woven_cloth"
        destinations: ["Deepholm", "Kolvik"]
        volume: "medium"

    strategic_resources:
      - resource: "thorn-hedge wall"
        military_value: "Living barrier surrounding the settlement. Fire-resistant, axe-resistant, and constantly growing. Attackers must spend hours cutting through or find the gate."
      - resource: "sheep flocks"
        military_value: "Walking rations for an army. 800 sheep can feed a large warband for weeks. Also wool for winter gear."
      - resource: "grain surplus"
        military_value: "Thornwall is the breadbasket of the eastern Rimevegr. Grimholt and Deepholm both depend on Thornwall grain. Whoever controls Thornwall controls who eats."
      - resource: "moor outriders"
        military_value: "Jarl Helga maintains mounted scouts who patrol the moor. Early warning and pursuit capability."

