      essential_imports_at_risk: ["iron_ingot", "timber"]
      notes: "Thornwall is self-sufficient in food — the only large settlement that can say this. The thorn-hedge and stone gatehouse give time, and 16 days of grain stores plus ongoing sheep slaughter means the settlement can hold for a month. Weakness is iron — without resupply, the smithy cannot repair weapons or tools."

  # ─────────────────────────────────────────────
  # 15. ICEBREAK — Ice-reach subsistence hamlet
  # ─────────────────────────────────────────────
  - settlement: "Icebreak"
    population: 12
    size: "hamlet"
    terrain: "ice"

    production:
      - good: "seal_blubber"
        quantity_weekly: "low"
        trade_good_id: "TG_FUEL_004"
        notes: "Seal hunting on the ice shelf. Primary fuel and food source. Everything depends on the seal migration."
      - good: "walrus_ivory"
        quantity_weekly: "low"
        trade_good_id: "TG_LUXURY_001"
        notes: "Occasional walrus kill. Ivory is the only trade good worth the journey to export."
      - good: "seidr_divination"
        quantity_weekly: "low"
        trade_good_id: "TG_SERVICE_006"
        notes: "Hermit Ragnhild (WYR 5) offers divination for a blood price. Dangerous and unreliable but sought after."

    imports:
      - good: "iron_tools"
        source: "Deepholm (if any)"
        urgency: "high"
        notes: "Every blade and hook is irreplaceable. A broken knife is a survival crisis."
      - good: "grain"
        source: "none regular"
        urgency: "low"
        notes: "Diet is seal meat, blubber, and whatever they can scavenge. Grain is a luxury they rarely see."

    exports:
      - good: "walrus_ivory"
        destinations: ["Deepholm"]
        volume: "low"
      - good: "seidr_divination"
        destinations: ["any pilgrim willing to make the journey"]
        volume: "low"

    strategic_resources:
      - resource: "Veil-thinning zone"
        military_value: "Ragnhild claims the Veil between worlds is permanently weakening here. No conventional military value — but galdr-seekers and desperate war-leaders may seek Ragnhild's sight."
      - resource: "ice cave shrine"
        military_value: "Ritual site. Unknown properties. Attracts the desperate and the curious."
      - resource: "extreme isolation"
        military_value: "No rational military force would march to Icebreak. 70 km across ice shelf from the nearest settlement. Perfect hiding place — if you can survive."

    market:
      market_day: "no regular market"
      stall_count: 0
      visiting_traders: "none"
      exotic_goods: false
      price_modifier: 2.0
      notes: "No market. No trade. No visitors except the lost, the mad, and the desperate. Ragnhild accepts payment in blood, not silver."

    economic_vulnerabilities:
      - "Seal migration failure means starvation — no alternative food source"
      - "12 people is below minimum viable community — one harsh winter could end Icebreak"
      - "Complete isolation from all supply networks"
      - "Ragnhild's Veil claims may attract dangerous attention (rivals, zealots, entities)"

    trade_routes:
      - to: "Bleakwater Landing"
        route_id: "RTE_018"
        goods_flow: "walrus ivory out (if any), nothing in"
        frequency: "yearly (summer only, if at all)"

    wartime_impact:
      food_security: "poor"
      siege_endurance_weeks: 0
      essential_imports_at_risk: ["iron_tools"]
      notes: "Icebreak cannot be besieged, supplied, reinforced, or meaningfully attacked. It exists outside the war economy entirely. Its only value is Ragnhild — and she answers to no jarl."
