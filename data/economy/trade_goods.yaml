# Iron Ledger — Trade Goods Database
# Canonical pricing and availability for the Rimevegr settlement network.
# Currency: 1 silver = 10 copper. Common merc retainer: 2 silver/week.
# Food baseline: 1 silver/week/person (10 copper).
# Seasons: thaw, long_sun, harvest, long_dark.
# Availability: common (any settlement), uncommon (village+),
#   rare (large_village+), exotic (Deepholm market or special contact).

trade_goods:
  # =================================================================
  # WEAPONS
  # =================================================================
  weapons:
    - id: "TG_WPN_001"
      name: "Iron Hand-Axe"
      base_price_copper: 40
      weight_kg: 1.2
      availability: "common"
      description: "Single-headed axe with a hickory haft. The Rimevegr's universal sidearm — every man owns one."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.95
        harvest: 1.0
        long_dark: 1.15
      wartime_modifier: 1.4
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach"]
      notes: "Price doubles when iron supply from Grimholt is disrupted."

    - id: "TG_WPN_002"
      name: "Broad-Axe"
      base_price_copper: 70
      weight_kg: 2.0
      availability: "common"
      description: "Wide-bladed war axe. Splits shields and men with equal ease."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.95
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.4
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach", "Thornwall"]
      notes: "Preferred weapon of most Svarthird axe-men."

    - id: "TG_WPN_003"
      name: "Iron Sword"
      base_price_copper: 100
      weight_kg: 1.4
      availability: "uncommon"
      description: "Straight-bladed sword with a simple crossguard. Mark of a veteran or a man with ambitions."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.5
      produced_by: ["Deepholm", "Grimholt"]
      notes: "Masterwork swords from Deepholm command 200+ copper. Named Men carry them."

    - id: "TG_WPN_004"
      name: "Seax"
      base_price_copper: 15
      weight_kg: 0.5
      availability: "common"
      description: "Heavy single-edged knife, long as a man's forearm. Eating tool, skinning blade, and throat-cutter."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.05
      wartime_modifier: 1.2
      produced_by:
        [
          "Grimholt",
          "Deepholm",
          "Ashen Reach",
          "Thornwall",
          "Vargheim",
          "Skaldhaven",
        ]
      notes: "Every man carries one. Losing your seax is losing your self-respect."

    - id: "TG_WPN_005"
      name: "Ash-Haft Spear"
      base_price_copper: 25
      weight_kg: 1.8
      availability: "common"
      description: "Iron-tipped spear on a two-metre ash shaft. The formation weapon of any shield-wall."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.95
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.3
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach", "Thornwall"]
      notes: "Cheapest way to arm a recruit. Ash shafts sourced from Vargheim and Ashen Reach forests."

    - id: "TG_WPN_006"
      name: "Javelins (bundle of 3)"
      base_price_copper: 20
      weight_kg: 2.4
      availability: "common"
      description: "Light throwing spears with leaf-shaped iron heads. Effective at thirty paces against unshielded targets."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.3
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach"]
      notes: "Expendable. Bands scavenge them after every skirmish."

    - id: "TG_WPN_007"
      name: "War Hammer"
      base_price_copper: 80
      weight_kg: 2.5
      availability: "uncommon"
      description: "Iron-headed hammer on a reinforced haft. Crushes helms and breaks bones through mail."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.4
      produced_by: ["Grimholt", "Deepholm"]
      notes: "Favoured against armoured opponents. Grimholt smiths forge the best."

    - id: "TG_WPN_008"
      name: "Hunting Bow"
      base_price_copper: 35
      weight_kg: 0.9
      availability: "common"
      description: "Short self-bow of yew or elm. Meant for deer and wolves, serviceable against men in a pinch."
      seasonal_modifier:
        thaw: 1.05
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.3
      produced_by: ["Vargheim", "Ashen Reach", "Raven's Perch"]
      notes: "Damp ruins bowstrings. Carry spares wrapped in oiled cloth."

    - id: "TG_WPN_009"
      name: "Arrows (bundle of 20)"
      base_price_copper: 8
      weight_kg: 1.0
      availability: "common"
      description: "Iron-tipped birch shafts fletched with goose feather. Standard hunting and war arrows."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 1.0
        long_dark: 1.15
      wartime_modifier: 1.5
      produced_by: ["Vargheim", "Ashen Reach", "Deepholm", "Raven's Perch"]
      notes: "Consumed fast in skirmishes. Bands that run out of arrows die."

    - id: "TG_WPN_010"
      name: "Sling"
      base_price_copper: 3
      weight_kg: 0.2
      availability: "common"
      description: "Braided wool sling. Shepherds carry them; so do men too poor for a bow."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.0
      wartime_modifier: 1.1
      produced_by: ["Feldwick", "Thornwall", "Moor's End"]
      notes: "Ammunition is free — river stones everywhere. Deadly accurate in trained hands."

    - id: "TG_WPN_011"
      name: "Dane-Axe"
      base_price_copper: 120
      weight_kg: 2.8
      availability: "uncommon"
      description: "Long-hafted two-handed axe with a broad crescent blade. Terrifying in open combat, useless in tight spaces."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.5
      produced_by: ["Deepholm", "Grimholt"]
      notes: "Status weapon. A man carrying a Dane-axe is announcing he intends to kill something large."

    - id: "TG_WPN_012"
      name: "Iron Mace"
      base_price_copper: 60
      weight_kg: 2.2
      availability: "uncommon"
      description: "Flanged iron head on an oak shaft. Simple to forge, brutal to receive."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.3
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach"]
      notes: "Cheaper than a sword, simpler than an axe. Common among garrison fighters."

  # =================================================================
  # ARMOR
  # =================================================================
  armor:
    - id: "TG_ARM_001"
      name: "Leather Jerkin"
      base_price_copper: 30
      weight_kg: 3.0
      availability: "common"
      description: "Hardened cowhide vest laced at the sides. Stops a glancing knife but not much else."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.05
      wartime_modifier: 1.3
      produced_by: ["Thornwall", "Vargheim", "Ashen Reach", "Frostfjord Hollow"]
      notes: "Most common armour in the Rimevegr. Even farmers own one."

    - id: "TG_ARM_002"
      name: "Padded Gambeson"
      base_price_copper: 50
      weight_kg: 5.0
      availability: "common"
      description: "Layered linen and wool, stitched tight. Absorbs blows better than leather and keeps the cold out."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.95
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.3
      produced_by: ["Thornwall", "Deepholm", "Ashen Reach"]
      notes: "Worn under mail by those who can afford both. Stinks after a week on the march."

    - id: "TG_ARM_003"
      name: "Chainmail Shirt"
      base_price_copper: 250
      weight_kg: 12.0
      availability: "rare"
      description: "Riveted iron rings, knee-length. A fortune in iron and a thousand hours of a smith's labour."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.05
      wartime_modifier: 1.5
      produced_by: ["Deepholm"]
      notes: "Only Deepholm can produce new mail. Most shirts in circulation are inherited or looted. Worth killing for."

    - id: "TG_ARM_004"
      name: "Iron Helm (Nasal)"
      base_price_copper: 80
      weight_kg: 2.0
      availability: "uncommon"
      description: "Conical iron helm with a nose-guard. Keeps your skull intact when the axes come down."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.05
      wartime_modifier: 1.4
      produced_by: ["Deepholm", "Grimholt"]
      notes: "Line the inside with wool padding or regret it after the first blow."

    - id: "TG_ARM_005"
      name: "Wooden Shield (Round)"
      base_price_copper: 20
      weight_kg: 4.5
      availability: "common"
      description: "Lime-wood planks with a central iron boss. Expendable — one hard fight and it needs replacing."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.4
      produced_by: ["Ashen Reach", "Vargheim", "Deepholm", "Kolvik"]
      notes: "Bands go through shields fast. Kolvik's shipwrights make them from leftover planking."

    - id: "TG_ARM_006"
      name: "Iron-Rimmed Shield"
      base_price_copper: 45
      weight_kg: 5.5
      availability: "uncommon"
      description: "Round shield with an iron rim and reinforced boss. Survives more punishment than bare wood."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.4
      produced_by: ["Deepholm", "Grimholt"]
      notes: "Veterans insist on iron-rimmed. Costs more but lasts three fights instead of one."

    - id: "TG_ARM_007"
      name: "Leather Greaves"
      base_price_copper: 15
      weight_kg: 1.5
      availability: "common"
      description: "Hardened leather shin-guards strapped over boots. Any fighter who has been leg-swept learns to value them."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.0
      wartime_modifier: 1.2
      produced_by: ["Thornwall", "Vargheim", "Deepholm"]
      notes: null

    - id: "TG_ARM_008"
      name: "Arm Guards (Leather and Iron)"
      base_price_copper: 20
      weight_kg: 1.2
      availability: "common"
      description: "Leather vambraces with iron splints riveted along the forearm. Catches blades that slip past the shield."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.0
      wartime_modifier: 1.3
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach"]
      notes: null

    - id: "TG_ARM_009"
      name: "Fur-Lined Hauberk"
      base_price_copper: 180
      weight_kg: 10.0
      availability: "rare"
      description: "Thick leather hauberk lined with wolf or bear fur, reinforced with iron studs. Warmth and protection both."
      seasonal_modifier:
        thaw: 0.9
        long_sun: 0.8
        harvest: 0.95
        long_dark: 1.3
      wartime_modifier: 1.3
      produced_by: ["Vargheim", "Deepholm"]
      notes: "Highly prized in the Long Dark. Vargheim wolf-wardens produce the finest furs."

    - id: "TG_ARM_010"
      name: "Leather Cap"
      base_price_copper: 10
      weight_kg: 0.5
      availability: "common"
      description: "Boiled leather skullcap. Won't stop an axe, but keeps rocks and rain off your head."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.0
      wartime_modifier: 1.1
      produced_by: ["Thornwall", "Ashen Reach", "Frostfjord Hollow", "Vargheim"]
      notes: "Common men wear these. Better than nothing."

  # =================================================================
  # TOOLS
  # =================================================================
  tools:
    - id: "TG_TLS_001"
      name: "Woodcutting Axe"
      base_price_copper: 25
      weight_kg: 2.0
      availability: "common"
      description: "Iron-headed felling axe. Heavier than a hand-axe, wrong balance for fighting, right balance for timber."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 1.05
        long_dark: 1.1
      wartime_modifier: 1.1
      produced_by: ["Ashen Reach", "Vargheim", "Grimholt", "Deepholm"]
      notes: "A desperate man can fight with one, but a proper weapon beats it every time."

    - id: "TG_TLS_002"
      name: "Iron Pot (Cooking)"
      base_price_copper: 20
      weight_kg: 3.5
      availability: "common"
      description: "Cast-iron cook pot with a bail handle. Boils stew, melts snow, heats water for wounds. Indispensable."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.1
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach"]
      notes: "Bands guard their cook pot like a second captain. Lose it and morale drops."

    - id: "TG_TLS_003"
      name: "Fishing Hooks (set of 10)"
      base_price_copper: 5
      weight_kg: 0.1
      availability: "common"
      description: "Bent iron hooks in a leather pouch. Thread with gut line and bait with worms or offal."
      seasonal_modifier:
        thaw: 1.1
        long_sun: 1.0
        harvest: 0.95
        long_dark: 1.0
      wartime_modifier: 1.0
      produced_by:
        ["Frostfjord Hollow", "Kolvik", "Stonebay Hamlet", "Skaldhaven"]
      notes: "Coastal settlements always have these. Inland travelers pay a premium."

    - id: "TG_TLS_004"
      name: "Rope (20m, Hemp)"
      base_price_copper: 8
      weight_kg: 2.5
      availability: "common"
      description: "Coiled hemp rope. Binds prisoners, lashes shelters, hauls loads, lowers men into barrows."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.05
      wartime_modifier: 1.2
      produced_by: ["Kolvik", "Frostfjord Hollow", "Thornwall", "Deepholm"]
      notes: "Wet rope freezes rigid in the Long Dark. Keep it under your cloak."

    - id: "TG_TLS_005"
      name: "Shovel (Iron-Head)"
      base_price_copper: 15
      weight_kg: 2.2
      availability: "common"
      description: "Iron blade on an ash handle. Digs latrines, fire-pits, and graves. The Long Dark keeps it busy."
      seasonal_modifier:
        thaw: 1.1
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.0
      wartime_modifier: 1.1
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach"]
      notes: null

    - id: "TG_TLS_006"
      name: "Iron Nails (100)"
      base_price_copper: 12
      weight_kg: 1.0
      availability: "common"
      description: "Hand-forged iron nails in a cloth sack. Every repair, shelter, and coffin needs them."
      seasonal_modifier:
        thaw: 1.05
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.2
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach"]
      notes: "Scavenged from ruins and wreckage when supply runs low."

    - id: "TG_TLS_007"
      name: "Crosscut Saw"
      base_price_copper: 30
      weight_kg: 2.0
      availability: "uncommon"
      description: "Two-man iron saw for cutting timber planks. Rare and valuable — most woodwork is done with axe and adze."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.95
        harvest: 1.0
        long_dark: 1.1
      wartime_modifier: 1.0
      produced_by: ["Deepholm", "Ashen Reach"]
      notes: "Kolvik's shipwright keeps his saws locked. Worth stealing."

    - id: "TG_TLS_008"
      name: "Whetstone"
      base_price_copper: 3
      weight_kg: 0.3
      availability: "common"
      description: "Flat quartzite stone for sharpening blades. Every fighter carries one in his belt-pouch."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.0
      wartime_modifier: 1.2
      produced_by: ["Grimholt", "Deepholm", "Raven's Perch"]
      notes: "Good whetstones from Grimholt's quarries are recognizable by their grey-green colour."

    - id: "TG_TLS_009"
      name: "Flint and Steel Set"
      base_price_copper: 5
      weight_kg: 0.2
      availability: "common"
      description: "Fire-steel, flint shard, and a pouch of char-cloth. Strikes a light in dry conditions — the wet is another matter."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 1.0
        long_dark: 1.2
      wartime_modifier: 1.1
      produced_by: ["Grimholt", "Deepholm", "Ashen Reach", "Thornwall"]
      notes: "Keep the char-cloth dry or freeze to death. Simple as that."

    - id: "TG_TLS_010"
      name: "Iron Tongs"
      base_price_copper: 18
      weight_kg: 1.5
      availability: "uncommon"
      description: "Blacksmith's tongs. Required for forge work, field repairs, and pulling arrowheads from screaming men."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 1.0
        harvest: 1.0
        long_dark: 1.0
      wartime_modifier: 1.2
      produced_by: ["Deepholm", "Grimholt"]
      notes: "A band with a smith carries tongs. A band without borrows — or begs."

  # =================================================================
  # FOOD AND DRINK
  # =================================================================
  food_and_drink:
    - id: "TG_FOD_001"
      name: "Rations (1 Week, Dried)"
      base_price_copper: 10
      weight_kg: 3.5
      availability: "common"
      description: "Hardtack, dried fish, and a twist of salt in an oiled cloth. Keeps body and soul together — barely."
      seasonal_modifier:
        thaw: 1.1
        long_sun: 0.9
        harvest: 0.8
        long_dark: 1.5
      wartime_modifier: 1.8
      produced_by:
        ["Frostfjord Hollow", "Kolvik", "Deepholm", "Thornwall", "Ashen Reach"]
      notes: "The baseline. 10 copper feeds one mouth for seven days. Everything else is luxury."

    - id: "TG_FOD_002"
      name: "Dried Cod (1 kg)"
      base_price_copper: 3
      weight_kg: 1.0
      availability: "common"
      description: "Salt-cured stockfish, stiff as a plank. Soak in water overnight or break your teeth."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.8
        harvest: 0.9
        long_dark: 1.3
      wartime_modifier: 1.5
      produced_by:
        ["Frostfjord Hollow", "Kolvik", "Stonebay Hamlet", "Skaldhaven"]
      notes: "Staple of every coastal settlement. Keeps for months. Tastes like penance."

    - id: "TG_FOD_003"
      name: "Smoked Mutton (1 kg)"
      base_price_copper: 4
      weight_kg: 1.0
      availability: "common"
      description: "Dark-smoked sheep meat from the moor flocks. Tough, salty, and better than starving."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 0.8
        long_dark: 1.4
      wartime_modifier: 1.6
      produced_by: ["Thornwall", "Feldwick", "Moor's End"]
      notes: "Thornwall's moor sheep are the main source. Feldwick's occupation has disrupted supply."

    - id: "TG_FOD_004"
      name: "Barley Bread (Loaf)"
      base_price_copper: 1
      weight_kg: 0.5
      availability: "common"
      description: "Dense, dark flatbread. Baked on a hearthstone, eaten the same day or it turns to gravel."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 0.7
        long_dark: 1.5
      wartime_modifier: 1.5
      produced_by: ["Deepholm", "Thornwall", "Ashen Reach", "Frostfjord Hollow"]
      notes: "Barley grows poorly this far north. Most grain is imported or traded from Thornwall's moor farms."

    - id: "TG_FOD_005"
      name: "Honey (Clay Pot, ~0.5 kg)"
      base_price_copper: 12
      weight_kg: 0.7
      availability: "uncommon"
      description: "Dark forest honey, thick and bitter-sweet. Medicinal, preservative, and the soul of mead."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.8
        harvest: 0.7
        long_dark: 1.4
      wartime_modifier: 1.3
      produced_by: ["Ashmark", "Ashen Reach", "Vargheim"]
      notes: "Forest settlements keep bee-hives. Healers pay well for honey — it fights wound-rot."

    - id: "TG_FOD_006"
      name: "Salt (1 kg)"
      base_price_copper: 8
      weight_kg: 1.0
      availability: "uncommon"
      description: "Coarse grey sea-salt. Preserves everything — meat, fish, hides, and trust."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 0.85
        long_dark: 1.3
      wartime_modifier: 1.5
      produced_by: ["Kolvik", "Frostfjord Hollow", "Skaldhaven"]
      notes: "Coastal settlements boil seawater for salt. Inland, it trades at a steep mark-up."

    - id: "TG_FOD_007"
      name: "Ale (Barrel, ~40 L)"
      base_price_copper: 25
      weight_kg: 45.0
      availability: "common"
      description: "Thick barley ale, amber and cloudy. The only reliable comfort on the Rimevegr."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 0.8
        long_dark: 1.2
      wartime_modifier: 1.3
      produced_by:
        [
          "Deepholm",
          "Frostfjord Hollow",
          "Ashen Reach",
          "Thornwall",
          "Vargheim",
        ]
      notes: "Every settlement brews. Quality varies from passable to punishment. Transport is the problem — barrels are heavy."

    - id: "TG_FOD_008"
      name: "Mead (Jug, ~2 L)"
      base_price_copper: 15
      weight_kg: 2.5
      availability: "uncommon"
      description: "Honey-wine, golden and sweet. Drunk at oath-making, feasts, and funerals."
      seasonal_modifier:
        thaw: 1.0
        long_sun: 0.9
        harvest: 0.8
        long_dark: 1.3
      wartime_modifier: 1.2
      produced_by: ["Ashmark", "Deepholm", "Ashen Reach"]
      notes: "Good mead is a gift. Great mead is a bribe. A jug buys goodwill faster than a speech."

    - id: "TG_FOD_009"
      name: "Turnips (Sack, ~5 kg)"
      base_price_copper: 3
      weight_kg: 5.0
      availability: "common"
      description: "Hard, bitter root vegetables. Ugly but reliable — they grow where nothing else will."
      seasonal_modifier:
        thaw: 1.1
        long_sun: 0.9
        harvest: 0.6
        long_dark: 1.5
      wartime_modifier: 1.5
      produced_by: ["Feldwick", "Thornwall", "Moor's End", "Ashen Reach"]
