    # ===========================================================================
    # YEAR 314 — Reconstruction and Second Crisis
    # Post-war recovery. Thaw reveals mass graves. Summer rebuilding.
    # Supernatural escalation begins — barrow activity, Veil weakening.
    # ===========================================================================
    314:
      summary: "Reconstruction year. Thaw uncovers Y313's dead. Summer allows rebuilding but the land is scarred. Autumn sees first barrow incidents. Winter brings creeping supernatural dread — the Veil thins visibly."
      weeks:
        # --- THAW / SPRING (Weeks 1-4, Days 1-30) ---
        - week: 1
          season: thaw
          days: "1-7"
          dominant_weather: light_rain
          temperature: cold
          wind: strong_gusts
          precipitation: heavy_rain
          visibility: poor
          named_event: "WE_015"
          narrative: "Violent thaw. The Y313 snowpack releases all at once. Flash floods on every river. Roads become rivers."

        - week: 2
          season: thaw
          days: "8-15"
          dominant_weather: rime_fog
          temperature: cold
          wind: light_breeze
          precipitation: light_rain
          visibility: poor
          named_event: "WE_016"
          narrative: "Meltwater recedes. The dead emerge. Mass graves, frozen corpses, siege trenches full of bodies. The stench begins. EVT_314_S04_004."

        - week: 3
