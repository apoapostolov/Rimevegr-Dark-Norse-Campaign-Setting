    # ===========================================================================
    # YEAR 315 — The Veil Year
    # Supernatural escalation peaks. Barrow crisis. Blood suns become frequent.
    # Winter weather increasingly unnatural. The land itself is wrong.
    # ===========================================================================
    315:
      summary: "The Veil year. Supernatural weather dominates. Blood suns, prolonged Hush events, Veil thinning weekly by midwinter. The barrow crisis reaches a peak. Natural weather patterns warp. Something is waking."
      weeks:
        # --- THAW / SPRING (Weeks 1-4, Days 1-30) ---
        - week: 1
          season: thaw
          days: "1-7"
          dominant_weather: blood_sun
          temperature: cold
          wind: calm
          precipitation: light_rain
          visibility: fair
          named_event: "WE_027"
          narrative: "Year opens with a blood sun on Day 1. Red light on melting ice. The völvas refuse to interpret it. Bad sign when they won't even guess."

        - week: 2
          season: thaw
          days: "8-15"
          dominant_weather: light_rain
          temperature: cold
          wind: steady_wind
          precipitation: heavy_rain
          visibility: poor
          named_event: null
          narrative: "Heavy thaw rain. Mountain streams flood. Roads wash out. The dead from Y314's late barrow incidents surface in the mud."

        - week: 3
          season: thaw
          days: "16-22"
          dominant_weather: veil_thinning
          temperature: cold
          wind: calm
          precipitation: light_mist
          visibility: poor
          named_event: "WE_028"
          narrative: "Veil event during thaw — unprecedented. Green light visible at noon. The barrow hum becomes a chord, harmonic and terrible."

        - week: 4
          season: thaw
          days: "23-30"
          dominant_weather: clear_grey
          temperature: cool
          wind: light_breeze
          precipitation: none
          visibility: fair
          named_event: null
          narrative: "Normal weather returns. The contrast makes it worse. Men flinch at ordinary shadows."

        # --- LONG SUN / SUMMER (Weeks 5-8, Days 31-60) ---
        - week: 5
          season: long_sun
          days: "31-37"
          dominant_weather: clear_grey
          temperature: cool
          wind: light_breeze
          precipitation: none
          visibility: clear
          named_event: null
          narrative: "Summer opens clean. The daylight feels thin, though. Colours washed out. The sun has no warmth behind it."

        - week: 6
          season: long_sun
          days: "38-45"
          dominant_weather: clear_grey
          temperature: mild
          wind: calm
          precipitation: none
          visibility: clear
          named_event: null
          narrative: "Peak warmth such as it is. Functional. Work proceeds. But the sky has a metallic quality that wasn't there in Y312."

        - week: 7
          season: long_sun
          days: "46-52"
          dominant_weather: blood_sun
          temperature: cool
          wind: calm
          precipitation: none
          visibility: fair
          named_event: "WE_029"
          narrative: "Blood sun in midsummer. Wrong season entirely. Lasts three hours. The barley fields look like they're bleeding. Panic at Ashen Reach."

        - week: 8
          season: long_sun
          days: "53-60"
          dominant_weather: rime_fog
          temperature: cold
          wind: steady_wind
          precipitation: light_mist
          visibility: poor
          named_event: null
          narrative: "Unseasonal fog. Cold returns early. The best weeks of the year are slipping away faster each cycle."

        # --- HARVEST / AUTUMN (Weeks 9-12, Days 61-90) ---
        - week: 9
          season: harvest
          days: "61-67"
          dominant_weather: clear_grey
          temperature: cold
          wind: steady_wind
          precipitation: none
          visibility: fair
          named_event: null
          narrative: "Dry harvest. Yields adequate but not generous. Every settlement stores with the memory of Y313."

        - week: 10
          season: harvest
          days: "68-75"
          dominant_weather: veil_thinning
          temperature: cold
          wind: calm
          precipitation: none
          visibility: poor
          named_event: "WE_030"
