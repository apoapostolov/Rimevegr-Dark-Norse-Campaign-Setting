        wooden racks in the wind, stockfish feeds the Rimevegr through the Long Dark. The
        dried planks of fish are hard as wood and must be beaten with a mallet and soaked for
        days before they are edible. They taste of salt, wind, and survival. A man with a
        shed full of stockfish is richer than a man with silver and nothing to eat.

