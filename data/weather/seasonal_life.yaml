        not tire. It does not feel pain the way the living do. Cutting it makes it angry.
        Fire makes it retreat. Iron disrupts whatever holds it together. A band camped within
        sight of a barrow mound in the Long Dark will post double watches and sleep poorly.
        The ones who sleep well are the ones who do not understand what they are sleeping near.

