        A vast shape in the fog — the outline of a whale, but wrong. The proportions shift.
        The blowhole vents something that is not breath — a greyish mist that smells of
        rotting fish and deep water. It surfaces near boats in storms, and the wave it
        creates capsizes them. Survivors describe the eye — a single pale disc the size of a
        shield, looking up from just below the surface. Fishermen who have seen it do not go
        out in fog again. Not because they are cowards. Because they understand what is out
        there.

  # ==========================================================================
  # FORAGING CALENDAR
  # ==========================================================================
  foraging_calendar:
    thaw:
      days: "1-30"
      description: >
        First signs of life after 270 days of darkness. Snowmelt reveals overwintered
        tubers and roots. Streams swell. The coastal ice breaks. Every band marches toward
        food — the coast for scurvy grass and seaweed, the forest for birch sap and angelica
        shoots. Men weep at the taste of something green. This is not poetic exaggeration.
        After nine months of dried fish, bark flour, and lichen porridge, fresh food triggers
        a physical reaction. The body knows what it needs.
      best_biomes: [coastal, river, forest]
      worst_biomes: [tundra, mountain]
      key_resources:
        - "Scurvy grass (coastal) — anti-scurvy, the first priority"
        - "Birch sap (forest) — sweet water from tapped trees"
        - "Angelica shoots (coastal, marsh) — first real greens"
        - "Seaweed — dulse and kelp from tidal zones"
        - "Pine needle tea — vitamin-rich, available in forest"
        - "Overwintered root vegetables near abandoned gardens"
      foraging_yield: moderate
      hunting_notes: >
        Game is thin and poor after winter. Bears emerging from hibernation are dangerously
        hungry. Cod spawning run begins — the most critical food event. Ptarmigan nesting
        on open ground provides easy snaring. Seal pups on rocky coastlines.

    long_sun:
      days: "31-60"
      description: >
        The land explodes with life. Everything grows, breeds, feeds, and fattens at once.
        The midnight sun means foraging from dawn to dawn — which is to say, continuously.
        This is the window. Every berry picked, fish smoked, and herb dried in these thirty
        days is a day of survival in the Long Dark. Bands that waste the Long Sun die in
        Frostmoon. There is no second chance.
      best_biomes: [forest, coastal, river, moor]
      worst_biomes: [tundra]
      key_resources:
        - "All berries — crowberry, cloudberry, lingonberry reaching harvestable levels"
        - "Wild garlic, sorrel, sea kale — greens at peak"
        - "Mushrooms beginning in birch stands"
        - "Herring shoals — net fishing at peak, salt and smoke everything"
        - "Trout and salmon runs in rivers"
        - "Yarrow, meadowsweet, bog myrtle — medicinal harvest"
        - "Dulse and kelp — dry and store in bulk"
        - "Eider down collection from nesting colonies"
      foraging_yield: abundant
      hunting_notes: >
        Deer and elk fattening with summer coat. Hares abundant. Bird eggs available early
        in the season. Seal basking on skerries. Bear fishing at river falls — approach with
        extreme caution. Boar rooting in forest clearings. The midges are appalling. The
        bounty is worth the suffering.

    harvest:
      days: "61-90"
      description: >
        The last productive days. Urgency governs everything. First frosts kill tender
        plants. Berries that are not picked this week rot on the stem. Fish not smoked
        this month will not keep. The Long Dark is thirty days away, and every man, woman,
        and child who has survived one before works with a grim, wordless efficiency that
        outsiders mistake for panic. It is not panic. It is the accumulated knowledge of
        what happens to those who are not ready.
      best_biomes: [forest, coastal, moor]
      worst_biomes: [tundra, mountain]
      key_resources:
        - "Lingonberry — peak harvest after first frost sweetens them"
        - "Crowberry — bulk gathering for drying"
        - "Mushrooms — birch boletes at peak, dry everything"
        - "Iceland moss and reindeer lichen — gather and process for winter flour"
        - "Salmon spawning run — the second great harvest"
        - "Juniper berries — last of the fresh spices"
        - "Angelica root — dig and dry before ground freezes"
        - "Willow bark — strip and dry for winter medicine"
        - "Chaga — hack from birch trunks and store dry"
      foraging_yield: moderate
      hunting_notes: >
        Deer rutting season — stags careless and aggressive, good hunting. Reindeer
        migration south provides mass hunting opportunity. Boar at peak fat — the best
        pork of the year. Bears gorging before hibernation — fat and somewhat less
        agile, but still lethal. Seals hauling out on autumn beaches. Ptarmigan flocking.
        This is the killing season. No sentiment. Fill the larder or starve.

    long_dark:
      days: "91-360"
      description: >
        Two hundred and seventy days. Nine months. The sun does not rise above the horizon
        for most of it. Temperatures drop to where exposed flesh freezes in minutes.
        Nothing grows. Almost nothing can be foraged. What you cached, smoked, salted,
        and dried in the ninety days of light is what you have. When it runs out — and it
        always runs out before the Thaw — you eat bark flour, lichen porridge, and the
        leather of your own boots. The Long Dark is not a season. It is a siege.
      best_biomes: [coastal]
      worst_biomes: [tundra, mountain, marsh]
      key_resources:
        - "Dried dulse and kelp (coastal) — the only 'fresh' forage available"
        - "Juniper berries — frozen on branches but edible"
        - "Iceland moss — scraped from exposed rocks in calm weather"
        - "Pine bark flour — inner bark of living pines, ground and baked"
        - "Chaga — hacked from birch trunks, brewed as medicinal tea"
        - "Birch polypore — wound dressing and fire material"
        - "Ice fishing — river trout through holes in lake ice, cod if harbor is open"
        - "Seal — hunting on ice is dangerous but blubber is critical for lamp oil"
        - "Cached and preserved food — stockfish, smoked salmon, salted herring, dried berries, dried mushrooms"
      foraging_yield: minimal
      hunting_notes: >
        Hunting is survival-critical and increasingly dangerous. Arctic hares in white
        coat are nearly invisible. Ptarmigan in snow burrows require luck to find. Wolf
        packs are bold and follow bands openly. Reindeer in sheltered valleys are thin
        and wary. Ice fishing is reliable but tedious. Seal hunting on shore ice risks
        falls through thin ice. Bear dens should not be approached — a hibernating bear
        woken in its den is the most dangerous animal in the Rimevegr. Everything about
        hunting in the Long Dark is harder, slower, colder, and more likely to kill the
        hunter than the hunted. The men who come back with a deer carcass are heroes.
        The men who do not come back are statistics.
