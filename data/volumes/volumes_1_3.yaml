      # --- Chapter 29 ---
      - chapter: 29
        title: "Kell Runs"
        template: "CHAP_CRISIS"
        time: "Y312, Days 228-240"
        weather_week: 31
        location: "Thornwall"
        pov: "Lump"
        summary: >-
          A blizzard traps the band. In its aftermath, the barrow mound
          at Vargheim splits open from within — barefoot tracks lead
          away in the snow. Kell, pushed past breaking by debt and fear,
          packs his kit at midnight and heads for the tree line. Lump
          is on watch. He sees Kell go. A decision: raise the alarm or
          let a desperate man flee. He raises the alarm. Kell is dragged
          back. Voss must decide punishment. Kell is found with 12 silver
          from the treasury.
        events_referenced:
          - "EVT_312_W05_068" # Blizzard Traps Travellers
          - "EVT_312_W06_069" # Barrow Mound Split Open
          - "EVT_312_W07_070" # Kell Attempts to Flee
        npcs_present:
          - "Lump"
          - "Kell"
          - "Voss"
          - "Gest"
          - "Thorne"
        character_beats:
          lump: >-
            The hardest choice of his free life. Kell was kind to him
            once — shared a fire, didn't call him thrall. But the band
            is the only thing keeping Lump alive. He raises the alarm
            and hates himself for it. This is the cost of belonging.
          kell: >-
            Broken. The debts, the wound, the winter, the fear. He
            didn't plan the theft — he was just running. The 12 silver
            was in his pack because he'd been hiding it from Gest for
            weeks. Everything comes out.
          voss: >-
            No rage. Cold assessment. The band is watching. Whatever he
            does defines the rules for every man here. Mercy is weakness.
            Cruelty is poison. He chooses a middle path.
        band_state:
          morale: 2
          treasury: 35 # recovered stolen silver, but expenses
          food_days: 3
        hooks: >-
          Kell's fate — expelled from the band into the winter, or
          punished and kept? Either way, the band is shaken. The Vargheim
          barrow has opened. The dead are physically walking.
        word_target: 5000

      # --- Chapter 30 ---
      - chapter: 30
        title: "Holmgang"
        template: "CHAP_BATTLE"
        time: "Y312, Days 241-255"
        weather_week: 33
        location: "Thornwall"
        pov: "Lump"
        summary: >-
          Deep cold kills livestock across the region — Moor's End loses
          half its sheep. Thorne's blood-debt collector formally challenges
          him to holmgang on Day 255. The law is clear: refusal means
          outlawry. Thorne fights. The duel is held in the snow outside
          Thornwall's walls. Both men bleed. Thorne wins but barely —
          the collector dies in the snow. The Grave Wardens send a
          desperate plea: they need fighters to seal a barrow at Icebreak
          before midwinter. Voss can't spare the men.
        events_referenced:
          - "EVT_312_W09_072" # Thorne Challenged to Holmgang
          - "EVT_312_W10_073" # Deep Cold Kills Livestock
          - "EVT_312_W11_074" # Grave Wardens Request Aid
        npcs_present:
          - "Lump"
          - "Thorne"
          - "Voss"
          - "Gest"
          - "Rolf"
        character_beats:
          lump: >-
            Watches the holmgang from start to finish. This is different
            from the Bone Pack challenge — this is law, not rivalry.
            Thorne could die here and it would be legal. The brutality
            of free men's justice shocks him more than the barrow dead.
          thorne: >-
            Fights with everything he has. When the collector falls,
            Thorne stands over him and says nothing. The blood-debt is
            paid. His burn scars stop aching for the first time in
            months.
          voss: >-
            Watches cold-eyed. If Thorne dies, the band loses a good
            fighter. If Thorne wins, the past is settled. Either way,
            Voss cannot intervene. This is the law.
        band_state:
          morale: 3 # victory in holmgang lifts spirits briefly
          treasury: 35
          food_days: 3
        hooks: >-
          Thorne's arc resolved — debt paid in blood. But the Grave
          Wardens' plea ignored. That will have consequences. Winter
          deepening. Iron Grip marching.
        word_target: 5000

      # --- Chapter 31 ---
