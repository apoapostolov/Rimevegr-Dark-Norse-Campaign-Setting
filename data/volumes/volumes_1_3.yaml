      # --- Chapter 34 ---
      - chapter: 34
        title: "Wolf Night"
        template: "CHAP_SURVIVAL"
        time: "Y312, Days 301-320"
        weather_week: 42
        location: "Thornwall"
        pov: "Lump"
        summary: >-
          Shortest days. Sunlight lasts four hours. Frostbite and despair.
          A pack of starving wolves ambushes a foraging party — one band
          member takes a bite wound to the arm. Lump fights wolves for
          the first time, swinging a hatchet he took from the garrison
          stores. He kills one wolf and the others scatter. The meat feeds
          the band for three days. First time Lump draws blood. It's not
          glory — it's survival.
        events_referenced:
          - "EVT_312_W19_082" # Wolves Attack Foraging Party
          - "EVT_312_W21_084" # The Long Dark Deepens
        npcs_present:
          - "Lump"
          - "Bjorn"
          - "Rolf"
          - "Voss"
        character_beats:
          lump: >-
            The wolf kill is his first. Not a man, not a draugr — an
            animal. But the hatchet in its skull felt right. Competent.
            He's becoming something new. The fighters don't cheer, but
            they nod. The wolf meat makes him provider rather than burden.
          rolf: >-
            Fights mechanically. His movements are good but his eyes
            are distant. The barrow dreams have taken something from him.
          voss: >-
            Notes Lump's kill. Says nothing aloud. Tells Gest privately:
            "He'll do."
        band_state:
          morale: 2
          treasury: 35
          food_days: 4 # wolf meat helps
        hooks: >-
          Lump's first kill. Rolf's deterioration. The deepest point
          of winter — everything that doesn't kill them makes them thinner.
        word_target: 4500

      # --- Chapter 35 ---
