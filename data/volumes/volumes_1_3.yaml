      # --- Chapter 32 ---
      - chapter: 32
        title: "Midwinter Night"
        template: "CHAP_BARROW"
        time: "Y312, Day 280"
        weather_week: 37
        location: "Thornwall"
        pov: "Lump"
        summary: >-
          The longest night. Every barrow in the Rimevegr glows with pale
          green light. Sleepers wake screaming across six settlements.
          In Thornwall, Lump's dog howls at the door facing the barrow
          hills. Thorne's burn scars split open. Rolf stands at the gate
          staring northeast and will not answer when spoken to. Lump
          stays up all night with an axe he barely knows how to use and
          watches the lights on the hills. Nothing comes. But the
          silence after is worse. Morning breaks grey and the men do not
          speak of what they saw.
        events_referenced:
          - "EVT_312_W15_078" # Midwinter Night — Veil Thinnest
        npcs_present:
          - "Lump"
          - "Thorne"
          - "Rolf"
          - "Voss"
          - "Gest"
          - "Bjorn"
        character_beats:
          lump: >-
            His first midwinter as a free man. In the thrall-pens they
            locked the doors on this night. Here he has an axe and the
            right to stand watch. He's terrified and he doesn't leave
            his post. The barrow lights are the worst thing he has
            ever seen, and he has seen bad things.
          rolf: >-
            Something has reached into Rolf through the barrow dreams.
            He stands facing the lights and his eyes are not right.
            Bjorn has to shake him three times before he comes back.
          thorne: >-
            His scars bleed freely. He wraps them and says the old
            prayers. For the first time, they don't help.
        band_state:
          morale: 1 # mass terror
          treasury: 35
          food_days: 3
        hooks: >-
          The supernatural has announced itself to the entire Rimevegr.
          Rolf is compromised. The Veil is thin. The old war — whatever
          Dalla means by that — is beginning.
        word_target: 5000

