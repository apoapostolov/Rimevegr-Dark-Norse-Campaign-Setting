        pov: "Gest"
        summary: >-
          Iron Grip marches south. Ordovast leads forty men toward
          Deepholm with siege equipment. Sigrun sends riders to every
          unaligned band: fight for the Compact, 80 silver plus a winter
          hall. The Three Wolves offer a non-aggression pact — stay out
