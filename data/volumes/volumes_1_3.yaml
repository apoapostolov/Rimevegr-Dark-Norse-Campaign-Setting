#   Petra: stoic → letter → desperation → hope when band turns south
#   Thorne: hunted → confronted → holmgang → free but scarred
#   Voss:  steady → aging → tested → decisive (barely)
#   Gest:  precise → worried → alarmed → recording everything
#   Rolf:  quiet → dreaming → compromised → pulled toward barrows
#
# Political arc:
#   Spring: tributedemands, agent placement, trade opening
#   Summer: Allthing fails to resolve tensions, alliances courted
#   Autumn: Bone Pack challenge, escalation, food crisis
#   Winter: siege, retreat, Widow expands, map changes
#
# Supernatural arc:
#   Spring: stirring (lights, dead cattle, visions)
#   Summer: spreading (stench, vanishings, dreams)
#   Autumn: erupting (sinkholes, warnings, Dalla's collapse)
#   Winter: manifest (barrows open, midwinter night, Dalla's prophecy)
