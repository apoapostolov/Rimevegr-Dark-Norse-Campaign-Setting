            Maps the political situation for Voss. Three offers on the
            table: Sigrun's alliance, Ordovast's standing offer
            (rejected), and the Wolves' pact. Each has a price. Gest
            presents the numbers. Voss stares at the fire.
          voss: >-
            The choice defines Y313. Accept Sigrun's call and the band
