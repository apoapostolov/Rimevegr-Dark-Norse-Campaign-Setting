      # --- Chapter 36 ---
      - chapter: 36
        title: "The Old War"
        template: "CHAP_BARROW"
        time: "Y312, Days 341-355"
        weather_week: 46
        location: "Thornwall"
        pov: "Lump"
        summary: >-
          Dalla speaks clearly for the first time in weeks: "The barrows
          will not sleep again. The old war is coming back." Word travels
          fast. The supernatural escalation is now public knowledge across
          the Rimevegr. Rolf walks out of Thornwall at dawn and stands
          at the barrow hill for an hour. Lump follows him and brings
          him back. Rolf says: "They know my name." Lump doesn't
          understand yet. The band is gaunt, hard, stripped down to
          bone and will.
        events_referenced:
          - "EVT_312_W22_085" # Dalla's Final Vision
        npcs_present:
          - "Lump"
          - "Rolf"
          - "Thorne"
          - "Voss"
          - "Gest"
        character_beats:
          lump: >-
            Brings Rolf back from the barrow hill. This is new — Lump
            as caretaker, not the cared-for. He has crossed a line. He
            is part of this band now, not a passenger. When Rolf says
            "they know my name," Lump grips his arm and says "I know
            your name too."
          rolf: >-
            Being pulled toward the barrows. The dreams are becoming
            commands. He resists because the band is still real and the
            dead are not, but the margin is shrinking.
          voss: >-
            Hears Dalla's prophecy and says nothing. He's heard
            prophecies before. The difference is this one matches what
            he's seeing.
        band_state:
          morale: 2
          treasury: 35
          food_days: 3
        hooks: >-
          Dalla's prophecy sets the supernatural arc for the entire
          series. Rolf is a ticking timebomb. Lump's role in the band
          has fundamentally shifted.
        word_target: 5000

      # --- Chapter 37 ---
      - chapter: 37
        title: "Thaw Signs"
        template: "CHAP_SURVIVAL"
        time: "Y312, Days 356-360"
        weather_week: 48
        location: "Thornwall"
        pov: "Lump"
        summary: >-
          Ice cracks on the northern fjord. Dripping sounds in the forest.
          The survivors of Year 312 begin to count the days. Lump's dog
          lifts its head at a sound only it can hear — the ice breaking.
          Spring is coming. The band has lost Kell, lost weight, lost
          certainty. But they are alive. Voss gathers the men by the fire
          and makes no speech. He nods at Gest. Gest reads the treasury
          balance: 35 silver. Enough to eat for a week or hire passage
          south. Voss says one word: "South." The Long Dark ends.
        events_referenced:
          - "EVT_312_W23_086" # Spring Thaw Signs
        npcs_present:
          - "Lump"
          - "Voss"
          - "Gest"
          - "Thorne"
          - "Petra"
          - "Bjorn"
          - "Rolf"
        character_beats:
          lump: >-
            One year as a free man. He stands with the band by the fire.
            He is thinner, harder, scarred by winter, haunted by
            midwinter night. But he stands. Nobody calls him thrall
            anymore. They call him Lump, which is his name.
          voss: >-
            "South." One word. The word means: we move toward the war.
            Because the war is where the contracts are. And contracts
            are survival. Voss doesn't want war, but he knows how to
            live through one. That's the only edge he has left.
          petra: >-
            South means closer to her sister. Her eyes change when
            Voss says it. First real hope in months.
          gest: >-
            Reads the numbers. Writes the last entry for Y312 in the
            ledger. Closes the book. Opens a new page for Y313.
        band_state:
          morale: 2
          treasury: 35
          food_days: 3
        hooks: >-
          "South" hooks directly into Volume 4 / Y313. The band is
          marching toward the war — contracts, danger, and Petra's
          sister. Rolf's barrow condition unresolved. Thorne is free
          but changed. Voss has the Widow's intelligence and a decision
          to make. The barrows will not sleep again.
        word_target: 5000

      # --- Epilogue Chapter ---
      - chapter: 38
        title: "The Ledger Closes"
        template: "CHAP_PERSONAL"
        time: "Y312, Day 360"
        weather_week: 48
        location: "Thornwall"
        pov: "Gest"
        summary: >-
          Final coda. Gest alone. He writes the year-end summary in the
          ledger: contracts completed, silver earned and spent, men lost,
          miles marched, meals missed. The arithmetic of survival. He
          lists each man's name and his status. He pauses at Kell's name
          and draws a line through it. He pauses at Lump's name and
          underlines it. The last line in the ledger for Year 312 reads:
          "Band strength: thirteen. Treasury: thirty-five silver. Debts
          outstanding: the living kind. Spring comes. We march."
        events_referenced: []
        npcs_present:
          - "Gest"
        character_beats:
          gest: >-
            The ledger is the story. Every number is a decision, a loss,
            a hard mile. Gest doesn't write poetry — he writes accounts.
            But the accounts are the truest record of what happened.
            When he crosses out Kell's name, his hand is steady. When
            he underlines Lump's, it shakes. Just once.
        band_state:
          morale: 2
          treasury: 35
          food_days: 3
        hooks: >-
          Y313 — the war year. Thirteen fighters, thirty-five silver,
          and the dead waking across the Rimevegr. The Iron Ledger
          continues.
        word_target: 3000

