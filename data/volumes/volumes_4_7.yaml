        events_referenced:
          - "EVT_313_W21_096"
        npcs_present: []
        character_beats:
          thorne: "Full confession. The weight lifts but the danger doesn't."
          voss: "Chooses loyalty over pragmatism. Rare for him."
          gest: "Writes Thorne's debt into the ledger. Makes it official."
        band_state:
          morale: 1
          treasury_silver: 5
          roster: 11
          food_days: 1
        hooks: "Thorne's arc resolved for now. His old warband will come in Y314."
        word_target: 5500

  # ================================================================
  # VOLUME 7 — THE DEAD SING
  # Winter Y313: Deepest Long Dark, supernatural eruption, survival
  # ================================================================
  volume_7:
    title: "The Dead Sing"
    time_span: "Y313, Deep Long Dark through Thaw edge (Days 320–360)"
    chapter_count: 14
    themes:
      - "What survives the longest night"
      - "The supernatural is no longer deniable"
      - "The Widow's offer — salvation with strings"
      - "Endurance as identity"
    band_state_start:
      morale: 1
      reputation: 7
      treasury_silver: 5
      roster: 11
      condition: "Starving, cold, depleted. But still together."
    band_state_end:
      morale: 2
      reputation: 7
      treasury_silver: 8
      roster: 10
      condition: "Alive. Barely. One more loss. Heading into Y314 with the dead awake."

    chapters:
      - chapter: 44
        title: "Midwinter"
        template: "CHAP_SUPERNATURAL"
        time: "Y313, Day 325"
        weather_week: 46
        location: "Black Axes shelter, all Rimevegr"
        pov: "Lump"
        summary: >
          On the longest night, a sound rises from every barrow in the
          Rimevegr — a low, toneless hum that vibrates in the chest. It
          lasts until dawn. No one sleeps. Lump presses his hands over his
          ears and still hears it. The dog howls until its voice breaks.
          In the morning, not a single person in the band speaks. They
          sit by a dead fire and wait for light that barely comes.
        events_referenced:
          - "EVT_313_W22_097"
        npcs_present: []
        character_beats:
          lump: "Hears the dead sing. Understands that the world has changed."
        band_state:
          morale: 0
          treasury_silver: 5
          roster: 11
          food_days: 1
        hooks: "The supernatural can no longer be ignored."
        word_target: 5500

      - chapter: 45
        title: "Silence"
        template: "CHAP_CAMP"
        time: "Y313, Days 326–330"
        weather_week: 47
        location: "Black Axes shelter, Thornwall"
        pov: "Gest"
        summary: >
          The days after the Dead Sing. Quiet drinking at Thornwall — no
          songs, no boasts. Men stare at the fire. Bjorn arm-wrestles Rolf
          and wins; nobody cheers. Gest writes the date in his ledger and
          then cannot think of what else to say. He settles for: "The barrows
          sang. We heard them. We lived." It is the shortest entry he has
          ever made.
        events_referenced:
          - "EVT_313_W23_098"
        npcs_present: []
        character_beats:
          gest: "The record-keeper faces something that does not fit in a ledger."
          bjorn: "Still competing. Still breathing. That passes for hope."
        band_state:
          morale: 1
          treasury_silver: 5
          roster: 11
          food_days: 1
        hooks: "Aftermath of supernatural terror. Band holding together by habit."
        word_target: 4000

      - chapter: 46
        title: "Merte's Secret"
        template: "CHAP_CAMP"
        time: "Y313, Days 330–335"
        weather_week: 47
        location: "Black Axes shelter"
        pov: "Petra"
        summary: >
          Merte recovers enough to talk. She tells Petra what she could not
          say before: the Widow did not just heal her. The Widow gave her a
          message to deliver to Voss — an offer of alliance, terms included.
          Petra realizes the healing was never charity. It was a recruitment
          tool. She tells Voss. Voss does not seem surprised.
        events_referenced:
          - "EVT_313_W11_086"
          - "EVT_313_W24_099"
        npcs_present:
          - "Merte"
        character_beats:
          petra: "Sees the web she walked into. Angry but pragmatic."
          merte: "Carrier of the Widow's message. Ashamed but alive."
          voss: "Knew it was coming. Evaluates the terms coldly."
        band_state:
          morale: 1
          treasury_silver: 5
          roster: 11
          food_days: 1
        hooks: "The Widow's gambit reaches the band. Salvation at a price."
        word_target: 5000

      - chapter: 47
        title: "The Offer Again"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 335–340"
        weather_week: 48
        location: "Black Axes shelter"
        pov: "Voss"
        summary: >
          The Widow's letter arrives: grain and silver through spring in
          exchange for a formal alliance with the Whispering Circle.
          Voss puts it to the band — not because he needs their opinion,
          but because they need to own the decision. Arguments. Gest says
          take it or die. Bjorn says the Widow cannot be trusted. Kell says
          nothing; he is watching to see what Voss does. Voss takes the deal.
        events_referenced:
          - "EVT_313_W24_099"
        npcs_present: []
        character_beats:
          voss: "Chooses survival. Knows the Widow will collect eventually."
          gest: "The pragmatist. Food first, regrets later."
          bjorn: "Dissent again. But follows."
          kell: "Silent. Learning to read power dynamics."
        band_state:
          morale: 1
          treasury_silver: 8
          roster: 11
          food_days: 3
        hooks: "Alliance with the Widow. Survival secured, freedom compromised."
        word_target: 5000

      - chapter: 48
        title: "The Hush Returns"
        template: "CHAP_SUPERNATURAL"
        time: "Y313, Days 340–345"
        weather_week: 49
        named_weather: "WE_020 early signs (The False Thaw)"
        location: "Deepholm area, patrol"
        pov: "Thorne"
        summary: >
          Another Hush descends — no wind, no sound, the snow falls
          straight. Thorne walks the perimeter alone and feels the barrow
          pull stronger than ever. He sees a figure standing at the treeline
          that does not breathe steam. He raises his hand. The figure raises
          its hand. Thorne backs away slowly and tells no one.
        events_referenced:
          - "EVT_313_W22_097"
        npcs_present: []
        character_beats:
          thorne: "The dead are not just watching. They are mirroring. Something recognizes him."
        band_state:
          morale: 1
          treasury_silver: 8
          roster: 11
          food_days: 3
        hooks: "Thorne's supernatural connection deepens. The dead know him."
        word_target: 4500

      - chapter: 49
        title: "Rations"
        template: "CHAP_SURVIVAL"
        time: "Y313, Days 345–350"
        weather_week: 49
        location: "Black Axes shelter"
        pov: "Kell"
        summary: >
          The Widow's first grain shipment arrives — enough for two weeks.
          Kell distributes it carefully, measuring by the handful. He has
          become the man who feeds the band, a role nobody assigned him.
          A fighter — the one with the chronic wheeze — collapses and does
          not get up. Lungs gave out. Roster drops to ten. Kell digs the
          grave himself because the ground is frozen and nobody else has
          the strength.
        events_referenced:
          - "EVT_313_W24_099"
        npcs_present: []
        character_beats:
          kell: "From thief to provider. The transformation is complete."
        band_state:
          morale: 1
          treasury_silver: 7
          roster: 10
          roster_note: "One common fighter dies (chronic illness + starvation)"
          food_days: 5
        hooks: "Roster at 10. Kell's arc inverted — debtor becomes the one who feeds."
        word_target: 4500

      - chapter: 50
        title: "Letters"
        template: "CHAP_DOWNTIME"
        time: "Y313, Days 350–353"
        weather_week: 50
        location: "Black Axes shelter"
        pov: "Gest"
        summary: >
          Gest writes letters he will never send: to his daughter, to a
          woman in Kolvik, to a dead man he wronged twenty years ago. He
          burns them all. Then he opens his ledger and writes the band's
          inventory one more time — ten fighters, eight silver, five days
          of grain, three wounded, one dog. The numbers are the smallest
          yet. But they are alive.
        events_referenced: []
        npcs_present: []
        character_beats:
          gest: "The old man contemplates endings. His letters are his eulogy."
        band_state:
          morale: 1
          treasury_silver: 7
          roster: 10
          food_days: 4
        hooks: "Gest's mortality weighs. The band's survival is its own achievement."
        word_target: 4000

      - chapter: 51
        title: "Petra's Debt"
        template: "CHAP_CAMP"
        time: "Y313, Days 353–355"
        weather_week: 50
        location: "Black Axes shelter"
        pov: "Petra"
        summary: >
          A messenger from the Widow arrives with a note for Petra: the
          favor is named. The Widow wants Petra to carry a sealed letter
          to Sigrun in spring — contents unknown. Petra does not know if it
          is a peace offer or a knife. She shows the note to Voss. Voss
          says do it. Petra says she will, but she will read the letter
          first. Voss does not object.
        events_referenced:
          - "EVT_313_W24_099"
        npcs_present:
          - "Widow's messenger"
        character_beats:
          petra: "Will not be a blind tool. Opens the envelope. Whatever it is, she'll know."
          voss: "Trusts Petra's judgment. A rare concession."
        band_state:
          morale: 1
          treasury_silver: 7
          roster: 10
          food_days: 3
        hooks: "Petra's Widow-debt becomes a Y314 plot thread."
        word_target: 4500

      - chapter: 52
        title: "The Dog"
        template: "CHAP_CAMP"
        time: "Y313, Days 355–356"
        weather_week: 51
        location: "Black Axes shelter"
        pov: "Lump"
        summary: >
          The dog is sick. Lump sits with it through the night while the
          others sleep. It is a small chapter about a small thing — a boy
          and a dog in the dark. But the dog is the only creature in the
          band that has never lied to anyone, and Lump knows that if it
          dies, something in the band dies with it. The dog survives.
          Barely. Like everything else.
        events_referenced: []
        npcs_present: []
        character_beats:
          lump: "Tenderness in the dark. His humanity measured by what he cares for."
        band_state:
          morale: 1
          treasury_silver: 7
          roster: 10
          food_days: 3
        hooks: "Quiet chapter before the end. The small stakes holding everything together."
        word_target: 3500

      - chapter: 53
        title: "False Thaw"
        template: "CHAP_TRAVEL"
        time: "Y313, Days 356–358"
        weather_week: 51
        named_weather: "WE_020 (The False Thaw)"
        location: "Deepholm outskirts"
        pov: "Voss"
        summary: >
          Temperatures rise. Snow softens. Hope flickers. Then a sleet storm
          drops on the final week — winter's last spite. Voss walks the
          camp perimeter at dawn and counts: ten fighters, one wounded
          shepherd, one old man, one boy who is not a boy anymore, and
          a sick dog. He knows these numbers better than his own name.
          This is what the war year left him.
        events_referenced:
          - "EVT_313_W25_100"
        npcs_present: []
        character_beats:
          voss: "Counts what remains. Assessment without self-pity."
        band_state:
          morale: 1
          treasury_silver: 7
          roster: 10
          food_days: 2
        hooks: "Winter's last blow. The year is almost over."
        word_target: 4500

      - chapter: 54
        title: "Lump's Question"
        template: "CHAP_CAMP"
        time: "Y313, Day 358"
        weather_week: 51
        location: "Black Axes shelter"
        pov: "Lump"
        summary: >
          Lump asks Voss: "What happens next year?" Voss says: "We rebuild."
          Lump says: "What about the dead?" Voss has no answer. Gest says:
          "We bury our own and hope the rest stay buried." Nobody believes
          that will be enough. But it is something to say.
        events_referenced: []
        npcs_present: []
        character_beats:
          lump: "Asks the question the adults avoid. Has become the band's conscience."
          voss: "'We rebuild.' The only answer he has."
          gest: "Gallows humor. The old man copes through words."
        band_state:
          morale: 1
          treasury_silver: 7
          roster: 10
          food_days: 2
        hooks: "Direct hook into Y314 — reconstruction, but the dead are awake."
        word_target: 3500

      - chapter: 55
        title: "First Crack"
        template: "CHAP_INTERLUDE"
        time: "Y313, Days 358–360"
        weather_week: 51
        location: "Deepholm fjord"
        pov: "Gest"
        summary: >
          The first crack of melting ice echoes across the fjord. Year 313
          ends as it began — with thawing dead and the promise that what
          comes next will be worse. Gest opens his ledger to a fresh page
          and writes "Year 314" at the top. He does not write anything else.
          The page waits. The ice groans. Somewhere in the dark, the barrows
          hum.
        events_referenced:
          - "EVT_313_W25_100"
        npcs_present: []
        character_beats:
          gest: "Opens a new page. The act of beginning again is the act of survival."
        band_state:
          morale: 2
          treasury_silver: 8
          roster: 10
          food_days: 3
        hooks: >
          Volume 7 closes with: band at 10 (down from 13), allied with the
          Widow, Petra carrying a sealed message for Sigrun, Thorne's old
          warband coming in Y314, Kell redeemed but scarred, Voss's past
          still unresolved, barrow army growing, the dead sang at midwinter
          and no one knows what it means. Y314 opens with reconstruction —
          but the worst supernatural threat is ahead.
        word_target: 4500

      - chapter: 56
        title: "Ledger Entry"
        template: "CHAP_EPILOGUE"
        time: "Y313, Day 360"
        weather_week: 51
        location: "Black Axes shelter"
        pov: "Gest"
        summary: >
          A final ledger entry. Gest writes the year's totals: three dead,
          forty-seven battles or skirmishes witnessed, one warband destroyed,
          two alliances made and one broken, seventeen named weather events,
          and an amount of silver that would not buy a decent horse. He
          closes the book. The band sleeps. The ice cracks. Year 314 begins
          in the dark.
        events_referenced: []
        npcs_present: []
        character_beats:
          gest: "The final count. The band's memory closes the book on the worst year."
        band_state:
          morale: 2
          reputation: 7
          treasury_silver: 8
          roster: 10
          food_days: 3
        hooks: >
          Y314 hooks: Petra's sealed letter to Sigrun, Thorne's old warband
          arriving, the Widow's alliance terms, barrow army mobilizing,
          Kell's new role as provider, Lump's emerging voice, Voss's
          unresolved past, Gest's aging body, reconstruction on a starving
          land, and the dead who sang at midwinter — still singing.
        word_target: 3000

