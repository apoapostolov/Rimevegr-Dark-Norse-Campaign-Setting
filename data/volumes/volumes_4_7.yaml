# Iron Ledger — Volume Outlines: Volumes 4–7
# Year 313 (The War Year) — 57 chapters across 4 volumes.
# Covers spring mobilization through deepest Long Dark.
# Canonical event/weather IDs reference y313_events.yaml,
# personal_band_events.yaml, weather_history.yaml, named_events.yaml.

volumes_4_7:
  # ================================================================
  # VOLUME 4 — THE IRON HOST
  # Spring Y313: War preparations, choosing sides, old debts surfacing
  # Band enters at morale ~3, rep ~5, roster 13, treasury moderate
  # ================================================================
  volume_4:
    title: "The Iron Host"
    time_span: "Y313, Thaw through Long Sun (Days 1–60)"
    chapter_count: 14
    themes:
      - "War mobilization and the cost of neutrality"
      - "Debts — silver, blood, and honor — come due"
      - "The land itself reveals what was buried"
      - "Choosing whom to serve when every option costs"
    band_state_start:
      morale: 3
      reputation: 5
      treasury_silver: 35
      roster: 13
      condition: "Battered. Two fighters with frostbite injuries. Stores thin."
    band_state_end:
      morale: 3
      reputation: 5
      treasury_silver: 28
      roster: 13
      condition: "Committed to a side. Provisions low. War approaching."

    chapters:
      - chapter: 1
        title: "Frozen Dead"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 1–3"
        weather_week: 1
        named_weather: "WE_009 (The Blood Thaw)"
        location: "Deepholm outskirts"
        pov: "Lump"
        summary: >
          Spring thaw melts the snow around Deepholm and reveals frozen
          corpses from Ordovast's winter siege — stacked in drifts, half-eaten
          by foxes. Lump helps a burial detail and counts the dead aloud
          because nobody else will. The meltwater runs red through the camp
          ditches. Ravens arrive in hundreds. Lump understands for the first
          time what war leaves behind.
        events_referenced:
          - "EVT_313_S01_001"
        npcs_present:
          - "Sigrun (distant — orders burial parties from the wall)"
        character_beats:
          lump: "No longer looks away from the dead. Counts them. Growing up."
          gest: "Watches Lump work. Approves quietly."
        band_state:
          morale: 3
          treasury_silver: 35
          roster: 13
          food_days: 14
        hooks: "The scale of Ordovast's failed siege foreshadows what comes next."
        word_target: 5000

      - chapter: 2
        title: "The Ledger"
        template: "CHAP_DOWNTIME"
        time: "Y313, Days 4–10"
        weather_week: 1
        location: "Black Axes camp, Thornwall"
        pov: "Gest"
        summary: >
          Voss orders a full count of silver, weapons, and rations. Gest
          tallies everything in his charcoal ledger. The numbers are thin:
          twelve days of grain, six of salt meat, two fighters limited by
          frostbite. Voss says nothing but his jaw sets. Meanwhile, Ordovast
          regroups at Grimholt and executes two officers for cowardice.
        events_referenced:
          - "EVT_313_S02_002"
          - "EVT_313_S05_005"
        npcs_present: []
        character_beats:
          gest: "Confronts the arithmetic of survival. One last good winter feels impossible."
          voss: "Reads the ledger twice. Makes no promises."
        band_state:
          morale: 3
          treasury_silver: 35
          roster: 13
          food_days: 12
        hooks: "The band's finances establish urgency — they need a contract or a patron."
        word_target: 4500

      - chapter: 3
        title: "Barrow Cracks"
        template: "CHAP_TRAVEL"
        time: "Y313, Days 11–15"
        weather_week: 2
        named_weather: "WE_010 (The Siege Fog)"
        location: "Vargheim, then south toward Thornwall"
        pov: "Thorne"
        summary: >
          Thorne scouts the northern trail and passes near Vargheim. The
          split barrow has widened over winter — green light pulses nightly.
          Shepherds refuse to graze within a league. Thorne feels the old
          pull in his chest, the thing he does not name. He pushes south toward
          the band. At Thornwall, Voss orders three hired men to hold a bridge
          during a retreat from Iron Grip scouts. None survive.
        events_referenced:
          - "EVT_313_S06_006"
          - "EVT_313_PER_001"
        npcs_present: []
        character_beats:
          thorne: "The barrows unsettle him more than he admits. His nightmares worsen."
          voss: "Sacrifices expendables without flinching. The cost registers later."
        band_state:
          morale: 2
          treasury_silver: 34
          roster: 13
          food_days: 10
        hooks: "Supernatural thread established. Voss's ruthlessness noted."
        word_target: 5000

      - chapter: 4
        title: "Wolf Tracks"
        template: "CHAP_TRAVEL"
        time: "Y313, Days 15–19"
        weather_week: 3
        location: "Feldwick approach, patrol territory"
        pov: "Petra"
        summary: >
          The Three Wolves probe south, testing how far the Black Axes
          patrol. Petra spots their scouts first — boot prints, cold fire
          pits, a broken branch at eye height. She tracks their movements
          for two days and reports to Voss. Then Petra slips away alone to
          a burned farmstead where her sister was last reported and sifts
          through ashes until her fingers crack. She finds a bronze hair-pin.
        events_referenced:
          - "EVT_313_S08_008"
          - "EVT_313_PER_007"
        npcs_present:
          - "Hadric's scouts (unseen)"
        character_beats:
          petra: "Competence in the field masks private grief. The hair-pin could be Merte's."
        band_state:
          morale: 3
          treasury_silver: 34
          roster: 13
          food_days: 9
        hooks: "Three Wolves as future threat. Petra's sister arc deepens."
        word_target: 5000

      - chapter: 5
        title: "Half-Share"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 19–22"
        weather_week: 3
        location: "Black Axes camp"
        pov: "Kell"
        summary: >
          Voss settles Kell's debts publicly. The total owed is read aloud
          in front of the whole band — a deliberate humiliation that also
          protects Kell from worse. Half-share until paid, no more dice.
          That night, Gest's ledger shows eight marks missing from the common
          chest. Kell avoids eye contact. He repays five within a week,
          claiming he found them. The other three remain a silent accusation.
        events_referenced:
          - "EVT_313_S09_009"
          - "EVT_313_PER_004"
        npcs_present: []
        character_beats:
          kell: "Shame and defiance in equal measure. Steals to survive, hates himself for it."
          gest: "Counts twice. Tells Voss quietly. The old accountant's disappointment is worse than anger."
          voss: "Public discipline. Private silence. Doubles the watch on stores."
        band_state:
          morale: 2
          treasury_silver: 31
          roster: 13
          food_days: 8
        hooks: "Kell's debt arc established as both personal shame and band-trust erosion."
        word_target: 4500

      - chapter: 6
        title: "Dalla's Feet"
        template: "CHAP_INTERLUDE"
        time: "Y313, Days 25–28"
        weather_week: 4
        location: "Ashen Reach (reported), Black Axes camp"
        pov: "Lump"
        summary: >
          Word reaches the band that Dalla was found walking barefoot in the
          mud outside Ashen Reach at dawn — no memory, feet unmarked.
          Meanwhile, a mudslide buries three houses at Moor's End. Twelve
          dead. Lump hears both stories from a trader and asks Gest what it
          means when the dead walk and the living bury. Gest has no good answer.
          Petra decides to stay with the band rather than leave for the south.
        events_referenced:
          - "EVT_313_S12_012"
          - "EVT_313_S11_011"
          - "EVT_313_S14_014"
        npcs_present:
          - "Dalla (reported only)"
        character_beats:
          lump: "Asks the right questions. No longer content to observe."
          petra: "Chooses loyalty to the band over personal mission — for now."
        band_state:
          morale: 2
          treasury_silver: 30
          roster: 13
          food_days: 7
        hooks: "Supernatural and natural disasters converging. Petra's commitment tested."
        word_target: 4000

      - chapter: 7
        title: "The Offer"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 29–37"
        weather_week: 5
        location: "Black Axes camp, Feldwick"
        pov: "Voss"
        summary: >
          Feldwick elders arrive at camp and offer 25 silver plus lodging
          for a season of patrol against the Three Wolves. A good deal.
          But Thorne returns from a holmgang with a fresh scar — the
          collector is dead, the blood-debt is not. And Ordovast demands
          renewed oaths from his vassals. The political ground is shifting.
          Voss takes the Feldwick contract as a stopgap but knows it puts
          the band in the Wolves' path.
        events_referenced:
          - "EVT_313_S15_015"
          - "EVT_313_S18_018"
          - "EVT_313_S10_010"
        npcs_present:
          - "Feldwick elders"
        character_beats:
          voss: "Takes the contract that buys time but narrows options."
          thorne: "Returns bloody. The debt follows him. His hands shake when he thinks the band isn't looking."
        band_state:
          morale: 3
          treasury_silver: 38
          roster: 13
          food_days: 12
        hooks: "Feldwick contract as stepping stone to the larger war choice."
        word_target: 5500

      - chapter: 8
        title: "Night Terrors"
        template: "CHAP_CAMP"
        time: "Y313, Days 39–45"
        weather_week: 6
        location: "Feldwick patrol camp"
        pov: "Thorne"
        summary: >
          Thorne screams in his sleep and speaks in a language no one
          recognises. Rolf tries to shake him awake and Thorne nearly
          breaks his arm. The spring fair at Skaldhaven draws fewer traders
          and more armed men — two brawls before noon. A second barrow opens
          at Ashmark: a farmer's plough breaks through into a burial chamber.
          Cold air rushes up. The Widow places an agent in Raven's Perch.
        events_referenced:
          - "EVT_313_PER_010"
          - "EVT_313_S19_019"
          - "EVT_313_S22_022"
          - "EVT_313_S20_020"
        npcs_present:
          - "Pale Widow's agent (reported)"
        character_beats:
          thorne: "The nightmares are getting worse. Something beneath is calling him."
          rolf: "Wary of Thorne now. Sleeps with his knife."
        band_state:
          morale: 2
          treasury_silver: 38
          roster: 13
          food_days: 11
        hooks: "Supernatural pressure on Thorne. Widow's web expanding."
        word_target: 5000

      - chapter: 9
        title: "Conscript Smoke"
        template: "CHAP_TRAVEL"
        time: "Y313, Days 48–55"
        weather_week: 7
        location: "Grimholt road, Ashmark"
        pov: "Gest"
        summary: >
          Ordovast conscripts one in five able men from each vassal settlement.
          The band sees the evidence on the road: thin men marching north
          with spears they do not know how to hold. Ashmark sends half the
          demanded count. Late snow buries the trails for three days. Gest
          writes in his ledger that the war will come whether they choose a
          side or not.
        events_referenced:
          - "EVT_313_S23_023"
          - "EVT_313_S21_021"
        npcs_present: []
        character_beats:
          gest: "The band's memory sees the pattern. War eats everything, starts with the weakest."
        band_state:
          morale: 2
          treasury_silver: 36
          roster: 13
          food_days: 8
        hooks: "Conscription shows the war machine grinding. Time running out for neutrality."
        word_target: 4500

      - chapter: 10
        title: "Ashes and Bone"
        template: "CHAP_INVESTIGATION"
        time: "Y313, Days 55–59"
        weather_week: 8
        location: "Skaldhaven, then Black Axes camp"
        pov: "Voss"
        summary: >
          Voss visits Skaldhaven and asks about the one-armed man — who
          killed him, and why. Nobody talks. An innkeeper goes pale and shuts
          the door. Voss returns to camp where Gest reports the numbers:
          twelve days of grain, six of salt meat. The band needs a contract
          or a patron within the month.
        events_referenced:
          - "EVT_313_S24_024"
          - "EVT_313_S25_025"
        npcs_present: []
        character_beats:
          voss: "His past is catching up. The silence in Skaldhaven tells him more than words would."
        band_state:
          morale: 2
          treasury_silver: 33
          roster: 13
          food_days: 6
        hooks: "Voss's personal mystery intensifies. Band finances at crisis point."
        word_target: 4500

      - chapter: 11
        title: "War Clouds"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 60–64"
        weather_week: 9
        location: "Deepholm approach"
        pov: "Lump"
        summary: >
          Sigrun proclaims the summer Allthing at Deepholm — peace-shields
          required, war certain. Ordovast marches eighty men south from
          Grimholt with siege equipment and a month of grain. Lump sees
          the column from a ridge: wagons, spears, dust. He counts them
          the way Gest taught him. The Compact fortifies and levies a war tax.
        events_referenced:
          - "EVT_313_U01_026"
          - "EVT_313_U02_027"
          - "EVT_313_S16_016"
        npcs_present:
          - "Ordovast (distant column)"
          - "Sigrun (reported)"
        character_beats:
          lump: "Counts the enemy. Understands arithmetic as threat assessment."
        band_state:
          morale: 2
          treasury_silver: 33
          roster: 13
          food_days: 5
        hooks: "War begins in earnest. The band cannot stay on the sideline."
        word_target: 5000

      - chapter: 12
        title: "The Choice"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 66–73"
        weather_week: 10
        named_weather: "WE_012 (The Dry Weeks)"
        location: "Black Axes camp, near Deepholm"
        pov: "Voss"
        summary: >
          Both sides send riders. Ordovast offers 80 silver a month. Sigrun
          offers 60 plus winter hall. Neutrality is no longer possible — the
          Three Wolves have already sold their swords to the Iron Grip.
          Voss sits with Gest and weighs silver against survival. He chooses
          the Compact: less coin, but a roof and the trade network. Bjorn
          argues for the Iron Grip in front of the band. Voss lets him speak,
          then overrules. The silence after is the kind that breaks bands.
        events_referenced:
          - "EVT_313_U06_031"
          - "EVT_313_U09_034"
          - "EVT_313_PER_002"
        npcs_present:
          - "Iron Grip rider"
          - "Compact rider"
        character_beats:
          voss: "The pivotal decision. Chooses survival over profit. Knows it may not be enough."
          bjorn: "Openly challenges Voss. Follows anyway. The damage lingers."
          gest: "Supports the choice. Writes the terms in the ledger."
        band_state:
          morale: 2
          treasury_silver: 33
          roster: 13
          food_days: 4
        hooks: "Band commits to the Compact. Burns the bridge to Ordovast."
        word_target: 6000

      - chapter: 13
        title: "First Blood"
        template: "CHAP_BATTLE"
        time: "Y313, Days 71–75"
        weather_week: 10
        location: "Southern Pass, Deepholm"
        pov: "Kell"
        summary: >
          The Iron Grip vanguard hits the Compact palisade at the southern
          pass. Eighteen dead on both sides. Kell fights in the front rank
          and kills a man for the first time since joining the band — an
          act that costs him something he cannot name. The pass holds, but
          barely. Dalla speaks in tongues at Ashen Reach.
        events_referenced:
          - "EVT_313_U05_030"
          - "EVT_313_U07_032"
        npcs_present:
          - "Compact defenders"
          - "Iron Grip vanguard"
        character_beats:
          kell: "Kills for the group. Redemption through violence — the only currency the band accepts."
        band_state:
          morale: 2
          treasury_silver: 33
          roster: 13
          food_days: 4
        hooks: "First taste of the war proper. The pass held — next time may be different."
        word_target: 5500

      - chapter: 14
        title: "The Allthing Burns"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 75–80"
        weather_week: 11
        location: "Deepholm"
        pov: "Gest"
        summary: >
          The Allthing convenes with armed camps on three sides. Ordovast
          demands submission. Sigrun demands withdrawal. The Widow proposes
          arbitration. Nobody agrees. A Grimholt retainer stabs a Compact
          dock worker over a stolen ale horn — the peace-shield shatters.
          The Allthing dissolves in shouting. Gest records it all. Three
          Wolves pledge to the Iron Grip. War is now official.
        events_referenced:
          - "EVT_313_U08_033"
          - "EVT_313_U15_040"
          - "EVT_313_U09_034"
        npcs_present:
          - "Sigrun"
          - "Ordovast"
          - "Pale Widow"
          - "Hadric"
        character_beats:
          gest: "Records the death of peace in his ledger. Knows what comes next."
        band_state:
          morale: 2
          treasury_silver: 35
          roster: 13
          food_days: 6
        hooks: "Allthing collapse marks the point of no return. Volume ends on the brink of full war."
        word_target: 5000

  # ================================================================
  # VOLUME 5 — THE MARCH SOUTH
  # Summer Y313: War ignites, alliances tested, first major battles
  # ================================================================
  volume_5:
    title: "The March South"
    time_span: "Y313, Long Sun through early Harvest (Days 80–140)"
    chapter_count: 14
    themes:
      - "War as economics — who pays, who bleeds, who profits"
      - "Loyalty tested under fire"
      - "Family obligations vs band obligations"
      - "The Widow plays both sides"
    band_state_start:
      morale: 2
      reputation: 5
      treasury_silver: 35
      roster: 13
      condition: "Committed to Compact. Feldwick contract expired. War footing."
    band_state_end:
      morale: 2
      reputation: 6
      treasury_silver: 22
      roster: 12
      condition: "Bloodied. One fighter lost at Deepholm Gate. War economy bites."

    chapters:
      - chapter: 15
        title: "Trade Collapse"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 80–85"
        weather_week: 12
        location: "Deepholm"
        pov: "Gest"
        summary: >
          With armies between Grimholt and Deepholm, no merchant dares the
          overland route. Coastal shipping triples in price. Inland settlements
          starve. Gest tracks the numbers: food prices, silver flow, days
          until the band cannot eat. Kell proves himself in a skirmish,
          dragging a wounded fighter to safety under arrow fire. Nobody
          mentions his debts that evening.
        events_referenced:
          - "EVT_313_U10_035"
          - "EVT_313_U11_036"
        npcs_present: []
        character_beats:
          gest: "Watches the economy die. His ledger becomes a record of loss."
          kell: "Earns respect the hard way. Blood atones where silver cannot."
        band_state:
          morale: 2
          treasury_silver: 32
          roster: 13
          food_days: 5
        hooks: "Economic collapse accelerates. Kell's redemption advances."
        word_target: 5000

      - chapter: 16
        title: "Dead Eyes"
        template: "CHAP_CAMP"
        time: "Y313, Days 85–90"
        weather_week: 12
        location: "Feldwick barrow, then camp"
        pov: "Thorne"
        summary: >
          Sentries at the Feldwick barrow report a figure standing in the
          entrance at midnight — it does not breathe, it watches. Thorne
          volunteers for the watch and sees it himself. He does not speak of
          what he felt. The Red Tide attacks the undefended coast at Bleakwater.
          The Widow feeds intelligence to both sides.
        events_referenced:
          - "EVT_313_U12_037"
          - "EVT_313_U13_038"
          - "EVT_313_U14_039"
        npcs_present:
          - "Wulfgar (reported)"
          - "Pale Widow (reported)"
        character_beats:
          thorne: "Drawn to the barrows. His connection to the dead is growing."
        band_state:
          morale: 2
          treasury_silver: 32
          roster: 13
          food_days: 4
        hooks: "Supernatural escalation. The dead observe the living."
        word_target: 4500

      - chapter: 17
        title: "Sister"
        template: "CHAP_SETTLEMENT"
        time: "Y313, Days 91–97"
        weather_week: 13
        location: "Black Axes camp"
        pov: "Petra"
        summary: >
          A gaunt woman appears at camp claiming to be Petra's sister Merte.
          She has walked five weeks. She says men burned her village looking
          for Petra. The reunion is not joyful — it is urgent, exhausted,
          and threaded with guilt. Merte is in someone's debt. She will not
          say whose. Bjorn and Rolf argue openly about which faction to support.
        events_referenced:
          - "EVT_313_U16_041"
          - "EVT_313_U22_047"
        npcs_present:
          - "Merte (Petra's sister)"
        character_beats:
          petra: "Relief and dread. Her sister is alive but brings trouble."
          merte: "Thin, scared, hiding something. The Widow's shadow on her."
          bjorn: "Tests Voss publicly. The band's unity frays."
        band_state:
          morale: 2
          treasury_silver: 30
          roster: 13
          food_days: 4
        hooks: "Merte's debt to the Widow positions Petra for winter crisis."
        word_target: 5500

      - chapter: 18
        title: "The Gate, Part I"
        template: "CHAP_BATTLE"
        time: "Y313, Day 100 (dawn)"
        weather_week: 14
        named_weather: "WE_011 aftermath"
        location: "Deepholm Gate"
        pov: "Lump"
        summary: >
          Ordovast assaults Deepholm's main gate at dawn with rams and fire.
          Lump is in the second rank behind the palisade, holding a spear he
          barely knows how to use. The noise is beyond anything he imagined.
          A ram hits the gate and the timbers crack. Men die on both sides.
          Lump holds his ground because there is nowhere to go.
        events_referenced:
          - "EVT_313_U17_042"
        npcs_present:
          - "Ordovast (leading assault)"
          - "Sigrun (commanding defense)"
        character_beats:
          lump: "First real battle. Survives through stubbornness, not skill."
        band_state:
          morale: 2
          treasury_silver: 30
          roster: 13
          food_days: 3
        hooks: "Battle of Deepholm Gate — first of three chapters."
        word_target: 6000

      - chapter: 19
        title: "The Gate, Part II"
        template: "CHAP_BATTLE"
        time: "Y313, Day 100 (midday)"
        weather_week: 14
        location: "Deepholm Gate"
        pov: "Voss"
        summary: >
          The gate cracks but does not fall. Voss leads the Black Axes into
          the breach to hold it while timbers are braced. He fights with
          the cold precision that earned his name. Forty dead when the
          assault breaks. Voss counts his people: twelve standing, one badly
          wounded. A common fighter — the young farmer's son — took a spear
          through the gut. He dies before dark.
        events_referenced:
          - "EVT_313_U17_042"
        npcs_present:
          - "Ordovast's officers"
          - "Compact defenders"
        character_beats:
          voss: "Commands under fire. Cold, effective, and paying the price."
        band_state:
          morale: 1
          treasury_silver: 30
          roster: 12
          roster_note: "One common fighter KIA at the Gate"
          food_days: 3
        hooks: "First band casualty of the war. Roster drops to 12."
        word_target: 6000

      - chapter: 20
        title: "The Gate, Part III"
        template: "CHAP_AFTERMATH"
        time: "Y313, Days 101–106"
        weather_week: 15
        location: "Deepholm, inside the walls"
        pov: "Kell"
        summary: >
          Aftermath of the battle. The band buries their dead. War economy
          bites: iron costs triple, a sword costs what a cow did last spring.
          Kell patches armor with leather and tries not to think about the
          man whose gear he is wearing. A violent thunderstorm floods the siege
          camp and both armies hunker in mud for two days. Ordovast offers
          terms; Sigrun burns them.
        events_referenced:
          - "EVT_313_U18_043"
          - "EVT_313_U19_044"
          - "EVT_313_U21_046"
        npcs_present:
          - "Sigrun"
        character_beats:
          kell: "Wears a dead man's gear. Starts becoming the fighter the band needs."
        band_state:
          morale: 2
          treasury_silver: 25
          roster: 12
          food_days: 5
        hooks: "Ordovast's terms rejected. The siege will continue."
        word_target: 5000

      - chapter: 21
        title: "Old Name"
        template: "CHAP_CAMP"
        time: "Y313, Days 106–114"
        weather_week: 16
        location: "Deepholm outskirts"
        pov: "Thorne"
        summary: >
          During fighting, a wounded enemy calls Thorne by his old name.
          Two band members hear it. At night, Thorne sits apart from the
          fire and Petra asks him once if he is all right. He says yes.
          He is lying. Kell sells route information to a merchant syndicate
          for twelve marks. Not exactly betrayal — but not loyalty either.
        events_referenced:
