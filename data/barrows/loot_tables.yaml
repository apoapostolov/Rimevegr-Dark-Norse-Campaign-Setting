        curse: null
        description: "A solid gold arm-ring the size of a man's bicep — not jewelry, but a portable treasure. It was the war-chest of Jarl Eiríkr Bloodmouth, who melted down the treasures of three raided monasteries into a single ring so he could carry his wealth into battle. Eiríkr drowned when his ship sank in a storm. The ring was recovered from his barrow by the band that buried him — and put back when four of them killed each other arguing over it."
        image_prompt: "A massive solid gold arm-ring with crude monastery-melted texture, sitting on a stone plinth in a vault, too heavy for one hand."
