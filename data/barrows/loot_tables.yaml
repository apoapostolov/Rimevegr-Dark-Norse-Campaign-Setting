        description: "A circlet of blackened iron studded with amber and carved with a continuous rune-band that reads 'I RULE THE RESTLESS.' It was worn by Vargr Corpse-King, the draugr-lord of the Whispering Barrow, who commanded the dead of the Rimevegr for eighty years before the last warband put him down. The crown still hums with authority. Putting it on is easy. The hard part is remembering you are still alive."
        image_prompt: "A blackened iron circlet studded with amber and carved with rune-bands, resting on a dark stone, dim light reflected in the amber."

      - id: "LOOT_T4_020"
