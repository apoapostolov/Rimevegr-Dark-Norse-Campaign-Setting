        description: "A spectacle-guarded helm with oddly shaped eye holes — too narrow, like slits. Made for a warrior named Glumr who lost his eyes in battle but kept fighting, guided by the helm. The story goes that he saw better blind than he ever did sighted. The helm shows you everything in the dark. It takes the light away in exchange."
        image_prompt: "A spectacle-guarded iron helm with narrow slit eye holes, dark and angular, on a stone shelf in a deep barrow vault."

