        description: "A broad-headed axe with a silver-inlaid blade and a grip wrapped in red-stained leather. It was Raðulfr the Silent's weapon — a headsman who executed over one hundred men for the jarls of three holds. He never spoke after the first year of his service. The axe cuts men easily. Too easily. It makes everything feel like execution."
        image_prompt: "A broad-headed axe with silver inlay and red-stained leather grip, the blade edge unnervingly clean, resting on a stone block."

