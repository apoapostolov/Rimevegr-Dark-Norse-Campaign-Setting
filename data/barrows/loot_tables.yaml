      - id: "LOOT_T4_011"
        name: "Cursed Helm — 'Dauðasjón' (Death Sight)"
        type: "cursed"
        value_silver: 90
        weight_kg: 2.5
        condition: "good"
        mechanical_effect: "Wearer can see in complete darkness. Can see through illusions and seidr concealment."
        curse:
          name: "The Price of Sight"
          trigger: "Worn in complete darkness"
          effect: "In daylight afterward, all colors appear washed out and painful. -1 NIM in daylight for d6 hours. After 5 uses: permanent -1 to NIM in daylight unless removed for a full month."
