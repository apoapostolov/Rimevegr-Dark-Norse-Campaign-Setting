# Iron Ledger — Barrow Loot Tables
# Tiered loot system for barrow exploration.
# Silver economy reference: meal=1s, seax=8s, good sword=30-50s, mail shirt=100s, ship=500+s.
# Condition multiplier: poor=25%, fair=50%, good=75%, excellent=100%, pristine=125%.

loot_tables:
  # ========================================================================
  # TIER 1 — COMMON GRAVE GOODS  (~35 items)
  # Found in minor burials, collapsed barrows, outer chambers of larger mounds.
  # ========================================================================
  tier_1:
    name: "Common Grave Goods"
    description: "Found in minor burials, collapsed barrows, and the outer chambers of larger mounds. The dead here were farmers, thralls, and the unremarkable."
