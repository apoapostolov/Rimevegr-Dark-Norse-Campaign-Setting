        curse: null
        description: "A bearded axe with a good head, the edge nicked but holdable. The ash haft is dry but sound. Clean the rust off and it kills just fine."
        image_prompt: "A bearded axe with a dark iron head and dry ash haft, rust along the beard, laid across a stone-lined grave shelf."

