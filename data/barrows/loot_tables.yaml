  # ========================================================================
  # TIER 4 — LEGENDARY ARTIFACTS  (~20 items)
  # Unique, named items. Each has a story.
  # ========================================================================
  tier_4:
    name: "Legendary Artifacts"
    description: "The deepest chambers hold things that should not exist — weapons with names older than the barrow, objects of seidr that remember their makers, and treasures that have already ruined everyone who owned them. Taking these is never simple."
    items:
      - id: "LOOT_T4_001"
        name: "Járnbítr — 'Iron Biter'"
        type: "weapon"
        value_silver: 200
        weight_kg: 1.3
        condition: "excellent"
        mechanical_effect: "+2 damage. Ignores 1 point of armor. Never rusts."
        curse: null
        description: "A sword forged by the dwarf-smith Valbrand three hundred years ago, commissioned by a jarl who paid with his youngest son. The blade has never dulled. The pattern-welding shows a serpent that seems to move when the steel catches light. Járnbítr cut through Skaggi Halfhand's shield and arm in a single stroke at the Battle of the Red Shore — the last time anyone drew it in anger."
        image_prompt: "A pattern-welded sword with a serpentine design in the blade steel, bronze hilt with amber pommel, on dark fur in a stone vault."

      - id: "LOOT_T4_002"
        name: "The Gothi's Skull"
        type: "seidr_object"
        value_silver: 150
        weight_kg: 1.2
        condition: "good"
        mechanical_effect: "Once per day, ask one question of the dead gothi's spirit. WYR 3+ to hear the answer. Failure: the skull screams and all undead within 100 paces awaken."
        curse: null
        description: "The skull of Arnfinnr the Seer, who could walk between worlds. His jaw is bound shut with silver wire. Someone wired it shut after he died — because he kept talking. The eye sockets are filled with black pitch, and runes are carved into the brow. Arnfinnr answers questions, but his answers always serve his own purposes."
        image_prompt: "A human skull with silver wire binding the jaw shut, black pitch filling the eye sockets, runes carved into the brow bone."

      - id: "LOOT_T4_003"
        name: "Ulfhednar Pelt"
        type: "armor"
        value_silver: 120
        weight_kg: 6.0
        condition: "good"
        mechanical_effect: "+2 armor. +2 Intimidation. Wearer adds +1 MIG in combat but must make WIL test to disengage from a fight."
        curse: null
        description: "The wolf-skin battle mantle of Kveldulf 'Evening Wolf,' a berserkr who raided the Rimevegr coast for twelve winters. He killed thirty-one men in single combat before the Frostfjord huscarls cornered him in a burning hall. The pelt is dark grey, almost black, and smells of musk and blood no matter how many times it is washed. Men who wear it do not sleep easily."
        image_prompt: "A dark grey-black wolf skin mantle with the head forming a hood, the teeth bared, spread over a stone sarcophagus."

      - id: "LOOT_T4_004"
        name: "Blóðsteinn — 'Blood Stone'"
        type: "rune_item"
        value_silver: 180
        weight_kg: 4.0
        condition: "excellent"
        mechanical_effect: "Rune-stone of warding. Setting it at a camp entrance forces all undead to make WIL test to cross the line. Activation: blood price (d4 HP from the setter) and WYR 2+ test."
        curse: null
        description: "A granite standing stone the size of a man's torso, carved with interlocking ward-runes on all four faces. It was cut by the rune-master Skaldvé for the defense of Grimholt during the Corpse-Tide of Year 289 — when the dead rose from every barrow within three days' walk. The stone held the door for nine nights. The runes are stained brown. The blood-price was paid many times."
        image_prompt: "A granite stone carved with interlocking runes on all faces, brown stains in the rune grooves, standing in a stone vault."

      - id: "LOOT_T4_005"
        name: "Hrafnklór — 'Raven Claw'"
        type: "weapon"
        value_silver: 160
        weight_kg: 1.8
        condition: "excellent"
        mechanical_effect: "+1 damage, +1 to hit. On a critical hit, target bleeds for d4 additional damage per round until treated."
        curse: null
        description: "A bearded axe with a blade curved like a raven's talon. The head is inlaid with silver knotwork depicting Huginn and Muninn. Forged for the huscarl captain Thrain Kol, who used it to execute twelve oathbreakers at the Althing of Year 278. The axe has a reputation: people who see it know what it was made for."
        image_prompt: "A bearded axe with a raven-talon curved blade, silver knotwork inlay showing two ravens, the haft wrapped in black leather."

      - id: "LOOT_T4_006"
        name: "Seidr Thread Spool"
        type: "seidr_object"
        value_silver: 100
        weight_kg: 0.3
        condition: "excellent"
        mechanical_effect: "The thread reveals hidden doors, traps, and wards when unspooled in barrows. 20 paces of thread. Each pace used is consumed. WYR 1+ to activate. No cost — but the thread runs out."
        curse: null
        description: "A spool of thread spun from the hair of dead women by the völva Hildr Bone-Singer. The thread is black as shadow and impossibly fine. When unspooled in a barrow, it reaches toward hidden things — doors, traps, the places the dead do not want you to find. Hildr made three spools. Two are lost. This is the third."
        image_prompt: "A small bone spool wound with impossibly fine black thread, resting on a carved stone stand in a dark chamber."

      - id: "LOOT_T4_007"
        name: "Cursed Sword — 'Sváfnir' (The Sleep-Bringer)"
        type: "cursed"
        value_silver: 180
        weight_kg: 1.4
        condition: "excellent"
        mechanical_effect: "+2 damage. Any wound inflicted resists healing — natural healing takes twice as long, magical healing requires WYR contest against the sword's WYR (4)."
        curse:
          name: "Death's Lullaby"
          trigger: "Kills a named enemy"
          effect: "Wielder must sleep within 1 hour or lose d6 WIL. During sleep, dreams of the killed person's memories. After 3 kills, the wielder's eyes take on a grey-film appearance and they begin to smell of grave earth."
          removal: "Drive the sword through the wielder's own hand (d8 damage, permanent scar) and bury it at a crossroads under a new moon. Do not mark the spot."
        description: "A straight-bladed sword with a hilt wrapped in grey-stained leather. It was forged by the smith Vefr for the warlord Sigmund Corpse-Maker during the war of the Three Holds. Sigmund used it to end seventeen men before it turned on him — he could not stop sleeping, and in his sleep, the dead men found him. He was buried with the sword still in his hand. His grip has not loosened."
        image_prompt: "A straight sword with a grey-stained leather grip, the blade showing a cold sheen, gripped in a skeleton's white-knuckled hand."

