        name: "Corroded Hand Axe"
        type: "weapon"
        value_silver: 2
        weight_kg: 1.5
        condition: "poor"
        mechanical_effect: null
        curse: null
        description: "An axe-head fused to its haft with rust. Could be cleaned up and used in desperation. The edge is gone."
        image_prompt: "A rusted hand axe with a cracked wooden haft, iron pitted and dark brown, sitting on a stone shelf in a burial alcove."

