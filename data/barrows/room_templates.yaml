    connections: ["corridor", "chamber"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_DISC_08"
    name: "Spirit Well"
    category: "discovery"
    description: "A shaft cut straight down through the floor, so deep the bottom is invisible. Drop a stone and count — a long time before the faint click of impact. Cold air rises from the well, and with it a sound that might be wind or might be whispering. The edge of the well is smooth and the rim stones are mortared with something darker than clay."
    dimensions:
      width_paces: 5
      length_paces: 5
      height_paces: 3
    features:
      - "Deep shaft in floor"
      - "Cold updraft"
      - "Whispering wind sound"
      - "Dark mortar on rim stones"
      - "The depth is unknowable"
    possible_encounters:
      - tier: [3, 4]
        types: ["SUP_SPIRIT_03", "SUP_SPIRIT_04", "SUP_VEIL_01"]
        chance_pct: 35
      - tier: [5]
        types: ["SUP_VEIL_02", "SUP_VEIL_03"]
        chance_pct: 20
    possible_loot:
      - tier: [3]
        items: ["rim_stone_fragment", "dark_mortar_sample"]
        chance_pct: 15
    traps: []
    hazards:
      - "Falling into the well — fatal"
      - "Whispers may compel listeners closer to the edge"
      - "The cold rising from below saps warmth rapidly"
    connections: ["corridor", "chamber"]
    barrow_size_min: "large"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_DISC_09"
    name: "Dream Chamber"
    category: "discovery"
    description: "The walls are smooth and the room is round — unusual in a barrow. Dried herbs hang from the ceiling in bunches, their scent faint but present: mugwort, henbane, something that catches in the throat. A stone platform in the centre, body-length, with a shallow head-rest carved at one end. This is where someone came to dream on purpose."
    dimensions:
      width_paces: 5
      length_paces: 5
      height_paces: 2
    features:
      - "Round chamber (unusual geometry)"
      - "Dried herb bunches on ceiling"
      - "Stone dream-platform with head-rest"
      - "Smooth, featureless walls"
      - "Lingering herbal scent"
    possible_encounters:
      - tier: [3, 4]
        types: ["SUP_SPIRIT_01", "SUP_SPIRIT_02", "SUP_VEIL_01"]
        chance_pct: 25
    possible_loot:
      - tier: [2]
        items: ["dried_herb_bundle", "carved_headrest_fragment"]
        chance_pct: 30
      - tier: [3]
        items: ["dream_herb_pouch", "bone_pipe"]
        chance_pct: 20
    traps: []
    hazards:
      - "Herb fumes induce drowsiness — risk of unwanted sleep"
      - "Dreams in this room are vivid, possibly prophetic, possibly lies"
      - "Sleeping here may attract spiritual attention"
    connections: ["corridor", "chamber"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_DISC_10"
    name: "Ancestor Gallery"
    category: "discovery"
    description: "Stone niches line both walls, each holding a skull. Dozens of them, arranged by size and age — the bone colour darkens as you go deeper, from yellow-white to brown to nearly black. Each skull sits on a small shelf with a carved name-stone below it. The oldest names are in a script no one reads anymore. A family line, stored in bone."
    dimensions:
      width_paces: 4
      length_paces: 14
      height_paces: 3
    features:
      - "Skull niches along both walls"
      - "Dozens of skulls arranged chronologically"
      - "Carved name-stones below each"
      - "Oldest names in archaic script"
      - "Bone colour progression from recent to ancient"
    possible_encounters:
      - tier: [3, 4]
        types: ["UND_SPEC_01", "UND_SPEC_02", "SUP_SPIRIT_02"]
        chance_pct: 30
      - tier: [5]
        types: ["UND_SPEC_04", "SUP_SPIRIT_04"]
        chance_pct: 15
    possible_loot:
      - tier: [2]
        items: ["name_stone", "ancient_skull"]
        chance_pct: 30
      - tier: [3, 4]
        items: ["lineage_record", "rune_carved_name_stone"]
        chance_pct: 20
    traps: []
    hazards:
      - "Removing a skull disturbs the entire lineage — mass encounter"
      - "The weight of ancestral memory is palpable"
    connections: ["corridor", "chamber", "special"]
    barrow_size_min: "large"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_DISC_11"
    name: "Failed Excavation"
    category: "discovery"
    description: "A side-tunnel dug by someone after the barrow was sealed. The technique is different — cruder, rushed. Broken tools left where they fell. A half-dug shaft angles toward where the main burial chamber should be, but the diggers hit bedrock and gave up. Or were stopped. A gnawed leather water-skin and cold fire-ring suggest they camped here for days."
    dimensions:
      width_paces: 4
      length_paces: 8
      height_paces: 2
    features:
      - "Crude secondary tunnel"
      - "Broken digging tools"
      - "Dead-end at bedrock"
      - "Abandoned camp remains"
      - "Different construction from the barrow proper"
    possible_encounters:
      - tier: [1, 2]
        types: ["ANI_VERM_01", "UND_DRAUGR_01"]
        chance_pct: 25
    possible_loot:
      - tier: [1, 2]
        items: ["broken_pickaxe", "leather_water_skin", "fire_ring_charcoal"]
        chance_pct: 45
    traps: []
    hazards:
      - "Unstable secondary tunnel — not built to last"
      - "The diggers' fate is unknown and possibly relevant"
    connections: ["corridor", "chamber"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["old", "ancient"]

  # ==========================================================================
  # SPECIAL / BOSS (6 rooms)
  # ==========================================================================

  - id: "ROOM_SPEC_01"
    name: "Barrow-King Throne"
    category: "special"
    description: "The end of the barrow. A chamber built for one purpose: to seat the dead forever. The throne is massive — cut from a single block of dark stone, carved with interlocking animal patterns worn smooth by the touch of dead hands. Before it, the floor is grooved in concentric circles. Behind it, the wall is blank. Nothing else matters in this room but the throne and what sits in it."
    dimensions:
      width_paces: 12
      length_paces: 14
      height_paces: 5
    features:
      - "Massive carved stone throne"
      - "Concentric floor grooves"
      - "Animal-pattern carvings"
      - "The occupant may still be seated"
      - "Oppressive spiritual weight"
    possible_encounters:
      - tier: [4, 5]
        types: ["UND_HAUG_02", "UND_HAUG_03"]
        chance_pct: 75
    possible_loot:
      - tier: [4]
        items: ["iron_crown", "grave_sword", "chieftain_torque"]
        chance_pct: 60
      - tier: [5]
        items: ["king_ring", "ancient_blade", "barrow_crown"]
        chance_pct: 45
    traps:
      - name: "Throne ward"
        detection_difficulty: "hard"
        damage: "none — awakens the king"
        description: "Approaching within three paces of the throne triggers the occupant to stir. Touching it guarantees animation of the barrow-king and his guard."
    hazards:
      - "The strongest undead in the barrow is here"
      - "Retreat may be blocked by summoned guards"
      - "The room's spiritual pressure affects willpower"
    connections: ["corridor", "chamber"]
    barrow_size_min: "large"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_SPEC_02"
    name: "Haugbui Nest"
    category: "special"
    description: "Not a built room. A natural cavity that something has shaped — walls scored with claw marks, the floor a depression lined with scraps of cloth, leather, and bone. The air is thick with the smell of old meat and cold earth. Something lives here. Something that waits in the dark and does not need to eat but remembers how."
    dimensions:
      width_paces: 8
      length_paces: 10
      height_paces: 3
    features:
      - "Claw-scored walls"
      - "Nest depression lined with debris"
      - "Thick charnel smell"
      - "Gnawed bones scattered throughout"
      - "Signs of repeated occupancy"
    possible_encounters:
      - tier: [4, 5]
        types: ["UND_HAUG_01", "UND_HAUG_02"]
        chance_pct: 80
    possible_loot:
      - tier: [3]
        items: ["gnawed_arm_ring", "torn_mail", "half_digested_silver"]
        chance_pct: 50
      - tier: [4]
        items: ["prior_explorer_gear", "hoard_fragment"]
        chance_pct: 30
    traps: []
    hazards:
      - "The haugbui is present and aware of intruders"
      - "Limited space for manoeuvre in the nest"
      - "The smell is overpowering — nausea check"
    connections: ["corridor", "chamber"]
    barrow_size_min: "large"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_SPEC_03"
    name: "Veil-Thin Chamber"
    category: "special"
    description: "The walls shimmer. Not with light — with absence. Shadows move independently of the torchlight. The air feels heavy and thin at the same time, as if the room exists in two places. Sound behaves wrong — your voice comes back a heartbeat late, from the wrong direction. The boundary between this world and whatever comes after is worn thin here. You can almost see through."
    dimensions:
      width_paces: 8
      length_paces: 8
      height_paces: 4
    features:
      - "Independent shadow movement"
      - "Sound delay and displacement"
      - "Visual shimmer on walls"
      - "Temperature fluctuations without source"
      - "The sense that someone is standing just behind you"
    possible_encounters:
      - tier: [4, 5]
        types:
          [
            "SUP_VEIL_01",
            "SUP_VEIL_02",
            "SUP_VEIL_03",
            "UND_VEIL_01",
            "UND_VEIL_02",
          ]
        chance_pct: 60
    possible_loot:
      - tier: [4, 5]
        items: ["veil_fragment", "spirit_touched_stone", "otherworld_token"]
        chance_pct: 35
    traps: []
    hazards:
      - "Reality instability — perception checks constantly"
      - "Prolonged exposure risks partial crossing"
      - "Entities from the other side may cross"
      - "Compasses and direction sense fail"
    connections: ["corridor", "chamber"]
    barrow_size_min: "large"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_SPEC_04"
    name: "Primordial Grave"
    category: "special"
    description: "Older than the barrow. The builders found this when they were digging and built around it. A burial of a different kind — no Norse craftsmanship, no runes, no iron. The body is in a foetal position in a stone-lined pit, huge, the bones too thick and the skull too heavy. Whoever this was, they predate everything above. The barrow-builders left offerings to it. They were afraid of it."
    dimensions:
      width_paces: 10
      length_paces: 10
      height_paces: 5
    features:
      - "Pre-Norse burial pit"
      - "Oversized skeletal remains"
      - "Foetal position burial"
      - "Primitive stone lining"
      - "Norse offerings placed around the pit (they feared this)"
    possible_encounters:
      - tier: [5]
        types: ["SUP_WILD_01", "SUP_WILD_02", "SUP_CORR_01"]
        chance_pct: 50
    possible_loot:
      - tier: [4, 5]
        items:
          ["ancient_bone_fragment", "pre_norse_stone_tool", "primordial_tooth"]
        chance_pct: 40
    traps: []
    hazards:
      - "The age of this place is disorienting — existential dread"
      - "The offerings suggest the Norse builders propitiated whatever is here"
      - "Something older than human memory stirs"
    connections: ["chamber"]
    barrow_size_min: "vast"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_SPEC_05"
    name: "Cursed Forge"
    category: "special"
    description: "An underground smithy. The anvil is stone, not iron, and the forge basin is carved into the bedrock. Charcoal dust covers everything. Unfinished blades lie on a work-shelf, half-shaped, the metal discoloured and wrong — dark veins running through it as if the iron were sick. The tools are intact but everything they made went bad. The smith was making something that should not be made."
    dimensions:
      width_paces: 8
      length_paces: 10
      height_paces: 3
    features:
      - "Stone anvil"
      - "Bedrock forge basin"
      - "Unfinished blades with dark veining"
      - "Smithing tools intact"
      - "Charcoal dust on everything"
      - "The metal is visibly corrupted"
    possible_encounters:
      - tier: [4, 5]
        types: ["UND_DRAUGR_05", "UND_VEIL_03", "SUP_CORR_02"]
        chance_pct: 55
    possible_loot:
      - tier: [3]
        items: ["smithing_tools", "charcoal_dust", "unfinished_blade"]
        chance_pct: 50
      - tier: [4, 5]
        items: ["cursed_blade", "dark_iron_ingot", "forge_rune_stone"]
        chance_pct: 35
    traps:
      - name: "Forge ignition"
        detection_difficulty: "hard"
        damage: "d10 fire"
        description: "Disturbing the forge basin releases trapped gas. Any spark or flame ignites it in a burst that fills the room."
    hazards:
      - "The corrupted metal is dangerous to handle — d2 ongoing"
      - "The forge wants to be lit — compulsion on those with smithing knowledge"
    connections: ["chamber"]
    barrow_size_min: "large"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_SPEC_06"
    name: "Summoning Circle"
    category: "special"
    description: "The floor is a single carved design — a circle within a circle, with symbols in the space between. The outer circle is cracked in one place, a break that runs through two symbols. The inner circle is intact. Iron nails are driven into the stone at cardinal points, their heads flat against the floor. Stains radiate outward from the centre like a starburst. Something was called here. Whether it answered, or whether it left, is not clear."
    dimensions:
      width_paces: 10
      length_paces: 10
      height_paces: 4
    features:
      - "Double circle carved into floor"
      - "Symbolic inscriptions between circles"
      - "Crack in outer circle"
      - "Iron nails at cardinal points"
      - "Radial stains from centre"
    possible_encounters:
      - tier: [4, 5]
        types: ["SUP_VEIL_02", "SUP_VEIL_03", "SUP_VEIL_04", "SUP_CORR_03"]
        chance_pct: 55
    possible_loot:
      - tier: [3, 4]
        items: ["iron_nail", "carved_symbol_stone", "circle_dust"]
        chance_pct: 40
      - tier: [5]
        items: ["binding_relic", "summoner_journal", "veil_key"]
        chance_pct: 25
    traps:
      - name: "Reactivation"
        detection_difficulty: "hard"
        damage: "none — reactivates the summoning"
        description: "Stepping into the inner circle with blood on you (even a scratch) feeds the design. The crack in the outer ring means containment has failed."
    hazards:
      - "The circle is partially active — the crack means it leaks"
      - "Blood or life-force near the circle energises it"
      - "The boundary between worlds is permeable here"
      - "Standing in the centre is a profoundly bad idea"
    connections: ["chamber"]
    barrow_size_min: "vast"
    barrow_age_affinity: ["ancient"]
