room_templates:
  # ==========================================================================
  # ENTRY / APPROACH (10 rooms)
  # ==========================================================================

  - id: "ROOM_ENTRY_01"
    name: "Standard Entry Chamber"
    category: "entry"
    description: "A low-ceilinged stone space carved from the hillside. The air is heavy with earth-smell and the faint sweetness of old decay. Chisel marks visible on the walls where someone cut this hole a long time ago."
    dimensions:
      width_paces: 6
      length_paces: 8
      height_paces: 2
    features:
      - "Chisel marks on walls"
      - "Packed earth floor"
      - "Stone lintel over inner door"
    possible_encounters:
      - tier: [1, 2]
        types: ["UND_DRAUGR_01", "ANI_VERM_01"]
        chance_pct: 30
      - tier: [3, 4]
        types: ["UND_DRAUGR_02", "UND_SKEL_01"]
        chance_pct: 20
    possible_loot:
      - tier: [1]
        items: ["corroded_blade", "bone_fragments"]
        chance_pct: 40
    traps:
      - name: "Weighted threshold stone"
        detection_difficulty: "easy"
        damage: "d6 crushing"
        description: "Stone drops from lintel when weight shifts beneath the entry slab."
    hazards:
      - "Stale air (torch flicker warning)"
    connections: ["corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_ENTRY_02"
    name: "Collapsed Entrance"
    category: "entry"
    description: "Half the ceiling has come down. Broken slabs lean against each other forming a narrow triangle of access. Cold air seeps through gaps in the rubble. The smell of wet stone and crushed lichen."
    dimensions:
      width_paces: 5
      length_paces: 4
      height_paces: 1
    features:
      - "Rubble pile blocking half the space"
      - "Narrow crawl-through gap"
      - "Cracked ceiling beams"
      - "Lichen on exposed stone faces"
    possible_encounters:
      - tier: [1]
        types: ["ANI_VERM_01", "ANI_HAZ_01"]
        chance_pct: 25
    possible_loot:
      - tier: [1]
        items: ["cracked_pottery"]
        chance_pct: 20
    traps: []
    hazards:
      - "Collapse risk — loud sounds or heavy impact may bring more ceiling down"
      - "Tight crawl space — armoured men must strip plate or wedge"
    connections: ["corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_ENTRY_03"
    name: "Hidden Entrance"
    category: "entry"
    description: "Behind a shelf of turf and tangled roots, a slot in the hillside barely wide enough for a man's shoulders. The opening was sealed with fitted stones at some point—someone pried them loose. Fingernail scratches in the dirt around the edges."
    dimensions:
      width_paces: 3
      length_paces: 5
      height_paces: 2
    features:
      - "Dislodged sealing stones stacked outside"
      - "Scratch marks around opening"
      - "Root tendrils hanging from ceiling"
      - "Narrow entry requires single file"
    possible_encounters:
      - tier: [2, 3]
        types: ["UND_DRAUGR_01"]
        chance_pct: 15
    possible_loot:
      - tier: [1]
        items: ["crude_iron_prybar"]
        chance_pct: 30
    traps:
      - name: "Tripwire string of gut"
        detection_difficulty: "moderate"
        damage: "none — alerts inhabitants"
        description: "Dried animal gut stretched ankle-height across the entry. Snapping it dislodges a small stone that clatters deeper inside."
    hazards: []
    connections: ["corridor"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_ENTRY_04"
    name: "False Entrance"
    category: "entry"
    description: "A convincing stone doorway that leads eight paces into solid earth and stops at a blank wall. Carved runes above the lintel warn of death inside—but this passage holds nothing but cold air and the bones of someone who believed it was real."
    dimensions:
      width_paces: 4
      length_paces: 8
      height_paces: 2
    features:
      - "Warning runes above entrance"
      - "Dead-end wall"
      - "Skeleton slumped against far wall"
      - "Empty pack and broken lantern"
    possible_encounters: []
    possible_loot:
      - tier: [1]
        items: ["bone_fragments", "rusted_knife", "rotted_leather_scraps"]
        chance_pct: 60
    traps:
      - name: "Collapsing false floor"
        detection_difficulty: "hard"
        damage: "d8 crushing + trapped"
        description: "Five paces in, the stone floor is a thin shelf over a pit. Body weight cracks it."
    hazards:
      - "Dead air — no ventilation at depth"
    connections: []
    barrow_size_min: "medium"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_ENTRY_05"
    name: "Trapped Threshold"
    category: "entry"
    description: "A proper stone entrance, well-cut, with grooves in the floor and walls where something once slid. The builders anticipated visitors. Iron pins jut from the walls at knee height. Rust stains streak the stone below them like old blood."
    dimensions:
      width_paces: 4
      length_paces: 6
      height_paces: 3
    features:
      - "Mechanical grooves in walls and floor"
      - "Iron pins at knee height"
      - "Rust stains on stone"
      - "Well-fitted stone blocks"
    possible_encounters:
      - tier: [2, 3]
        types: ["UND_DRAUGR_01", "UND_SKEL_01"]
        chance_pct: 20
    possible_loot:
      - tier: [1, 2]
        items: ["iron_mechanisms", "corroded_blade"]
        chance_pct: 35
    traps:
      - name: "Swinging stone slab"
        detection_difficulty: "moderate"
        damage: "d10 crushing"
        description: "Pressure plate triggers a counterweighted slab that swings from the ceiling across the passage at waist height."
      - name: "Floor spike pit"
        detection_difficulty: "moderate"
        damage: "d8 piercing"
        description: "Second pressure plate drops a hinged section of floor into a shallow pit lined with corroded iron spikes."
    hazards: []
    connections: ["corridor", "chamber"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_ENTRY_06"
    name: "Descent Stair"
    category: "entry"
    description: "Stone steps cut into the hillside, descending at a steep angle. Water trickles down the centre groove worn by centuries of runoff. The steps are slick with moisture and a film of green-black algae. Each step lower, the temperature drops."
    dimensions:
      width_paces: 3
      length_paces: 15
      height_paces: 3
    features:
      - "Steep stone staircase"
      - "Central drainage groove"
      - "Algae-slick steps"
      - "Temperature drop as you descend"
    possible_encounters:
      - tier: [1]
        types: ["ANI_VERM_01"]
        chance_pct: 15
    possible_loot: []
    traps:
      - name: "Greased step"
        detection_difficulty: "easy"
        damage: "d4 + fall to bottom"
        description: "Animal fat smeared on a middle step. Old trap, possibly set by prior explorers, possibly by something that lives here."
    hazards:
      - "Slippery footing — fall risk on steep descent"
      - "Water runoff in rain — flash flooding possible"
    connections: ["corridor", "chamber", "entry"]
    barrow_size_min: "small"
    barrow_age_affinity: ["old", "ancient", "recent"]

  - id: "ROOM_ENTRY_07"
    name: "Animal-Gnawed Opening"
    category: "entry"
    description: "Something dug here. A fox den or badger sett broke through the outer wall of the barrow, and weather widened the hole. Claw marks gouge the packed earth. Tufts of fur caught on stone edges. The burrow angles down into darkness that smells of wet animal and something older underneath."
    dimensions:
      width_paces: 2
      length_paces: 6
      height_paces: 1
    features:
      - "Animal burrow entrance"
      - "Claw marks in packed earth"
      - "Tufts of animal fur on stones"
      - "Narrow — belly-crawl for armoured men"
    possible_encounters:
      - tier: [1]
        types: ["ANI_VERM_01", "ANI_VERM_02", "ANI_HAZ_01"]
        chance_pct: 50
      - tier: [2]
        types: ["ANI_WOLF_01"]
        chance_pct: 20
    possible_loot:
      - tier: [1]
        items: ["gnawed_bone", "animal_pelts"]
        chance_pct: 30
    traps: []
    hazards:
      - "Extremely tight — shields and large packs must be left behind"
      - "Unstable earth ceiling"
    connections: ["corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_ENTRY_08"
    name: "Root-Choked Crawl"
    category: "entry"
    description: "Tree roots have broken through the barrow ceiling and walls, creating a lattice of wood and earth. You push through a curtain of hanging roots, each one cold and wet. Dirt falls in your hair. The roots are thick—whatever tree stands above is old and deep-rooted."
    dimensions:
      width_paces: 3
      length_paces: 7
      height_paces: 1
    features:
      - "Dense root network"
      - "Dripping moisture"
      - "Falling earth from disturbance"
      - "Natural support structure from roots"
    possible_encounters:
      - tier: [1]
        types: ["ANI_VERM_01"]
        chance_pct: 20
    possible_loot: []
    traps: []
    hazards:
      - "Entanglement risk — roots snag gear and limbs"
      - "Limited visibility through root curtain"
      - "Noise discipline impossible — roots snap and scrape"
    connections: ["corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_ENTRY_09"
    name: "Ice-Sealed Mouth"
    category: "entry"
    description: "The entrance is a dark slit in the hillside, the stone around it glazed with ice. Water seeps from above and freezes in sheets across the opening. The ice is cloudy, grey-white, and in places you can see the stone behind it like a tooth inside a gum. Breaking through sends shards ringing on the floor."
    dimensions:
      width_paces: 4
      length_paces: 5
      height_paces: 2
    features:
      - "Ice sheet across entrance"
      - "Frozen water seepage on walls"
      - "Sub-zero temperature"
      - "Ice fragments on floor after entry"
    possible_encounters:
      - tier: [1, 2]
        types: ["UND_DRAUGR_01"]
        chance_pct: 15
    possible_loot: []
    traps: []
    hazards:
      - "Extreme cold — exposed skin risk"
      - "Slippery ice floor"
      - "Breaking ice creates loud noise (encounter check)"
    connections: ["corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_ENTRY_10"
    name: "Eroded Slope"
    category: "entry"
    description: "Rain and snowmelt have carved a gully down the hillside that cuts into the barrow's outer wall. The entrance is accidental—erosion exposed the stonework, and weather cracked it open. Mud and gravel slope steeply downward into the gap. Water pools at the bottom."
    dimensions:
      width_paces: 5
      length_paces: 10
      height_paces: 2
    features:
      - "Muddy slope descent"
      - "Exposed stonework"
      - "Standing water at base"
      - "Gravel and loose earth"
    possible_encounters:
      - tier: [1]
        types: ["ANI_VERM_01", "ANI_HAZ_02"]
        chance_pct: 20
    possible_loot: []
    traps: []
    hazards:
      - "Slippery descent — mud and loose gravel"
      - "Standing water hides floor hazards"
      - "Slope difficult to climb back up quickly"
    connections: ["corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_ENTRY_11"
    name: "Warded Doorway"
    category: "entry"
    description: "A proper doorway, framed in dressed stone with a heavy lintel carved in animal-head terminals. Iron nails driven into the frame in a deliberate pattern — not structural, ritual. The nails are hand-forged, each one different, driven deep into the stone at a cost of serious labour. Whatever is inside was meant to stay inside."
    dimensions:
      width_paces: 4
      length_paces: 5
      height_paces: 3
    features:
      - "Dressed stone door frame"
      - "Animal-head carved terminals"
      - "Ritual iron nail pattern"
      - "Each nail hand-forged and unique"
    possible_encounters:
      - tier: [2, 3]
        types: ["UND_DRAUGR_02", "UND_SPEC_01"]
        chance_pct: 25
    possible_loot:
      - tier: [1, 2]
        items: ["iron_nail", "carved_lintel_fragment"]
        chance_pct: 30
    traps:
      - name: "Warding collapse"
        detection_difficulty: "hard"
        damage: "d8 crushing"
        description: "Removing the iron nails weakens the lintel. The third nail pulled brings the heavy stone down on whoever stands beneath."
    hazards:
      - "The ward pattern may have spiritual function — removing it has consequences"
    connections: ["corridor", "chamber"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["old", "ancient"]

  # ==========================================================================
  # CORRIDORS (12 rooms)
  # ==========================================================================

  - id: "ROOM_CORR_01"
    name: "Straight Corridor"
    category: "corridor"
    description: "A passage cut through packed earth and stone, straight as a spear-shaft. The walls are damp and the ceiling just high enough to stand. Your torchlight reaches the far end where the corridor opens into something else. Footsteps echo."
    dimensions:
      width_paces: 3
      length_paces: 15
      height_paces: 2
    features:
      - "Straight passage"
      - "Damp stone walls"
      - "Echo carries sound"
    possible_encounters:
      - tier: [1, 2]
        types: ["UND_DRAUGR_01", "UND_SKEL_01"]
        chance_pct: 25
      - tier: [3]
        types: ["UND_DRAUGR_02", "UND_DRAUGR_03"]
        chance_pct: 20
    possible_loot: []
    traps:
      - name: "Pressure-plate dart"
        detection_difficulty: "moderate"
        damage: "d4 piercing (poisoned — d6 additional over time)"
        description: "Stone plate in floor triggers a bone needle fired from a wall slot at shin height."
    hazards: []
    connections: ["entry", "corridor", "chamber", "hazard", "discovery"]
    barrow_size_min: "small"
    barrow_age_affinity: ["old", "ancient", "recent"]

  - id: "ROOM_CORR_02"
    name: "Collapse Corridor"
    category: "corridor"
    description: "The passage was once wider. One wall has buckled inward, spilling rubble across the floor. You have to pick your way over broken stone, crouching where the ceiling sags. Timber braces have rotted through—the ones that remain are soft under a finger's pressure."
    dimensions:
      width_paces: 2
      length_paces: 12
      height_paces: 1
    features:
      - "Partially collapsed wall"
      - "Rubble-strewn floor"
      - "Rotted timber braces"
      - "Sagging ceiling"
    possible_encounters:
      - tier: [1]
        types: ["ANI_VERM_01"]
        chance_pct: 20
    possible_loot:
      - tier: [1]
        items: ["stone_fragments", "rotted_wood"]
        chance_pct: 15
    traps: []
    hazards:
      - "Further collapse risk — vibration or loud noise"
      - "Restricted movement — no room to swing weapons"
      - "Dust clouds if ceiling shifts"
    connections: ["entry", "corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_CORR_03"
    name: "Flooded Passage"
    category: "corridor"
    description: "Water covers the floor from wall to wall. Black, still, cold. The surface reflects your torchlight as a wavering orange smear. You cannot see the bottom. Something about the water smells wrong—mineral and old, like water that has sat in stone for years without moving."
    dimensions:
      width_paces: 3
      length_paces: 12
      height_paces: 2
    features:
      - "Standing water — knee to thigh depth"
      - "Zero floor visibility"
      - "Mineral smell"
      - "Still surface — no current"
    possible_encounters:
      - tier: [1, 2]
        types: ["ANI_HAZ_01", "ANI_HAZ_02"]
        chance_pct: 30
      - tier: [3]
        types: ["UND_DRAUGR_01"]
        chance_pct: 20
    possible_loot:
      - tier: [1, 2]
        items: ["waterlogged_leather", "corroded_coin"]
        chance_pct: 25
    traps:
      - name: "Submerged pit"
        detection_difficulty: "hard"
        damage: "d6 + submersion"
        description: "The floor drops away suddenly into a deeper section. Water closes over your head."
    hazards:
      - "Cold water — stamina drain"
      - "Hidden floor hazards"
      - "Noise from wading (encounter check)"
      - "Torches extinguished if dropped"
    connections: ["entry", "corridor", "chamber", "hazard"]
    barrow_size_min: "small"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_CORR_04"
    name: "Trapped Corridor"
    category: "corridor"
    description: "This passage is too clean. The floor stones are fitted too well, the walls too smooth. Everything about it says the builders wanted you to walk down here—and wanted you to regret it. Thin seams between stones mark where mechanisms hide."
    dimensions:
      width_paces: 3
      length_paces: 10
      height_paces: 3
    features:
      - "Precisely fitted floor stones"
      - "Smooth walls with thin seams"
      - "Mechanical slots at various heights"
      - "Faint scratches on walls from previous activations"
    possible_encounters: []
    possible_loot: []
    traps:
      - name: "Ceiling drop-stones"
        detection_difficulty: "moderate"
        damage: "d8 crushing"
        description: "Pressure plates release stone blocks from ceiling cavities. Three plates spaced along the corridor."
      - name: "Wall spear-thrust"
        detection_difficulty: "hard"
        damage: "d10 piercing"
        description: "A floor trigger releases corroded iron spear-points from wall slots at chest height. Range covers the full corridor width."
      - name: "Ankle-breaker step"
        detection_difficulty: "moderate"
        damage: "d6 + immobilized"
        description: "A floor stone tilts when stepped on, trapping the foot in a V-groove underneath."
    hazards: []
    connections: ["entry", "corridor", "chamber", "discovery"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_CORR_05"
    name: "Branching Passage"
    category: "corridor"
    description: "The corridor splits. One branch goes left, slightly downward, the air colder and damper. The other goes right and level, a faint draft suggesting it connects to somewhere with ventilation. Scratch marks on the wall at the fork—someone marked the left path with a crude arrow. Whether as guidance or warning is unclear."
    dimensions:
      width_paces: 5
      length_paces: 8
      height_paces: 2
    features:
      - "T-junction or Y-fork"
      - "Scratch-mark directions on wall"
      - "Temperature difference between branches"
      - "Draft from one direction"
    possible_encounters:
      - tier: [2, 3]
        types: ["UND_DRAUGR_01", "UND_SKEL_01"]
        chance_pct: 25
    possible_loot: []
    traps: []
    hazards:
      - "Navigation confusion — easy to get turned around"
    connections: ["corridor", "chamber", "hazard", "discovery"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["old", "ancient", "recent"]

  - id: "ROOM_CORR_06"
    name: "Spiral Descent"
    category: "corridor"
    description: "The passage curves to the left and drops, winding deeper in a slow spiral. The inner wall is rough-cut, the outer wall smoother where hands have trailed along it. The slope is gradual but relentless. After three full turns you are well below the surface and the air is heavy and still."
    dimensions:
      width_paces: 3
      length_paces: 30
      height_paces: 2
    features:
      - "Spiralling descent"
      - "Smooth outer wall from hand-contact"
      - "Increasing depth"
      - "Heavier air at bottom"
    possible_encounters:
      - tier: [2, 3]
        types: ["UND_DRAUGR_02", "UND_SKEL_02"]
        chance_pct: 20
    possible_loot: []
    traps: []
    hazards:
      - "Disorientation — direction sense compromised"
      - "Bad air at depth — torch burns low"
    connections: ["corridor", "chamber", "special"]
    barrow_size_min: "large"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_CORR_07"
    name: "Bone-Lined Walkway"
    category: "corridor"
    description: "Human bones set into the walls. Not thrown in—placed. Femurs laid horizontal like bricks, skulls at regular intervals facing the passage, jaw-bones arranged in rows. The floor is packed earth but bone fragments crunch underfoot where pieces have fallen. The arrangement is deliberate. Someone spent a long time doing this."
    dimensions:
      width_paces: 3
      length_paces: 12
      height_paces: 2
    features:
      - "Bones set into walls in patterns"
      - "Skulls at regular intervals"
      - "Bone fragments on floor"
      - "The craftsmanship is unsettling"
    possible_encounters:
      - tier: [2, 3]
        types: ["UND_SKEL_01", "UND_SKEL_02"]
        chance_pct: 35
      - tier: [4]
        types: ["UND_DRAUGR_04", "UND_SPEC_01"]
        chance_pct: 20
    possible_loot:
      - tier: [2]
        items: ["intact_skull", "bone_tool"]
        chance_pct: 25
    traps: []
    hazards:
      - "Morale check — sustained proximity to arranged human remains"
    connections: ["corridor", "chamber", "discovery", "special"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_CORR_08"
    name: "Rune-Carved Tunnel"
    category: "corridor"
    description: "Every surface is carved. Runes cover the walls floor to ceiling, so dense they overlap in places. The carving is not decorative—it reads like text, pages and pages of it compressed into stone. The torch makes the incised lines cast tiny shadows that shift as you move. It feels like walking through someone's thoughts."
    dimensions:
      width_paces: 3
      length_paces: 10
      height_paces: 2
    features:
      - "Dense runic text on all surfaces"
      - "Overlapping inscriptions"
      - "Shadow-play from torchlight"
      - "Some runes deeper-cut than others"
    possible_encounters:
      - tier: [3, 4]
        types: ["UND_SPEC_01", "UND_SPEC_02", "SUP_SPIRIT_01"]
        chance_pct: 25
    possible_loot:
      - tier: [2, 3]
        items: ["runic_rubbing", "translation_fragment"]
        chance_pct: 30
    traps: []
    hazards:
      - "Concentration drain — the sheer volume of text is disorienting"
      - "Those who read runes may become fixated"
    connections: ["corridor", "chamber", "discovery", "special"]
    barrow_size_min: "medium"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_CORR_09"
    name: "Rubble-Choked Squeeze"
    category: "corridor"
    description: "A cave-in has reduced this passage to a gap barely wide enough to pull yourself through. Sharp stone edges catch on clothing and skin. You can feel the weight of the earth above—the stone groans when you press against it. It is the kind of space that kills men who panic."
    dimensions:
      width_paces: 1
      length_paces: 6
      height_paces: 1
    features:
      - "Extreme constriction"
      - "Sharp stone edges"
      - "Audible stone stress"
      - "Torn cloth fragments from prior explorers"
    possible_encounters: []
    possible_loot:
      - tier: [1]
        items: ["torn_cloth", "dropped_knife"]
        chance_pct: 20
    traps: []
    hazards:
      - "Trapped — armour or large body may wedge"
      - "Panic risk in tight space"
      - "Collapse possible — the stability is marginal"
      - "Cannot fight or defend while in squeeze"
    connections: ["corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["ancient"]

  - id: "ROOM_CORR_10"
    name: "Wind Passage"
    category: "corridor"
    description: "A steady, cold draft funnels through this passage, strong enough to make torches gutter and lean. The wind moans against stone edges—a low, uneven sound that could be mistaken for a voice. The air is cleaner here than elsewhere in the barrow. Something connects to the surface."
    dimensions:
      width_paces: 2
      length_paces: 14
      height_paces: 3
    features:
      - "Strong cold draft"
      - "Moaning wind sound"
      - "Cleaner air"
      - "Torch instability"
    possible_encounters:
      - tier: [2]
        types: ["UND_SPEC_01", "SUP_SPIRIT_01"]
        chance_pct: 15
    possible_loot: []
    traps: []
    hazards:
      - "Torch may extinguish — wind gusts"
      - "Sound masking — cannot hear approach over wind"
    connections: ["entry", "corridor", "chamber"]
    barrow_size_min: "small"
    barrow_age_affinity: ["old", "ancient"]

  - id: "ROOM_CORR_11"
    name: "Sinking Floor Passage"
    category: "corridor"
    description: "The floor here is not stone but compacted earth over timber planking, and the timber is rotten. Each step sinks slightly. You can feel the flex underfoot, hear the creak of wood giving way. Somewhere below the planking there is a drop—how far, you cannot tell."
