    year: 315
    season: "summer"
    day: 105
    category: "social"
    location: "Skaldhaven"
    band_relevant: true
    summary: "The first real celebration in three years. Songs. Mead. Wrestling. Bjorn loses an arm-wrestle to Bryn and demands a rematch. Kell sits outside the firelight and drinks alone. He is smiling."

  - id: "EVT_315_U13_088"
    title: "Widow Seizes Forge Artifacts"
    year: 315
    season: "summer"
    day: 110
    category: "political"
    chain: "widows_web"
    chain_order: 22
    actors:
      - "Pale Widow"
    factions:
      - "The Whispering Circle"
    band_relevant: true
    summary: "Circle agents recover rune-tools from the expedition's wounded before anyone notices they are missing. The Widow now possesses galdr artifacts. What she intends to do with them is not shared."

  - id: "EVT_315_U14_089"
