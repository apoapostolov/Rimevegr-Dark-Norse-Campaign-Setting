    season: "summer"
    day: 98
    category: "personal"
    chain: "thorne_curse"
    chain_order: 9
    actors:
      - "Thorne Ash-Born"
      - "Voss Cold-Eye"
    band_relevant: true
    summary: "Two men from Thorne's old warband arrive in the region asking questions. They are careful, professional, patient. Voss posts extra watches."
    prerequisites:
      - "EVT_313_W21_096"

  - id: "EVT_314_U12_028"
    title: "Midsummer Rites — Thin Attendance"
    year: 314
    season: "summer"
    day: 105
    category: "social"
    location: "Thornwall"
    band_relevant: false
    summary: "The midsummer bonfire at Thornwall draws a third of the usual crowd. Too many dead. Too many gone. The songs are old ones. Nobody adds new verses."

  - id: "EVT_314_U13_029"
    title: "Iron Grip Fractures"
    year: 314
    season: "summer"
    day: 110
    category: "political"
    chain: "iron_grip"
