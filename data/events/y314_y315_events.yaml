    location: "Deepholm"
    actors:
      - "Pale Widow"
    factions:
      - "The Whispering Circle"
    band_relevant: false
    summary: "The Widow takes Ashen Reach's council seat personally. Everyone expected a proxy. Her presence in the open — a first — signals something. Whether it is trust or dominance remains unclear."

  - id: "EVT_315_W04_109"
    title: "Kell Opens a Tab"
    year: 315
    season: "winter"
    day: 232
    category: "personal"
    actors:
      - "Kell Hook"
    band_relevant: true
    summary: "Kell walks into the Skaldhaven mead hall and puts silver on the bar. Drinks for anyone who fought in the barrow. He sits in the corner and doesn't gamble. The barkeeper marks the date in charcoal."

  - id: "EVT_315_W05_110"
    title: "Wulfgar Retires"
    year: 315
    season: "winter"
    day: 238
    category: "personal"
    chain: "red_tide"
    chain_order: 12
    location: "Bleakwater Landing"
    actors:
      - "Wulfgar"
    factions:
      - "The Red Tide"
    band_relevant: false
    summary: "Wulfgar disbands the Red Tide. He keeps one boat and takes up fishing at Bleakwater. His fighters scatter across the region. The river raider era ends with a man mending nets."

  - id: "EVT_315_W06_111"
    title: "Thorne Teaches Rune-Reading"
    year: 315
    season: "winter"
    day: 244
    category: "personal"
    chain: "thorne_curse"
    chain_order: 14
    actors:
      - "Thorne Ash-Born"
    band_relevant: true
    summary: "With his marks faded, Thorne's galdr sense is dull but not dead. He teaches basic rune identification to three Grave Wardens. The knowledge that was carved into him is now given freely."

  - id: "EVT_315_W07_112"
    title: "Long Dark — Endured"
    year: 315
    season: "winter"
    day: 265
    category: "weather"
    chain: "long_dark"
    chain_order: 3
    band_relevant: true
    summary: "The deepest dark comes. Two hours of light. Bitter cold. But the barrows are silent, the stores hold, and people survive it the way people always have — together, grudgingly, with small acts of care."

  - id: "EVT_315_W08_113"
    title: "Bjorn Gets a Dog"
    year: 315
    season: "winter"
    day: 272
    category: "personal"
    actors:
      - "Bjorn the Lean"
      - "Lump"
    band_relevant: true
    summary: "A stray follows Bjorn back to camp. Lump accepts the newcomer after a brief standoff involving growling and then shared scraps. Bjorn names the dog Rust. Nobody asks why."

  - id: "EVT_315_W09_114"
    title: "Bryn Visits the Sealed Barrow"
    year: 315
    season: "winter"
    day: 280
    category: "supernatural"
    chain: "grave_wardens"
    chain_order: 13
    location: "Vargheim"
    actors:
      - "Bryn"
    factions:
      - "The Grave Wardens"
    band_relevant: false
    summary: "Bryn makes the pilgrimage to the sealed Iron Barrow. The hillside is quiet. Grass is growing over the sealed entrance. She leaves a cairn for the eight who died inside."

  - id: "EVT_315_W10_115"
    title: "Gest Writes the History"
    year: 315
    season: "winter"
    day: 290
    category: "social"
    actors:
      - "Gest Ledger"
    band_relevant: true
    summary: "Gest begins writing the Black Axes' history — contracts, casualties, silver earned. Not a saga. A ledger. But between the numbers, the whole story is there for anyone who reads carefully."

  - id: "EVT_315_W11_116"
    title: "Council Sets Spring Tax"
    year: 315
    season: "winter"
    day: 300
    category: "economic"
    chain: "fjord_compact"
    chain_order: 19
    location: "Deepholm"
    factions:
      - "The Fjord Compact"
    band_relevant: false
    summary: "The council agrees on a modest spring tax — three percent of trade value. Low enough to accept, high enough to fund road repairs and a standing garrison. The first tax voted by consent, not imposed by force."

  - id: "EVT_315_W12_117"
    title: "Widow Seeds the Next Cycle"
    year: 315
    season: "winter"
    day: 310
    category: "political"
    chain: "widows_web"
    chain_order: 25
    location: "Kolvik"
    actors:
      - "Pale Widow"
    factions:
      - "The Whispering Circle"
    band_relevant: false
    summary: "Circle agents place two new operatives — one in Grimholt, one in Feldwick. The Widow's network expands while the council debates governance. Power moves in the gaps between words."

  - id: "EVT_315_W13_118"
    title: "Midwinter Feast — No Hum"
    year: 315
    season: "winter"
    day: 325
    category: "social"
    location: "Skaldhaven"
    band_relevant: true
    summary: "Midwinter night passes in silence. No hum. No green light. No voices. Just the crackle of fires and the sound of people eating together. Rolf raises a cup to absent friends. Everyone drinks."

  - id: "EVT_315_W14_119"
    title: "Voss Makes a Decision"
    year: 315
    season: "winter"
    day: 345
    category: "personal"
    chain: "voss_command"
    chain_order: 16
    actors:
      - "Voss Cold-Eye"
      - "Gest Ledger"
      - "Kell Hook"
      - "Thorne Ash-Born"
      - "Petra Shepherd"
      - "Bjorn the Lean"
      - "Rolf"
      - "Lump"
    band_relevant: true
    summary: "Voss gathers the band. He tells them the world is changing and they must change with it. Not disband — adapt. The Black Axes will take contracts from the council, guard trade routes, clear whatever comes next. Mercenaries with a seat at the table. Nobody argues. Lump wags his tail."

  - id: "EVT_315_W15_120"
    title: "Ice Cracks on the Fjord"
    year: 315
    season: "winter"
    day: 358
    category: "weather"
    band_relevant: true
    summary: "The first crack of melting ice echoes across the fjord. Year 315 ends. The Rimevegr is scarred, diminished, and still standing. The Black Axes sharpen their weapons and wait for spring."
