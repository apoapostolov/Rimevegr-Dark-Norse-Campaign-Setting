    branches:
      - condition: "voss_joins_ordovast"
        result: "Band becomes Iron Grip's military arm. Power and resources, but Ordovast's leash."
      - condition: "voss_refuses_ordovast"
        result: "Ordovast faces the barrow crisis with only garrison troops. Grimholt may fall."

  - id: "EVT_314_W13_059"
    title: "Midwinter Barrow Chorus"
    year: 314
    season: "winter"
    day: 325
    category: "supernatural"
    chain: "waking_barrows"
    chain_order: 20
    band_relevant: true
