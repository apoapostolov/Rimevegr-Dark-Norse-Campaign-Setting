    branches:
      - condition: "voss_agrees_widow_price"
        result: "Circle gains galdr-forge artifacts. Widow becomes the most powerful person in the Rimevegr."
      - condition: "voss_refuses_widow_price"
        result: "Widow withdraws Circle logistics. Expedition loses supply support mid-mission."

  - id: "EVT_315_U05_080"
    title: "Iron Barrow Entrance Found"
    year: 315
    season: "summer"
    day: 82
    category: "supernatural"
    chain: "waking_barrows"
    chain_order: 23
    location: "Vargheim"
    actors:
      - "Dalla"
      - "Thorne Ash-Born"
    band_relevant: true
    summary: "Dalla leads them to a hillside north of Vargheim. Thorne places his hand on the stone. His rune-marks glow. The hill opens. A staircase descends into green-lit darkness."

  - id: "EVT_315_U06_081"
    title: "Surface Guard Engagement"
    year: 315
    season: "summer"
    day: 85
    category: "military"
    chain: "waking_barrows"
    chain_order: 24
    location: "Vargheim"
    factions:
      - "The Grave Wardens"
      - "The Red Tide"
    band_relevant: false
    summary: "As the expedition descends, draugar swarm the surface camp. Red Tide and Compact fighters hold the perimeter. Twelve dead by nightfall. The exit must stay open."

