    effects:
      food_change:
        { delta: -2, cause: "Red Tide river blockade cuts supply lines" }

  - id: "EVT_314_U09_025"
    title: "Dalla Prophecy at Allthing"
    year: 314
    season: "summer"
    day: 91
    category: "supernatural"
    chain: "dalla_awakening"
    chain_order: 11
    location: "Skaldhaven"
    actors:
      - "Dalla"
    band_relevant: true
    summary: "Dalla walks into the Allthing grounds uninvited. She speaks in a flat voice: 'The barrow at the center of the world wakes in autumn. What sleeps there does not forgive.' Then she collapses."

  - id: "EVT_314_U10_026"
    title: "Bone Pack Claims Ashmark"
    year: 314
    season: "summer"
    day: 95
    category: "military"
    location: "Ashmark"
    factions:
      - "The Bone Pack"
    band_relevant: false
    summary: "The reinforced Bone Pack walks into Ashmark and declares itself the settlement's guard force. The headman had no fighters left to argue with."

  - id: "EVT_314_U11_027"
    title: "Thorne's Hunters Arrive"
