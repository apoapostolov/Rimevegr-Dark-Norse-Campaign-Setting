# Iron Ledger — Y314-Y315 Event Database
# ~120 canonical events across eight seasons (Y314 Reconstruction/Second Crisis, Y315 Endgame).
# Schema: see EVENT_SCHEMA.md. Loaded by event_manager.py.
# Chain orders continue from Y313 endpoints.

events:
  # ============================================================
  # Y314 SPRING (Days 1–60) — Post-War Reconstruction
  # ============================================================

