    location: "Grimholt"
    actors:
      - "Ordovast"
    factions:
      - "The Iron Grip"
    band_relevant: false
    summary: "Ordovast declares the war won, though half his vassal settlements sent no representatives and Deepholm remains unbroken. He orders a feast no one can afford."
    prerequisites:
      - "EVT_313_W17_092"

  - id: "EVT_314_S03_003"
    title: "Kell Settles the Last Coin"
