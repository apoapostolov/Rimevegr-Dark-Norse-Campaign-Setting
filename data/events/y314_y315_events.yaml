  - id: "EVT_315_U04_079"
    title: "Widow's True Price"
    year: 315
    season: "summer"
    day: 78
    category: "political"
    chain: "widows_web"
    chain_order: 21
    actors:
      - "Pale Widow"
      - "Voss Cold-Eye"
    factions:
      - "The Whispering Circle"
    band_relevant: true
