    year: 314
    season: "spring"
    day: 2
    category: "social"
    location: "Frostfjord Hollow"
    band_relevant: false
    summary: "Frostfjord tallies the winter dead. Forty-three names read aloud at the quay. The youngest was six."

  - id: "EVT_314_S02_002"
    title: "Ordovast Claims War Victory"
    year: 314
