  - id: "EVT_315_U11_086"
    title: "Expedition Returns"
    year: 315
    season: "summer"
    day: 98
    category: "military"
    chain: "voss_command"
    chain_order: 14
    location: "Skaldhaven"
    actors:
      - "Voss Cold-Eye"
    band_relevant: true
    summary: "Forty-three fighters walk back into Skaldhaven from sixty. Nobody cheers. Nobody needs to. The barrow hum has stopped across the entire Rimevegr. People stand in doorways and watch them pass."

  - id: "EVT_315_U12_087"
