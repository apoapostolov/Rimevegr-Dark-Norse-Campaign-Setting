  - id: "EVT_314_U02_018"
    title: "Ordovast Sabotages the Fair"
    year: 314
    season: "summer"
    day: 66
    category: "political"
    chain: "iron_grip"
    chain_order: 24
    location: "Deepholm"
    actors:
      - "Ordovast"
    factions:
      - "The Iron Grip"
    band_relevant: false
