    title: "The Galdr-Forge"
    year: 315
    season: "summer"
    day: 88
    category: "supernatural"
    chain: "ash_past"
    chain_order: 10
    actors:
      - "Thorne Ash-Born"
      - "Dalla"
      - "Voss Cold-Eye"
    band_relevant: true
    summary: "Three levels down, they find it. A stone chamber with a forge that burns without fuel. Runes cover every surface. Thorne's entire body glows. Dalla says: 'This is where they made you. This is where we end it.'"
    prerequisites:
      - "EVT_314_W04_050"

  - id: "EVT_315_U08_083"
    title: "Kell Holds the Gate"
    year: 315
    season: "summer"
    day: 90
    category: "military"
    actors:
      - "Kell Hook"
      - "Bjorn the Lean"
    band_relevant: true
    summary: "Draugar pour from a side tunnel. Kell and Bjorn hold a narrow chokepoint for six hours while the rune-workers do what must be done. Kell fights with a calm precision no one has ever seen from him."

  - id: "EVT_315_U09_084"
    title: "Sealing the Forge"
    year: 315
    season: "summer"
    day: 92
    category: "supernatural"
    chain: "waking_barrows"
    chain_order: 25
    actors:
      - "Thorne Ash-Born"
      - "Dalla"
    band_relevant: true
