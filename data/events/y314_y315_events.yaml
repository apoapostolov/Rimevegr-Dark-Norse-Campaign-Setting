    day: 122
    category: "supernatural"
    chain: "waking_barrows"
    chain_order: 26
    band_relevant: false
    summary: "For the first time in four years, no barrow in the Rimevegr shows light, sound, or activity. The Grave Wardens continue patrols but find nothing. The sealing holds."

