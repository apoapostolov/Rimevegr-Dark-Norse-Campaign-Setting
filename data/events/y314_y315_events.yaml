  - id: "EVT_314_A02_033"
    title: "Ordovast Hires the Bone Pack"
    year: 314
    season: "autumn"
    day: 126
    category: "political"
    chain: "iron_grip"
    chain_order: 26
    location: "Grimholt"
    actors:
      - "Ordovast"
    factions:
      - "The Iron Grip"
      - "The Bone Pack"
    band_relevant: false
    summary: "Ordovast pays the Bone Pack eighty silver to garrison Ashmark and threaten Raven's Perch. He cannot hold territory with loyal men, so he buys disloyal ones."

  - id: "EVT_314_A03_034"
    title: "Dalla Walks to the Barrow"
    year: 314
    season: "autumn"
    day: 130
    category: "supernatural"
    chain: "dalla_awakening"
    chain_order: 12
    location: "Vargheim"
    actors:
      - "Dalla"
    band_relevant: true
    summary: "Dalla walks three days to the Vargheim barrow without food or water, lies on the cracked stone, and sleeps for two days. When she wakes, she says: 'It knows my name.'"

  - id: "EVT_314_A04_035"
    title: "Harvest Assessment — Below Survival"
    year: 314
    season: "autumn"
    day: 134
    category: "economic"
    band_relevant: false
    summary: "Regional harvest tallied at sixty percent of the minimum needed. The war burned fields. The spring planting failed. Without imports, people will die before midwinter."
    effects:
      food_change: { delta: -4, cause: "Post-war harvest catastrophically low" }

  - id: "EVT_314_A05_036"
    title: "Petra's Sister Tells the Truth"
    year: 314
    season: "autumn"
    day: 138
    category: "personal"
    chain: "petra_sister"
    chain_order: 8
    actors:
      - "Petra Shepherd"
    band_relevant: true
    summary: "Petra's sister finally speaks about what happened in the south. Slavers. A burned house. Things she had to do to survive. Petra listens without moving. Her face could be carved from stone."

  - id: "EVT_314_A06_037"
    title: "Grave Wardens Declare Emergency"
    year: 314
    season: "autumn"
    day: 142
    category: "military"
    chain: "grave_wardens"
    chain_order: 9
    location: "Skaldhaven"
    actors:
      - "Bryn"
    factions:
      - "The Grave Wardens"
    band_relevant: true
    summary: "Bryn sends riders to every settlement: three barrows have breached. Wisp-lights move between them at night. The Wardens cannot cover all three. Bands are offered double rates for barrow-clearing contracts."

  - id: "EVT_314_A07_038"
    title: "Widow Opens Grain Stores"
    year: 314
    season: "autumn"
    day: 148
    category: "economic"
    chain: "widows_web"
    chain_order: 18
    location: "Ashen Reach"
    actors:
      - "Pale Widow"
    factions:
      - "The Whispering Circle"
    band_relevant: false
    summary: "The Widow opens hidden grain stores at Ashen Reach and sells below market. Settlements that take the grain owe the Circle debts that are carefully recorded and never discussed aloud."

  - id: "EVT_314_A08_039"
    title: "Thorne Confronts His Pursuers"
    year: 314
    season: "autumn"
    day: 152
    category: "personal"
    chain: "thorne_curse"
    chain_order: 10
    actors:
      - "Thorne Ash-Born"
      - "Kell Hook"
    band_relevant: true
    summary: "Thorne and Kell intercept the two hunters outside Thornwall. Words, then weapons. One hunter dies. The other escapes south. The blood-price just doubled."
    prerequisites:
      - "EVT_314_U11_027"

  - id: "EVT_314_A09_040"
    title: "Red Tide Meets the Dead"
    year: 314
    season: "autumn"
    day: 158
    category: "supernatural"
    chain: "red_tide"
    chain_order: 9
    location: "Bleakwater Landing"
    actors:
      - "Wulfgar"
    factions:
      - "The Red Tide"
    band_relevant: false
    summary: "A Red Tide raiding party camps near a barrow for the night. Three men are found dead at dawn — no wounds, faces frozen in terror. Wulfgar burns the camp and moves upriver."

  - id: "EVT_314_A10_041"
    title: "Ash Reads the Bone Tablet"
    year: 314
    season: "autumn"
    day: 164
    category: "supernatural"
    chain: "ash_past"
    chain_order: 8
    actors:
      - "Thorne Ash-Born"
    band_relevant: true
    summary: "Working alone by firelight for weeks, Thorne deciphers the bone tablet. It describes a galdr-forge beneath the Iron Barrow — a place where runes were first carved into living flesh. His rune-marks ache."
    prerequisites:
      - "EVT_314_S14_014"

  - id: "EVT_314_A11_042"
    title: "Second Barrow Eruption"
    year: 314
    season: "autumn"
    day: 170
    category: "supernatural"
    chain: "waking_barrows"
    chain_order: 16
    location: "Deepholm"
    band_relevant: true
    summary: "The barrow west of Deepholm erupts — not light this time, but sound. A subsonic pulse that cracks plaster walls and stops the hearts of two elderly residents. The dead are walking inside."

  - id: "EVT_314_A12_043"
    title: "Compact and Grip Forced Truce"
    year: 314
    season: "autumn"
    day: 176
    category: "political"
    chain: "fjord_compact"
    chain_order: 13
    location: "Thornwall"
    actors:
      - "Sigrun"
      - "Ordovast"
    factions:
      - "The Fjord Compact"
      - "The Iron Grip"
    band_relevant: false
    summary: "Sigrun and Ordovast meet at Thornwall under truce. They hate each other. But the barrows are worse than either of them. A ceasefire is signed — valid until spring."

  - id: "EVT_314_A13_044"
    title: "Band Takes Barrow Contract"
    year: 314
    season: "autumn"
    day: 182
    category: "military"
    chain: "voss_command"
    chain_order: 10
    actors:
      - "Voss Cold-Eye"
      - "Bryn"
    factions:
      - "The Grave Wardens"
    band_relevant: true
    summary: "Voss signs with the Grave Wardens for sixty silver — clear and seal the Moor's End barrow. The most dangerous contract the Black Axes have ever taken."

  - id: "EVT_314_A14_045"
    title: "Dalla Culmination"
    year: 314
    season: "autumn"
    day: 190
    category: "supernatural"
    chain: "dalla_awakening"
    chain_order: 13
    location: "Vargheim"
    actors:
      - "Dalla"
    band_relevant: true
    summary: "Dalla enters the Vargheim barrow alone. She emerges three days later, barefoot, calm, glowing faintly. She says: 'I closed the first door. There are seven.' The Vargheim barrow goes dark."

  - id: "EVT_314_A15_046"
    title: "Autumn Storms Batter Coast"
    year: 314
    season: "autumn"
    day: 200
    category: "weather"
    location: "Frostfjord Hollow"
    band_relevant: false
    summary: "Three days of gale-force winds destroy what remained of the Frostfjord docks. Two trading ships lost. The coast road floods again. Winter is early."
    effects:
      food_change:
        { delta: -2, cause: "Autumn storms destroy trade infrastructure" }

  # ============================================================
  # Y314 WINTER (Days 211–360) — Supernatural Crisis
  # ============================================================

  - id: "EVT_314_W01_047"
    title: "Veil Thinning Begins"
    year: 314
    season: "winter"
    day: 212
    category: "supernatural"
    chain: "waking_barrows"
    chain_order: 17
    band_relevant: true
    summary: "Every seiðr-practitioner in the Rimevegr reports the same thing: the barrier between the living world and the barrow-dead is thinner than it has been since the Cracking. Not metaphor. Measurable."
    effects:
      morale_change:
        { delta: -2, cause: "Veil-thinning confirmed across the region" }

  - id: "EVT_314_W02_048"
