    location: "Deepholm"
    actors:
      - "Sigrun"
    factions:
      - "The Fjord Compact"
    band_relevant: false
    summary: "Eleven of fifteen settlements send representatives. The regional council is ratified. Sigrun is elected first chair for a two-year term. It is imperfect and fragile and real."

  - id: "EVT_315_W03_108"
    title: "Widow Takes Council Seat"
    year: 315
    season: "winter"
    day: 226
    category: "political"
