    year: 315
    season: "summer"
    day: 115
    category: "economic"
    chain: "fjord_compact"
    chain_order: 16
    location: "Deepholm"
    actors:
      - "Sigrun"
    factions:
      - "The Fjord Compact"
    band_relevant: false
    summary: "With the barrow threat ended and trade routes reopened, merchant ships return to Deepholm. Prices stabilize. The Compact now controls the strongest economic network the Rimevegr has seen."
    effects:
      food_change:
        { delta: 4, cause: "Post-crisis trade boom restores supply lines" }

  - id: "EVT_315_U15_090"
    title: "Lump Finds a Bone"
    year: 315
    season: "summer"
    day: 119
    category: "personal"
    actors:
      - "Lump"
    band_relevant: true
    summary: "Lump digs up a massive thighbone from outside the sealed barrow. He carries it everywhere for a week. Nobody has the heart to take it away."

  # ============================================================
  # Y315 AUTUMN (Days 121–210) — Resolution and Consequences
  # ============================================================

