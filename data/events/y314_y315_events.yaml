      - "EVT_314_A14_045"

  - id: "EVT_314_W12_058"
    title: "Ordovast's Last Gamble"
    year: 314
    season: "winter"
    day: 290
    category: "political"
    chain: "iron_grip"
    chain_order: 28
    location: "Grimholt"
    actors:
      - "Ordovast"
    factions:
      - "The Iron Grip"
    band_relevant: true
