  - id: "EVT_314_U06_022"
    title: "Allthing Votes on Barrow Tithe"
    year: 314
    season: "summer"
    day: 80
    category: "political"
    chain: "allthing"
    chain_order: 4
    location: "Skaldhaven"
    factions:
      - "The Grave Wardens"
    band_relevant: true
    summary: "Bryn demands a barrow tithe — every settlement contributes fighters or silver toward barrow-clearing. The vote divides sharply. Ordovast abstains. Sigrun supports. The Widow watches."
    branches:
      - condition: "tithe_passes"
        result: "Regional defense against the supernatural threat. Grave Wardens gain legitimate authority."
      - condition: "tithe_fails"
        result: "Settlements fend for themselves. Barrow crisis escalates without coordination."

  - id: "EVT_314_U07_023"
    title: "Kell Wins a Fistfight"
    year: 314
    season: "summer"
    day: 84
    category: "personal"
    actors:
      - "Kell Hook"
    band_relevant: true
    summary: "Kell beats a Bone Pack fighter in a bare-knuckle bout at the Allthing grounds. No stakes. He did it because the man insulted Bjorn. Something has shifted in Kell."

  - id: "EVT_314_U08_024"
    title: "Red Tide Blockades Bleakwater"
    year: 314
    season: "summer"
    day: 88
    category: "military"
    chain: "red_tide"
    chain_order: 8
    location: "Bleakwater Landing"
    actors:
      - "Wulfgar"
    factions:
      - "The Red Tide"
    band_relevant: false
