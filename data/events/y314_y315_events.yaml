    actors:
      - "Kell Hook"
      - "Gest Ledger"
    band_relevant: true
    summary: "Kell drops a leather pouch on Gest's table — the last of the debt, earned by winter guard work. Gest counts it twice, nods. Kell is square for the first time in two years."
    prerequisites:
      - "EVT_313_S09_009"

  - id: "EVT_314_S04_004"
    title: "Thaw Reveals Mass Graves"
    year: 314
    season: "spring"
    day: 9
    category: "weather"
    location: "Ashmark"
    band_relevant: false
    summary: "Hasty winter burials around Ashmark surface in the melt. The living cannot rebury the dead fast enough. Crows move in columns."

  - id: "EVT_314_S05_005"
    title: "Sigrun Rebuilds the Compact"
    year: 314
    season: "spring"
    day: 12
    category: "political"
    chain: "fjord_compact"
    chain_order: 11
    location: "Deepholm"
    actors:
      - "Sigrun"
    factions:
      - "The Fjord Compact"
    band_relevant: false
    summary: "Sigrun invites Stonebay and Bleakwater to join the Compact on reduced terms — half tribute, full protection. Both accept within a week."
    prerequisites:
      - "EVT_313_W12_087"

  - id: "EVT_314_S06_006"
    title: "Petra's Sister Arrives"
    year: 314
    season: "spring"
    day: 14
    category: "personal"
    chain: "petra_sister"
    chain_order: 7
    actors:
      - "Petra Shepherd"
    band_relevant: true
    summary: "A cart from the south brings a thin woman with burn scars on her arms. Petra says nothing for a long time. They stand in the mud and hold each other."
    prerequisites:
      - "EVT_313_W11_086"

  - id: "EVT_314_S07_007"
    title: "Barrow Fields Quiet — Too Quiet"
    year: 314
    season: "spring"
    day: 16
    category: "supernatural"
    chain: "waking_barrows"
    chain_order: 14
    location: "Vargheim"
    band_relevant: false
    summary: "The green lights that pulsed all winter have stopped. The humming has stopped. The barrow fields are silent. Nobody believes this is good news."
    prerequisites:
      - "EVT_313_W22_097"

  - id: "EVT_314_S08_008"
    title: "Widow Collects on Petra's Debt"
    year: 314
    season: "spring"
    day: 18
    category: "personal"
    chain: "widows_web"
    chain_order: 16
    actors:
      - "Pale Widow"
      - "Petra Shepherd"
    factions:
      - "The Whispering Circle"
    band_relevant: true
    summary: "A Whispering Circle agent arrives at the Black Axes camp and asks Petra to deliver a sealed letter to Sigrun. The favor, it seems, is espionage."
    prerequisites:
      - "EVT_313_W11_086"
    branches:
      - condition: "petra_delivers_letter"
        result: "Petra becomes a Widow asset. The band's loyalty is compromised."
      - condition: "petra_refuses_widow"
        result: "Petra breaks the deal. The Widow's healers stop treating her sister."

  - id: "EVT_314_S09_009"
    title: "Voss Takes Spring Contract"
    year: 314
    season: "spring"
    day: 21
    category: "military"
    chain: "voss_command"
    chain_order: 8
    location: "Stonebay Hamlet"
    actors:
      - "Voss Cold-Eye"
      - "Gest Ledger"
    band_relevant: true
    summary: "Voss signs a patrol contract for Stonebay — thirty silver for two months clearing bandits from the coast road. It pays the bills. It does not rebuild the band."
    prerequisites:
      - "EVT_313_W07_082"

  - id: "EVT_314_S10_010"
    title: "Bone Pack Absorbs Hollow Hall"
    year: 314
    season: "spring"
    day: 24
    category: "military"
    location: "Moor's End"
    factions:
      - "The Bone Pack"
      - "The Hollow Hall"
    band_relevant: false
