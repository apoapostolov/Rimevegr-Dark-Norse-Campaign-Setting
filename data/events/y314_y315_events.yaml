  - id: "EVT_314_S11_011"
    title: "Dalla Speaks in Tongues"
    year: 314
    season: "spring"
    day: 27
    category: "supernatural"
    chain: "dalla_awakening"
    chain_order: 10
    location: "Ashen Reach"
    actors:
      - "Dalla"
    band_relevant: false
    summary: "Dalla begins speaking in a language no one recognizes. The words come in her sleep and continue when she wakes. A seiðr-woman from Skaldhaven is summoned."
    prerequisites:
      - "EVT_313_W09_084"

  - id: "EVT_314_S12_012"
    title: "Refugees Flood Feldwick"
    year: 314
    season: "spring"
    day: 30
    category: "economic"
    location: "Feldwick"
    band_relevant: false
    summary: "Forty refugees from burned farmsteads arrive in Feldwick with nothing. The settlement cannot feed them. Arguments break out over rations."
    effects:
      food_change:
        { delta: -2, cause: "Refugee influx strains Feldwick stores" }

  - id: "EVT_314_S13_013"
    title: "Three Wolves Switch Sides"
    year: 314
    season: "spring"
    day: 33
    category: "political"
    chain: "three_wolves"
    chain_order: 8
    location: "Feldwick"
    actors:
