    effects:
      morale_change:
        { delta: -3, cause: "Midwinter barrow chorus — voices in the hum" }

  - id: "EVT_314_W14_060"
    title: "Year's End Assessment"
    year: 314
    season: "winter"
    day: 355
    category: "social"
    band_relevant: true
    summary: "Gest tallies the year. Silver: adequate. Losses: one Warden auxiliary. Morale: fragile. The band survived another year. But the world outside is worse, and Y315 will decide everything."

