    summary: "Compact fighters march on Raven's Perch with the authority of the Allthing. The Bone Pack sees the numbers and retreats to Ashmark without a fight. Raven's Perch is free."

  - id: "EVT_315_A03_093"
    title: "Ordovast Sighted on Coast Road"
    year: 315
    season: "autumn"
    day: 130
    category: "personal"
    chain: "iron_grip"
    chain_order: 30
    actors:
      - "Ordovast"
    band_relevant: false
    summary: "A trader reports seeing Ordovast walking the coast road south of Frostfjord. Alone. Unarmed. He did not respond when called. The warlord has become a pilgrim or a ghost."

  - id: "EVT_315_A04_094"
    title: "Dalla Returns to Normal"
    year: 315
    season: "autumn"
    day: 135
    category: "personal"
    chain: "dalla_awakening"
    chain_order: 15
    location: "Ashen Reach"
    actors:
      - "Dalla"
    band_relevant: false
    summary: "Dalla wakes one morning and asks for breakfast. She eats three bowls of porridge. Her eyes are brown again. She remembers everything and nothing. The seiðr has passed through her and moved on."

  - id: "EVT_315_A05_095"
    title: "Gest Updates the Ledger"
    year: 315
    season: "autumn"
    day: 140
    category: "economic"
    actors:
      - "Gest Ledger"
      - "Voss Cold-Eye"
    band_relevant: true
    summary: "Gest presents the band's accounts. The barrow contracts and Allthing bonuses have made the Black Axes financially comfortable for the first time since Y312. Not rich. Comfortable. There is a difference."

  - id: "EVT_315_A06_096"
    title: "Thorne's Marks Fade"
    year: 315
    season: "autumn"
    day: 145
    category: "personal"
    chain: "thorne_curse"
    chain_order: 13
    actors:
      - "Thorne Ash-Born"
    band_relevant: true
    summary: "Thorne's rune-marks continue to fade. By autumn they are faint scars. He is no longer a galdr-tool. He is just a man with scars and a band that knows his name."

  - id: "EVT_315_A07_097"
    title: "Harvest — First Decent Year"
    year: 315
    season: "autumn"
    day: 150
    category: "economic"
    band_relevant: false
    summary: "The harvest meets eighty percent of regional need — not abundance, but survival without imports. Fields are healing. The war is two years behind. Recovery is measurable."
    effects:
      food_change: { delta: 3, cause: "First adequate harvest since the war" }

  - id: "EVT_315_A08_098"
    title: "Grave Wardens Shift Mission"
    year: 315
    season: "autumn"
    day: 156
    category: "military"
    chain: "grave_wardens"
    chain_order: 12
    location: "Skaldhaven"
    actors:
      - "Bryn"
    factions:
      - "The Grave Wardens"
    band_relevant: false
    summary: "With the barrows sealed, Bryn reorients the Wardens toward mapping and monitoring. Patrols continue, but the urgency has shifted from crisis to maintenance. Bryn sleeps through the night for the first time in years."

  - id: "EVT_315_A09_099"
    title: "Widow Consolidates Quietly"
    year: 315
    season: "autumn"
    day: 162
    category: "political"
    chain: "widows_web"
    chain_order: 23
    location: "Ashen Reach"
    actors:
      - "Pale Widow"
    factions:
      - "The Whispering Circle"
    band_relevant: false
    summary: "The Widow has the artifacts, the debts, the information networks. She does not declare anything. She does not need to. Everyone who matters knows who holds the real power in the post-crisis Rimevegr."

  - id: "EVT_315_A10_100"
    title: "Bone Pack Disbands"
    year: 315
    season: "autumn"
    day: 168
    category: "military"
    factions:
      - "The Bone Pack"
    band_relevant: false
    summary: "Cut off from their occupied settlements, six Bone Pack fighters drift away over autumn. Their captain is found drunk in Kolvik. The remaining eight take individual contracts. The Bone Pack is finished."

  - id: "EVT_315_A11_101"
    title: "Petra Visits Her Sister"
    year: 315
    season: "autumn"
    day: 174
    category: "personal"
    chain: "petra_sister"
    chain_order: 10
    location: "Deepholm"
    actors:
      - "Petra Shepherd"
    band_relevant: true
    summary: "Petra spends a week in Deepholm. She brings her sister a good axe, a warm cloak, and enough silver to see through winter. They eat together every night. Neither one talks about the past."

  - id: "EVT_315_A12_102"
    title: "Three Wolves Permanent Garrison"
    year: 315
    season: "autumn"
    day: 180
    category: "political"
    chain: "three_wolves"
    chain_order: 9
    location: "Feldwick"
    actors:
      - "Hadric"
    factions:
      - "The Three Wolves"
      - "The Fjord Compact"
    band_relevant: false
    summary: "The Three Wolves formally settle at Feldwick as permanent garrison under Compact charter. Hadric hangs up his sword. His fighters keep theirs, but garden plots are assigned alongside barracks."

  - id: "EVT_315_A13_103"
    title: "Autumn Rites — Real Ones"
    year: 315
    season: "autumn"
    day: 188
    category: "social"
    location: "Thornwall"
    band_relevant: true
    summary: "The autumn feast at Thornwall draws three times last year's attendance. New songs. Some bad. Some good. Rolf gets roaring drunk and recites a poem about the barrow that is mostly profanity. Everyone applauds."

  - id: "EVT_315_A14_104"
    title: "Sigrun Proposes Regional Council"
    year: 315
    season: "autumn"
    day: 196
    category: "political"
    chain: "fjord_compact"
    chain_order: 17
    location: "Deepholm"
    actors:
      - "Sigrun"
    factions:
      - "The Fjord Compact"
    band_relevant: false
    summary: "Sigrun proposes replacing the Allthing's temporary war-footing structure with a permanent regional council. Representatives from every settlement. Taxes. Law. Something that might, for the first time, resemble governance."

  - id: "EVT_315_A15_105"
    title: "Voss Considers the Future"
    year: 315
    season: "autumn"
    day: 205
    category: "personal"
    chain: "voss_command"
    chain_order: 15
    actors:
      - "Voss Cold-Eye"
      - "Gest Ledger"
    band_relevant: true
    summary: "Voss and Gest sit by the fire after the others sleep. Gest asks: what do the Black Axes do in peacetime? Voss stares at the fire for a long time. He does not have an answer yet."

  # ============================================================
  # Y315 WINTER (Days 211–360) — New Equilibrium
  # ============================================================

  - id: "EVT_315_W01_106"
    title: "First Calm Winter"
    year: 315
    season: "winter"
    day: 212
    category: "weather"
    band_relevant: true
    summary: "The cold comes as it always does. But this year there is enough firewood. Enough food. Enough shelter. The Rimevegr settles into winter without dread for the first time in four years."

  - id: "EVT_315_W02_107"
    title: "Compact Council Ratified"
