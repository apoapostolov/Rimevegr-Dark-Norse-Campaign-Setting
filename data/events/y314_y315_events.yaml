  - id: "EVT_314_U03_019"
    title: "Voss Challenged by Rolf"
    year: 314
    season: "summer"
    day: 70
    category: "personal"
    chain: "voss_command"
    chain_order: 9
    actors:
      - "Voss Cold-Eye"
      - "Rolf"
    band_relevant: true
    summary: "Rolf questions Voss's refusal to take the Widow's deal. In front of the band. Voss says nothing. They stare at each other for a long count. Rolf looks away first."

  - id: "EVT_314_U04_020"
    title: "Allthing Opens at Skaldhaven"
    year: 314
    season: "summer"
    day: 75
    category: "social"
    chain: "allthing"
    chain_order: 3
    location: "Skaldhaven"
    actors:
      - "Ordovast"
      - "Sigrun"
      - "Pale Widow"
    factions:
      - "The Iron Grip"
      - "The Fjord Compact"
      - "The Whispering Circle"
    band_relevant: true
    summary: "The first post-war Allthing. All three factions present. Armed guards outnumber delegates. The lawspeaker's hands tremble as he calls the assembly to order."

  - id: "EVT_314_U05_021"
    title: "Widow Reveals War Ledger"
    year: 314
    season: "summer"
    day: 78
    category: "political"
    chain: "widows_web"
    chain_order: 17
    location: "Skaldhaven"
    actors:
      - "Pale Widow"
    factions:
      - "The Whispering Circle"
    band_relevant: true
