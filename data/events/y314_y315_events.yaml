      - "Sigrun"
    factions:
      - "The Three Wolves"
      - "The Fjord Compact"
    band_relevant: true
    summary: "Hadric pledges the Three Wolves to the Compact in exchange for winter provisions and a territorial grant around Feldwick. Sigrun accepts. The power map shifts."
    prerequisites:
      - "EVT_313_W18_093"

  - id: "EVT_314_S14_014"
    title: "Ash Finds the Galdr Fragment"
    year: 314
    season: "spring"
    day: 36
    category: "supernatural"
    chain: "ash_past"
    chain_order: 7
    location: "Skaldhaven"
    actors:
      - "Thorne Ash-Born"
    band_relevant: true
    summary: "While trading in Skaldhaven, Thorne discovers a carved bone tablet in a dead man's belongings. The runes match the marks on his skin. His hands shake."
    prerequisites:
      - "EVT_313_W16_091"

  - id: "EVT_314_S15_015"
    title: "Spring Planting Fails"
    year: 314
    season: "spring"
    day: 42
    category: "economic"
    band_relevant: false
    summary: "War-salted fields around Ashmark and Moor's End yield nothing. The soil is dead. Settlements that depended on local grain face a second year of imports."
    effects:
      food_change: { delta: -3, cause: "War-damaged fields fail to produce" }

  - id: "EVT_314_S16_016"
    title: "Grave Wardens Recruit Hard"
    year: 314
    season: "spring"
    day: 48
    category: "military"
    chain: "grave_wardens"
    chain_order: 8
    location: "Skaldhaven"
    actors:
      - "Bryn"
    factions:
      - "The Grave Wardens"
    band_relevant: true
    summary: "Bryn offers triple wages for barrow-clearing. Thirteen fighters sign on from disbanded warbands. The Wardens are now thirty strong — the largest they have ever been."
    prerequisites:
      - "EVT_313_W13_088"

  # ============================================================
  # Y314 SUMMER (Days 61–120) — Allthing and New Power Structure
  # ============================================================

