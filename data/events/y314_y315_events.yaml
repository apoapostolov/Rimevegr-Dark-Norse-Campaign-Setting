    location: "Raven's Perch"
    actors:
      - "Ordovast"
    factions:
      - "The Iron Grip"
    band_relevant: false
    summary: "Raven's Perch formally breaks from the Iron Grip and declares neutrality. Two other settlements send messengers saying the same. Ordovast has Grimholt, Vargheim, and his pride."
    effects:
      cohesion_change: { union: "The Iron Grip", delta: -3 }

  - id: "EVT_314_U14_030"
    title: "Voss Orders Weapons Maintenance"
    year: 314
    season: "summer"
    day: 115
    category: "military"
    actors:
      - "Voss Cold-Eye"
      - "Bjorn the Lean"
    band_relevant: true
    summary: "Voss has every weapon in the band stripped, oiled, and sharpened. Bjorn spends two days repairing shield rims. Voss says nothing about why. The band understands."

  - id: "EVT_314_U15_031"
    title: "Silent Oar Disappears"
    year: 314
    season: "summer"
    day: 118
    category: "military"
    factions:
      - "The Silent Oar"
    band_relevant: false
    summary: "The Silent Oar pulls up stakes and sails south without a word. Seven fighters, gone overnight. Nobody hired them to leave. Nobody knows why."

