    prerequisites:
      - "EVT_315_U07_082"

  - id: "EVT_315_U10_085"
    title: "Collapse and Retreat"
    year: 315
    season: "summer"
    day: 94
    category: "military"
    chain: "grave_wardens"
    chain_order: 11
    actors:
      - "Bryn"
      - "Voss Cold-Eye"
    factions:
      - "The Grave Wardens"
    band_relevant: true
