  - id: "SUP_UNIQUE_01"
    name: "Draugr-King"
    category: "supernatural"
    subcategory: "unique"
    tier: 5
    description: "Not a mindless corpse. A dead chieftain who refused to stay dead through sheer will and accumulated seidr. Sits on a stone throne in the deepest barrow chamber, perfectly preserved except for the skin — grey-blue and tight as a drum. Wears corroded but intact war-gear. Gold arm rings green with verdigris. The eyes are open, aware, and furious. It speaks in the Old Tongue with a voice like grinding stone. Every draugr in the region answers to it."
    stats:
      MIG: 8
      NIM: 4
      TOU: 8
      WIT: 7
      WIL: 9
      WYR: 8
    hp: 28
    skills:
      - name: "Swords"
        rank: 4
      - name: "Shields"
        rank: 3
      - name: "Seidr"
        rank: 4
      - name: "Intimidation"
        rank: 5
      - name: "Leadership"
        rank: 4
    gear:
      weapons:
        - name: "Rune-Etched War Sword"
          type: "sword"
          speed: 3
          base_damage: 8
      armor:
        torso: "Ancient Mail preserved by seidr"
        head: "Bronze-Inlaid Helm"
        shield: "Iron-Rimmed Round Shield"
    tactics: "Commands lesser draugr to attack first while it assesses threats from its throne. Rises only to deal with worthy opponents or seidr users. Fights with ancient martial skill combined with galdr — curses opponents mid-combat. Targets leaders and seidr users. Will negotiate if addressed with proper respect in the Old Tongue."
    morale_break: "Does not flee its barrow. Can be negotiated with — it wants tribute, respect, and its territory undisturbed. If severely damaged, retreats deeper and seals passages with seidr."
    group_size: "1 (with d6+2 draugr servants)"
    abilities:
      - "Command Dead: controls all draugr within the barrow complex — they act on its will"
      - "Death Curse: can pronounce a curse on a living person — WIL contest or suffer permanent -1 to one stat"
      - "Galdr User: can speak rune-magic (frost bolt d8 damage, fear aura, darkness)"
      - "Ancient Warrior: fights with the skill of a seasoned war-chief, parries and ripostes"
      - "Undying Will: at 0 HP, makes WIL test — success means it continues fighting at 1 HP for d6 more rounds"
      - "Regional Authority: all undead within several miles feel its will and move toward its barrow"
    combat_phases:
      pre_battle:
        - name: "Throne Command"
          description: "Rises from throne — all lesser draugr in the barrow activate simultaneously. Temperature drops to freezing. His voice echoes through the corridors."
      maneuvers:
        - name: "Death Curse Strike"
          description: "Sword blow carries a curse. On hit, target must pass WIL test at -2 or suffer permanent -1 to one stat of the Draugr-King's choice."
          cost: "Once per encounter"
        - name: "Command Surge"
          description: "All lesser draugr in the chamber attack the same target this round."
          cost: "Free action"
      bloodied:
        - name: "Ancient Fury"
          trigger: "Below 50% HP (14 HP)"
          description: "+2 MIG and +1 NIM. Speaks power-words that cause d4 seidr damage per round to everyone in the chamber. Can raise one fresh corpse per round as Shambling Corpse."
      on_death:
        - name: "Barrow Collapse"
          description: "The will holding the barrow structure fails. Ceiling begins to crumble — all combatants have d6 rounds to escape before total collapse. All lesser draugr go dormant. His curse lifts from any living victims."
    resistances:
      ["cold", "fear", "poison", "bleeding", "physical_weapons_non_magical"]
    weaknesses:
      [
        "silver",
        "fire",
        "sunlight",
        "seidr_counterspells",
        "proper_funeral_rites",
      ]
    encounter_conditions:
      terrain: ["barrow_throne_room", "deep_barrow"]
      season: ["any"]
    loot:
      silver_range: [50, 200]
      items:
        [
          "rune_etched_war_sword",
          "gold_arm_rings",
          "bronze_helm",
          "ancient_mail",
        ]
      special: "The throne itself is a seidr anchor — destroying it weakens all draugr in the region. The Draugr-King's sword retains galdr enchantment and functions as a seidr-active weapon."
    image_prompt: |
      A dead chieftain sitting upright on a carved stone throne in a deep
      barrow chamber. Grey-blue skin, perfectly preserved, pulled tight
      over heavy bone. Gold arm rings corroded green. Ancient mail still
      intact, a rune-etched sword across the knees. Bronze-inlaid helm.
      The eyes are OPEN — aware, intelligent, furious. Torchlight from
      the approaching intruders illuminating the chamber. Lesser draugr
      standing motionless along the walls like an honor guard. Carved
      runes on every surface glowing faintly. Overwhelming presence.
      This thing ruled in life and rules still.

  - id: "SUP_UNIQUE_02"
    name: "Galdr-Forge Echo"
    category: "supernatural"
    subcategory: "unique"
    tier: 4
    description: "Not alive. Not dead. Not a spirit. A loop of ancient seidr energy imprinted on stone. In the deepest chamber of the Iron Barrow, where the old masters worked their galdr, the walls remember. Walk into the room and the air thickens. Runes on the walls light up in sequence — the same sequence, every time. A voice speaks words of power that shake your teeth. Shapes form in the air: hands working invisible metal, pouring nothing into nothing. The echo doesn't know it's an echo. It will treat you as an apprentice or an intruder, depending on what you do."
    stats:
      MIG: 0
      NIM: 0
      TOU: 7
      WIT: 8
      WIL: 7
      WYR: 9
    hp: 0
    skills:
      - name: "Seidr"
        rank: 5
      - name: "Lore"
        rank: 5
    gear:
      weapons: []
      armor: {}
    tactics: "The Echo is a loop. It performs the same sequence of galdr-working every time it activates. If interrupted at the wrong point, it lashes out with residual seidr energy — not malicious, reflexive. If a seidr user follows the sequence correctly, the Echo treats them as an apprentice and teaches. Disrupting the runes on the walls damages the Echo."
    morale_break: "Cannot flee. Disrupting the wall-runes weakens it — destroying all runes ends the phenomenon permanently, but also destroys irreplaceable galdr knowledge."
    group_size: "1 (phenomenon)"
    abilities:
      - "Galdr Sequence: performs ancient rune-magic in a repeating loop — seidr users can learn from it (WYR test)"
      - "Reflexive Discharge: if interrupted, releases d8 seidr damage in the chamber — WIL test to halve"
      - "Teaching Mode: if a seidr user mimics the sequence correctly, grants temporary +2 to Seidr skill for one day"
      - "Chamber-Bound: cannot leave the forge chamber — exists only where the runes are intact"
      - "Cannot Be Fought: has no HP, no physical form — can only be disrupted by destroying the runes"
    resistances: ["all_physical", "cold", "fire", "poison"]
    weaknesses:
      [
        "rune_destruction",
        "seidr_counterspells_targeted_at_walls",
        "time_erosion",
      ]
    encounter_conditions:
      terrain: ["iron_barrow_forge_chamber"]
      season: ["any"]
    loot:
      silver_range: [0, 0]
      items: []
      special: "The knowledge contained in the Echo is the real treasure — galdr techniques lost for centuries. A seidr user who spends a week studying the loop can permanently learn one ancient rune-form. The wall-runes themselves can be transcribed but require WYR 6+ to copy accurately."
    image_prompt: |
      A dark stone chamber deep underground. Runes carved into every wall
      surface are glowing in sequence — blue-white, activating one after
      another like a circuit. In the center, translucent shapes of hands
      working at an invisible forge, pouring nothing into nothing. The air
      is thick, distorted. A voice seems to come from the walls themselves.
      A lone figure stands at the entrance, torch held up, watching the
      ancient loop repeat. The technology is clearly beyond anything the
      current age understands. Stone walls, rune-light, deep darkness
      beyond. Awe and danger in equal measure.

  - id: "SUP_UNIQUE_03"
    name: "Veil-Walker"
    category: "supernatural"
    subcategory: "unique"
    tier: 5
    description: "Something that lives on both sides of the Veil simultaneously. It exists here and there at the same time. When it moves, it steps sideways into nothing and reappears three paces to the left. Its shape flickers — sometimes humanoid, sometimes a column of folded space, sometimes a hole in the air with teeth. It does not think like anything that evolved under a sun. When it speaks — and it does speak, in perfect contemporary Norse — the words make grammatical sense but describe concepts that have no referent in human experience."
    stats:
      MIG: 6
      NIM: 8
      TOU: 6
      WIT: 9
      WIL: 9
      WYR: 9
    hp: 18
    skills:
      - name: "Seidr"
        rank: 5
      - name: "Stealth"
        rank: 4
      - name: "Intimidation"
        rank: 5
      - name: "Deception"
        rank: 4
    gear:
      weapons:
        - name: "Phase-Touch"
          type: "unarmed"
          speed: 3
          base_damage: 6
      armor:
        torso: "Veil-Fold Skin (attacks partially pass through)"
        head: "None"
    tactics: "Approaches with alien curiosity. May attempt communication first — the conversation will be disturbing but not immediate hostile. If threatened, phases between realities to avoid attacks and strikes from unexpected angles. Targets seidr users with fascination. May attempt to take a living person across the Veil. Its motives are incomprehensible."
    morale_break: "Does not experience morale in any recognizable sense. Sustained iron contact causes it pain and it will avoid iron-wielders. Powerful seidr barriers can trap it on one side of the Veil, making it vulnerable. It may simply lose interest and leave."
    group_size: "1"
    abilities:
      - "Phase Shift: can step between Veil and reality at will — untargetable for 1 round after shifting"
      - "Bilocation: exists on both sides simultaneously — can see and act in both reality and Veil-space"
      - "Alien Communication: speaks perfect Norse but describes impossible concepts — WIL test or gain Confused condition for d6 rounds"
      - "Veil Drag: can attempt to pull a target partially into the Veil — MIG + WIL contest, failure means d8 damage and partial phasing (target becomes translucent, -2 to all physical actions for d6 hours)"
      - "Reality Rejection: physical attacks have 50% chance of passing through harmlessly"
      - "Seidr Fascination: drawn to seidr users, will prioritize interaction (not necessarily hostile) with them"
    combat_phases:
      pre_battle:
        - name: "Spatial Distortion"
          description: "The area warps — distances become unreliable. All movement costs double. Compasses spin uselessly."
      maneuvers:
        - name: "Veil Rip"
          description: "Tears a hole in reality at a point within 10 paces. d6 damage to all within 3 paces from spatial shearing. Veil-Shadows may emerge from the tear."
          cost: "Replaces attack"
        - name: "Phase Strike"
          description: "Strikes from an impossible angle. Target cannot use shield bonus for this attack."
          cost: "Free action, once per 3 rounds"
      bloodied:
        - name: "Dimensional Bleed"
          trigger: "Below 50% HP (9 HP)"
          description: "Becomes semi-transparent. Physical attacks now have 75% chance of passing through (up from 50%). Can pull one target partially into the Veil each round — contested WIL test."
      on_death:
        - name: "Veil Scar"
          description: "Permanent tear in reality at the death-site. Veil entities are drawn to it permanently. Within 10 paces, the living see ghosts and the dead see the living. The scar cannot be sealed by any known means."
    resistances: ["physical_weapons_partial", "cold", "fire", "poison", "fear"]
    weaknesses:
      [
        "iron_sustained_contact",
        "seidr_barriers",
        "veil_sealing_rituals",
        "silver",
      ]
    encounter_conditions:
      terrain:
        [
          "veil_rupture",
          "veil_thin_spot",
          "barrow_deep",
          "standing_stones_at_solstice",
        ]
      season: ["winter_solstice", "equinox", "during_hush_events"]
    loot:
      silver_range: [0, 0]
      items: []
      special: "If somehow destroyed (extremely difficult), it leaves a permanent Veil scar — a point where reality is always thin. This scar can be used as a stable gateway for seidr workings but attracts other Veil entities permanently. Its phase-residue is the rarest seidr component known — enables workings that bridge realities."
    image_prompt: |
      A figure that exists wrong. Humanoid one moment, a folded column
      of space the next, then a hole in the air with the suggestion of
      teeth. It flickers between states like a badly spliced image.
      Standing at a crossroads near standing stones under a winter sky.
      The ground beneath it shows two shadows pointing in different
      directions. One hand is reaching toward a terrified Norse warrior,
      the other hand isn't in this reality. The air around it is visually
      distorted like heat haze. Stars visible through its body where
      stars shouldn't be. The most unsettling thing in the bestiary.
      Cosmic wrongness wearing a human-shaped mask. Desaturated palette
      with occasional flickers of impossible color.
