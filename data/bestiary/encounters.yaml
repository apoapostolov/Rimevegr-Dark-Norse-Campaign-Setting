        count: 2
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 2
      - enemy_id: "UND_SKEL_02"
        name: "Skeleton Archer"
        count: 2
      - enemy_id: "UND_APT_01"
        name: "Aptrgangr"
        count: 1
