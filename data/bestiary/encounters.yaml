      - "Oppressive cold — TOU test each round or suffer frostbite penalties"
      - "Echo chamber — all sound amplified, stealth impossible"
    difficulty: "deadly"
    loot_bonus: "Hoard: 200+ silver in gold, jewels, weapons. Cursed crown — immense value but attracts undead attention permanently"
    notes: "DESIGNED TO BE UNWINNABLE for most parties. The haugbui cannot be permanently destroyed without knowing its true name. Grabbing treasure and fleeing is the realistic play."

  - id: "ENC_BARROW_010"
    name: "Grave-Dust Ambush"
    terrain: "barrow"
    tier: 2
    season: ["autumn"]
    time_of_day: "any"
