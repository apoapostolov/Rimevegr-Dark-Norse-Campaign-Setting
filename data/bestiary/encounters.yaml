    enemies:
      - enemy_id: "HUM_SELL_02"
        name: "Sellsword"
        count: 2
      - enemy_id: "HUM_SPEC_04"
        name: "Tomb Robber"
        count: 1
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 3
    battlefield_conditions:
      - "Three-way fight — rival wardens, draugr, and you"
      - "Narrow gallery — only 2 abreast, flanking impossible"
      - "Rival torchbearer drops light if killed — plunges zone into darkness"
    difficulty: "hard"
    loot_bonus: "Rival wardens carry: 30 silver, iron tools, rope. Draugr burial goods: 15 silver"
