    difficulty: "hard"
    loot_bonus: "Frost-preserved burial cloak: fine wool, 25 silver to a merchant"
    notes: "The frost aptrgangr's touch numbs limbs. Each hit on a limb reduces that limb's function for the rest of the encounter."

