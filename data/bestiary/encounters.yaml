    difficulty: "deadly"
    loot_bonus: "Skull of a seer: seidr focus worth 50 silver to the right buyer"
    notes: "Destroying skulls reduces the chorus effect — 10 skulls destroyed per round of effort. The wailing dead is the conductor; killing it silences the choir."

