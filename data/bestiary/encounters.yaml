    notes: "The moor stalker drives wolves toward prey, then attacks the weakened survivor. Holding ground in a tight formation reduces flanking."

  - id: "ENC_MOOR_003"
    name: "Wandering Dead"
    terrain: "moor"
    tier: 2
    season: ["winter"]
    time_of_day: "night"
    description: "A figure stumbles across the moor in the moonlight, dragging one leg. Then another rises from a hollow. Then two more."
    enemies:
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 4
    battlefield_conditions:
      - "Open moor — no cover anywhere within sprinting distance"
      - "Driving rain — -1 to ranged attacks, bowstrings slacken"
      - "Soft ground — the dead don't sink, but the living do"
    difficulty: "moderate"
    loot_bonus: "Tattered burial goods: 6 silver total across all bodies"
    notes: "These dead wander from a distant barrow. Destroying them here does not solve the source problem. They are slow — outrunning them is viable."

  - id: "ENC_MOOR_004"
    name: "Will-o'-Wisp Lure"
    terrain: "moor"
    tier: 3
    season: ["autumn"]
    time_of_day: "night"
    description: "Pale lights dance ahead, always just at the edge of sight. They look like lanterns. They are not lanterns."
    enemies:
      - enemy_id: "UND_VEIL_01"
        name: "Wisp"
        count: 3
      - enemy_id: "SUP_CORR_01"
        name: "Bog Corruption"
        count: 1
    battlefield_conditions:
      - "Will-o-wisps mislead — Awareness test to keep bearings, failure moves you toward deep bog"
      - "Standing stones nearby create seidr amplification — spells stronger but unpredictable"
      - "Ankle-deep water everywhere — no dry ground to rest"
    difficulty: "hard"
    loot_bonus: "Wisp-glass (captured wisp light): 20 silver to a volva, dims in sunlight"
    notes: "The wisps lure travelers into the bog corruption's reach. Ignoring the lights and navigating by stars or landmarks is the safest course."

  - id: "ENC_MOOR_005"
    name: "Abandoned Croft Defence"
    terrain: "moor"
    tier: 2
    season: ["winter", "spring"]
    time_of_day: "night"
    description: "A ruined croft offers the only shelter on the moor. You're not the first to think so — and what comes after dark knows people shelter here."
    enemies:
      - enemy_id: "ANI_WOLF_02"
        name: "Lone Wolf"
        count: 1
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 4
    battlefield_conditions:
      - "Ruined croft walls provide half-cover but gaps on two sides"
      - "No door — barricade must be improvised from debris"
      - "Wolves test defense, retreat, and probe from another direction"
    difficulty: "moderate"
    loot_bonus: "Previous shelter occupant's abandoned pack: blanket, flint, 3 silver"
    notes: "Holding the croft through the night is feasible with fire and watchfulness. Wolves give up by dawn."

  - id: "ENC_MOOR_006"
    name: "Bog-Thing Emergence"
    terrain: "moor"
    tier: 4
    season: ["autumn", "winter"]
    time_of_day: "dusk"
    description: "The peat splits open like a wound. Something ancient hauls itself upright — wrapped in black mud, trailing roots, wearing the face of a man dead two hundred years."
    enemies:
      - enemy_id: "UND_APT_03"
        name: "Elder Aptrgangr"
        count: 1
      - enemy_id: "UND_DRAUGR_02"
        name: "Shambling Dead"
        count: 2
    battlefield_conditions:
      - "Saturated peat — fighters sink to mid-calf, movement at quarter speed"
      - "Bog-thing pulls victims under — grapple drags toward submerged peat"
      - "No solid ground within 50 paces — fighting retreat is a slog"
    difficulty: "deadly"
    loot_bonus: "Bog iron weapon fused to the thing's hand: corroded but ancient, 30 silver as a curiosity"
    notes: "DESIGNED TO BE UNWINNABLE on its home ground. The bog-thing regenerates from peat. Fighting it on solid ground (if you can lure it) negates regeneration."

  - id: "ENC_MOOR_007"
    name: "Moor Bandit Toll"
    terrain: "moor"
    tier: 2
    season: ["summer", "autumn"]
    time_of_day: "day"
    description: "Three cairns mark a junction on the moor path. A woman sits on the middle one, sharpening a seax. Her companions rise from behind the other two."
    enemies:
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 3
    battlefield_conditions:
      - "Cairns provide half-cover for both sides"
      - "Open moor beyond — fleeing exposes your back for 100 paces"
      - "Wet heather underfoot — slippery but passable"
    difficulty: "moderate"
    loot_bonus: "Toll collection: 20 silver in mixed coins, a stolen brooch worth 10 silver"
    notes: "The sergeant is pragmatic — she'll negotiate if outnumbered or if you look too dangerous. Paying the toll (5 silver per head) avoids the fight entirely."

  - id: "ENC_MOOR_008"
    name: "Seidr Storm"
    terrain: "moor"
    tier: 4
    season: ["winter"]
    time_of_day: "night"
    description: "Lightning strikes the standing stones and doesn't stop. The air crackles with unnatural charge. Between the stones, the Veil tears and things push through."
    enemies:
      - enemy_id: "SUP_VEIL_02"
        name: "Veil-Bleeder"
        count: 1
      - enemy_id: "SUP_SPIRIT_01"
        name: "Lost Spirit"
        count: 2
      - enemy_id: "SUP_CORR_03"
        name: "Seidr Parasite"
        count: 1
    battlefield_conditions:
      - "Standing stones — seidr amplification zone, all magic doubled but wild"
      - "Lightning strikes randomly — each round, roll for strike location"
      - "Wet ground conducts — metal armor increases lightning attraction"
      - "Veil-thin zone — spirits partially immune to physical attacks"
    difficulty: "deadly"
    loot_bonus: "Storm-glass (lightning-fused sand) from impact sites: 40 silver to an alchemist"
    notes: "Sheltering behind stone and waiting for the storm to pass is the sane option. The entities disperse when the storm ends. Fighting draws more lightning."

  - id: "ENC_MOOR_009"
    name: "Sheep-Killing Beast"
    terrain: "moor"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "Mangled sheep carcasses along the moor trail. A farm-hand waves you down, desperate — something is killing his flock and the jarl won't send men."
    enemies:
      - enemy_id: "ANI_PRED_02"
        name: "Moor Cat"
        count: 1
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 2
    battlefield_conditions:
      - "Long grass conceals predator approach — Awareness to spot before close range"
      - "Sheep stampede if combat erupts — risk of being knocked prone"
      - "Rocky outcrop nearby provides high ground advantage"
    difficulty: "moderate"
    loot_bonus: "Farmer's gratitude: 10 silver and free lodging. Cat pelt: 12 silver"
    notes: "Social encounter potential — the farmer knows local terrain and can guide through the moor safely."

  - id: "ENC_MOOR_010"
    name: "Drowned Man's Crossing"
    terrain: "moor"
    tier: 3
    season: ["spring"]
    time_of_day: "dusk"
    description: "A shallow stream crossing, stones slick with algae. A man stands in the middle, water to his waist, unmoving. He's been dead for weeks."
    enemies:
      - enemy_id: "UND_SPEC_04"
        name: "Risen Drowner"
        count: 1
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 2
    battlefield_conditions:
      - "Stream crossing — waist-deep, slippery stones, difficult footing"
      - "Current pulls toward deeper pool — STR test to maintain position"
      - "Drowner grapples and drags under — drowning rules apply after 2 rounds submerged"
    difficulty: "hard"
    loot_bonus: "Drowned merchant's waterlogged pack: ruined goods but 15 silver in sealed pouch"
    notes: "Crossing upstream or downstream adds an hour but avoids the encounter. The drowner only holds territory at this specific crossing."

  - id: "ENC_MOOR_011"
    name: "Corrupted Spring"
    terrain: "moor"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "any"
    description: "The spring was holy once — carved stones and faded offerings surround it. Now the water runs black and the air smells of rot. Something nests in the basin."
    enemies:
      - enemy_id: "SUP_CORR_04"
        name: "Corruption Bloom"
        count: 1
      - enemy_id: "ANI_VERM_02"
        name: "Plague Rats"
        count: 1
    battlefield_conditions:
      - "Corrupted ground — any wound sustained here resists healing for 24 hours"
      - "Slippery moss on carved stones — difficult terrain around the spring"
      - "Black water spray — contact causes nausea, TOU test or -1 for 1 hour"
    difficulty: "hard"
    loot_bonus: "Purified spring (if corruption cleared): local village pays 30 silver and gives supplies"
    notes: "Destroying the corruption bloom purifies the spring over several days. The rats flee when the bloom dies. Drinking the black water is a very bad idea."

  - id: "ENC_MOOR_012"
    name: "Burial Mound Hornet Nest"
    terrain: "moor"
    tier: 1
    season: ["summer"]
    time_of_day: "day"
    description: "What looked like a small barrow from a distance is actually a collapsed cairn with a massive hornet nest built into it. And you just walked too close."
    enemies:
      - enemy_id: "ANI_HAZ_03"
        name: "Hornet Swarm"
        count: 1
    battlefield_conditions:
      - "Swarm — cannot be hit with single-target weapons, area damage only"
      - "Open moor — running is viable but swarm pursues for 200 paces"
      - "Stings cause swelling — cumulative -1 penalty per round of exposure"
    difficulty: "easy"
    loot_bonus: "Honeycomb inside the cairn: worth 5 silver, excellent trade goods"
    notes: "Fire or smoke drives the swarm away. Submerging in a bog pool provides cover but risks other hazards. A comedy encounter — not every danger on the moor wants to eat your soul."

  # ========================================================================
  # COAST ENCOUNTERS (ENC_COAST_001 to ENC_COAST_010)
  # ========================================================================

  - id: "ENC_COAST_001"
    name: "Shore Raiders"
    terrain: "coast"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "dawn"
    description: "A longship beached at dawn. Raiders are already fanning out, torches in hand, heading for the nearest settlement."
    enemies:
      - enemy_id: "HUM_RAIDER_02"
        name: "Norse Raider"
        count: 4
      - enemy_id: "HUM_RAIDER_03"
        name: "Raider Veteran"
        count: 1
    battlefield_conditions:
      - "Narrow shingle beach — loose stones shift underfoot, -1 to charges"
      - "Beached longship provides heavy cover on one flank"
      - "Wind gusting off the sea — ranged attacks against the wind at -1"
    difficulty: "hard"
    loot_bonus: "Raider plunder: 40 silver in mixed goods, weapons, a navigation charm"
    notes: "Engaging five raiders head-on is reckless. Ambushing them as they spread out is far wiser. The veteran will call retreat to the ship if losses mount."

  - id: "ENC_COAST_002"
    name: "Tidal Cave"
    terrain: "coast"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "The cave mouth yawns at low tide, littered with driftwood and fish bones. Something has been dragging things in here."
    enemies:
      - enemy_id: "ANI_PRED_01"
        name: "Sea Eagle"
        count: 2
      - enemy_id: "ANI_HAZ_04"
        name: "Rockfall Hazard"
        count: 1
    battlefield_conditions:
      - "Rising tide — water level increases each round, combat area shrinks"
      - "Slippery rocks — NIM test when moving quickly or fall prone"
      - "Cave entrance narrows — only 1 fighter at the opening"
    difficulty: "moderate"
    loot_bonus: "Eagle nest: 3 silver worth of salvageable bone and driftwood. Smuggler's cache deeper in: 25 silver"
    notes: "The real danger is the tide, not the eagles. Parties who linger too long must swim out. The smuggler's cache is behind a false rock wall."

  - id: "ENC_COAST_003"
    name: "Cliff-Edge Duel"
    terrain: "coast"
    tier: 3
    season: ["autumn"]
    time_of_day: "day"
    description: "The coastal path crumbles to a knife-edge. A man stands at the narrowest point, sword drawn, eyes wild. He says one of you killed his brother."
    enemies:
      - enemy_id: "HUM_BERSERK_01"
        name: "Blood-Maddened Warrior"
        count: 1
    battlefield_conditions:
      - "Cliff-edge path — one fighter wide, drop to rocks and sea on both sides"
      - "Wind gusting — heavy shield use risks being caught by a gust"
      - "Crumbling edge — heavy impacts cause path sections to collapse"
    difficulty: "hard"
    loot_bonus: "Warrior's gear: quality sword, mail shirt, 15 silver. His brother's ring on a cord."
    notes: "He cannot be reasoned with — the grief has broken him. Shoving him off the cliff is effective but dishonorable. His brother's killer may or may not be in the party."

  - id: "ENC_COAST_004"
    name: "Nykr-Haunted Shallows"
    terrain: "coast"
    tier: 4
    season: ["summer", "autumn"]
    time_of_day: "dusk"
    description: "A pale horse stands in the surf, mane tangled with kelp. It is beautiful. It watches you with eyes too knowing for a beast."
    enemies:
      - enemy_id: "SUP_WILD_02"
        name: "Nykr"
        count: 1
    battlefield_conditions:
      - "Knee-deep surf — movement halved, wave surges knock prone on failed STR"
      - "Kelp-strewn shallows — tangling, trip hazard when running"
      - "Nykr-infested waters — grabbing hands beneath the surface if pulled in"
      - "Sea spray — visibility reduced, salt stings open wounds"
    difficulty: "deadly"
    loot_bonus: "The nykr leaves nothing but kelp and salt. Local village pays 50 silver for ending the threat"
    notes: "DESIGNED TO BE UNWINNABLE in the water. The nykr is nearly invincible in its element. Iron forcefully pressed against its skin causes it to flee temporarily. Luring it onto dry land is the only chance."

  - id: "ENC_COAST_005"
    name: "Wreckers' Beach"
    terrain: "coast"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "False lights on the headland have lured a ship onto the rocks. Men with clubs wade out to the wreck. The crew are still alive and screaming."
    enemies:
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
      - enemy_id: "HUM_CIVIL_02"
        name: "Desperate Villager"
        count: 2
    battlefield_conditions:
      - "Thigh-deep surf — difficult terrain across the entire combat zone"
      - "Wrecked ship hull provides cover but collapses further each round"
      - "Darkness — only the false beacon light and moonlight"
    difficulty: "moderate"
    loot_bonus: "Ship cargo washing ashore: 30 silver in salvageable goods over several hours"
    notes: "Moral dilemma — the wreckers include starving villagers, not just outlaws. Intervening saves the crew but makes enemies of the local settlement."

  - id: "ENC_COAST_006"
    name: "Drowned Sailors"
    terrain: "coast"
    tier: 3
    season: ["winter", "spring"]
    time_of_day: "night"
    description: "They come ashore at high tide — bloated, barnacled, still wearing their ship-clothes. The crew of a vessel lost last season, walking home."
    enemies:
      - enemy_id: "UND_DRAUGR_02"
        name: "Shambling Dead"
        count: 5
      - enemy_id: "UND_SPEC_01"
        name: "Bone Swarm"
        count: 1
    battlefield_conditions:
      - "Wet sand — firm footing but waves wash across the battlefield periodically"
      - "Barnacle-crusted dead — grappling them causes cutting damage"
      - "High tide incoming — combat zone narrows as water rises"
    difficulty: "hard"
    loot_bonus: "Sea-corroded silver: 12 silver total. One still wears a gold earring: 8 silver"
    notes: "They walk toward their home village. If not stopped on the beach, they will reach it by dawn. The bone swarm is the remains of those who drowned below decks."

  - id: "ENC_COAST_007"
    name: "Seal-Hunter's Dispute"
    terrain: "coast"
    tier: 2
    season: ["spring"]
    time_of_day: "day"
    description: "Two groups of hunters argue over a seal colony's territory. Harpoons are leveled. A wrong word from a stranger could set it off."
    enemies:
      - enemy_id: "HUM_CIVIL_03"
        name: "Armed Commoner"
        count: 4
      - enemy_id: "HUM_SPEC_02"
        name: "Hunter"
        count: 2
    battlefield_conditions:
      - "Slippery rock platforms — NIM test when struck or repositioning"
      - "Seal colony stampedes into the water — chaos for 1 round"
      - "Harpoons as improvised polearms — long reach but slow"
    difficulty: "moderate"
    loot_bonus: "Seal pelts and blubber stockpile: 20 silver if you help the winning side"
    notes: "Diplomacy is the ideal outcome — both groups have legitimate claims. Taking sides earns a friend and an enemy. The seals are not combatants but their panicked flight disrupts footing."

  - id: "ENC_COAST_008"
    name: "Sea-Cave Spirit"
    terrain: "coast"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "dusk"
    description: "The cave echoes with a woman's singing — neither mournful nor joyful, just old. Fishermen won't enter. They say whoever does comes back wrong."
    enemies:
      - enemy_id: "SUP_SPIRIT_04"
        name: "Bound Spirit"
        count: 1
      - enemy_id: "SUP_VEIL_04"
        name: "Veil-Snare"
        count: 1
    battlefield_conditions:
      - "Tidal cave — walls slick, water ankle-deep and rising"
      - "Spirit's singing echoes — direction impossible to determine"
      - "Veil-snare creates pockets where reality thins — stepping in causes confusion"
    difficulty: "hard"
    loot_bonus: "Ancient offering cache in the cave: 35 silver in corroded jewelry"
    notes: "The spirit is bound to the cave by old offerings. Returning or destroying the offerings releases it. The veil-snare is a side effect of the binding, not a separate entity."

  - id: "ENC_COAST_009"
    name: "Beached Whale Scavengers"
    terrain: "coast"
    tier: 2
    season: ["winter"]
    time_of_day: "day"
    description: "A whale carcass lies on the beach, half-butchered. Three groups claim salvage rights. Knives are out. You just walked into a property dispute with very sharp edges."
    enemies:
      - enemy_id: "HUM_CIVIL_03"
        name: "Armed Commoner"
        count: 6
    battlefield_conditions:
      - "Whale carcass provides massive cover but the smell is overwhelming"
      - "Blood-slick sand — NIM test to avoid falling near the carcass"
      - "Multiple factions — targeting makes temporary alliances"
    difficulty: "moderate"
    loot_bonus: "Whale oil and baleen: 40 silver worth if you can claim a share"
    notes: "This is largely a social encounter that escalates. A strong leader can assert jarl-backed authority to divide shares. Fighting risks alienating an entire coastal community."

  - id: "ENC_COAST_010"
    name: "Fjord Serpent"
    terrain: "coast"
    tier: 5
    season: ["summer"]
    time_of_day: "day"
    description: "The water erupts. A scaled neck thicker than a ship's mast rises from the fjord, shedding waterfalls. It turns toward the shore. Toward you."
    enemies:
      - enemy_id: "BOS_SUPER_03"
        name: "Fjord Wyrm"
        count: 1
    battlefield_conditions:
      - "Fjord shoreline — half the battlefield is water, wyrm controls that half"
      - "Tidal wave on emergence — everyone within 20 paces makes STR test or is swept"
      - "Thrown boulders and tail sweeps — area attacks hit multiple targets"
      - "Cliff retreat available but wyrm can reach the first ledge"
    difficulty: "deadly"
    loot_bonus: "Wyrm scale (if any pried loose): 200 silver. Wyrm blood: 100 silver to an alchemist"
    notes: "DESIGNED TO BE UNWINNABLE. This is a force of nature, not a combat encounter. Fleeing inland is the only sane response. Legends say they can be driven off by fire ships, but you don't have one."

  # ========================================================================
  # MOUNTAIN ENCOUNTERS (ENC_MOUNT_001 to ENC_MOUNT_008)
  # ========================================================================

  - id: "ENC_MOUNT_001"
    name: "Mountain Pass Ambush"
    terrain: "mountain"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "day"
    description: "Rocks tumble from above — not a natural slide. Figures appear on the ridge line, bows drawn."
    enemies:
      - enemy_id: "HUM_BANDIT_05"
        name: "Mountain Bandit"
        count: 3
      - enemy_id: "HUM_SPEC_02"
        name: "Hunter"
        count: 1
    battlefield_conditions:
      - "Attackers on high ground — ranged advantage, melee requires climbing"
      - "Scree slopes — climbing NIM test each round or slide back"
      - "Narrow pass — no room to spread out, bunching makes easy targets"
    difficulty: "hard"
    loot_bonus: "Bandits' mountain cache: 25 silver, dried meat, rope, climbing picks"
    notes: "Rushing the slope is costly but shields held overhead reduce ranged damage. If the hunter is killed first, the bandits lose their nerve."

  - id: "ENC_MOUNT_002"
    name: "Ice-Shelf Collapse"
    terrain: "mountain"
    tier: 2
    season: ["winter", "spring"]
    time_of_day: "any"
    description: "The ice groans beneath your feet. Something frozen in the shelf below is moving — its shadow visible through translucent ice."
    enemies:
      - enemy_id: "UND_APT_02"
        name: "Frost Aptrgangr"
        count: 1
      - enemy_id: "UND_SKEL_01"
        name: "Skeleton Thrall"
        count: 2
    battlefield_conditions:
      - "Ice-covered ground — NIM test each round or fall, crawling is safe but slow"
      - "Thin ice zones — heavy fighters risk breaking through into freezing water below"
      - "Altitude — thin air, -1 to TOU tests for sustained exertion"
    difficulty: "moderate"
    loot_bonus: "Frozen explorer's pack visible through ice: climbing gear, 10 silver, a map"
    notes: "Breaking the ice deliberately can drop enemies into freezing water, but risks the party too. The map shows a safer mountain route."

  - id: "ENC_MOUNT_003"
    name: "Avalanche Canyon"
    terrain: "mountain"
    tier: 3
    season: ["winter"]
    time_of_day: "day"
    description: "Fresh snow hangs on the slopes above the trail. Every sound echoes. The figures blocking the path ahead know this — they speak in whispers."
    enemies:
      - enemy_id: "HUM_RAIDER_01"
        name: "Coastland Raider"
        count: 2
      - enemy_id: "HUM_SELL_02"
        name: "Sellsword"
        count: 2
    battlefield_conditions:
      - "Avalanche risk — any loud combat (shouting, weapon clashing) triggers cumulative roll each round"
      - "Narrow canyon floor — 3 fighters abreast maximum"
      - "Blinding snow reflection — sunlight off snow causes -1 to Awareness when facing uphill"
    difficulty: "hard"
    loot_bonus: "Raiders' packs: 30 silver, furs, stolen goods from a mountain village"
    notes: "Fighting quietly (unarmed, daggers, grappling) avoids avalanche risk. If an avalanche triggers, everyone makes STR/NIM test or is buried — suffocation in 3 rounds."

  - id: "ENC_MOUNT_004"
    name: "Summit Shrine Guardian"
    terrain: "mountain"
    tier: 4
    season: ["summer"]
    time_of_day: "day"
    description: "The summit cairn holds an ancient offering — a sword driven into the rock. The wind screams protest as your hand closes on the grip."
    enemies:
      - enemy_id: "SUP_SPIRIT_02"
        name: "Wrath Spirit"
        count: 1
      - enemy_id: "SUP_WILD_03"
        name: "Wind Elemental"
        count: 1
    battlefield_conditions:
      - "Summit exposure — wind gusts can knock fighters off balance (STR test)"
      - "Cliff-edge on three sides — pushed or failing NIM means a lethal fall"
      - "Thin air — extended combat causes cumulative fatigue (-1 TOU per 5 rounds)"
      - "Lightning risk in storm — metal equipment attracts strikes"
    difficulty: "deadly"
    loot_bonus: "Summit sword: ancient, rune-marked, worth 100 silver or kept as a weapon. Shrine offerings: 30 silver in old coins"
    notes: "The guardian manifests only when the sword is touched. Leaving the sword alone means no encounter. Taking offerings but not the sword angers only the wrath spirit."

  - id: "ENC_MOUNT_005"
    name: "Narrow Ledge Standoff"
    terrain: "mountain"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "The trail narrows to a ledge barely two paces wide. Coming the other way — a group that won't back up. Neither can you."
    enemies:
      - enemy_id: "HUM_WAR_01"
        name: "Soldier"
        count: 2
      - enemy_id: "HUM_WAR_02"
        name: "Man-at-Arms"
        count: 1
    battlefield_conditions:
      - "Narrow ledge — single file only, shields barely fit"
      - "Sheer drop on one side — any push or shove can send someone over"
      - "No retreat without turning your back — disengaging is extremely dangerous"
    difficulty: "moderate"
    loot_bonus: "Soldiers' pay: 15 silver each, military-issue weapons and armor"
    notes: "Negotiation is possible — these are soldiers, not bandits. A silver toll or letting them pass first resolves it. Pride on either side makes it lethal."

  - id: "ENC_MOUNT_006"
    name: "Eagle Nest Territory"
    terrain: "mountain"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "The trail passes within 30 paces of a massive nest. Two golden eagles circle overhead, screaming. Their talons are the length of your fingers."
    enemies:
      - enemy_id: "ANI_BIRD_01"
        name: "Giant Eagle"
        count: 2
    battlefield_conditions:
      - "Aerial attackers — diving from above, difficult to engage in melee"
      - "Mountain trail — no overhead cover, shields provide only partial defense"
      - "Altitude sickness — TOU test if running or fighting hard at this elevation"
    difficulty: "moderate"
    loot_bonus: "Eagle feathers (if collected without destroying them): 15 silver to a fletcher"
    notes: "The eagles defend their nest — moving away quickly ends the encounter. Approaching the nest escalates to frenzy. Eagle chicks are worth a fortune but taking them guarantees relentless attacks."

  - id: "ENC_MOUNT_007"
    name: "Frozen Dead Thaw"
    terrain: "mountain"
    tier: 3
    season: ["spring"]
    time_of_day: "any"
    description: "Spring thaw has exposed bodies on the mountainside — an old war party, frozen mid-march. The ice releases them one by one, and they don't stay down."
    enemies:
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 3
      - enemy_id: "UND_DRAUGR_04"
        name: "Draugr Captain"
        count: 1
    battlefield_conditions:
      - "Partially thawed slope — ice patches interspersed with mud and scree"
      - "Draugr thaw and animate over 3 rounds — engage early or face all at once"
      - "Meltwater stream cuts across the battlefield — difficult to cross quickly"
    difficulty: "hard"
    loot_bonus: "Ancient war party equipment: corroded but some pieces salvageable, 30 silver in weapons and mail"
    notes: "Destroying them while still partially frozen is far easier — each round of thaw restores more of their combat capability. The captain thaws last and is strongest."

  - id: "ENC_MOUNT_008"
    name: "Mountain Troll Bridge"
    terrain: "mountain"
    tier: 5
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "A stone bridge spans a gorge. Something enormous squats on the far side, motionless as the rock. Then it blinks."
    enemies:
      - enemy_id: "BOS_SUPER_02"
        name: "Mountain Troll"
        count: 1
    battlefield_conditions:
      - "Stone bridge — 4 paces wide, 30 paces long, no railings"
      - "Gorge drop of 60 paces — instantly lethal"
      - "Troll controls the far end — approaching means closing on its terms"
      - "Night — troll's eyes adapted, yours are not without torchlight"
    difficulty: "deadly"
    loot_bonus: "Troll's bridge hoard under the span: 150 silver in tolls collected over decades"
    notes: "DESIGNED TO BE UNWINNABLE in a direct bridge fight. The troll has thrown dozens of men into the gorge. Waiting for dawn weakens it (sunlight sensitivity). Riddles and trickery are the saga-approved solution."

  # ========================================================================
  # CAMP ENCOUNTERS (ENC_CAMP_001 to ENC_CAMP_005)
  # ========================================================================

  - id: "ENC_CAMP_001"
    name: "Night Raid"
    terrain: "camp"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "night"
    description: "The sentry's shout comes too late. Shadows rush from the treeline, blades drawn. Half your party is still in their blankets."
    enemies:
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 3
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
    battlefield_conditions:
      - "Scattered campfire light — illumination in 5-pace radius only"
      - "Half the party unarmored — armor takes 2 rounds to don"
      - "Tent ropes as trip hazards — NIM test when running through camp"
    difficulty: "hard"
    loot_bonus: "Bandits' picks: 20 silver in stolen goods, weapons, a stolen map"
    notes: "Sentry watchfulness determines surprise. A good watch raises the alarm with 2 rounds to prepare. No watch means full surprise — devastating."

  - id: "ENC_CAMP_002"
    name: "Dawn Wolf Pack"
    terrain: "camp"
    tier: 2
    season: ["winter"]
    time_of_day: "dawn"
    description: "The fire burned low in the night. At dawn's grey light, wolves ring the camp — they've been waiting for the embers to die."
    enemies:
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 5
      - enemy_id: "ANI_WOLF_03"
        name: "Pack Alpha"
        count: 1
    battlefield_conditions:
      - "Extinguished fire — total darkness until someone relights it"
      - "Horses and pack animals panicking — breaking free of tethers, stampeding through camp"
      - "Wolves attack from all sides simultaneously — no safe direction"
    difficulty: "moderate"
    loot_bonus: "Wolf pelts: 5 silver each. Alpha pelt: 15 silver"
    notes: "Relighting the fire drives most wolves back. The alpha must be specifically killed or driven off — the pack won't quit while it stands. Losing pack animals to stampede is the real cost."

  - id: "ENC_CAMP_003"
    name: "Deserter Raid"
    terrain: "camp"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "These aren't bandits — they're soldiers. Deserters, desperate and disciplined, who've been watching your camp since dusk."
    enemies:
      - enemy_id: "HUM_DESER_02"
        name: "Deserter Veteran"
        count: 1
      - enemy_id: "HUM_DESER_01"
        name: "Lone Deserter"
        count: 3
      - enemy_id: "HUM_WAR_01"
        name: "Soldier"
        count: 2
    battlefield_conditions:
      - "Coordinated attack — enemies hit from two directions simultaneously"
      - "Camp supplies targeted — one group goes for packs while the other engages"
      - "Sleeping allies need 1 round to wake and 2 more rounds to arm"
    difficulty: "hard"
    loot_bonus: "Deserters carry: 15 silver each, military weapons, a dispatch letter worth leverage"
    notes: "The deserters want supplies, not a fight to the death. If they secure packs, they retreat immediately. The dispatch letter implicates a local jarl in corruption."

  - id: "ENC_CAMP_004"
    name: "Dead Camp"
    terrain: "camp"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "dusk"
    description: "You find a camp already set — fire laid, bedrolls out, stew on the hook. No one here. Then you notice the blood soaked into the ground."
    enemies:
      - enemy_id: "SUP_CORR_02"
        name: "Corruption Creeper"
        count: 1
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 2
    battlefield_conditions:
      - "Familiar camp layout — good cover positions but the enemy knows them too"
      - "Corruption-tainted ground — wounds resist healing until camp is left"
      - "Dusk light fading — full darkness in 10 rounds"
    difficulty: "hard"
    loot_bonus: "Previous campers' gear: 20 silver in supplies, weapons, a journal describing what killed them"
    notes: "The corruption creeper killed the camp's occupants and raised two as restless dead. The journal describes hearing singing before the attack. Using this camp is unwise — the corruption lingers."

  - id: "ENC_CAMP_005"
    name: "Ambush at Enemy Camp"
    terrain: "camp"
    tier: 3
    season: ["spring", "summer"]
    time_of_day: "night"
    description: "You've tracked the raiders to their camp. Three tents, banked fire, two sentries. The rest are sleeping. You have the advantage — if you don't waste it."
    enemies:
      - enemy_id: "HUM_RAIDER_01"
        name: "Coastland Raider"
        count: 4
      - enemy_id: "HUM_RAIDER_02"
        name: "Norse Raider"
        count: 2
      - enemy_id: "HUM_RAIDER_03"
        name: "Raider Veteran"
        count: 1
    battlefield_conditions:
      - "Surprise advantage — 2 free rounds if sentries eliminated quietly"
      - "Sleeping enemies take 2 rounds to arm and 3 to armor up"
      - "Banked fire can be kicked into a tent — fire panic for 1 round"
      - "Horses tethered at the edge — cutting them loose removes escape route"
    difficulty: "hard"
    loot_bonus: "Raider camp: 60 silver in plunder, weapons, provisions for a week, stolen livestock"
    notes: "This is the player-initiated ambush — reverse of ENC_CAMP_001. Success depends entirely on planning and stealth. A failed approach wakes the camp and reverses the advantage."

  # ========================================================================
  # SUPERNATURAL ENCOUNTERS (ENC_SUPER_001 to ENC_SUPER_015)
  # ========================================================================

  - id: "ENC_SUPER_001"
    name: "The Hush Falls"
    terrain: "any"
    tier: 5
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "All sound ceases. The fire dims to nothing. Something moves in absolute silence."
    enemies:
      - enemy_id: "SUP_VEIL_02"
        name: "Hush Manifestation"
        count: 1
      - enemy_id: "SUP_VEIL_01"
        name: "Veil-Shadow"
        count: 4
    battlefield_conditions:
      - "Absolute silence — verbal commands impossible"
      - "Light sources dim to half radius"
      - "WIL test each round or freeze in terror"
      - "Seidr disrupted — galdr requires double WYR cost"
    difficulty: "deadly"
    loot_bonus: "None — survivors keep their sanity"
    notes: "The Hush cannot be fought. Surviving until dawn is victory. Flee-or-die encounter for any band below tier 4."

  - id: "ENC_SUPER_002"
    name: "Veil-Walker's Passage"
    terrain: "any"
    tier: 5
    season: ["winter"]
    time_of_day: "night"
    description: "The air splits like a wound and something steps through — too tall, too many joints, wearing a face it didn't grow."
    enemies:
      - enemy_id: "SUP_VEIL_04"
        name: "Veil-Walker"
        count: 1
    battlefield_conditions:
      - "Reality distortion — distances wrong, melee range shifts by 1d6 paces each round"
      - "Gravity shifts — NIM test each round or fall toward the Walker"
      - "Weapons pass through it unless coated in blood or salt"
    difficulty: "deadly"
    loot_bonus: "Veil-residue on the ground — worth 50 silver to a seidr-worker who knows what it is"
    notes: "Flee-or-die. The Veil-Walker is not here to fight — it is passing through. Anything in its path is collateral. Standing aside and staying silent may let it pass."

  - id: "ENC_SUPER_003"
    name: "The Weeping Stone"
    terrain: "any"
    tier: 3
    season: ["autumn"]
    time_of_day: "dusk"
    description: "A standing stone bleeds dark water from its carvings. The dead gather around it like moths to a flame, drawn by grief they can't name."
    enemies:
      - enemy_id: "UND_VEIL_01"
        name: "Grief-Wraith"
        count: 3
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 2
    battlefield_conditions:
      - "Veil-thin zone — dead visible as overlapping shadows on the living"
      - "Compulsion aura — WIL test to approach or retreat from the stone"
      - "Wounds near the stone bleed freely — injuries deal 1 extra damage"
    difficulty: "hard"
    loot_bonus: "Rune-carved stone fragment: 20 silver, or 40 to a scholar"
    notes: "Destroying the stone ends the haunting but releases a pulse of grief that forces WIL test (difficulty 5) or suffer 1d6 WIL damage. Leaving the stone intact means it draws more dead each night."

  - id: "ENC_SUPER_004"
    name: "Dreamspace Ambush"
    terrain: "any"
    tier: 3
    season: ["any"]
    time_of_day: "night"
    description: "You wake in the same camp, but the sky is wrong — no stars, no moon, just a faint grey nothing. Something hunts you here, where your body cannot follow."
    enemies:
      - enemy_id: "SUP_SPIRIT_03"
        name: "Dream-Stalker"
        count: 1
      - enemy_id: "SUP_SPIRIT_01"
        name: "Restless Spirit"
        count: 2
    battlefield_conditions:
      - "Dreamspace combat — physical stats replaced by mental (WIL for MIG, WYR for NIM)"
      - "Wounds manifest as exhaustion on waking — dream-damage becomes real fatigue"
      - "Time dilation — 1 dream-round equals 1 minute of sleep"
    difficulty: "hard"
    loot_bonus: "None — dream-victories grant clarity: +1 WIL for 1 week"
    notes: "Only seidr-users fight at full capacity. Warriors must use WIL for combat, which most have at lower values. Waking up requires succeeding a WIL test (difficulty 3) — failure means another round trapped."

  - id: "ENC_SUPER_005"
    name: "The Cursed Hoard"
    terrain: "any"
    tier: 2
    season: ["any"]
    time_of_day: "any"
    description: "A dead man's chest, half-buried, spilling silver into the mud. The moment someone touches a coin, the air turns cold and something screams beneath the earth."
    enemies:
      - enemy_id: "UND_SPEC_02"
        name: "Curse-Bound Spirit"
        count: 1
      - enemy_id: "UND_SKEL_01"
        name: "Skeletal Thrall"
        count: 3
    battlefield_conditions:
      - "Cursed ground — anyone holding hoard silver takes 1 damage per round"
      - "Rune-stones around the chest pulse with dim light — stepping on one triggers a galdr trap"
      - "The spirit is bound to the chest and cannot move more than 10 paces from it"
    difficulty: "moderate"
    loot_bonus: "80 silver in the chest — but cursed until a seidr-worker breaks the binding"
    notes: "The curse can be broken by returning all silver to the chest and burying it properly with rites. Keeping the silver without breaking the curse draws increasingly worse supernatural attention."

  - id: "ENC_SUPER_006"
    name: "Seidr Duel at the Crossroads"
    terrain: "any"
    tier: 4
    season: ["spring", "autumn"]
    time_of_day: "dusk"
    description: "A woman stands at the crossroads, staff in hand, runes glowing on her skin. She says your seidr-user has something that belongs to her. She means to take it."
    enemies:
      - enemy_id: "SUP_CORR_03"
        name: "Rogue Völva"
        count: 1
      - enemy_id: "SUP_WILD_01"
        name: "Bound Fetch"
        count: 2
    battlefield_conditions:
      - "Seidr interference field — all galdr costs doubled for both sides"
      - "Crossroads power — the Völva draws 1 extra WYR per round from the junction"
      - "Prophetic flashes blind combatants — random fighter loses next action each round"
    difficulty: "hard"
    loot_bonus: "Völva's staff: rune-carved, worth 60 silver or usable as a seidr focus"
    notes: "This is a magical confrontation first. Non-seidr fighters are secondary. The Völva respects strength — defeating her bound fetches earns her grudging recognition and she may parley."

  - id: "ENC_SUPER_007"
    name: "The Mirror Pool"
    terrain: "any"
    tier: 3
    season: ["autumn"]
    time_of_day: "night"
    description: "A still pool reflects the wrong sky. Your reflections move independently, drawing weapons you haven't drawn yet."
    enemies:
      - enemy_id: "SUP_VEIL_03"
        name: "Mirror-Twin"
        count: 4
    battlefield_conditions:
      - "Reflections attack with the same stats as their originals"
      - "Mirror-twins take damage only when their source bleeds — self-harm defeats them"
      - "The pool cannot be disturbed — thrown objects stop mid-air above its surface"
    difficulty: "hard"
    loot_bonus: "Mirror-glass from the pool's edge: 25 silver to an alchemist"
    notes: "Violence feeds the mirror. The reflections only exist while someone looks at the pool. Covering it, walking away without looking back, or destroying a reflection through self-inflicted wounds all work. Clever parties lose no blood."

  - id: "ENC_SUPER_008"
    name: "Veil-Thinning: The Dead Walk"
    terrain: "any"
    tier: 4
    season: ["winter"]
    time_of_day: "night"
    description: "The Veil tears open along a line of old cairns. The dead pour through — not hostile, confused, terrified. Then the things that drove them follow."
    enemies:
      - enemy_id: "SUP_CORR_04"
        name: "Veil-Predator"
        count: 2
      - enemy_id: "UND_VEIL_03"
        name: "Veil-Lost Dead"
        count: 6
    battlefield_conditions:
      - "Confused dead crowd the battlefield — difficult terrain of shuffling corpses"
      - "Veil-thin — reality flickers, occasionally showing the dead world underneath"
      - "Temperature drops to lethal — TOU test each round or suffer 1 cold damage"
      - "The Veil-Predators feed on the dead, not the living — unless provoked"
    difficulty: "deadly"
    loot_bonus: "Veil-residue crystallizes as the tear seals: 40 silver in raw veil-glass"
    notes: "The Veil-Predators are hunting the dead, not the band. Staying out of their way is the safest strategy. Killing a Predator causes the tear to widen. Dawn seals the Veil naturally."

  - id: "ENC_SUPER_009"
    name: "The Bone-Singer"
    terrain: "any"
    tier: 3
    season: ["winter"]
    time_of_day: "night"
    description: "A voice sings from the darkness — a lullaby your grandmother knew. The bones of the dead scrape together and dance upright to its melody."
    enemies:
      - enemy_id: "SUP_SPIRIT_04"
        name: "Bone-Singer Spirit"
        count: 1
      - enemy_id: "UND_SKEL_02"
        name: "Bone Dancer"
        count: 4
      - enemy_id: "UND_SKEL_03"
        name: "Skeletal Archer"
        count: 2
    battlefield_conditions:
      - "The singing compels — WIL test or move toward the voice involuntarily"
      - "Destroying skeletons is pointless while the singer lives — they reassemble in 2 rounds"
      - "Ghostfire illumination only — blue-white light, no warmth, casts wrong shadows"
    difficulty: "hard"
    loot_bonus: "Bone-Singer's talisman: a jaw-harp made from a human rib, worth 30 silver or usable as a seidr tool"
    notes: "Kill the singer, not the puppets. The spirit is invisible until someone sings back — counter-song reveals its location. A bard or skald in the party makes this trivially easy."

  - id: "ENC_SUPER_010"
    name: "Rune-Stone Detonation"
    terrain: "any"
    tier: 2
    season: ["any"]
    time_of_day: "any"
    description: "The old rune-stone beside the path hums. Hairline cracks spiderweb across its face. It's been building pressure for decades and you're standing too close."
    enemies:
      - enemy_id: "SUP_CORR_01"
        name: "Corruption Fragment"
        count: 3
    battlefield_conditions:
      - "Rune-stone explodes in 3 rounds — 3d6 damage in 10-pace radius"
      - "Corruption fragments emerge from the debris — small, fast, drawn to seidr"
      - "Residual rune energy disrupts metal — metal weapons and armor spark and burn to touch"
    difficulty: "moderate"
    loot_bonus: "Rune-stone fragments: 15 silver each, 4 fragments recoverable"
    notes: "Running is the obvious answer. If the band doesn't flee before detonation, casualties are likely. The corruption fragments linger for an hour after the blast, making recovery dangerous."

  - id: "ENC_SUPER_011"
    name: "The Fetch Harvest"
    terrain: "any"
    tier: 4
    season: ["autumn"]
    time_of_day: "dusk"
    description: "Shapes that look almost like your companions stand at the edge of camp, watching. They have the same faces, the same scars — but their eyes are hollow."
    enemies:
      - enemy_id: "SUP_WILD_02"
        name: "Fetch-Double"
        count: 3
      - enemy_id: "SUP_WILD_03"
        name: "Fetch Harvester"
        count: 1
    battlefield_conditions:
      - "Identifying friend from foe requires WIL test (difficulty 4) each round"
      - "Fetch-Doubles mimic combat styles — same weapon skills as their originals"
      - "Killing your own Fetch deals 2d6 WIL damage to the original"
      - "The Harvester is invisible until all Doubles are slain or the original touches their Double"
    difficulty: "hard"
    loot_bonus: "Fetch Harvester's binding cord: 45 silver, powerful seidr component"
    notes: "Do NOT kill your own Fetch. Touching it causes a WIL contest — winner absorbs the other. The Harvester collects unbound Fetches. Seidr-users may recognize the danger before fighters."

  - id: "ENC_SUPER_012"
    name: "Grave-Gift Rejected"
    terrain: "any"
    tier: 2
    season: ["any"]
    time_of_day: "night"
    description: "The burial offering was wrong — the wrong sword, the wrong woman's name spoken. The grave opens and the occupant is furious."
    enemies:
      - enemy_id: "UND_HAUG_02"
        name: "Offended Haugbui"
        count: 1
    battlefield_conditions:
      - "The Haugbui's rage aura — all within 5 paces suffer -1 to all rolls"
      - "Grave-dirt erupts from the ground, blinding nearby fighters for 1 round"
      - "The Haugbui cannot be permanently killed until the correct rites are performed"
    difficulty: "moderate"
    loot_bonus: "Original grave goods: 35 silver in ancient weapons and ornaments"
    notes: "This is a puzzle encounter. The Haugbui can be beaten down but reforms each midnight until the grave-gift is corrected. The band needs to learn who the dead person was and what they wanted."

  - id: "ENC_SUPER_013"
    name: "Corruption Bloom"
    terrain: "any"
    tier: 3
    season: ["spring", "summer"]
    time_of_day: "any"
    description: "Black flowers burst from the soil in a perfect circle. The air tastes of copper. Inside the ring, the ground breathes."
    enemies:
      - enemy_id: "SUP_CORR_02"
        name: "Corruption Creeper"
        count: 2
      - enemy_id: "SUP_CORR_01"
        name: "Corruption Fragment"
        count: 4
    battlefield_conditions:
      - "Corruption zone — 1 corruption point per round for anyone inside the flower ring"
      - "The ground pulses — knocked-prone characters sink 1 pace into the soil per round"
      - "Fire suppresses the bloom temporarily — burning creates toxic smoke (TOU test)"
    difficulty: "hard"
    loot_bonus: "Corruption-bloom petals: 10 silver each to alchemists, 6 petals harvestable — but handling them risks corruption"
    notes: "The bloom is expanding. Left alone, it covers a 50-pace radius in a week. Fire cleanses it but the smoke is dangerous. Seidr-workers can seal it with rites (WYR test difficulty 5)."

  - id: "ENC_SUPER_014"
    name: "The Singing Sword"
    terrain: "any"
    tier: 3
    season: ["any"]
    time_of_day: "any"
    description: "A blade half-buried in a cairn keens like a mourning woman. Anyone who grips the hilt hears its dead owner's voice demanding blood."
    enemies:
      - enemy_id: "SUP_SPIRIT_02"
        name: "Bound Weapon-Spirit"
        count: 1
      - enemy_id: "UND_SPEC_03"
        name: "Thrall-Ghost"
        count: 2
    battlefield_conditions:
      - "The wielder must make WIL test each round or attack the nearest living thing"
      - "The sword deals +2 damage but feeds on its wielder — 1 HP drain per round"
      - "Dropping the sword requires WIL test (difficulty 4) — it doesn't want to leave"
    difficulty: "hard"
    loot_bonus: "The sword itself: masterwork quality, worth 80 silver — if you can silence the spirit"
    notes: "The spirit wants vengeance for its owner's murder. Identifying the killer (or their lineage) and offering blood-price satisfies it. Otherwise it possesses each new wielder until someone dies."

  - id: "ENC_SUPER_015"
    name: "The Dead Jarl's Court"
    terrain: "any"
    tier: 4
    season: ["winter"]
    time_of_day: "midnight"
    description: "The air shimmers and you stand in a ghostly mead-hall. A dead jarl sits his high seat, his court of spectres arrayed around him. He demands to know why you walk his lands."
    enemies:
      - enemy_id: "UND_HAUG_03"
        name: "Jarl-Revenant"
        count: 1
      - enemy_id: "UND_VEIL_02"
        name: "Spectral Huskarl"
        count: 4
      - enemy_id: "UND_SPEC_04"
        name: "Court-Wraith"
        count: 2
    battlefield_conditions:
      - "Ghostly mead-hall — walls are real enough to block movement but shimmer and shift"
      - "The Jarl commands his court — slain huskarls reform in 3 rounds unless the Jarl falls"
      - "Einherjar rules apply — unarmed or surrendering characters are not attacked"
      - "Time dilation — 1 round in the hall equals 1 hour outside"
    difficulty: "deadly"
    loot_bonus: "Jarl's arm-ring: gold, worth 120 silver, grants +1 CHA to the wearer in dealings with the dead"
    notes: "The Jarl is testing the band. Fighting well earns respect. Cowardice earns contempt and a curse. He can be appeased with a saga told in his honor (Lore test difficulty 4). Defeating him in single combat earns his arm-ring freely given."

  # ========================================================================
  # RIVER ENCOUNTERS (ENC_RIVER_001 to ENC_RIVER_010)
  # ========================================================================

  - id: "ENC_RIVER_001"
    name: "Ford Shakedown"
    terrain: "river"
    tier: 1
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "Two men and a boy hold the only ford for miles. They want silver for passage and they've got the high bank."
    enemies:
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 2
      - enemy_id: "HUM_CIVIL_01"
        name: "Armed Farmer"
        count: 1
    battlefield_conditions:
      - "Ford crossing: waist-deep water, -2 to all combat rolls while in the river"
      - "High bank gives defenders +1 to ranged attacks"
      - "Ford stones — single-file crossing, only 1 fighter can engage at a time"
    difficulty: "easy"
    loot_bonus: "Toll pouch: 12 silver"
    notes: "The boy runs if fighting starts. The bandits are opportunists — a show of force (4+ armed warriors) makes them back down without a blow."

  - id: "ENC_RIVER_002"
    name: "Nykr at the Crossing"
    terrain: "river"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "dusk"
    description: "A grey horse stands in the shallows, saddled and calm. It watches you with too-knowing eyes. The current around its legs flows the wrong direction."
    enemies:
      - enemy_id: "SUP_WILD_02"
        name: "Nykr"
        count: 1
    battlefield_conditions:
      - "The river obeys the Nykr — current pulls fighters toward deep water"
      - "Anyone who touches the Nykr's hide must make WIL test (difficulty 5) or be unable to let go"
      - "Waist-deep water across the battlefield — -2 combat, -4 if dragged to depth"
    difficulty: "hard"
    loot_bonus: "None — the Nykr leaves nothing but wet hoofprints"
    notes: "The Nykr drowns anyone who mounts it. Iron thrown over its back breaks the glamour. Knowing its name and speaking it aloud forces it to flee. A seidr-worker may sense the trick before anyone touches it."

  - id: "ENC_RIVER_003"
    name: "Log-Jam Bridge Fight"
    terrain: "river"
    tier: 2
    season: ["spring"]
    time_of_day: "day"
    description: "Spring flood jammed logs across the narrows — a treacherous natural bridge. Outlaws hold the far bank and they saw you coming."
    enemies:
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Desperate Beggar-Thief"
        count: 2
    battlefield_conditions:
      - "Log-jam bridge: NIM test each round or fall into rapids below"
      - "Logs shift under weight — only 2 fighters on the jam at once before it breaks apart"
      - "Rapids below: MIG test (difficulty 4) to swim to shore, swept 50 paces downstream on failure"
    difficulty: "moderate"
    loot_bonus: "Outlaws' cache on the far bank: 20 silver in mixed goods"
    notes: "The log-jam won't survive a prolonged fight — after 5 rounds of heavy use, it breaks apart. Anyone still on it goes into the rapids."

  - id: "ENC_RIVER_004"
    name: "Drowned Dead Rising"
    terrain: "river"
    tier: 3
    season: ["autumn"]
    time_of_day: "night"
    description: "Bodies surface in the moonlit river — bloated, pale, still moving. A drowned warband, lost in a crossing last season, finally finds the shore."
    enemies:
      - enemy_id: "UND_DRAUGR_02"
        name: "Draugr Thrall"
        count: 4
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 2
    battlefield_conditions:
      - "Riverbank mud — movement halved, falling prone means a full round to stand"
      - "Drowned dead fight in water without penalty — they don't breathe"
      - "Moonlight only — visibility 15 paces, deep shadows along the tree-lined bank"
    difficulty: "hard"
    loot_bonus: "Waterlogged weapons: 15 silver salvageable. A captain's seal worth 25 silver to the right jarl"
    notes: "The drowned dead emerge over 4 rounds — fighting early means facing fewer at once. They are drawn to campfires on the riverbank. Moving camp inland 100 paces avoids the encounter entirely."

  - id: "ENC_RIVER_005"
    name: "Waterfall Spray Ambush"
    terrain: "river"
    tier: 2
    season: ["summer"]
    time_of_day: "day"
    description: "The path passes behind a waterfall. The roar drowns everything. Sellswords wait on the slick rocks above, silhouetted against the cascade."
    enemies:
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Sellsword"
        count: 3
      - enemy_id: "HUM_SELL_02"
        name: "Veteran Sellsword"
        count: 1
    battlefield_conditions:
      - "Waterfall spray — visibility 5 paces, all ranged attacks at -2"
      - "Slippery rocks — NIM test on any rapid movement or fall prone"
      - "Roaring water — verbal communication impossible, commands require hand signals"
    difficulty: "moderate"
    loot_bonus: "Sellswords' payment pouch: 30 silver. Someone hired them to watch this path"
    notes: "The sellswords were hired to guard the path, not die on it. Killing or disabling two causes the rest to retreat through the waterfall. The employer's name is on a writ in the veteran's pouch."

  - id: "ENC_RIVER_006"
    name: "Frozen River Crossing"
    terrain: "river"
    tier: 2
    season: ["winter"]
    time_of_day: "day"
    description: "Ice thick enough to walk on — or so it looks. Halfway across, cracks spider outward from your feet. Something moves beneath the surface."
    enemies:
      - enemy_id: "ANI_HAZ_05"
        name: "River Serpent"
        count: 1
      - enemy_id: "ANI_HAZ_01"
        name: "Swarm of Eels"
        count: 2
    battlefield_conditions:
      - "Ice cracking — each round of combat widens cracks, MIG test to avoid breaking through"
      - "Falling through ice: immediate cold shock (TOU test difficulty 4 or lose next 2 actions)"
      - "Movement limited — running or charging guarantees ice collapse under the runner"
    difficulty: "moderate"
    loot_bonus: "None — the river takes more than it gives"
    notes: "Slow and careful movement avoids the worst. Spreading weight (crawling) allows safe retreat. The creature beneath is territorial, not hungry — reaching the far bank ends the threat."

  - id: "ENC_RIVER_007"
    name: "Bridge Troll's Toll"
    terrain: "river"
    tier: 3
    season: ["any"]
    time_of_day: "any"
    description: "The stone bridge has stood for generations. The thing beneath it has squatted there for longer. It wants flesh, not silver."
    enemies:
      - enemy_id: "BOS_SUPER_01"
        name: "River Troll"
        count: 1
    battlefield_conditions:
      - "Bridge: 3 paces wide — troll fills most of it, squeezing past impossible"
      - "Troll strikes from below through gaps in the stonework — attacks from unexpected angles"
      - "Falling off the bridge: 4d6 damage onto river rocks below"
    difficulty: "hard"
    loot_bonus: "Troll's nest under the bridge: 70 silver in travellers' possessions, a fine sword, bones"
    notes: "A classic. The troll regenerates 2 HP per round unless wounded by fire. Riddles may distract it long enough to cross. Throwing livestock satisfies it for a day. Truly killing it requires fire."

  - id: "ENC_RIVER_008"
    name: "Flooded Campsite"
    terrain: "river"
    tier: 1
    season: ["spring"]
    time_of_day: "dawn"
    description: "You wake to water. The river rose in the night and your camp is ankle-deep. Your supplies float. Wolves watch from the dry ridge above."
    enemies:
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 3
      - enemy_id: "ANI_WOLF_02"
        name: "Lone Wolf"
        count: 1
    battlefield_conditions:
      - "Ankle-deep water — all movement at half speed, footing treacherous"
      - "Supplies scattering downstream — each round of delay loses 1d6 silver worth of gear"
      - "Wolves on dry ground above — height advantage and solid footing vs. the band's disadvantage"
    difficulty: "moderate"
    loot_bonus: "Wolf pelts: 5 silver each"
    notes: "The wolves are opportunistic — they sensed the band's vulnerability. Saving supplies conflicts with fighting. Split focus is the real danger. Fire is impossible in wet conditions."

  - id: "ENC_RIVER_009"
    name: "Upstream Ambush"
    terrain: "river"
    tier: 2
    season: ["summer", "autumn"]
    time_of_day: "day"
    description: "Fording the river when arrows hiss from the upstream bank. Raiders hold the high ground where the river bends, shooting into the crossing column."
    enemies:
      - enemy_id: "HUM_RAIDER_01"
        name: "Coastland Raider"
        count: 3
      - enemy_id: "HUM_RAIDER_02"
        name: "Norse Raider"
        count: 2
    battlefield_conditions:
      - "Band caught mid-ford — waist-deep in current, -2 to all combat rolls"
      - "Raiders on high bank with cover — ranged attacks downhill at +1"
      - "River current pushes waders downstream — MIG test each round to hold position"
    difficulty: "hard"
    loot_bonus: "Raider gear: 25 silver in weapons, a map marking their camp upriver"
    notes: "Retreat is downstream — the current helps escape. Charging uphill through water is near-suicidal. Flanking through shallows upstream takes 3 rounds but puts fighters on dry ground."

  - id: "ENC_RIVER_010"
    name: "The River Gives Back"
    terrain: "river"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "Bodies wash up on the gravel bar — fresh, armored, still gripping weapons. Then one sits up, river water pouring from its mouth, and reaches for you."
    enemies:
      - enemy_id: "UND_APT_02"
        name: "River Aptrgangr"
        count: 2
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 3
    battlefield_conditions:
      - "Gravel bar — narrow strip of dry ground, river on both sides"
      - "Wet dead are slippery — grapple attempts against them at -2"
      - "More dead surface every 3 rounds — encounter escalates until the band retreats"
    difficulty: "hard"
    loot_bonus: "Arms and armor from the dead: 40 silver if cleaned and dried. A sealed dispatch case worth 50 silver"
    notes: "The river is disgorging a defeated warband. There is no end to them — retreat is mandatory eventually. The dispatch case reveals a battle upstream and identifies a wounded jarl who might pay for its return."

  # ========================================================================
  # RUINS ENCOUNTERS (ENC_RUINS_001 to ENC_RUINS_010)
  # ========================================================================

  - id: "ENC_RUINS_001"
    name: "Squatters in the Old Hall"
    terrain: "ruins"
    tier: 1
    season: ["any"]
    time_of_day: "any"
    description: "The longhouse roof sags but the walls stand. Smoke seeps from a hole above. Someone has been living here — and they don't want company."
    enemies:
      - enemy_id: "HUM_DESER_01"
        name: "Lone Deserter"
        count: 2
      - enemy_id: "HUM_CIVIL_02"
        name: "Desperate Villager"
        count: 3
    battlefield_conditions:
      - "Collapsed beam across the hall — divides battlefield into two zones"
      - "Sagging roof — heavy impacts risk collapse (1-in-6 per round of fighting)"
      - "Single narrow doorway — bottleneck entry, defenders have advantage"
    difficulty: "easy"
    loot_bonus: "Squatters' stash: 8 silver, stolen tools, salted meat for 3 days"
    notes: "These are desperate people, not warriors. They surrender if cornered and two fall. The deserters fight harder than the villagers. Taking their food in winter is a death sentence for them."

  - id: "ENC_RUINS_002"
    name: "The Burned Village"
    terrain: "ruins"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "Charred timbers and ash. The raid was weeks ago. But something still digs in the cellars — snuffling, heavy, territorial."
    enemies:
      - enemy_id: "ANI_BEAR_01"
        name: "Brown Bear"
        count: 1
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 2
    battlefield_conditions:
      - "Burned timbers — fall hazard, NIM test when moving through rubble at speed"
      - "Cellar holes hidden under ash — pitfall 2d6 damage on failed Perception test"
      - "Broken glass and pottery shards — barefoot or light-shod characters take 1 damage per move action"
    difficulty: "moderate"
    loot_bonus: "Cellar contents: preserved food, 15 silver in buried household goods"
    notes: "The bear denned in the cellar; the wolves scavenge at the edges. The bear fights only if cornered in its cellar. Loud noise from the entrance drives it out the back. The wolves flee once the bear is gone."

  - id: "ENC_RUINS_003"
    name: "Shrine Guardian"
    terrain: "ruins"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "dusk"
    description: "An old shrine to a forgotten god, half-swallowed by roots. The carved face above the lintel moves its eyes to follow you. The offerings at its feet are fresh."
    enemies:
      - enemy_id: "SUP_SPIRIT_01"
        name: "Shrine Guardian Spirit"
        count: 1
      - enemy_id: "SUP_CORR_01"
        name: "Corruption Fragment"
        count: 2
    battlefield_conditions:
      - "Sacred ground — weapons drawn within 5 paces of the shrine lose 1 durability per round"
      - "Overgrown rubble — ivy and roots trip runners, NIM test to move quickly"
      - "The shrine pulses with old power — seidr costs halved within its radius for both sides"
    difficulty: "hard"
    loot_bonus: "Shrine offerings: 20 silver in old coins and ornaments. Taking them angers the guardian permanently"
    notes: "The guardian protects the shrine — it does not pursue. Leaving an offering and retreating avoids combat entirely. The corruption fragments are drawn by the shrine's power and are the guardian's actual enemy."

  - id: "ENC_RUINS_004"
    name: "Collapsed Keep Rats"
    terrain: "ruins"
    tier: 1
    season: ["any"]
    time_of_day: "night"
    description: "The keep is more rubble than building, but the one intact room makes good shelter. Until the walls come alive with scratching. Rats — thousands of them, pouring from every crack."
    enemies:
      - enemy_id: "ANI_VERM_01"
        name: "Rat Swarm"
        count: 3
      - enemy_id: "ANI_VERM_02"
        name: "Plague Rat Alpha"
        count: 1
    battlefield_conditions:
      - "Enclosed room — nowhere to retreat without going through the swarm"
      - "Rats climb armor — individually harmless but mass weight drags fighters down"
      - "Unstable walls — striking walls to crush rats risks section collapse (2d6 damage)"
    difficulty: "easy"
    loot_bonus: "Nothing — rats own nothing worth having"
    notes: "Fire solves everything but risks burning the shelter down. Climbing onto the remaining wall section gets above the swarm. The plague rat alpha coordinates the swarm — killing it scatters them."

  - id: "ENC_RUINS_005"
    name: "Bandit Outpost"
    terrain: "ruins"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "any"
    description: "What looked like an abandoned farmstead has been fortified — stakes along the approaches, a sentry on the one standing wall. A bandit crew has made this home."
    enemies:
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 2
    battlefield_conditions:
      - "Stake line — approaching is slow and channels attackers into kill zones"
      - "Standing wall provides full cover for the sentry with a bow"
      - "Old well in the yard — pitfall trap, 10-pace drop onto rocks"
    difficulty: "moderate"
    loot_bonus: "Bandit stash: 45 silver, stolen goods, a merchant's strongbox (locked)"
    notes: "The bandits have defensive advantage. A night approach bypasses the sentry. The old well can be used against them — driving enemies toward it in melee. The merchant's strongbox key is on the sergeant."

  - id: "ENC_RUINS_006"
    name: "The Cursed Hearth"
    terrain: "ruins"
    tier: 3
    season: ["winter"]
    time_of_day: "night"
    description: "The old farmhouse hearth still works. Seeking shelter, you light a fire. The flames burn green and the family that died here comes home."
    enemies:
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 3
      - enemy_id: "UND_SPEC_01"
        name: "Bound Ghost"
        count: 1
    battlefield_conditions:
      - "Green hearth-fire — illumination only, no warmth, extinguishing it angers the dead further"
      - "Familiar home-ground — the dead know every floorboard, no terrain penalty for them"
      - "Defensible position at the hearth — but the dead come from the walls, not the door"
    difficulty: "hard"
    loot_bonus: "Family's hidden savings: 25 silver under a hearthstone, found only after clearing the dead"
    notes: "The family died in a feud. They believe any stranger in their house is the enemy. Speaking the family name (found carved above the lintel) gives them pause — one round of hesitation to parley or flee."

  - id: "ENC_RUINS_007"
    name: "Root Cellar Horror"
    terrain: "ruins"
    tier: 2
    season: ["autumn"]
    time_of_day: "any"
    description: "The root cellar looks promising — dry, intact, sheltered. Then the door slams shut behind you and fingernails scrape the wood from outside."
    enemies:
      - enemy_id: "UND_APT_01"
        name: "Cellar Aptrgangr"
        count: 1
      - enemy_id: "UND_SKEL_01"
        name: "Skeletal Thrall"
        count: 2
    battlefield_conditions:
      - "Confined space — only 2 fighters abreast, no room for swinging long weapons"
      - "Darkness — no light source unless brought, fighting blind otherwise"
      - "Low ceiling — tall fighters must crouch, -1 to melee attacks"
    difficulty: "moderate"
    loot_bonus: "Preserved stores: worth 10 silver. A sealed clay jar of honey (rare, 20 silver)"
    notes: "The Aptrgangr was the cellar's previous owner who died down here. It sealed itself in. Breaking the door is possible (MIG test difficulty 3) but takes 2 rounds. The skeletons are its children."

  - id: "ENC_RUINS_008"
    name: "Tower Sniper"
    terrain: "ruins"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "An arrow slams into the ground at your feet from a half-ruined watchtower. A lone archer with good aim and a height advantage waves you off. He has friends below."
    enemies:
      - enemy_id: "HUM_SPEC_02"
        name: "Huntsman-Archer"
        count: 1
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Sellsword"
        count: 3
    battlefield_conditions:
      - "Tower height advantage — archer at +2 to hit, attackers must climb under fire"
      - "Rusted gate mechanism across the approach — NIM test to bypass without noise"
      - "Rubble field around the tower base — difficult terrain in all directions"
    difficulty: "moderate"
    loot_bonus: "Tower cache: 30 silver, bow and quiver, a spyglass worth 40 silver"
    notes: "The archer is the real threat — the sellswords below are mediocre. Climbing the tower under arrow fire is dangerous. Smoke from a fire at the base drives the archer down in 3 rounds. The spyglass is the real prize."

  - id: "ENC_RUINS_009"
    name: "Grave-Field Skirmish"
    terrain: "ruins"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "dusk"
    description: "The old settlement's burial field — shallow graves marked with sticks, some disturbed. You're not the first visitors and the current grave-robbers don't intend to share."
    enemies:
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 2
      - enemy_id: "HUM_SPEC_04"
        name: "Grave-Robber"
        count: 2
    battlefield_conditions:
      - "Soft earth — running collapses grave-tops, NIM test or leg sinks to knee"
      - "Headstones and wooden markers provide low cover across the field"
      - "Fading light — each round after round 5, visibility drops by 5 paces"
    difficulty: "moderate"
    loot_bonus: "Grave goods already dug up: 35 silver in corroded jewelry and weapons"
    notes: "The grave-robbers fight over their finds, not for territory. If the band takes the dug-up goods, the robbers flee. Disturbing further graves risks undead attention on following nights."

  - id: "ENC_RUINS_010"
    name: "The Old Well"
    terrain: "ruins"
    tier: 3
    season: ["any"]
    time_of_day: "night"
    description: "The village well still has water — dark, cold, deep. Something lives at the bottom and it's been climbing the stones at night, leaving wet handprints on the rim."
    enemies:
      - enemy_id: "UND_APT_03"
        name: "Well-Dweller"
        count: 1
      - enemy_id: "SUP_CORR_02"
        name: "Corruption Creeper"
        count: 1
    battlefield_conditions:
      - "The well is the creature's lair — it retreats inside and attacks from ambush"
      - "Wet stone rim — NIM test when fighting near the edge or risk falling in (3d6 fall + drowning)"
      - "The well corrupts water — drinking it inflicts 1 corruption point"
    difficulty: "hard"
    loot_bonus: "Coins thrown as offerings over the years: 50 silver at the bottom — if you can reach it"
    notes: "The well-dweller was a child who fell in and drowned. It pulls others in by instinct, not malice. Filling the well with rubble seals it but denies the settlement water forever. A seidr-worker can put the spirit to rest with rites."

  # ========================================================================
  # WINTER ENCOUNTERS (ENC_WINTER_001 to ENC_WINTER_010)
  # ========================================================================

  - id: "ENC_WINTER_001"
    name: "Starving Pack"
    terrain: "any"
    tier: 2
    season: ["winter"]
    time_of_day: "any"
    description: "The wolves are gaunt, ribs visible through ratty fur. They circle in broad daylight — too hungry for caution, too desperate to care about your fire."
    enemies:
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 6
      - enemy_id: "ANI_WOLF_03"
        name: "Pack Alpha"
        count: 1
    battlefield_conditions:
      - "Knee-deep snow — all movement at half speed for humans, wolves unaffected"
      - "Starvation frenzy — wolves don't flee when injured, fight to the death"
      - "Extreme cold — TOU test each round spent stationary or lose 1 HP to frostbite"
    difficulty: "hard"
    loot_bonus: "Wolf pelts: 5 silver each, alpha pelt 15 silver. Lean wolf meat barely edible"
    notes: "Unlike normal wolves, these do NOT flee when the alpha falls. Starvation overrides pack instinct. Throwing food (rations, a horse) distracts them for 1d6 rounds. Winter wolf encounters should feel relentless."

  - id: "ENC_WINTER_002"
    name: "Frost-Wraith on the Ice"
    terrain: "any"
    tier: 3
    season: ["winter"]
    time_of_day: "night"
    description: "The cold deepens past natural — breath freezes mid-air and shatters. A shape of compressed frost walks toward you, leaving glass-smooth ice in its footsteps."
    enemies:
      - enemy_id: "SUP_VEIL_01"
        name: "Frost-Wraith"
        count: 1
      - enemy_id: "SUP_CORR_01"
        name: "Ice Fragment"
        count: 3
    battlefield_conditions:
      - "Ice-covered ground in a 20-pace radius — NIM test every round or fall prone"
      - "Metal weapons stick to frozen skin — 1 damage to draw a metal weapon barehanded"
      - "Extreme cold aura — TOU test each round or lose 1 HP, cumulative"
    difficulty: "hard"
    loot_bonus: "Frost-wraith's core: a shard of never-melting ice worth 35 silver to a seidr-worker"
    notes: "Fire is the only effective weapon. Non-fire damage is halved. The wraith is drawn to warmth — using a campfire as bait lures it into a prepared position. It cannot enter any enclosed space with a hearth-fire burning."

  - id: "ENC_WINTER_003"
    name: "Whiteout Skirmish"
    terrain: "any"
    tier: 2
    season: ["winter"]
    time_of_day: "day"
    description: "The blizzard hits mid-march. Visibility drops to arm's length. Then shouts — and steel. Someone is out here and they can see better than you can."
    enemies:
      - enemy_id: "HUM_RAIDER_02"
        name: "Norse Raider"
        count: 3
      - enemy_id: "HUM_RAIDER_01"
        name: "Coastland Raider"
        count: 2
    battlefield_conditions:
      - "Whiteout conditions — cannot see beyond 5 paces, ranged combat impossible"
      - "Blinding snowfall — Perception tests at -3 to detect enemy positions"
      - "Frostbitten fingers — -1 to weapon skill after round 5 from cold exposure"
    difficulty: "hard"
    loot_bonus: "Raider gear: 20 silver. Getting their supplies means surviving — worth more than silver"
    notes: "The raiders know the terrain — they've been sheltering nearby and struck when the blizzard masked their approach. Retreating in a whiteout means getting lost. Holding position and defending is safer than running."

  - id: "ENC_WINTER_004"
    name: "The Frozen Warband"
    terrain: "any"
    tier: 4
    season: ["winter"]
    time_of_day: "dusk"
    description: "You find them standing in formation — a dozen warriors frozen solid mid-march, ice crystals threading through their mail. As the sun drops, the ice cracks."
    enemies:
      - enemy_id: "UND_DRAUGR_03"
        name: "Frost Draugr"
        count: 4
      - enemy_id: "UND_DRAUGR_04"
        name: "Frost Draugr Captain"
        count: 1
      - enemy_id: "UND_DRAUGR_02"
        name: "Draugr Thrall"
        count: 3
    battlefield_conditions:
      - "Frozen warriors thaw over 5 rounds — engaging early means fewer opponents"
      - "Deep snow field — movement halved, charges impossible"
      - "Dusk fading to full dark — total darkness in 8 rounds"
      - "Frost draugr radiate cold — 1 damage per round to anyone in melee range"
    difficulty: "deadly"
    loot_bonus: "Warband equipment: 60 silver in weapons and mail. Captain's arm-ring worth 40 silver. A sealed dispatch worth unknown value"
    notes: "Flee-or-die for small bands. The warband re-freezes at dawn and reanimates each dusk. Permanently destroying them requires fire or a seidr-worker's rites. The dispatch contains orders from a dead jarl — possibly valuable intelligence."

  - id: "ENC_WINTER_005"
    name: "Snowed-In Tomb"
    terrain: "any"
    tier: 3
    season: ["winter"]
    time_of_day: "night"
    description: "Seeking shelter from the storm, you dig into a snowdrift against a hillside — and break through into a burial chamber. The occupant is awake."
    enemies:
      - enemy_id: "UND_HAUG_01"
        name: "Barrow-Wight"
        count: 1
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 2
    battlefield_conditions:
      - "Confined chamber — 3 paces across, no room for more than 2 fighters at once"
      - "Snow collapse threatens the entrance — each round of fighting, 1-in-6 chance of burial"
      - "Total darkness inside — the barrow-wight sees perfectly, the band does not"
    difficulty: "hard"
    loot_bonus: "Burial goods: 45 silver in ancient weapons, a gold torc worth 80 silver"
    notes: "Retreating back into the blizzard is arguably worse than the barrow-wight. The confined space neutralizes numerical advantage. The wight fights defensively — it wants intruders gone, not dead. Leaving immediately and sealing the entrance resolves peacefully."

  - id: "ENC_WINTER_006"
    name: "Desperate Farmstead"
    terrain: "any"
    tier: 2
    season: ["winter"]
    time_of_day: "any"
    description: "The farm looked welcoming — smoke from the chimney, fenced yard. Then the gate barred behind you and a gaunt man with an axe stepped out. They need your food more than you do."
    enemies:
      - enemy_id: "HUM_CIVIL_01"
        name: "Armed Farmer"
        count: 2
      - enemy_id: "HUM_CIVIL_02"
        name: "Desperate Villager"
        count: 2
      - enemy_id: "HUM_CIVIL_03"
        name: "Farm Matriarch"
        count: 1
    battlefield_conditions:
      - "Fenced yard — limited space, retreat requires climbing the fence (NIM test)"
      - "Farm buildings provide cover — ambush positions in barn, woodshed, house"
      - "Short daylight — encounter starts in twilight, full dark in 6 rounds"
    difficulty: "moderate"
    loot_bonus: "Nothing worth taking — they have less than you do"
    notes: "These are starving people, not warriors. The matriarch orchestrated the trap. Sharing food resolves peacefully — they provide shelter for the night. Taking their last supplies and moving on condemns them. Morality encounter."

  - id: "ENC_WINTER_007"
    name: "Avalanche Aftermath"
    terrain: "any"
    tier: 3
    season: ["winter"]
    time_of_day: "day"
    description: "The mountainside let go. Your party is scattered across a debris field of snow, rock, and shattered trees. Someone is buried. Something else heard the noise."
    enemies:
      - enemy_id: "ANI_BEAR_02"
        name: "Cave Bear"
        count: 1
    battlefield_conditions:
      - "Avalanche debris — movement at quarter speed through churned snow and rubble"
      - "Party scattered — each member starts 10-20 paces from nearest ally"
      - "Buried companion — MIG tests to dig them out, 5 rounds before suffocation"
      - "Extreme cold exposure — wet clothing means TOU test each round or lose 1 HP"
    difficulty: "hard"
    loot_bonus: "None — everything you own is buried"
    notes: "The bear was driven from its den by the avalanche and is disoriented and aggressive. The real enemy is time — the buried companion will die in 5 rounds. The bear is a distraction from the rescue."

  - id: "ENC_WINTER_008"
    name: "Black Ice Ambush"
    terrain: "any"
    tier: 2
    season: ["winter"]
    time_of_day: "dawn"
    description: "The trail crosses a frozen lake. Halfway across, you hear the crack — not ice, a bowstring. Arrows skip across the ice from the tree line."
    enemies:
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
      - enemy_id: "HUM_SPEC_02"
        name: "Huntsman-Archer"
        count: 1
    battlefield_conditions:
      - "Frozen lake — no cover anywhere on the ice, completely exposed"
      - "Ice surface — NIM test on any movement faster than a walk, or fall prone"
      - "Reaching the tree line takes 3 rounds of crossing — under fire the entire time"
    difficulty: "hard"
    loot_bonus: "Outlaws' tree-line cache: 15 silver, arrows, a fur-lined cloak worth 20 silver"
    notes: "The outlaws chose this ground. Retreating back across the lake is equally exposed. Crawling reduces hit chance but doubles crossing time. Breaking ice near the shore creates a barrier the outlaws won't cross."

  - id: "ENC_WINTER_009"
    name: "The Cold-Touched Dead"
    terrain: "any"
    tier: 4
    season: ["winter"]
    time_of_day: "night"
    description: "The dead don't rot in winter. The ones following you have been walking since the first snow — preserved, tireless, silent on the frozen ground."
    enemies:
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 3
      - enemy_id: "UND_DRAUGR_05"
        name: "Draugr Champion"
        count: 1
      - enemy_id: "UND_SPEC_02"
        name: "Curse-Bound Spirit"
        count: 1
    battlefield_conditions:
      - "Deep snow — the dead walk on it without sinking, the living sink to their knees"
      - "The spirit commands the draugr — tactical coordination, flanking, pursuit"
      - "Night cold — TOU test each round or lose 1 HP, metal armor conducts cold (additional -1)"
    difficulty: "deadly"
    loot_bonus: "Champion's frozen blade: still sharp, worth 50 silver, radiates cold permanently"
    notes: "The spirit is the real threat — destroy it and the draugr lose coordination and collapse within 3 rounds. The champion's sword inflicts cold damage on the wielder unless wrapped in leather. Winter encounters should feel hopeless."

  - id: "ENC_WINTER_010"
    name: "Starvation March"
    terrain: "any"
    tier: 2
    season: ["winter"]
    time_of_day: "any"
    description: "Three days without food. The horse is lame. Then you see them — other starving travellers on the road ahead. They see you too. Only one group has enough strength to make it to the next settlement."
    enemies:
      - enemy_id: "HUM_DESER_01"
        name: "Lone Deserter"
        count: 2
      - enemy_id: "HUM_SELL_01"
        name: "Starving Sellsword"
        count: 2
      - enemy_id: "HUM_CIVIL_01"
        name: "Armed Traveller"
        count: 1
    battlefield_conditions:
      - "Both sides weakened — all combatants at -1 to MIG and TOU from starvation"
      - "Knee-deep snow slows everything — no charges, no sprinting"
      - "Exhaustion — after 5 rounds of combat, both sides must make TOU tests or collapse"
    difficulty: "moderate"
    loot_bonus: "The other group's supplies: 3 days of dwindling rations, a working horse"
    notes: "Nobody wants this fight. Parley is possible but desperation makes trust impossible. Sharing supplies leaves both groups short. The lame horse provides meat for a day. Winter makes monsters of everyone."

  # ========================================================================
  # AMBUSH ENCOUNTERS (ENC_AMBUSH_001 to ENC_AMBUSH_010)
  # ========================================================================

  - id: "ENC_AMBUSH_001"
    name: "Ravine Kill-Box"
    terrain: "any"
    tier: 3
    season: ["any"]
    time_of_day: "day"
    description: "The ravine narrows and a deadfall of logs seals the path behind you. Arrows from the ridgeline. They've been waiting."
    enemies:
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
      - enemy_id: "HUM_SPEC_02"
        name: "Huntsman-Archer"
        count: 2
    battlefield_conditions:
      - "Ravine walls — no escape to the sides, only forward or back"
      - "Deadfall blocks retreat — clearing it takes 3 rounds of MIG tests"
      - "Archers on the ridgeline with full cover — ranged attacks down at +2"
      - "Kill-zone — no cover on the ravine floor"
    difficulty: "hard"
    loot_bonus: "Bandit cache nearby: 50 silver, weapons, a map marking other ambush sites"
    notes: "Tactics matter here. Climbing the ravine wall takes 2 rounds under fire. Smoke from burning the deadfall obscures the archers' aim. Surrendering means robbery but survival — the sergeant wants goods, not corpses."

  - id: "ENC_AMBUSH_002"
    name: "River Crossing Trap"
    terrain: "any"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "Halfway across the ford, a horn blows. Armed men break from cover on both banks. You're waist-deep in current with enemies on every shore."
    enemies:
      - enemy_id: "HUM_SELL_02"
        name: "Veteran Sellsword"
        count: 2
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Sellsword"
        count: 3
    battlefield_conditions:
      - "Band caught mid-ford — waist-deep water, -2 to all combat actions"
      - "Enemies control both banks — no dry ground to retreat to"
      - "Pre-set snare lines in the shallows — NIM test or legs tangled, immobilized 1 round"
    difficulty: "hard"
    loot_bonus: "Sellswords' employer payment: 35 silver. A contract naming who hired them"
    notes: "The sellswords were hired to stop someone specific — possibly someone in the band. The contract identifies the employer. Fighting in water is brutal; bribing them with double their contract is cheaper than bleeding."

  - id: "ENC_AMBUSH_003"
    name: "Night Camp Strike"
    terrain: "any"
    tier: 3
    season: ["any"]
    time_of_day: "night"
    description: "The sentry dies quietly — a hand over the mouth, a blade across the throat. By the time the camp wakes, half the perimeter is compromised."
    enemies:
      - enemy_id: "HUM_SPEC_05"
        name: "Assassin"
        count: 1
      - enemy_id: "HUM_SELL_02"
        name: "Veteran Sellsword"
        count: 2
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Sellsword"
        count: 2
    battlefield_conditions:
      - "Surprise round — attackers strike from camp perimeter simultaneously"
      - "Half the band unarmored — armor takes 2 rounds to don"
      - "Sentry eliminated — the alarm was never raised, first round is silent confusion"
      - "Scattered embers — kicking the fire provides light but takes an action"
    difficulty: "hard"
    loot_bonus: "Assassin's purse: 40 silver. Orders identifying the target"
    notes: "The assassin has a specific target — the sellswords are backup. If the target is killed or subdued, the rest withdraw. The orders reveal who sent them. Good sentry rotation (multiple shifts) prevents the silent approach."

  - id: "ENC_AMBUSH_004"
    name: "Bridge Collapse"
    terrain: "any"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "The bridge had been weakened — cut supports, scored beams. When the first horse steps on, it gives way. The bandits emerge from the undergrowth on our side of the gap."
    enemies:
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 4
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
    battlefield_conditions:
      - "Band separated — those across the gap when it collapsed are cut off"
      - "Horse and supplies may have fallen — saving them requires MIG test"
      - "Bandits attack the group with fewer fighters"
      - "Broken bridge fragments create difficult terrain along the gap edge"
    difficulty: "moderate"
    loot_bonus: "Bandits' tools and stash: 25 silver. Bridge-cutting saw worth 10 silver"
    notes: "The bandits always attack the smaller group. If the band wasn't split, they scatter into the woods. The bridge can be jury-rigged with Athletics (difficulty 5) over several hours. Walking around adds a full day."

  - id: "ENC_AMBUSH_005"
    name: "Rival Band's Vengeance"
    terrain: "any"
    tier: 4
    season: ["any"]
    time_of_day: "any"
    description: "You recognize the leader — the jarl's nephew you humiliated last season. He's brought friends this time. Fifteen men surround your camp with cold purpose."
    enemies:
      - enemy_id: "BOS_RIVAL_03"
        name: "Rival Warleader"
        count: 1
      - enemy_id: "HUM_WAR_02"
        name: "Huskarl"
        count: 3
      - enemy_id: "HUM_WAR_01"
        name: "Soldier"
        count: 4
      - enemy_id: "HUM_SPEC_02"
        name: "Huntsman-Archer"
        count: 2
    battlefield_conditions:
      - "Surrounded — enemies on all sides, no direction of retreat"
      - "Signal fires alert reinforcements — if not disrupted, more arrive in 10 rounds"
      - "The rival wants a duel, not a massacre — accepting single combat stops the siege"
    difficulty: "deadly"
    loot_bonus: "Rival's war-chest: 80 silver, quality weapons, horses"
    notes: "The rival warleader offers single combat for honor. Accepting keeps both bands intact. Refusing means a full battle against superior numbers. Winning the duel earns grudging respect and the rival's pledge — a powerful future ally."

  - id: "ENC_AMBUSH_006"
    name: "Pit and Net"
    terrain: "any"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "The trail gives way — a concealed pit. The lead fighter drops into a spiked hole. As the band rushes forward, a weighted net falls from the trees."
    enemies:
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Desperate Beggar-Thief"
        count: 2
    battlefield_conditions:
      - "Lead fighter in pit — 2d6 fall damage, takes 2 rounds to climb out"
      - "Net trap — 1d6 fighters caught, NIM test (difficulty 4) to cut free in 1 round"
      - "Band caught in column formation — front and rear separated by the pit"
    difficulty: "moderate"
    loot_bonus: "Outlaws' trap-making gear: 10 silver. Nearby cache: 20 silver in stolen goods"
    notes: "The pit and net are the real weapons — the outlaws are mediocre fighters. If the traps catch nobody (unlikely but possible with high Perception), the outlaws flee immediately."

  - id: "ENC_AMBUSH_007"
    name: "Scouts Cut Off"
    terrain: "any"
    tier: 3
    season: ["any"]
    time_of_day: "any"
    description: "A shout from ahead — your scouts were seen and cut off. Horsemen circle between the scouts and the main body. You can hear fighting."
    enemies:
      - enemy_id: "HUM_WAR_03"
        name: "Mounted Warrior"
        count: 3
      - enemy_id: "HUM_WAR_01"
        name: "Soldier"
        count: 2
    battlefield_conditions:
      - "Band split — scouts engaged separately from main body"
      - "Mounted opponents — cavalry advantage in open ground, +2 to charge attacks"
      - "Retreat route blocked by horsemen — attempting to flee provokes pursuit"
      - "Scouts outnumbered — they fall in 4 rounds without support"
    difficulty: "hard"
    loot_bonus: "Cavalry horses: 30 silver each if captured. Military equipment: 25 silver"
    notes: "Speed matters. Reaching the scouts before they fall changes the fight. Horses are the prize — unhorsed cavalry are just infantry. Spear-wall or terrain that neutralizes mounted advantage (trees, rocks) is the key."

  - id: "ENC_AMBUSH_008"
    name: "The Friendly Village"
    terrain: "any"
    tier: 3
    season: ["any"]
    time_of_day: "dusk"
    description: "The village welcomed you with mead and a hearth. Now the doors are barred from outside and the walls are burning. They were never friendly — they were bait."
    enemies:
      - enemy_id: "HUM_RAIDER_03"
        name: "Raider Veteran"
        count: 2
      - enemy_id: "HUM_RAIDER_01"
        name: "Coastland Raider"
        count: 4
      - enemy_id: "HUM_CIVIL_03"
        name: "Treacherous Headman"
        count: 1
    battlefield_conditions:
      - "Building on fire — 1d6 fire damage per round inside after round 3"
      - "Barred doors — MIG test (difficulty 4) to break through"
      - "Raiders waiting outside with weapons drawn — ambush positions at all exits"
      - "Smoke filling the room — visibility halves per round, TOU test or choking"
    difficulty: "hard"
    loot_bonus: "Raiders' payment to the headman: 60 silver. The headman's own savings: 25 silver"
    notes: "Break out fast — the fire is the real killer. The raiders expect the band to pour out choking and blind. Going through the roof or a wall (not the door) avoids the kill-zone. The headman traded the band for his village's safety."

  - id: "ENC_AMBUSH_009"
    name: "Supply Train Hit"
    terrain: "any"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "They didn't come for you — they came for the cart. Horsemen sweep in, two cutting at the drivers while the rest circle to scatter the guards."
    enemies:
      - enemy_id: "HUM_RAIDER_02"
        name: "Norse Raider"
        count: 3
      - enemy_id: "HUM_RAIDER_01"
        name: "Coastland Raider"
        count: 3
    battlefield_conditions:
      - "Cart in the center — protecting it limits the band's mobility"
      - "Mounted enemies circle — changing direction constantly, hard to pin down"
      - "Horses scattered — pack animals bolt, chasing them takes fighters out of position"
      - "Crossfire positions — mounted archers fire from two sides"
    difficulty: "moderate"
    loot_bonus: "Keeping your own supplies is the reward. Raider horses: 30 silver each if caught"
    notes: "The raiders want supplies, not a prolonged fight. If the cart is abandoned, they take it and ride off. Killing a horse puts a raider on foot and vulnerable. The band must choose: protect the supplies or fight unencumbered."

  - id: "ENC_AMBUSH_010"
    name: "The Dead Road"
    terrain: "any"
    tier: 4
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "The dead rise from the ditches on both sides of the road — not randomly, not slowly. In formation. With purpose. Something is commanding them and it isn't done with this stretch of road."
    enemies:
      - enemy_id: "UND_SPEC_04"
        name: "Wight-Commander"
        count: 1
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 4
      - enemy_id: "UND_DRAUGR_02"
        name: "Draugr Thrall"
        count: 4
    battlefield_conditions:
      - "Road flanked by ditches — dead rise on both sides, no safe direction"
      - "The Wight-Commander coordinates from behind — draugr use shield-wall tactics"
      - "Retreat route blocks with risen dead — fighting through required to escape"
      - "Night darkness — torchlight only, commander stays in shadow"
    difficulty: "deadly"
    loot_bonus: "Ancient weapons from the dead: 40 silver. Wight-Commander's enchanted helm: 70 silver, grants dark-vision"
    notes: "The Wight-Commander is the priority target — without it, the draugr lose formation and become individual threats. It stays behind its troops and must be flanked or drawn out. This road is permanently dangerous until the Commander is destroyed."

  # ========================================================================
  # WOLFSHEAD ENCOUNTERS (ENC_WHEAD_001 to ENC_WHEAD_028)
  # ========================================================================

  # --- Road Encounters (001-005) ---

  - id: "ENC_WHEAD_001"
    name: "Toll Blockade"
    terrain: "road"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "A felled tree bars the road. Men in mismatched armour step out from behind it — not rushing, not threatening. One holds up an open hand. A plank sign nailed to the trunk reads 'ROAD TAX — 2 SILVER PER HEAD.' Organised. Polite. Armed."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Leader"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 2
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
    battlefield_conditions:
      - "Felled tree blocks the road — climbing over exposes flanks"
      - "Archers in the tree line on both sides — pre-sighted on the killing ground"
      - "Retreat route has caltrops scattered in the mud — movement penalty"
    difficulty: "moderate"
    loot_bonus: "Toll chest under the tree: 15-40 silver collected from previous travellers"
    notes: "Ref: WOLF_001 (The Burnt Charter) runs toll operations like this. Paying is cheapest. Fighting costs more than 2 silver per head in bandages alone. Bargain check to negotiate rate. Intimidate to call the bluff — but Ash-Tongue does not bluff."

  - id: "ENC_WHEAD_002"
    name: "Road Ambush — Professional"
    terrain: "road"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "dusk"
    description: "The decoy comes first: a limping man on the road ahead, waving for help. Then the brush on both sides erupts. These aren't starving farmers with sticks. Shield-wall on the left, archers on the right. They've done this before."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 3
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 2
      - enemy_id: "HUM_BANDIT_02"
        name: "Wolfshead Bowman"
        count: 2
    battlefield_conditions:
      - "Decoy in the road — engaging him triggers the ambush from flanks"
      - "Brush cover on both sides — half-cover for ambushers until they charge"
      - "Dusk light — visibility dropping, ranged attacks at disadvantage beyond 20m"
      - "Pre-dug escape trench behind the archer position"
    difficulty: "hard"
    loot_bonus: "Mixed weapons and 8-15 silver in loose coin"
    notes: "Ref: WOLF_009 (The Grey Shields) uses this pattern. The decoy is genuine — he's the newest member, proving himself. If the band spots the ambush early (Perception), the wolfsheads offer parley. They want silver, not casualties."

  - id: "ENC_WHEAD_003"
    name: "Shared Road"
    terrain: "road"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "A column of armed figures rounds the bend ahead — same direction, same pace. Both groups see each other at the same moment. Nobody draws, but nobody relaxes. You're going to be walking within bowshot for the next three hours."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Leader"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 4
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
    battlefield_conditions:
      - "Open road — no natural cover for either group"
      - "Neutral ground — escalation requires deliberate action from either side"
      - "Extended proximity — hours of tension, fatigue, and mutual surveillance"
    difficulty: "easy"
    loot_bonus: "None unless it turns violent. Trade opportunities if it doesn't"
    notes: "Ref: WOLF_001 (The Burnt Charter) would handle this professionally. WOLF_004 (The Red Mouths) would not. The encounter is social — diplomacy, information trading, or slow-burn intimidation. Fighting is optional and expensive for both sides."

  - id: "ENC_WHEAD_004"
    name: "Supply Convoy Raid"
    terrain: "road"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "day"
    description: "The merchant's guards spot the wolfsheads first — riders flanking from the north, foot soldiers blocking the road ahead. The merchant starts screaming at Voss to earn his money. Three wagons, eight attackers, one narrow stretch of road."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Leader"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 3
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 2
      - enemy_id: "HUM_RAIDER_01"
        name: "Mounted Wolfshead"
        count: 2
    battlefield_conditions:
      - "Three wagons stretched along the road — defending all three splits the band"
      - "Mounted attackers circle to the rear wagon — hit-and-run tactics"
      - "Merchant guards (3 men) are not soldiers — they panic and cluster"
      - "Road narrows between embankments — advantageous choke point if reached"
    difficulty: "hard"
    loot_bonus: "Merchant pays bonus: 10 silver per wagon saved. Wolfshead gear: 5-10 silver"
    notes: "Ref: WOLF_003 (Grimketil's Hold) raids convoys. Grimketil wants goods, not a prolonged fight. If two or more of his men fall, he pulls the rest out. Letting them take one wagon and keep the other two is a valid option the merchant won't like."

  - id: "ENC_WHEAD_005"
    name: "Dead on the Road"
    terrain: "road"
    tier: 1
    season: ["any"]
    time_of_day: "any"
    description: "A body in the ditch, face-down. Wolfshead clothes — patched leather, no insignia. Dead maybe two days. Stripped of weapons but not coin — six copper in a belt pouch. Whoever killed him didn't need the money."
    enemies: []
    battlefield_conditions:
      - "No immediate threat — the danger is what killed him and might still be nearby"
      - "Tracks around the body (Track check) — booted feet, at least three men"
      - "Carrion birds circling — visible for miles, attracting attention"
    difficulty: "trivial"
    loot_bonus: "6 copper. A crude map scratched on bark inside his tunic — marks a cache site"
    notes: "Investigation encounter. The dead man is from WOLF_010 (Skarv's Dogs). Killed by a jarl's road patrol — the boot prints are military. The bark map leads to a small weapons cache worth 20 silver. Following the patrol tracks leads to a military picket that might hire mercenaries."

  # --- Forest Encounters (006-010) ---

  - id: "ENC_WHEAD_006"
    name: "Occupied Camp"
    terrain: "forest"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "Smoke through the trees. Cook-fire smell. The trail leads through a thicket into a clearing with lean-tos, a fire pit, and a half-dozen people who all stop what they're doing when they hear the brush move."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 2
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Wolfshead Camp-Follower"
        count: 2
    battlefield_conditions:
      - "Clearing surrounded by dense brush — limited approach angles"
      - "Fire pit in the centre — good light, blocks direct charge"
      - "Lean-tos provide partial cover for defenders"
      - "One escape trail at the back of the camp — they know it, you don't"
    difficulty: "moderate"
    loot_bonus: "Camp supplies: 5-10 silver in trade goods, dried meat, salvageable gear"
    notes: "Ref: WOLF_007 (The Skinned Wolves) camps like this — they're desperate, not dangerous unless cornered. Non-combat resolution likely: trade, information exchange, or mutual avoidance. Attacking a camp with non-combatants present has reputation cost."

  - id: "ENC_WHEAD_007"
    name: "Hunting Party Clash"
    terrain: "forest"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "day"
    description: "Both groups are tracking the same stag. The blood trail converges at a ridge where the animal dropped. Five armed strangers are already dressing the carcass when the Black Axes walk out of the tree line."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Hunter"
        count: 2
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
    battlefield_conditions:
      - "Both groups surprised — no pre-positioned advantage"
      - "Carcass between them — the prize and the problem"
      - "Wooded ridge — trees provide cover but limit formation fighting"
      - "Hunters are armed with bows, not expecting melee"
    difficulty: "easy"
    loot_bonus: "The stag itself: 60 lbs of meat, hide worth 3 silver"
    notes: "Ref: WOLF_002 (The Ketilsons) sends hunters — Yrsa's likely among them. The stag feeds a family for a week. Splitting it is smart. Taking it by force earns a blood-grudge with people who know these woods better than you do."

  - id: "ENC_WHEAD_008"
    name: "Forest Chase"
    terrain: "forest"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "any"
    description: "The sound behind is deliberate — branches snapping, low whistles passing from tree to tree. They want the band to know they're being followed. The pace picks up. Another whistle, closer."
    enemies:
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Tracker"
        count: 4
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 2
    battlefield_conditions:
      - "Dense woodland — no clear lines of sight beyond 15 metres"
      - "Pursuers know the ground — they choose when to close"
      - "Moving while watching your back — exhaustion builds"
      - "The chase is the weapon — they're herding, not hunting"
    difficulty: "moderate"
    loot_bonus: "None unless the band turns and fights. Scout gear: 3-5 silver"
    notes: "They're herding the band toward a dead-end ravine or a secondary ambush team. Stopping and facing them breaks the pattern. A counter-tracker (Track check) can identify the herding route and find an exit. Running plays into their plan."

  - id: "ENC_WHEAD_009"
    name: "Hidden Lookout"
    terrain: "forest"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "An arrow thuds into the trail two paces ahead. Not a miss — a message. A voice from above: 'That's far enough. State your business or take the next one in the chest.'"
    enemies:
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Archer (treetop)"
        count: 2
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran (ground)"
        count: 1
    battlefield_conditions:
      - "Archers in trees — elevated position, half-cover from branches and trunk"
      - "Ground fighter concealed in brush — flanking position if melee starts"
      - "Arrow stuck in the trail marks the kill zone — pre-ranged"
      - "Forest canopy limits return archery — hard to spot shooters above"
    difficulty: "moderate"
    loot_bonus: "Lookout gear: 2-5 silver. Information about what they're guarding: priceless"
    notes: "Ref: WOLF_003 (Grimketil's Hold) posts lookouts like this. The lookout's job is to delay and report, not die fighting. Parley is expected. Stating legitimate business gets an escort to Grimketil. Hostility gets an arrow and a disappeared trail."

  - id: "ENC_WHEAD_010"
    name: "Trap Line"
    terrain: "forest"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "any"
    description: "The trip-wire snaps a bent sapling loose. The log doesn't hit anyone, but it was close. Then the band notices the cord across the next stretch of trail. And the one after that. Someone has laced this entire forest corridor with traps."
    enemies:
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Trapper"
        count: 2
    battlefield_conditions:
      - "Trail trapped in depth — deadfalls, trip-wires, concealed pits"
      - "Moving off-trail risks more traps — the safe path is unknown"
      - "Trappers watch from concealment — engaging means fighting on trapped ground"
      - "Disarming traps takes time — every minute is exposure"
    difficulty: "moderate"
    loot_bonus: "Trap components: rope, iron, useful salvage. Trail access to wolfshead territory"
    notes: "Ref: WOLF_002 (The Ketilsons) traps their approaches. The traps are warnings — meant to slow and deter, not kill. Pushing through signals hostile intent. Calling out and waiting signals willingness to talk. Rolf Ketilsen will show up eventually."

  # --- Settlement Outskirts (011-015) ---

  - id: "ENC_WHEAD_011"
    name: "Night Market"
    terrain: "settlement"
    tier: 2
    season: ["any"]
    time_of_day: "night"
    description: "Torches in a barn outside the walls. Inside: stolen goods laid on blankets, a man selling weapons he shouldn't have, a woman trading herb bundles that smell of seidr. Half the customers are wolfsheads. The other half are townsfolk pretending they aren't here."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Guard"
        count: 3
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Merchant"
        count: 1
      - enemy_id: "HUM_BANDIT_03"
        name: "Market Enforcer"
        count: 2
    battlefield_conditions:
      - "Enclosed barn — cramped, fire risk from torches"
      - "Mixed crowd of combatants and civilians — collateral damage likely"
      - "Multiple exits — wolfsheads have escape routes planned"
      - "Starting a fight shuts down the market permanently — intelligence loss"
    difficulty: "moderate"
    loot_bonus: "Rare goods at black-market prices. Stolen weapons: 10-30 silver. Herb bundles: 5-15 silver"
    notes: "Ref: WOLF_003 (Grimketil's Hold) runs these markets. The market is more valuable intact than destroyed. Buying, selling, and eavesdropping yields intelligence on regional movements, contracts, and wolfshead politics. Violence is bad business."

  - id: "ENC_WHEAD_012"
    name: "Wall-Skulkers"
    terrain: "settlement"
    tier: 2
    season: ["any"]
    time_of_day: "night"
    description: "Three figures crouching in the shadow of the settlement wall, passing something through a gap in the timbers. One sees the band and freezes. Hands go to weapons. A whispered argument — run or fight."
    enemies:
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 2
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 1
    battlefield_conditions:
      - "Settlement wall at their backs — only one way out past the band"
      - "Dark — moonlight only, identification difficult"
      - "Someone inside the wall is helping them — a collaborator"
      - "Noise attracts the settlement watch — escalation clock"
    difficulty: "easy"
    loot_bonus: "Whatever they're smuggling: 5-15 silver in goods or intelligence"
    notes: "They want a specific person, supply, or piece of information from inside. Capturing them provides leverage. Letting them go creates a favour debt. Shouting for the watch turns them desperate. The collaborator inside is the real prize."

  - id: "ENC_WHEAD_013"
    name: "Protection Racket"
    terrain: "settlement"
    tier: 3
    season: ["any"]
    time_of_day: "day"
    description: "The village headman is direct: 'We pay eight silver a month. They don't burn the grain stores. That was the arrangement until you lot showed up.' The wolfsheads are due tomorrow. The headman wants them gone. His wife thinks paying is safer."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Leader"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 3
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
    battlefield_conditions:
      - "Village buildings — cover, chokepoints, civilian structures"
      - "Villagers will not fight — they're bystanders at best, obstacles at worst"
      - "Wolfsheads approach in the open — confident, familiar with the ground"
      - "Ambush opportunity exists if the band prepares in advance"
    difficulty: "hard"
    loot_bonus: "Village pays 15 silver if resolved. Wolfshead gear: 8-12 silver"
    notes: "Ref: WOLF_003 (Grimketil's Hold) runs protection rackets. The wife is right — Grimketil will retaliate. Breaking the racket means committing to defend the village long-term or making Grimketil the kind of enemy who burns things. Negotiating a lower rate or replacing Grimketil's protection with a legitimate contract is the smart play."

  - id: "ENC_WHEAD_014"
    name: "Recruitment Pitch"
    terrain: "settlement"
    tier: 1
    season: ["any"]
    time_of_day: "night"
    description: "One of the band's fighters is approached in an ale-house. The stranger buys a drink, talks shop, then gets to the point: 'Your captain pays you, what, two silver a week? I know people who pay four. No charter needed.'"
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Recruiter"
        count: 1
    battlefield_conditions:
      - "Ale-house — civilians present, cramped quarters"
      - "One-on-one social encounter — not combat-oriented"
      - "The recruiter has backup outside — two armed men by the door"
    difficulty: "trivial"
    loot_bonus: "Intelligence on which wolfshead band is recruiting and why"
    notes: "Ref: WOLF_003 (Grimketil's Hold) or WOLF_009 (The Grey Shields) recruit this way. The real threat isn't the offer — it's what it says about the band's reputation and pay scale. If a fighter is tempted, Voss has a loyalty problem. If he isn't, the recruiter is still a source of intelligence."

  - id: "ENC_WHEAD_015"
    name: "Former Comrades"
    terrain: "settlement"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "The face across the market square stops one of the Black Axes cold. A man from a former company — or a hometown — or a family. He's wearing wolfshead leathers now. He's seen them too. The silence stretches."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Former Comrade"
        count: 1
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Escort"
        count: 2
    battlefield_conditions:
      - "Settlement market — dense crowd, no room for formation fighting"
      - "Personal ties complicate tactical decisions"
      - "Wolfshead escort will fight if their man is threatened"
      - "Settlement watch will intervene if violence breaks out"
    difficulty: "easy"
    loot_bonus: "Information is the only currency here — debts, secrets, old loyalties"
    notes: "Ref: WOLF_001 (The Burnt Charter) has former mercenaries. The encounter is personal. A Black Axe who recognises someone has to decide: report, ignore, or reconnect. The former comrade may want help, may want to recruit, or may want something far more complicated."

  # --- Ruins Encounters (016-018) ---

  - id: "ENC_WHEAD_016"
    name: "Wolfshead Stronghold"
    terrain: "ruins"
    tier: 3
    season: ["any"]
    time_of_day: "any"
    description: "The old hillfort has new occupants. Timber patches the gaps in the stone walls. A gate with a crossbar. Smoke from cook-fires. A bell on a rope. This isn't a camp — it's a position. Taking it will cost blood."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Leader"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 4
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
      - enemy_id: "HUM_BANDIT_02"
        name: "Wolfshead Bowman"
        count: 3
    battlefield_conditions:
      - "Stone walls with timber reinforcement — half-cover for defenders on the wall"
      - "Single gate with crossbar — breaching required or climbing"
      - "Bell alarm — surprise is impossible once within 50 metres"
      - "Interior buildings provide secondary defensive positions"
      - "Escape tunnel from the old ruins — the defenders have a way out"
    difficulty: "deadly"
    loot_bonus: "Stronghold stores: 30-60 silver in goods, weapons, food. The position itself is the real prize"
    notes: "Ref: WOLF_003 (Grimketil's Hold) maintains a fortified position. Assault is expensive. Siege is slow and alerts the region. Stealth entry through the escape tunnel (if discovered) bypasses the walls. Negotiation saves lives but leaves the stronghold intact."

  - id: "ENC_WHEAD_017"
    name: "Shared Shelter"
    terrain: "ruins"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "The storm hit an hour ago and the ruin is the only shelter for miles. The problem: firelight inside. Someone else had the same idea. Both groups pile in through the same broken doorway, soaked and shivering, reaching for weapons and warmth at the same time."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 2
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Wolfshead Camp-Follower"
        count: 2
    battlefield_conditions:
      - "Storm outside — leaving means exposure, hypothermia risk"
      - "One room with one fire — forced proximity"
      - "Both groups exhausted and wet — combat effectiveness reduced"
      - "Darkness outside the firelight — acoustics echo, amplify tension"
    difficulty: "easy"
    loot_bonus: "Shared resources if peaceful. Full camp gear: 8-12 silver if violent"
    notes: "Ref: WOLF_008 (The Dusk-Walkers) shelters in ruins seasonally. Nobody wants to fight wet and cold in the dark. The night is about managing tension: who sleeps, who watches, where the weapons sit. A shared watch builds trust. A stolen blanket starts a bloodbath."

  - id: "ENC_WHEAD_018"
    name: "Barrow Dispute"
    terrain: "ruins"
    tier: 3
    season: ["any"]
    time_of_day: "day"
    description: "The barrow entrance is open. Fresh tool-marks on the stone. Wolfsheads inside — you can hear them arguing about how to move the capstone. Both groups want what's underneath. The problem is what's underneath might want them back."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Leader"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 3
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Digger"
        count: 2
    battlefield_conditions:
      - "Barrow interior — cramped, low ceiling, torch-lit"
      - "Capstone partially moved — whatever is inside may emerge"
      - "Both groups trapped in the barrow if fighting starts — no room to manoeuvre"
      - "Draugr risk — the barrow's occupant may wake regardless of who wins"
    difficulty: "hard"
    loot_bonus: "Barrow silver: 30-80 silver if cleared. Splitting is possible"
    notes: "Ref: WOLF_006 (The Veil-Watchers) explores barrows. Cooperation is logical — fight the barrow together, split the take. Betrayal after the barrow is cleared is the obvious risk. The draugr don't care which group woke them."

  # --- River/Ford (019-021) ---

  - id: "ENC_WHEAD_019"
    name: "Ford Blockade"
    terrain: "river"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "The ford is the only crossing for ten miles in either direction. A crude palisade of sharpened stakes blocks the far bank. A man behind it calls out a price. Behind him, archers."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Toll-Master"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 2
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Archer"
        count: 3
    battlefield_conditions:
      - "River crossing — waist-deep water, current pulls at legs, footing treacherous"
      - "Stake palisade on the far bank — climbing it under fire is suicide"
      - "Archers have pre-ranged the ford — every square metre is a kill zone"
      - "Flanking requires finding an alternative crossing upstream — hours of delay"
    difficulty: "hard"
    loot_bonus: "Toll income: 20-40 silver. Control of the ford itself"
    notes: "Ref: WOLF_001 (The Burnt Charter) controls fords like this. Crossing under fire is a death sentence. Paying is 3 silver per head. Finding an upstream crossing takes half a day. Negotiation works if you have something Ash-Tongue wants more than coin."

  - id: "ENC_WHEAD_020"
    name: "River Crossing Ambush"
    terrain: "river"
    tier: 3
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "Halfway across the river. Water at the waist. Then the arrows start from the bank you just left. More figures on the bank ahead. The current is fast, the footing is loose gravel, and the band is split between two killing grounds."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 3
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Archer"
        count: 4
    battlefield_conditions:
      - "Band caught mid-river — waist-deep water, no cover, shields waterlogged"
      - "Archers on both banks — crossfire, no safe direction"
      - "Current pulls — moving is slow, falling means drowning in armour"
      - "Gear getting wet — bowstrings slack, leather heavy, metal rusting"
    difficulty: "deadly"
    loot_bonus: "Only what can be taken from bodies. Survival is the reward"
    notes: "Ref: WOLF_004 (The Red Mouths) would execute an ambush this brutal — no negotiation, no mercy. The only options are: push forward to one bank and fight wet, or dive and hope the current carries you downstream faster than arrows follow. Armour must be dropped or drowning is certain."

  - id: "ENC_WHEAD_021"
    name: "Fishing Camp"
    terrain: "river"
    tier: 1
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "Smoke from a cook-fire on the riverbank. Three lean-tos, fish drying on racks, a woman mending a net. Two men by the water with spears. They watch the band approach with the flat calm of people who have decided this is their spot."
    enemies:
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Fisher"
        count: 2
      - enemy_id: "HUM_BANDIT_01"
        name: "Wolfshead Camp-Follower"
        count: 2
    battlefield_conditions:
      - "Riverbank — open ground, shallow water on one side"
      - "Fish-drying racks and lean-tos — minimal cover"
      - "Non-combatants present — the woman, possibly children in the lean-tos"
      - "Peaceful unless provoked — weapons present but not drawn"
    difficulty: "trivial"
    loot_bonus: "Dried fish: 2 silver worth. Fresh catch if traded for. River intelligence"
    notes: "Ref: WOLF_005 (The Unchained) subsistence-camps like this. They have nothing worth taking. What they have is knowledge: who passed upriver, where the ford is shallow this season, which bank has wolfshead camps. A handful of bread buys a conversation."

  # --- Moor Encounters (022-024) ---

  - id: "ENC_WHEAD_022"
    name: "Desperate Chase"
    terrain: "moor"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "A clutch of figures running toward the band across open moorland. Behind them, riders — eight, ten, more. The wolfsheads aren't attacking. They're fleeing. One stumbles and doesn't get up. The riders close."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Fleeing Wolfshead"
        count: 4
      - enemy_id: "HUM_WOLF_01"
        name: "Wounded Wolfshead"
        count: 2
    battlefield_conditions:
      - "Open moorland — no cover, long sight-lines"
      - "Riders pursuing — mounted, armoured, closing fast"
      - "Wolfsheads are exhausted, some wounded — not combat-ready"
      - "The band must decide before the riders arrive — thirty seconds"
    difficulty: "moderate"
    loot_bonus: "Wolfshead gratitude: information, future favours, potential alliance"
    notes: "Ref: WOLF_010 (Skarv's Dogs) gets run down like this. The riders are a jarl's men or a rival band. Helping the wolfsheads means fighting the pursuers. Stepping aside is cheaper. The wounded won't survive without aid. Thirty seconds to decide what kind of people the Black Axes are."

  - id: "ENC_WHEAD_023"
    name: "Exposure Camp"
    terrain: "moor"
    tier: 1
    season: ["winter"]
    time_of_day: "any"
    description: "The camp is barely visible — a hollow in the moor with a wind-break of stacked turf. Inside: eight people, three of them children. A fire they can't keep lit. No food visible. The adults are too cold to reach for weapons when the band appears."
    enemies:
      - enemy_id: "HUM_WOLF_01"
        name: "Starving Wolfshead"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Wolfshead Non-Combatant"
        count: 2
    battlefield_conditions:
      - "No combat likely — the wolfsheads cannot fight effectively"
      - "Wind and cold are the real enemies — exposure kills within hours"
      - "Children present — the moral weight of walking away"
      - "Sharing supplies costs the band's own winter margin"
    difficulty: "trivial"
    loot_bonus: "Nothing material. Moral choice defines the band's character"
    notes: "Ref: WOLF_007 (The Skinned Wolves) ends up like this — tier-1 bands that can't sustain through winter. Feeding them costs the band a day's rations per person. Ignoring them costs nothing tangible. The children will be dead by morning. What Voss does here is what the band remembers."

  - id: "ENC_WHEAD_024"
    name: "Moor Ambush"
    terrain: "moor"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "dawn"
    description: "Fog thick enough to chew. The moor grass is knee-high and the ground is soft gullies you can't see until you're in them. Movement at the edge of visibility — they know this ground and you don't. When the first man drops into a concealed ditch, the attack starts."
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Leader"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Veteran"
        count: 3
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 4
    battlefield_conditions:
      - "Dense fog — visibility under ten metres, ranged attacks useless"
      - "Soft ground with concealed gullies — movement penalties, falling hazard"
      - "Wolfsheads know every ditch and hollow — they move freely, you stumble"
      - "Sound carries strangely in fog — direction of threats uncertain"
      - "No formation fighting possible — broken ground splits the band"
    difficulty: "hard"
    loot_bonus: "Wolfshead gear: 10-20 silver. Map of the moor trails: 5 silver to the right buyer"
    notes: "Ref: WOLF_010 (Skarv's Dogs) knows the moor. In fog, numbers mean less than terrain knowledge. The band must anchor on known ground, make noise to stay grouped, and refuse to chase. Fighting in fog against people who live on this moor is dying on this moor."

  # --- Moral Dilemma Encounters (025-028) ---

  - id: "ENC_WHEAD_025"
    name: "The Mirror"
    terrain: "road"
    tier: 3
    season: ["any"]
    time_of_day: "day"
    description: "They're better equipped. Better fed. Better organised. Their captain wears a mail shirt that costs more than the Black Axes' entire treasury. She looks the band over with the quiet assessment of a professional counting threats. 'You're Voss's lot,' she says. 'Heard of you. Smaller than I expected.'"
    enemies:
      - enemy_id: "HUM_WOLF_03"
        name: "Wolfshead Captain"
        count: 1
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Elite"
        count: 5
      - enemy_id: "HUM_SELL_01"
        name: "Wolfshead Sellsword"
        count: 4
    battlefield_conditions:
      - "Open road — the wolfsheads chose this ground deliberately"
      - "Numerical and equipment superiority — they know it, you know it"
      - "Professional posture — no aggression, no bluffing, just facts"
      - "The encounter is a display of dominance, not a fight invitation"
    difficulty: "hard"
    loot_bonus: "None unless suicidal. Intelligence on a well-funded outlaw operation"
    notes: "Ref: WOLF_003 (Grimketil's Hold) at full strength looks like this. The encounter is humbling. Fighting is losing. The Black Axes walk away and reassess, or they find something to offer that makes the wolfshead captain want to talk. Voss's reputation is the only weapon that works here."

  - id: "ENC_WHEAD_026"
    name: "Children in Camp"
    terrain: "forest"
    tier: 2
    season: ["any"]
    time_of_day: "day"
    description: "The contract says clear the camp. The jarl's man was specific: no wolfsheads within ten miles of the winter road. The camp has twelve adults. It also has nine children, a pregnant woman, and an old man who can't walk. The adults are reaching for weapons. The children are watching."
    enemies:
      - enemy_id: "HUM_WOLF_02"
        name: "Wolfshead Defender"
        count: 4
      - enemy_id: "HUM_WOLF_01"
        name: "Wolfshead Scout"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Wolfshead Non-Combatant"
        count: 5
    battlefield_conditions:
      - "Camp clearing — limited space, non-combatants throughout"
      - "Defenders will fight to the death if children are threatened"
      - "Children screaming destroys combat coordination for both sides"
      - "Compliance with the contract requires displacing everyone — dead of winter"
    difficulty: "moderate"
    loot_bonus: "Contract payment: 20 silver from the jarl. Camp supplies: 5-10 silver"
