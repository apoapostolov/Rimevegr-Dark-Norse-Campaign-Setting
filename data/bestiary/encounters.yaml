    enemies:
      - enemy_id: "UND_SKEL_01"
        name: "Skeleton Thrall"
        count: 3
      - enemy_id: "UND_SKEL_02"
        name: "Skeleton Archer"
        count: 1
    battlefield_conditions:
      - "Collapsing ceiling — loud combat triggers a cave-in roll each round"
      - "Fallen stone blocks create uneven terrain and half-cover"
      - "Dust clouds reduce visibility to 5 paces"
    difficulty: "moderate"
    loot_bonus: "Crushed explorer's pack: 6 silver, flint and steel, rope"
    notes: "Smart parties fight quietly or lure enemies out. A full cave-in deals massive damage to everyone in the chamber."

  - id: "ENC_BARROW_006"
    name: "Toxic Gas Pocket"
    terrain: "barrow"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "any"
