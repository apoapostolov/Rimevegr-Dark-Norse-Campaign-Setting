    enemies:
      - enemy_id: "UND_SKEL_03"
        name: "Skeleton Warrior"
        count: 2
    battlefield_conditions:
      - "Hidden pit traps — Awareness test or fall 3 paces onto spikes"
      - "Narrow corridor forces single-file advance"
      - "Skeleton warriors wait beyond the pit line, attacking anyone who falls"
    difficulty: "moderate"
    loot_bonus: "Previous victim's gear at pit bottom: short sword, leather cap, 4 silver"
    notes: "Probing ahead with a spear shaft reveals pits safely. Skeletons can be lured across their own traps."

  - id: "ENC_BARROW_009"
    name: "The Haugbui's Sanctum"
    terrain: "barrow"
    tier: 5
    season: ["winter"]
    time_of_day: "night"
    description: "The innermost chamber. Gold glints in the torchlight. The haugbui stands behind its hoard, ancient and terrible, wearing a crown of corroded iron."
    enemies:
      - enemy_id: "UND_HAUG_03"
        name: "Whispering Haugbui"
        count: 1
      - enemy_id: "UND_DRAUGR_05"
        name: "Draugr Lord"
        count: 1
      - enemy_id: "UND_VEIL_02"
