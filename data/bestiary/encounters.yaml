    enemies:
      - enemy_id: "UND_DRAUGR_02"
        name: "Shambling Dead"
        count: 2
      - enemy_id: "UND_APT_01"
        name: "Aptrgangr"
        count: 1
    battlefield_conditions:
      - "Flooded passage — waist-deep water, -2 movement, no dodging"
      - "Torches gutter and die if dropped — darkness in 1 round"
      - "Submerged enemies invisible until they grab you"
    difficulty: "hard"
    loot_bonus: "Waterlogged chest: corroded silver coins worth 12 silver total"
    notes: "The aptrgangr lurks beneath the waterline and drags targets under. Swimming test to escape grapple."

  - id: "ENC_BARROW_004"
    name: "Rival Grave Wardens"
    terrain: "barrow"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "any"
