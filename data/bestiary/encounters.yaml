    difficulty: "moderate"
    loot_bonus: "Burial goods: silver arm-ring worth 8 silver"
    notes: "Prior explorers may be found dead inside."

  - id: "ENC_BARROW_002"
    name: "The Gatekeeper's Chamber"
    terrain: "barrow"
    tier: 3
    season: ["autumn", "winter", "spring"]
    time_of_day: "any"
    description: "The passage opens into a stone-lined chamber. A massive draugr sits upright on a crumbling throne, sword across its knees. Its eyes open as you enter."
    enemies:
