# ==========================================================================
# PRE-BUILT ENCOUNTER TEMPLATES
# 55 encounters: 20 ROAD, 20 SETTLEMENT, 15 FOREST
# ==========================================================================

encounters:
  # ========================================================================
  # ROAD ENCOUNTERS (ENC_ROAD_001 to ENC_ROAD_020)
  # ========================================================================

  - id: "ENC_ROAD_001"
    name: "Toll Bridge Shakedown"
    terrain: "road"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "any"
    description: "A crude barricade blocks the bridge. Three men with axes demand silver to pass."
    enemies:
      - enemy_id: "HUM_SPEC_03"
        name: "Toll-Keeper"
        count: 1
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 2
    battlefield_conditions:
      - "Narrow bridge — only 2 fighters abreast"
      - "Barricade provides half-cover on the far side"
      - "River below — fell combatants swept away"
    difficulty: "moderate"
    loot_bonus: "Bridge toll chest: 10-30 silver"
    notes: "Non-combat resolution possible with Bargain or Intimidate."

  - id: "ENC_ROAD_002"
    name: "Ditch Ambush"
    terrain: "road"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "A cart lies overturned across the road, its driver groaning. Shapes rise from the drainage ditch on both sides."
    enemies:
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Desperate Beggar-Thief"
        count: 2
    battlefield_conditions:
      - "Overturned cart blocks the road center"
      - "Ditches on both sides give ambushers low cover"
      - "Muddy ground — movement penalties on soft shoulders"
    difficulty: "moderate"
    loot_bonus: "Cart cargo: linen bolts worth 15 silver"
    notes: "Bandits spring from both flanks. Perception check to spot them before they rise."

  - id: "ENC_ROAD_003"
    name: "Mountain Pass Standoff"
    terrain: "road"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "day"
    description: "The trail narrows between sheer cliff faces. A sergeant and his men block the only way through, demanding you turn back."
    enemies:
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
    battlefield_conditions:
      - "Single-file pass — only 1 fighter in the front line"
      - "Loose rockfall from cliff edges (environmental hazard each round)"
      - "Uphill slope gives defenders advantage on melee"
    difficulty: "hard"
    loot_bonus: "Sergeant's purse: 25 silver and a stolen ring"
    notes: "Retreating is the safest option. Climbing the cliff requires Athletics (difficulty 4)."

  - id: "ENC_ROAD_004"
    name: "Night Wolves on the King's Road"
    terrain: "road"
    tier: 2
    season: ["winter"]
    time_of_day: "night"
    description: "Eyes glow in pairs beyond the firelight. The pack has tracked you for an hour. Now they close in."
    enemies:
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 4
      - enemy_id: "ANI_WOLF_02"
        name: "Lone Wolf"
        count: 1
    battlefield_conditions:
      - "Darkness beyond campfire radius — torchlight to 10 paces only"
      - "Frozen ruts make footing treacherous"
      - "Wolves circle — attacks come from flanks and rear"
    difficulty: "moderate"
    loot_bonus: "Wolf pelts: 5 silver each if properly skinned"
    notes: "Fire keeps them at bay for 1-2 rounds. Throwing burning brands may scatter 1-2 wolves."

  - id: "ENC_ROAD_005"
    name: "Deserter's Desperation"
    terrain: "road"
    tier: 1
    season: ["spring", "summer", "autumn", "winter"]
    time_of_day: "day"
    description: "A wild-eyed man in a torn gambeson stumbles from the treeline. He demands your food, your cloak, everything. His hands shake but the blade is real."
    enemies:
      - enemy_id: "HUM_DESER_01"
        name: "Lone Deserter"
        count: 1
    battlefield_conditions:
      - "Open road — no cover for either side"
      - "Deserter is cornered against a steep embankment"
    difficulty: "easy"
    loot_bonus: "Battered sword, military-issue gambeson (poor condition)"
    notes: "Can be talked down with Persuasion or offering food. Will fight to the death if starving."

  - id: "ENC_ROAD_006"
    name: "Coastal Raider Patrol"
    terrain: "road"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "day"
    description: "Armed men march along the coastal cliff path. Their ship-prow shields and salt-stained mail mark them as shore raiders returning to their beached longship."
    enemies:
      - enemy_id: "HUM_RAIDER_01"
        name: "Shore Raider"
        count: 4
      - enemy_id: "HUM_RAIDER_02"
        name: "Mounted Raider"
        count: 1
    battlefield_conditions:
      - "Cliff edge on the seaward side — one wrong step and a long fall"
      - "Salt wind drives rain into faces (ranged penalty)"
      - "Narrow coastal path — 3 abreast maximum"
    difficulty: "hard"
    loot_bonus: "Raided silver arm-rings: 30-50 silver total"
    notes: "Raiders are confident and aggressive. They will not parley unless outnumbered. Horseman dismounts in tight terrain."

  - id: "ENC_ROAD_007"
    name: "Fog-Shrouded Crossroads"
    terrain: "road"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "dawn"
    description: "Thick fog blankets the crossroads. A corpse-light drifts lazily ahead, drawing you off the track. When it vanishes, you hear boots behind you."
    enemies:
      - enemy_id: "UND_SPEC_01"
        name: "Corpse-Light"
        count: 1
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 3
    battlefield_conditions:
      - "Dense fog — visibility 5 paces, ranged attacks at disadvantage"
      - "Crossroads area — open but disorienting in fog"
      - "Corpse-light lures party away from defensive positions"
    difficulty: "moderate"
    loot_bonus: "Bandits' collected tolls: 12-20 silver"
    notes: "Corpse-light is independent of bandits — genuinely undead, drawn by death. Bandits use the fog as cover. Two separate threats."

  - id: "ENC_ROAD_008"
    name: "Slavers' Wagon"
    terrain: "road"
    tier: 3
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "An ironbound wagon creaks along the road. Chains rattle inside. Two slavers ride up front; a sellsword walks behind with a spear."
    enemies:
      - enemy_id: "HUM_SPEC_02"
        name: "Slaver"
        count: 2
      - enemy_id: "HUM_SELL_02"
        name: "Seasoned Sellsword"
        count: 1
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Blade"
        count: 1
    battlefield_conditions:
      - "Wagon blocks center of road — fight on either side"
      - "Captives inside wagon may panic and rock it"
      - "Slavers have whips — reach weapons across the wagon bed"
    difficulty: "hard"
    loot_bonus: "Slaver's purse: 40 silver, iron key ring"
    notes: "Freeing captives earns reputation gain. Captives may join fight (armed farmers, T1) if freed mid-combat."

  - id: "ENC_ROAD_009"
    name: "Boar on the Trail"
    terrain: "road"
    tier: 2
    season: ["autumn"]
    time_of_day: "day"
    description: "A massive boar crashes through the brush onto the trail, tusks slick with mud. It lowers its head and charges."
    enemies:
      - enemy_id: "ANI_PRED_01"
        name: "Wild Boar"
        count: 1
    battlefield_conditions:
      - "Narrow trail between dense brush — dodging sideways is difficult"
      - "Boar charges in a straight line — devastating if it connects"
    difficulty: "moderate"
    loot_bonus: "Boar meat feeds party for 3 days; tusks worth 5 silver"
    notes: "Fighting from behind cover or climbing a tree avoids the charge. Boar will disengage if wounded and given space."

  - id: "ENC_ROAD_010"
    name: "The Blood-Feud"
    terrain: "road"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "Two groups face each other on the road. A blood-feuder screams insults. His kin stand behind him. They mistake you for allies of their enemy."
    enemies:
      - enemy_id: "HUM_WAR_04"
        name: "Blood-Feuder"
        count: 1
      - enemy_id: "HUM_CIVIL_02"
        name: "Armed Farmer"
        count: 3
    battlefield_conditions:
      - "Open farmland road — flat with shallow ditches"
      - "Feuder's kin block the road behind the party"
      - "Bystanders on the road may flee into the fight path"
    difficulty: "moderate"
    loot_bonus: "Feuder's heirloom axe: 20 silver value"
    notes: "Can convince feuder of mistaken identity with Persuasion (difficulty 3). Taking a side has lasting reputation consequences."

  - id: "ENC_ROAD_011"
    name: "Sellsword Toll"
    terrain: "road"
    tier: 3
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "Three armored men lean against a milestone, blades unsheathed. Their leader grins and says the road ahead costs steel or silver."
    enemies:
      - enemy_id: "HUM_SELL_03"
        name: "Veteran Mercenary"
        count: 1
      - enemy_id: "HUM_SELL_02"
        name: "Seasoned Sellsword"
        count: 2
    battlefield_conditions:
      - "Milestone area — one side has a shallow drainage gully"
      - "Sellswords positioned to control the road width"
      - "Rain-slicked cobblestones — footing checks on quick movement"
    difficulty: "hard"
    loot_bonus: "Mercenary gear: decent mail shirt, 35 silver between them"
    notes: "Paying 10 silver each lets you pass. They are professionals — they retreat if one falls."

  - id: "ENC_ROAD_012"
    name: "Flash Flood on the Ford"
    terrain: "road"
    tier: 3
    season: ["spring"]
    time_of_day: "day"
    description: "You are mid-crossing when brown water surges downstream. The ford goes from ankle-deep to chest-deep in seconds. Debris batters you."
    enemies:
      - enemy_id: "ANI_HAZ_05"
        name: "Flash Flood"
        count: 1
    battlefield_conditions:
      - "Waist-deep rushing water — Athletics check each round to stay upright"
      - "Debris in the current deals impact damage"
      - "Ford stones invisible beneath muddy water — uneven footing"
      - "Heavy armor drags wearer under"
    difficulty: "hard"
    loot_bonus: "Washed-up trade goods on the bank after: 5-15 silver worth"
    notes: "No enemies to fight — pure survival encounter. Dropping heavy gear increases survival odds. Items lost in the flood are gone."

  - id: "ENC_ROAD_013"
    name: "Huskarls at the Checkpoint"
    terrain: "road"
    tier: 3
    season: ["spring", "summer", "autumn", "winter"]
    time_of_day: "day"
    description: "A jarl's huskarls have set up a checkpoint. They demand names, business, and a search of packs. One of your companions is wanted."
    enemies:
      - enemy_id: "HUM_WAR_01"
        name: "Huskarl"
        count: 3
      - enemy_id: "HUM_WAR_03"
        name: "Shield-Maiden"
        count: 1
    battlefield_conditions:
      - "Road narrows between timber palisade posts"
      - "Huskarls have shield-wall ready — fighting them head-on is suicide"
      - "Horses tethered nearby — potential escape route"
    difficulty: "deadly"
    loot_bonus: "Only if looting lawful soldiers — consequences follow"
    notes: "DESIGNED TO BE UNWINNABLE in direct combat. Bluffing, bribery, or fleeing are the real options. Fighting draws reinforcements in 3 rounds."

  - id: "ENC_ROAD_014"
    name: "Night Raid on Camp"
    terrain: "road"
    tier: 2
    season: ["summer", "autumn"]
    time_of_day: "night"
    description: "The fire has burned to embers. A branch snaps. Three shadows rush in from the dark with knives drawn."
    enemies:
      - enemy_id: "HUM_BANDIT_01"
        name: "Desperate Beggar-Thief"
        count: 2
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 1
    battlefield_conditions:
      - "Campsite — bedrolls and gear scattered as obstacles"
      - "Darkness beyond dying fire — 3-pace visibility"
      - "Party may be unarmored and half-asleep"
    difficulty: "moderate"
    loot_bonus: "Thieves carry 3-8 silver, a stolen knife, scraps of dried meat"
    notes: "Watch rotation determines who is awake. Unarmored penalty applies to sleeping characters."

  - id: "ENC_ROAD_015"
    name: "Rockfall Trap"
    terrain: "road"
    tier: 3
    season: ["spring", "autumn"]
    time_of_day: "day"
    description: "Rocks tumble from the hillside above — not a natural slide. Outlaws wait in the treeline to pick through the debris."
    enemies:
      - enemy_id: "ANI_HAZ_04"
        name: "Rockfall"
        count: 1
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
    battlefield_conditions:
      - "Fallen boulders create irregular cover across the road"
      - "Hillside above gives outlaws high-ground advantage"
      - "Dust cloud from rockfall — visibility reduced for 2 rounds"
    difficulty: "hard"
    loot_bonus: "Outlaw camp nearby: 20 silver, rope, stolen tools"
    notes: "Perception check to notice the trap before triggering. Outlaws flee if their rocky advantage is lost."

  - id: "ENC_ROAD_016"
    name: "Berserker on the Road"
    terrain: "road"
    tier: 3
    season: ["spring", "summer", "autumn", "winter"]
    time_of_day: "any"
    description: "A blood-soaked man stands in the road. His eyes are somewhere else. Foam flecks his beard. He swings at anything that moves."
    enemies:
      - enemy_id: "HUM_BERSERK_01"
        name: "Maddened Berserker"
        count: 1
    battlefield_conditions:
      - "Open road — no terrain advantage for either side"
      - "Berserker is immune to fear and morale effects"
      - "Nearby dead bodies suggest he has already killed today"
    difficulty: "hard"
    loot_bonus: "Fine but blood-soaked axe: 15 silver if cleaned"
    notes: "Cannot be reasoned with. Retreating works — he does not pursue far. Will attack animals, trees, anything."

  - id: "ENC_ROAD_017"
    name: "Traders Under Siege"
    terrain: "road"
    tier: 2
    season: ["summer", "autumn"]
    time_of_day: "day"
    description: "Shouts and the clash of iron ahead. A merchant caravan has circled its wagons. Bandits press in from both sides."
    enemies:
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 3
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
    battlefield_conditions:
      - "Circled wagons provide cover for defenders inside"
      - "Bandits use fallen crates as shields on approach"
      - "Horses tied to wagons — panicking, may bolt"
      - "Open field on one flank, ditch on the other"
    difficulty: "moderate"
    loot_bonus: "Grateful merchant reward: 30 silver and a trade discount"
    notes: "Intervening on the merchants' side earns allies and trade contacts. Bandits retreat if sergeant falls."

  - id: "ENC_ROAD_018"
    name: "Ice-Crack Crossing"
    terrain: "road"
    tier: 3
    season: ["winter"]
    time_of_day: "day"
    description: "The frozen lake should hold. It held yesterday. Today under your weight the ice groans, then splits with a sound like a bone breaking."
    enemies:
      - enemy_id: "ANI_HAZ_03"
        name: "Ice-Crack"
        count: 1
    battlefield_conditions:
      - "Cracking ice underfoot — weight distribution matters"
      - "Freezing water below — hypothermia in minutes"
      - "Gear and armor increase risk of breaking through"
      - "Far shore is 30 paces — must choose: slow careful steps or run"
    difficulty: "hard"
    loot_bonus: "None — survival is the reward"
    notes: "Pure hazard encounter. Dropping packs reduces break-through chance. Rope use allows pulling fallen companions out."

  - id: "ENC_ROAD_019"
    name: "Draugr at the Crossroads"
    terrain: "road"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "The burial mound beside the crossroads has opened. Loose earth spills onto the road. A shape stands in the moonlight, head tilted, studying you."
    enemies:
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 2
      - enemy_id: "UND_APT_02"
        name: "Night-Walker"
        count: 1
    battlefield_conditions:
      - "Moonlit crossroads — intermittent cloud cover darkens the area"
      - "Broken mound creates uneven terrain around the burial site"
      - "Grave-cold aura — living fighters near the draugr feel sluggish"
    difficulty: "moderate"
    loot_bonus: "Tarnished silver brooch from the barrow: 10 silver"
    notes: "Undead do not pursue far from the crossroads. Sacred symbols may hold them at bay temporarily."

  - id: "ENC_ROAD_020"
    name: "The Bandit King's Blockade"
    terrain: "road"
    tier: 4
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "Felled trees block the road in both directions. From behind the timber, a man in looted mail raises a hand. His people are everywhere."
    enemies:
      - enemy_id: "HUM_BANDIT_05"
        name: "Bandit King"
        count: 1
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 4
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 3
    battlefield_conditions:
      - "Felled tree barricades on both ends — party is trapped in a kill zone"
      - "Archers in the treeline on elevated ground"
      - "Bandit King positioned behind cover, directing the fight"
      - "Narrow escape route through a ditch if discovered"
    difficulty: "deadly"
    loot_bonus: "Bandit King's war chest: 80-120 silver, stolen goods"
    notes: "DESIGNED TO BE UNWINNABLE by brute force — 9 enemies in prepared positions. Surrender and negotiation are valid paths. Bandit King may offer 'employment' instead of death."

  # ========================================================================
  # SETTLEMENT ENCOUNTERS (ENC_SETTLE_001 to ENC_SETTLE_020)
  # ========================================================================

  - id: "ENC_SETTLE_001"
    name: "Tavern Brawl"
    terrain: "settlement"
    tier: 1
    season: ["spring", "summer", "autumn", "winter"]
    time_of_day: "night"
    description: "A drunk shoves you. His friends rise from the benches. The barkeep ducks behind the counter."
    enemies:
      - enemy_id: "HUM_CIVIL_02"
        name: "Armed Farmer"
        count: 3
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Blade"
        count: 1
    battlefield_conditions:
      - "Overturned tables and benches — improvised cover and obstacles"
      - "Tight room — no space for wide swings with long weapons"
      - "Oil lamps on walls — risk of fire if knocked down"
    difficulty: "easy"
    loot_bonus: "Whatever's in their purses: 3-8 silver"
    notes: "Killing in a tavern brings law attention. Subdual is wiser. Barkeep calls guards after 5 rounds."

  - id: "ENC_SETTLE_002"
    name: "Thrall Uprising"
    terrain: "settlement"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "dawn"
    description: "The thralls have broken their chains in the longhouse. Armed with tools and kitchen blades, they want blood. Your host screams for help."
    enemies:
      - enemy_id: "HUM_CIVIL_01"
        name: "Thrall Rebel"
        count: 5
      - enemy_id: "HUM_CIVIL_02"
        name: "Armed Farmer"
        count: 2
    battlefield_conditions:
      - "Longhouse interior — smoky, low ceiling, central hearth fire"
      - "Thralls attack from multiple doorways"
      - "Sleeping quarters — party may not have armor on"
    difficulty: "moderate"
    loot_bonus: "Host offers 20 silver for putting down the revolt"
    notes: "Moral dilemma — thralls have legitimate grievances. Siding with thralls has different consequences. Some thralls will stop fighting if their leader falls."

  - id: "ENC_SETTLE_003"
    name: "Market Day Mob"
    terrain: "settlement"
    tier: 2
    season: ["summer", "autumn"]
    time_of_day: "day"
    description: "Accusations of cheating at the market stall escalate. A crowd turns angry. Fists and stall-poles swing. You are caught in the middle."
    enemies:
      - enemy_id: "HUM_CIVIL_03"
        name: "Desperate Mob"
        count: 1
      - enemy_id: "HUM_CIVIL_02"
        name: "Armed Farmer"
        count: 2
    battlefield_conditions:
      - "Market stalls provide low cover and obstacles"
      - "Panicking civilians run through the fight randomly"
      - "Spilled goods on the ground — slippery footing"
    difficulty: "moderate"
    loot_bonus: "Scattered market goods: 5-10 silver if looted (reputation cost)"
    notes: "Hitting civilians has severe reputation penalties. Mob disperses if leader is identified and subdued."

  - id: "ENC_SETTLE_004"
    name: "Gate Assault at Dawn"
    terrain: "settlement"
    tier: 3
    season: ["spring", "summer", "autumn"]
    time_of_day: "dawn"
    description: "War horns blare. Raiders hit the settlement gate with a ram. The timber groans. Defenders scramble to the walls."
    enemies:
      - enemy_id: "HUM_RAIDER_01"
        name: "Shore Raider"
        count: 5
      - enemy_id: "HUM_RAIDER_02"
        name: "Mounted Raider"
        count: 1
    battlefield_conditions:
      - "Gate bottleneck — only 3 defenders fit in the gateway"
      - "Raiders use a battering ram — gate breaks in 4 rounds if not reinforced"
      - "Arrow slits in the palisade — ranged support possible"
      - "Smoke from fire-arrows on thatched roofs"
    difficulty: "hard"
    loot_bonus: "Raider weapons and arm-rings: 40-60 silver from the fallen"
    notes: "Defending the gate is a hold-the-line encounter. Mounted raider circles to find a weak point in the palisade."

  - id: "ENC_SETTLE_005"
    name: "Night Raid — Burning Longhouse"
    terrain: "settlement"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "You wake to screams and the crackle of thatch overhead. Raiders have set the longhouse ablaze. Smoke fills the room."
    enemies:
      - enemy_id: "HUM_RAIDER_01"
        name: "Shore Raider"
        count: 3
      - enemy_id: "HUM_SELL_02"
        name: "Seasoned Sellsword"
        count: 1
    battlefield_conditions:
      - "Burning building — smoke inhalation each round inside"
      - "Collapsing roof beams — random hazard every 2 rounds"
      - "Party starts unarmored, weapons possibly across the room"
      - "Exit blocked — must fight through or find another way out"
    difficulty: "hard"
    loot_bonus: "Whatever survives the fire"
    notes: "Escaping the building is priority one. Raiders wait outside for fleeing survivors. Escape through the back wall is possible with strength check."

  - id: "ENC_SETTLE_006"
    name: "Warehouse Ambush"
    terrain: "settlement"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "night"
    description: "The deal was supposed to be simple — meet at the warehouse, exchange silver for information. The informant is dead on the floor. You are not alone."
    enemies:
      - enemy_id: "HUM_SELL_02"
        name: "Seasoned Sellsword"
        count: 2
      - enemy_id: "HUM_SPEC_05"
        name: "Poison-Brewer"
        count: 1
    battlefield_conditions:
      - "Stacked crates and barrels create maze-like cover"
      - "Single lantern — fight in near-darkness between crate rows"
      - "Poison-brewer has prepared a smoke pot (choking area)"
    difficulty: "moderate"
    loot_bonus: "Informant's hidden message + assassins' pay: 25 silver"
    notes: "Poison smoke fills one section per round. Moving upwind avoids it. Sellswords are hired killers — professional, coordinated."

  - id: "ENC_SETTLE_007"
    name: "Slave Liberation"
    terrain: "settlement"
    tier: 3
    season: ["spring", "summer"]
    time_of_day: "night"
    description: "The slave pens are guarded by two slavers and a hired blade. Inside, a dozen thralls wait in chains. The key hangs from the slaver's belt."
    enemies:
      - enemy_id: "HUM_SPEC_02"
        name: "Slaver"
        count: 2
      - enemy_id: "HUM_SELL_03"
        name: "Veteran Mercenary"
        count: 1
    battlefield_conditions:
      - "Pen enclosure — tight quarters, iron bars on one side"
      - "Guard dog chained near the entrance (alarm, not combatant)"
      - "Thralls in chains — collateral damage risk"
      - "Town patrol passes every 15 minutes"
    difficulty: "hard"
    loot_bonus: "Slaver's strongbox: 50 silver"
    notes: "Stealth approach preferred — noise brings town guard in 3 rounds. Freed thralls may help or flee depending on morale."

  - id: "ENC_SETTLE_008"
    name: "Witch-Hunter's Purge"
    terrain: "settlement"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "day"
    description: "The witch-hunter has tied a woman to a post in the square. The pyre is being built. He points at you — 'You consort with seidr. I smell it on you.'"
    enemies:
      - enemy_id: "HUM_SPEC_01"
        name: "Witch-Hunter"
        count: 1
      - enemy_id: "HUM_CIVIL_02"
        name: "Armed Farmer"
        count: 4
    battlefield_conditions:
      - "Town square — open area with a well in the center"
      - "Civilians watching from doorways — some may join either side"
      - "Pyre materials can be used as improvised weapons"
    difficulty: "hard"
    loot_bonus: "Witch-hunter's iron holy symbol and silver: 15 silver"
    notes: "Killing the witch-hunter turns the village against you. Discrediting him with evidence is a social challenge. Armed farmers fight reluctantly."

  - id: "ENC_SETTLE_009"
    name: "Rooftop Chase"
    terrain: "settlement"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "night"
    description: "The spy leaps onto the thatched roof and runs. If he escapes, your cover is blown. The only way to catch him is to follow across the rooftops."
    enemies:
      - enemy_id: "HUM_SPEC_04"
        name: "Skald-Spy"
        count: 1
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Blade"
        count: 2
    battlefield_conditions:
      - "Thatched rooftops — collapse risk with every landing"
      - "Gaps between buildings require Athletics checks to jump"
      - "Height advantage — falling deals significant damage"
    difficulty: "moderate"
    loot_bonus: "Spy's coded message and 10 silver"
    notes: "Pursuit encounter — primary goal is to catch the spy, not kill the guards. Cheap blades delay while spy escapes."

  - id: "ENC_SETTLE_010"
    name: "Dockside Ambush"
    terrain: "settlement"
    tier: 2
    season: ["summer", "autumn"]
    time_of_day: "night"
    description: "The harbour planks creak. Shapes emerge from behind stacked nets and fish barrels. A blade gleams in the moonlight."
    enemies:
      - enemy_id: "HUM_BANDIT_02"
        name: "Roadside Bandit"
        count: 2
      - enemy_id: "HUM_SELL_01"
        name: "Cheap Blade"
        count: 2
    battlefield_conditions:
      - "Wet dock planks — slippery footing"
      - "Stacked barrels and nets create close-quarters maze"
      - "Water on three sides — fell combatants drown in harbor"
    difficulty: "moderate"
    loot_bonus: "Stolen dock cargo: rope, fish, 8 silver between them"
    notes: "Noise attracts harbormaster in 4 rounds. Pushing enemies into the water is effective — swim in armor is near-impossible."

  - id: "ENC_SETTLE_011"
    name: "Draugr in the Cellar"
    terrain: "settlement"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "The cellar door bulges outward. Something claws at the wood from below. The homeowner begs you to deal with what woke up under his floor."
    enemies:
      - enemy_id: "UND_DRAUGR_01"
        name: "Restless Dead"
        count: 2
      - enemy_id: "UND_APT_01"
        name: "Shambling Corpse"
        count: 1
    battlefield_conditions:
      - "Cellar stairs — single file, defender's advantage at the bottom"
      - "Low ceiling — no overhead swings, thrusting weapons favored"
      - "Root cellar shelves line the walls — can collapse onto enemies"
    difficulty: "moderate"
    loot_bonus: "Buried grave goods beneath the cellar: tarnished silver torque, 15 silver"
    notes: "The building was constructed over an old burial. Putting the dead to rest properly prevents recurrence."

  - id: "ENC_SETTLE_012"
    name: "Deserter Pack in the Ruins"
    terrain: "settlement"
    tier: 3
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "The abandoned farmstead is not empty. Deserters have fortified it with sharpened stakes and a lookout. They mean to hold it."
    enemies:
      - enemy_id: "HUM_DESER_02"
        name: "Deserter Pack"
        count: 1
      - enemy_id: "HUM_DESER_01"
        name: "Lone Deserter"
        count: 2
    battlefield_conditions:
      - "Sharpened stakes around the perimeter — charging in is dangerous"
      - "Ruined walls provide cover but have gaps"
      - "Lookout on the intact roof section — ranged threat"
    difficulty: "hard"
    loot_bonus: "Looted military supplies: 20 silver, gambeson, spearheads"
    notes: "Deserters are desperate and well-organized. They will negotiate if offered safe passage elsewhere."

  - id: "ENC_SETTLE_013"
    name: "The Veil-Touched Farm"
    terrain: "settlement"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "dusk"
    description: "The farmer stands in his doorway, staring at nothing. His eyes are milky. He raises a sickle when you approach. Behind him, his family does the same."
    enemies:
      - enemy_id: "UND_VEIL_01"
        name: "Veil-Touched Farmer"
        count: 3
      - enemy_id: "SUP_SPIRIT_04"
        name: "Rune-Ghost"
        count: 1
    battlefield_conditions:
      - "Farmyard — open space with a low stone wall around the property"
      - "Rune-ghost's presence distorts perception — hallucination flickers"
      - "Tools and farming implements scattered as improvised weapons"
    difficulty: "moderate"
    loot_bonus: "Nothing worth taking — these were poor people"
    notes: "Destroying the rune-ghost releases the veil-touched. Killing the farmers when they could be saved has moral weight."

  - id: "ENC_SETTLE_014"
    name: "Holmgang in the Square"
    terrain: "settlement"
    tier: 4
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "The challenge has been issued. The hazel rods are laid. A holmgang champion steps into the ring and draws his blade. The crowd watches. Refusing is exile."
    enemies:
      - enemy_id: "HUM_RARE_01"
        name: "Holmgang Champion"
        count: 1
    battlefield_conditions:
      - "Holmgang ring: 3-pace square marked by hazel rods — stepping out forfeits"
      - "One-on-one duel — interference means outlawry for allies"
      - "Three shields allowed — when all three break, fight with blade alone"
    difficulty: "deadly"
    loot_bonus: "Champion's reputation and wager: 100 silver"
    notes: "Formal single combat. Legal killing. The champion is the finest blade in the district. Refusing the holmgang means exile from the settlement."

  - id: "ENC_SETTLE_015"
    name: "Burning Market Raid"
    terrain: "settlement"
    tier: 3
    season: ["summer"]
    time_of_day: "day"
    description: "Raiders torch the market district. Stalls burn. People run screaming. Through the smoke, armed men are dragging captives toward the harbor."
    enemies:
      - enemy_id: "HUM_RAIDER_01"
        name: "Shore Raider"
        count: 4
      - enemy_id: "HUM_RAIDER_03"
        name: "Raider Chieftain"
        count: 1
    battlefield_conditions:
      - "Burning market stalls — fire spreads and blocks paths"
      - "Thick smoke — visibility limited, choking hazard"
      - "Panicking civilians — obstacle to movement and targeting"
      - "Raider chieftain directing from the harbor end"
    difficulty: "deadly"
    loot_bonus: "Recovered trade goods: 30-50 silver. Chieftain's arm-ring: 40 silver"
    notes: "DESIGNED TO BE UNWINNABLE if fighting all raiders at once. Picking off stragglers and rescuing captives is more realistic. Chieftain retreats to ship if pressed."

  - id: "ENC_SETTLE_016"
    name: "Ale-Hall Assassination"
    terrain: "settlement"
    tier: 2
    season: ["spring", "summer", "autumn", "winter"]
    time_of_day: "night"
    description: "The poisoned mead was meant for you. Your cup-mate collapses. The poison-brewer slips toward the back door while her accomplice draws a blade."
    enemies:
      - enemy_id: "HUM_SPEC_05"
        name: "Poison-Brewer"
        count: 1
      - enemy_id: "HUM_SELL_02"
        name: "Seasoned Sellsword"
        count: 1
    battlefield_conditions:
      - "Longhouse hall — long tables as barriers, mead-slick floor"
      - "Drunk patrons stumble into the fight path"
      - "Poison-brewer fleeing — pursuit through the kitchen and out the back"
    difficulty: "moderate"
    loot_bonus: "Poison-brewer's kit: valuable to an apothecary, 15 silver"
    notes: "Split encounter: stop the fleeing brewer and fight the sellsword simultaneously. Questioning the brewer reveals who hired them."

  - id: "ENC_SETTLE_017"
    name: "Graveyard Disturbance"
    terrain: "settlement"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "Fresh graves have been torn open from the inside. Footprints lead into the village. A shambling shape stands in the lane between houses."
    enemies:
      - enemy_id: "UND_APT_02"
        name: "Night-Walker"
        count: 2
      - enemy_id: "UND_SKEL_01"
        name: "Bone Soldier"
        count: 3
    battlefield_conditions:
      - "Village lane — narrow between timber houses"
      - "Graveyard soil on the ground — uneven and soft"
      - "Villagers barricaded in houses — no help coming"
    difficulty: "moderate"
    loot_bonus: "Grave offerings disturbed: tarnished armband, 8 silver"
    notes: "Undead wander toward the living. They do not coordinate but converge on noise. Fire is effective against the skeletons."

  - id: "ENC_SETTLE_018"
    name: "Ulfhednar at the Gate"
    terrain: "settlement"
    tier: 4
    season: ["winter"]
    time_of_day: "night"
    description: "A wolf-skinned man walks out of the blizzard and through the gate. He kills the first guard with his hands. He is not looking for loot. He is looking for a fight worthy of dying in."
    enemies:
      - enemy_id: "HUM_BERSERK_02"
        name: "Ulfhednar"
        count: 1
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 2
    battlefield_conditions:
      - "Settlement gate — partially open, wind-driven snow"
      - "Blizzard reduces visibility to 5 paces"
      - "Wolves flank while ulfhednar charges head-on"
      - "Frozen ground — no mud but ice patches"
    difficulty: "deadly"
    loot_bonus: "Wolf pelts and ulfhednar's arm-rings: 35 silver"
    notes: "Ulfhednar cannot be intimidated or bargained with. He fights until dead. Wolves flee if ulfhednar falls. A glorious death for either side."

  - id: "ENC_SETTLE_019"
    name: "Corpse-Speaker's Congregation"
    terrain: "settlement"
    tier: 3
    season: ["winter"]
    time_of_day: "night"
    description: "The village seer has lost herself to the veil. She stands in the churchyard speaking to the dead — and they have listened. Three barrow-sick warriors rise at her command."
    enemies:
      - enemy_id: "UND_VEIL_03"
        name: "Corpse-Speaker"
        count: 1
      - enemy_id: "UND_VEIL_02"
        name: "Barrow-Sick Warrior"
        count: 3
    battlefield_conditions:
      - "Churchyard — gravestones provide scattered cover"
      - "Corpse-speaker channels from behind the warriors"
      - "Veil energy warps perception — shadows move wrong"
    difficulty: "hard"
    loot_bonus: "Corpse-speaker's runestones: valuable to seidr-workers, 25 silver"
    notes: "Killing the corpse-speaker drops the barrow-sick warriors. But she was once an ally. Non-lethal takedown is possible but harder."

  - id: "ENC_SETTLE_020"
    name: "Jarl's Champion Duel"
    terrain: "settlement"
    tier: 4
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "The jarl's champion has decided you need to answer for an insult — real or imagined. He stands in full war-gear in the mead-hall doorway. His lord watches from the high seat."
    enemies:
      - enemy_id: "HUM_WAR_02"
        name: "Jarl's Champion"
        count: 1
      - enemy_id: "HUM_WAR_01"
        name: "Huskarl"
        count: 2
    battlefield_conditions:
      - "Mead-hall interior — long room with central fire pit"
      - "Huskarls block the exits — fight is contained"
      - "Jarl watches — killing his champion has political consequences"
    difficulty: "deadly"
    loot_bonus: "Champion's war-gear: fine mail, sword worth 60 silver total"
    notes: "Huskarls only intervene if you try to flee or cheat. Beating the champion earns the jarl's grudging respect. Losing may mean thralldom."

  # ========================================================================
  # FOREST ENCOUNTERS (ENC_FOREST_001 to ENC_FOREST_015)
  # ========================================================================

  - id: "ENC_FOREST_001"
    name: "Dark Pine Ambush"
    terrain: "forest"
    tier: 2
    season: ["spring", "summer", "autumn"]
    time_of_day: "day"
    description: "The pines grow so thick here the trail is a tunnel. An arrow thuds into the tree beside your head. Shapes move behind the trunks."
    enemies:
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
      - enemy_id: "HUM_BANDIT_01"
        name: "Desperate Beggar-Thief"
        count: 2
    battlefield_conditions:
      - "Dense pine forest — movement penalty through undergrowth"
      - "Tree trunks provide solid cover on all sides"
      - "Canopy blocks sunlight — dim conditions even at midday"
    difficulty: "moderate"
    loot_bonus: "Outlaws' hidden stash nearby: 12 silver, stolen blankets"
    notes: "Outlaws scatter into the forest if half are downed. Tracking them to their camp is possible but costs half a day."

  - id: "ENC_FOREST_002"
    name: "Wolf Pack Pursuit"
    terrain: "forest"
    tier: 3
    season: ["winter"]
    time_of_day: "dusk"
    description: "The pack has been trailing you since midday. Now as light fades they close the distance. Lean shapes slip between the trees on all sides."
    enemies:
      - enemy_id: "ANI_WOLF_03"
        name: "Winter-Starved Pack"
        count: 1
      - enemy_id: "ANI_WOLF_01"
        name: "Timber Wolf"
        count: 2
    battlefield_conditions:
      - "Snow-covered forest floor — tracks are obvious, footing is poor"
      - "Fading light — full darkness in minutes"
      - "Wolves attack from multiple directions simultaneously"
      - "Root-tangled ground under the snow — trip hazard"
    difficulty: "hard"
    loot_bonus: "Wolf pelts: 5 silver each"
    notes: "Making a stand with fire and backs to a large tree is the best strategy. Running triggers pursuit instinct. Wolves are desperate — they do not break easily."

  - id: "ENC_FOREST_003"
    name: "Troll Bridge"
    terrain: "forest"
    tier: 4
    season: ["spring", "summer", "autumn"]
    time_of_day: "any"
    description: "The stone bridge over the ravine is ancient. Something large sits beneath it. The stench of rotting meat drifts up from the shadows."
    enemies:
      - enemy_id: "SUP_WILD_01"
        name: "Forest Troll"
        count: 1
    battlefield_conditions:
      - "Narrow stone bridge — 2 abreast maximum"
      - "Deep ravine below — falling is a death sentence"
      - "Troll can attack from underneath, grabbing legs"
      - "Ancient stone provides no cover — exposed on the bridge"
    difficulty: "deadly"
    loot_bonus: "Troll's bone-pile: accumulated loot from victims, 40-80 silver in scattered coins and items"
    notes: "Sunlight (if daytime) forces troll to stay under the bridge. Luring it out at night is fatal for most parties. Fire and sunlight are the weaknesses."

  - id: "ENC_FOREST_004"
    name: "Outlaw Camp Raid"
    terrain: "forest"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "night"
    description: "The outlaw camp is a rough circle of lean-tos around a fire pit. Sentries doze. This is where they've been dragging their victims."
    enemies:
      - enemy_id: "HUM_BANDIT_04"
        name: "Bandit Sergeant"
        count: 1
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 4
      - enemy_id: "HUM_BANDIT_01"
        name: "Desperate Beggar-Thief"
        count: 2
    battlefield_conditions:
      - "Camp clearing — fire in the center provides light but marks targets"
      - "Lean-to shelters as partial cover"
      - "Sleeping outlaws need 1 round to grab weapons"
      - "Escape trails in 3 directions into dark woods"
    difficulty: "hard"
    loot_bonus: "Camp supply cache: 30-50 silver, stolen goods, food stores"
    notes: "Stealth approach allows taking out sentries first. Alerting the camp turns it into a chaotic 7-on-party melee."

  - id: "ENC_FOREST_005"
    name: "Corrupted Grove"
    terrain: "forest"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "any"
    description: "The trees here are wrong. Bark peels in sheets, sap runs black, and the ground moves with fat pale grubs. Something low and dark watches from the center of the grove."
    enemies:
      - enemy_id: "SUP_CORR_01"
        name: "Seidr-Corrupted Wolf"
        count: 2
      - enemy_id: "SUP_CORR_03"
        name: "Rune-Sick Raven Swarm"
        count: 1
      - enemy_id: "SUP_VEIL_01"
        name: "Veil-Shadow"
        count: 1
    battlefield_conditions:
      - "Corruption aura — mild nausea, -1 to concentration checks"
      - "Black sap on the ground — sticky, slows movement"
      - "Diseased trees may collapse if struck — environmental hazard"
    difficulty: "hard"
    loot_bonus: "Corrupted runestone at grove center — valuable but cursed"
    notes: "Destroying the runestone cleanses the grove but releases a burst of veil energy. The wolves are victims, not true enemies — killing them is mercy."

  - id: "ENC_FOREST_006"
    name: "Bear Den Disturbed"
    terrain: "forest"
    tier: 3
    season: ["spring"]
    time_of_day: "day"
    description: "You smell it before you see it — musk and old meat. The cave mouth is half-hidden by brush. A low growl vibrates in your chest."
    enemies:
      - enemy_id: "ANI_BEAR_01"
        name: "Brown Bear"
        count: 1
    battlefield_conditions:
      - "Cave entrance — bear has the interior advantage"
      - "Dense brush restricts flanking movement"
      - "Bear charges out in a straight line — devastating first impact"
    difficulty: "hard"
    loot_bonus: "Bear pelt: 20 silver. Bear fat: useful for medicine and waterproofing"
    notes: "Slow retreat works if the bear is not cornered or her cubs are not threatened. Fighting in the cave mouth is suicidal."

  - id: "ENC_FOREST_007"
    name: "Bog-Thing Crossing"
    terrain: "forest"
    tier: 3
    season: ["spring", "autumn"]
    time_of_day: "day"
    description: "The trail crosses a boggy clearing. Halfway across, the water bubbles. Something rises — man-shaped but made of peat and roots and old bone."
    enemies:
      - enemy_id: "SUP_WILD_03"
        name: "Bog-Thing"
        count: 1
      - enemy_id: "ANI_HAZ_02"
        name: "Bog-Sink"
        count: 1
    battlefield_conditions:
      - "Boggy ground — heavy armor sinks, movement at half speed"
      - "Standing water knee-deep — no solid footing for bracing"
      - "Bog-sink zones pull combatants under if they stop moving"
      - "Solid tussocks scattered — safe footing but exposed"
    difficulty: "hard"
    loot_bonus: "Ancient sword hilt visible in the peat: relic, 30 silver"
    notes: "Fire is effective against the bog-thing's peat body. Fighting in the bog is miserable. Solid ground is 20 paces in any direction."

  - id: "ENC_FOREST_008"
    name: "Deadfall Blockade"
    terrain: "forest"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "A massive fallen oak blocks the trail. While you figure a way around, a serpent drops from the branches overhead and rats boil from the hollow trunk."
    enemies:
      - enemy_id: "ANI_VERM_02"
        name: "Serpent"
        count: 1
      - enemy_id: "ANI_VERM_01"
        name: "Rat Swarm"
        count: 2
    battlefield_conditions:
      - "Fallen tree blocks movement — must climb over or go around"
      - "Undergrowth on both sides is dense — flanking paths are slow"
      - "Rat swarms emerge from the hollow trunk — difficult to target individually"
    difficulty: "easy"
    loot_bonus: "Nothing — nature does not carry silver"
    notes: "More nuisance than deadly. Serpent bite may carry venom. Rats flee from fire. A quick party just climbs over and moves on."

  - id: "ENC_FOREST_009"
    name: "Standing Stone Ambush"
    terrain: "forest"
    tier: 3
    season: ["autumn", "winter"]
    time_of_day: "dusk"
    description: "The ancient standing stones hum faintly. The mist around their base is too thick to be natural. Shapes move within — not all of them human."
    enemies:
      - enemy_id: "UND_DRAUGR_02"
        name: "Barrow Draugr"
        count: 2
      - enemy_id: "UND_SPEC_04"
        name: "Grave-Mist"
        count: 1
    battlefield_conditions:
      - "Standing stones create irregular cover and block line of sight"
      - "Grave-mist reduces visibility to 3 paces"
      - "Stone circle is consecrated ground — seidr effects amplified"
      - "Uneven root-tangled ground between stones"
    difficulty: "hard"
    loot_bonus: "Draugr grave goods: corroded silver, rusted blade, 12 silver total"
    notes: "The standing stones amplify undead presence. Leaving the stone circle breaks their territorial anchor. They cannot pursue beyond the stones."

  - id: "ENC_FOREST_010"
    name: "Frost-Wraith in the Pines"
    terrain: "forest"
    tier: 3
    season: ["winter"]
    time_of_day: "night"
    description: "The temperature drops so fast your breath crystallizes mid-air. Frost crawls up the tree trunks. A pale shape drifts between the pines, trailing frozen air."
    enemies:
      - enemy_id: "SUP_WILD_02"
        name: "Frost-Wraith"
        count: 1
    battlefield_conditions:
      - "Supernatural cold — exposed flesh takes frost damage each round"
      - "Ice forms on weapons — grip checks or risk dropping"
      - "Frozen ground — no ability to dig in or use terrain"
      - "Pine branches crack and fall from the ice weight overhead"
    difficulty: "hard"
    loot_bonus: "Frost-wraith's frozen core: 20 silver to a seidr-worker"
    notes: "Fire and warmth are the primary weapons. Steel passes through the wraith without effect. Trapping it in a ring of fire is the traditional method."

  - id: "ENC_FOREST_011"
    name: "Mara at the Forest Pool"
    terrain: "forest"
    tier: 3
    season: ["summer", "autumn"]
    time_of_day: "night"
    description: "The forest pool is unnaturally still. One of the party sits at its edge, staring into the water with a slack expression. Something under the surface stares back."
    enemies:
      - enemy_id: "SUP_SPIRIT_01"
        name: "Mara"
        count: 1
    battlefield_conditions:
      - "Forest pool clearing — open around the water, dense trees beyond"
      - "Mara fights through the enchanted party member initially"
      - "Water reflects moonlight — hypnotic effect on those who look"
    difficulty: "hard"
    loot_bonus: "Offerings at the pool bottom: old coins and a silver comb, 15 silver"
    notes: "The mara targets the weakest-willed party member. Breaking eye contact with the pool weakens its hold. Violence against the pool itself may banish it."

  - id: "ENC_FOREST_012"
    name: "River Crossing Battle"
    terrain: "forest"
    tier: 2
    season: ["spring", "summer"]
    time_of_day: "day"
    description: "You are waist-deep in the river crossing when men appear on the far bank. Three outlaws with drawn bows. They want you to drop your weapons in the water."
    enemies:
      - enemy_id: "HUM_BANDIT_03"
        name: "Forest Outlaw"
        count: 3
    battlefield_conditions:
      - "Party is mid-river — waist-deep water, very limited mobility"
      - "Outlaws have high ground on the far bank — ranged advantage"
      - "Current pulls at legs — Athletics to stay upright"
      - "Retreating to the near bank exposes backs to arrows"
    difficulty: "moderate"
    loot_bonus: "Outlaws' camp stash if tracked: 18 silver"
    notes: "Terrible tactical position. Compliance and later tracking is wise. Shield-wall in water is possible but exhausting."

  - id: "ENC_FOREST_013"
    name: "Barrow-Rat King's Hollow"
    terrain: "forest"
    tier: 2
    season: ["autumn", "winter"]
    time_of_day: "any"
    description: "The hollow tree is massive, its roots forming a cave entrance. Bones litter the ground — small ones, then larger. The chittering from inside is deafening."
    enemies:
      - enemy_id: "SUP_CORR_04"
        name: "Barrow-Rat King"
        count: 1
      - enemy_id: "ANI_VERM_01"
        name: "Rat Swarm"
        count: 2
    battlefield_conditions:
      - "Hollow tree entrance — tight, only 1 fighter enters at a time"
      - "Rats pour out in waves — difficult to stem the flow"
      - "Bone-littered ground — crunching underfoot, uneven"
    difficulty: "moderate"
    loot_bonus: "Bones in the hollow include a human hand wearing a gold ring: 25 silver"
    notes: "Smoking out the hollow tree is effective. The rat king is a seidr-corrupted amalgamation — killing it disperses the swarm."

  - id: "ENC_FOREST_014"
    name: "Cave Bear's Territory"
    terrain: "forest"
    tier: 4
    season: ["autumn"]
    time_of_day: "day"
    description: "The cave bear stands on its hind legs when it sees you. It is twice the height of a man. Its roar shakes pinecones from the trees. This is its forest."
    enemies:
      - enemy_id: "ANI_BEAR_02"
        name: "Cave Bear"
        count: 1
      - enemy_id: "ANI_WOLF_02"
        name: "Lone Wolf"
        count: 2
    battlefield_conditions:
      - "Forest clearing with scattered boulders — the bear's feeding ground"
      - "Wolves lurk at the edges, drawn by the disturbance"
      - "Tree climbing is an escape option — bear cannot follow up thin trunks"
    difficulty: "deadly"
    loot_bonus: "Cave bear pelt: 50 silver. Claws and teeth: 20 silver to a craftsman"
    notes: "DESIGNED TO BE UNWINNABLE in a straight fight for most parties. The cave bear is an apex predator. Fleeing and climbing are the smart options. Wolves scavenge the aftermath."

  - id: "ENC_FOREST_015"
    name: "The Whispering Barrow"
    terrain: "forest"
    tier: 4
    season: ["autumn", "winter"]
    time_of_day: "night"
    description: "The mound rises between ancient oaks. The air is cold and still. Whispers curl from the barrow's entrance — your name, in a voice you almost recognize."
    enemies:
      - enemy_id: "UND_HAUG_03"
        name: "Whispering Haugbui"
        count: 1
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 2
      - enemy_id: "UND_SKEL_02"
        name: "Skeleton Archer"
        count: 2
    battlefield_conditions:
      - "Barrow mound exterior — earthen slopes, oak root cover"
      - "Whispers cause Will saves or be drawn toward the entrance"
      - "Barrow interior is pitch black if entered — total darkness"
      - "Draugr emerge from the mound — they know the terrain, you do not"
    difficulty: "deadly"
    loot_bonus: "Barrow treasure: ancient silver torque, rune-etched blade, 60-100 silver"
    notes: "The haugbui does not leave the barrow — it draws victims in. Fighting at the entrance neutralizes the whisper advantage. Entering the barrow is almost certain death without preparation."

  # ========================================================================
  # BARROW ENCOUNTERS (ENC_BARROW_001 to ENC_BARROW_020)
  # ========================================================================

  - id: "ENC_BARROW_001"
    name: "Disturbed Burial"
    terrain: "barrow"
    tier: 2
