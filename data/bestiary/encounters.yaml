    enemies:
      - enemy_id: "SUP_CORR_02"
        name: "Corruption Creeper"
        count: 1
      - enemy_id: "SUP_VEIL_01"
        name: "Veil-Walker"
        count: 1
    battlefield_conditions:
      - "Unnaturally clean chamber — no debris, no cover, nowhere to hide"
      - "Faint corruption residue — detect with Awareness (difficulty 4)"
      - "Entity phases through walls — cannot be cornered or blocked"
    difficulty: "hard"
    loot_bonus: "Nothing physical — but knowledge of what emptied the barrow has value to the right scholar"
