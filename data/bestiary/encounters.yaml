        count: 1
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 3
      - enemy_id: "UND_SPEC_03"
        name: "Barrow Revenant"
        count: 1
    battlefield_conditions:
      - "Rubble-choked passages — movement at half speed, squeeze through gaps"
      - "Structural instability — heavy impacts risk further collapse (STR attacks trigger roll)"
