    difficulty: "hard"
    loot_bonus: "Combined burial goods across three chambers: 35 silver, bronze knife, amber beads"
    notes: "Sealing doorways with debris can delay reinforcements by 2 rounds. The aptrgangr in the final chamber is the original barrow occupant."

