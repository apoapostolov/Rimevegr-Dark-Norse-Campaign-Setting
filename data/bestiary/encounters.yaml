        name: "Wailing Dead"
        count: 1
      - enemy_id: "UND_VEIL_01"
        name: "Wisp"
        count: 3
      - enemy_id: "UND_DRAUGR_02"
        name: "Shambling Dead"
        count: 2
    battlefield_conditions:
