        name: "Bone Swarm"
        count: 1
      - enemy_id: "UND_SKEL_01"
        name: "Skeleton Thrall"
        count: 2
    battlefield_conditions:
      - "Grave-dust cloud — visibility zero for 2 rounds, then 5 paces"
      - "Inhaled dust — TOU test or choke, losing next action"
      - "Bone fragments coat the floor — caltrops effect, barefoot movement impossible"
    difficulty: "moderate"
    loot_bonus: "Shard of a rune-bone: 5 silver to a volva, worthless otherwise"
