    enemies:
      - enemy_id: "UND_DRAUGR_02"
        name: "Shambling Dead"
        count: 4
    battlefield_conditions:
      - "Toxic gas — TOU test each round or take 1 damage, no armor"
      - "Torches burn erratically — 1-in-6 chance of extinguishing per round"
      - "Root-choked gallery — entangling roots grab feet on failed NIM"
    difficulty: "hard"
    loot_bonus: "Ancient bronze mirror worth 10 silver"
    notes: "Retreat is the wise option. Wet cloth over the mouth reduces gas damage but impairs speech for seidr casting."

  - id: "ENC_BARROW_007"
    name: "Rune-Ward Activation"
    terrain: "barrow"
    tier: 4
    season: ["autumn", "winter"]
    time_of_day: "any"
    description: "Carved runes along the walls flare to life as you cross the threshold. The dead stir — and the exit seals behind you."
    enemies:
      - enemy_id: "UND_DRAUGR_03"
        name: "Draugr Warrior"
        count: 2
      - enemy_id: "UND_HAUG_01"
        name: "Barrow Wight"
        count: 1
    battlefield_conditions:
      - "Rune-ward sealed chamber — no exit until ward is broken or all enemies destroyed"
      - "Glowing runes pulse cold light — illumination but seidr disrupted (-1 to casting)"
      - "Ice crystals form on weapons — iron becomes brittle, chance of weapon breakage on fumble"
    difficulty: "deadly"
    loot_bonus: "Wight's hoard: gold arm-ring worth 80 silver, rune-carved bone talisman"
    notes: "Breaking the rune-ward requires Lore test (difficulty 5) or destroying the inscribed capstone. Brute force risks bringing down the roof."

  - id: "ENC_BARROW_008"
    name: "Pit Trap Gallery"
    terrain: "barrow"
    tier: 2
    season: ["spring", "summer", "autumn", "winter"]
    time_of_day: "any"
