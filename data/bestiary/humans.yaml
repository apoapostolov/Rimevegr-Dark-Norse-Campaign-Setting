enemies:
  # ==========================================================================
  # BANDITS (HUM_BANDIT_01 through HUM_BANDIT_05)
  # ==========================================================================

  - id: "HUM_BANDIT_01"
    name: "Desperate Beggar-Thief"
    category: "human"
    subcategory: "bandit"
    tier: 1
    description: "Hollow-cheeked wretch with cracked lips and a tremor in his knife hand. Ribs visible through a torn tunic. Smells of piss and rotting teeth."
    stats:
      MIG: 2
      NIM: 3
      TOU: 2
      WIT: 3
      WIL: 2
      WYR: 1
    hp: 4
    skills:
      - name: "Knives"
        rank: 1
      - name: "Stealth"
        rank: 1
    gear:
      weapons:
        - name: "Eating Knife"
          type: "knife"
          speed: 2
          base_damage: 2
      armor:
        torso: "Rags"
        head: "None"
    tactics: "Creeps up on sleeping or distracted targets. Grabs food or a purse and bolts. Will stab only if cornered, aiming wild and low."
    morale_break: "Flees at first wound. Surrenders immediately if grabbed."
    group_size: "1-2"
    encounter_conditions:
      terrain: ["road", "town_outskirts", "camp"]
      season: ["autumn", "winter"]
    loot:
      silver_range: [0, 3]
      items: ["eating_knife", "dirty_rags"]
    image_prompt: |
      A skeletal man in filthy rags, barefoot on muddy ground, holding a small
      knife with a shaking hand. Deep-set eyes, visible ribs, matted hair.
      Muted browns and greys. Cold overcast light. Norse settlement refuse heap
      in background.

  - id: "HUM_BANDIT_02"
    name: "Roadside Bandit"
    category: "human"
    subcategory: "bandit"
    tier: 2
    description: "Wiry man with a weather-beaten face and a hand axe tucked through a rope belt. Leather jerkin stained dark at the armpits. Missing two fingers on his left hand."
    stats:
      MIG: 4
      NIM: 5
      TOU: 4
      WIT: 3
      WIL: 3
      WYR: 1
    hp: 8
    skills:
      - name: "Axes"
        rank: 2
      - name: "Stealth"
        rank: 1
    gear:
      weapons:
        - name: "Hand Axe"
          type: "axe"
          speed: 3
          base_damage: 4
      armor:
        torso: "Leather Jerkin"
        head: "None"
    tactics: "Ambushes from cover with two or three others. Steps onto the road to block. Demands silver first, attacks if refused. Targets the one carrying bags."
    morale_break: "Flees below 50% HP or if leader falls."
    group_size: "2-5"
    encounter_conditions:
      terrain: ["road", "forest_edge"]
      season: ["spring", "summer", "autumn"]
    loot:
      silver_range: [2, 15]
      items: ["hand_axe", "leather_scraps"]
    image_prompt: |
      A gaunt man in patched leather jerkin crouching behind a fallen birch
      tree beside a muddy road. Hand axe ready, eyes on approaching travelers.
      Brown and green palette, overcast sky, sparse Nordic forest.

  - id: "HUM_BANDIT_03"
    name: "Forest Outlaw"
    category: "human"
    subcategory: "bandit"
    tier: 2
    description: "Compact woman in moss-stained leathers with a short bow and a face painted in charcoal streaks. Moves through undergrowth without sound. A collection of severed finger-bones hangs from her belt."
    stats:
      MIG: 3
      NIM: 5
      TOU: 4
      WIT: 5
      WIL: 3
      WYR: 1
    hp: 8
    skills:
      - name: "Bows"
        rank: 3
      - name: "Stealth"
        rank: 2
      - name: "Knives"
        rank: 1
      - name: "Navigate"
        rank: 2
    gear:
      weapons:
        - name: "Short Bow"
          type: "bow"
          speed: 4
          base_damage: 4
        - name: "Hunting Knife"
          type: "knife"
          speed: 2
          base_damage: 3
      armor:
        torso: "Boiled Leather"
        head: "None"
    tactics: "Fires from concealment in trees. Repositions after every two shots. If targets close distance, falls back deeper into forest where she knows the ground. Never engages melee willingly."
    morale_break: "Withdraws silently if more than lightly wounded. Will not flee in panic — simply vanishes into the trees."
    group_size: "1-3"
    encounter_conditions:
      terrain: ["deep_forest", "forest_edge", "mountain_pass"]
      season: ["spring", "summer", "autumn"]
    loot:
      silver_range: [5, 20]
      items: ["short_bow", "arrows", "hunting_knife", "finger_bone_trophies"]
    image_prompt: |
      A lean woman with charcoal-streaked face crouching on a mossy boulder in
      thick pine forest, short bow drawn, eyes fixed downhill. Boiled leather
      armor green with age. Finger-bone necklace. Dappled grey-green light
      through canopy.

  - id: "HUM_BANDIT_04"
    name: "Bandit Sergeant"
    category: "human"
    subcategory: "bandit"
    tier: 3
    description: "Broad-shouldered man with a scar running from temple to jawline and a mail shirt looted from a dead huskarl. Carries a proper sword and round shield. Barks orders that his crew actually follows."
    stats:
      MIG: 6
      NIM: 5
      TOU: 5
      WIT: 5
      WIL: 5
      WYR: 1
    hp: 12
    skills:
      - name: "Swords"
        rank: 3
      - name: "Shields"
        rank: 2
      - name: "Command"
        rank: 2
      - name: "Intimidate"
        rank: 2
    gear:
      weapons:
        - name: "Looted Sword"
          type: "sword"
          speed: 4
          base_damage: 6
        - name: "Round Shield"
          type: "shield"
          speed: 3
          base_damage: 2
      armor:
        torso: "Looted Mail Shirt"
        head: "Leather Cap"
    tactics: "Directs his band from the second rank, pushing his weakest men forward first to test the enemy. Enters the fight once he sees an opening. Targets the most dangerous-looking opponent to break enemy morale."
    morale_break: "Retreats if he loses more than half his men. Will not surrender — knows the rope waits."
    group_size: "4-8"
    encounter_conditions:
      terrain: ["road", "forest_edge", "river_crossing", "ruins"]
      season: ["spring", "summer", "autumn"]
    loot:
      silver_range: [15, 50]
      items: ["looted_sword", "mail_shirt", "round_shield", "silver_arm_ring"]
    image_prompt: |
      A scarred, heavy-set man in a dented mail shirt standing on a dirt road,
      sword drawn, round shield raised, three ragged bandits behind him. Deep
      scar across his face. Overcast sky, birch trees, cart tracks in mud.
      Dark iron tones and muted leather browns.

  - id: "HUM_BANDIT_05"
    name: "Bandit King"
    category: "human"
    subcategory: "bandit"
    tier: 4
    description: "Grey-bearded veteran who controls three river crossings and a ruined hill fort. Wears layered mail and a wolf-fur cloak clasped with stolen silver. His left eye is a milky dead thing. Commands through fear and fairness — his crew eats well."
    stats:
      MIG: 7
      NIM: 5
      TOU: 7
      WIT: 6
      WIL: 7
      WYR: 1
    hp: 18
    skills:
      - name: "Axes"
        rank: 4
      - name: "Shields"
        rank: 3
      - name: "Command"
        rank: 4
      - name: "Intimidate"
        rank: 3
      - name: "Bargain"
        rank: 2
    gear:
      weapons:
        - name: "Dane Axe"
          type: "axe"
          speed: 5
          base_damage: 8
        - name: "Iron-Rimmed Shield"
          type: "shield"
          speed: 3
          base_damage: 3
      armor:
        torso: "Layered Mail"
        head: "Iron Helm"
    tactics: "Never fights alone — always has eight or more men with him. Opens with a demand for toll. If combat begins, directs from behind a shield wall. Enters personally only to finish a weakened foe or to rally breaking troops. Will offer terms to save his own men."
    morale_break: "Will negotiate a retreat if losing badly. Never panics. Would rather buy his way out than die for pride."
    group_size: "10+"
    encounter_conditions:
      terrain: ["river_crossing", "ruins", "road", "hill_fort"]
      season: ["spring", "summer", "autumn", "winter"]
    loot:
      silver_range: [50, 200]
      items:
        [
          "dane_axe",
          "layered_mail",
          "iron_helm",
          "silver_arm_rings",
          "wolf_fur_cloak",
        ]
    image_prompt: |
      A grey-bearded one-eyed man in layered mail and wolf-fur cloak seated on
      a carved wooden chair inside a ruined stone hall. Dane axe across his
      knees, iron helm beside him. Armed men flanking the entrance. Firelight
      and shadow. Heavy, brooding atmosphere.

  # ==========================================================================
  # RAIDERS (HUM_RAIDER_01 through HUM_RAIDER_03)
  # ==========================================================================

  - id: "HUM_RAIDER_01"
    name: "Shore Raider"
    category: "human"
    subcategory: "raider"
    tier: 2
    description: "Salt-crusted man with wind-burnt skin and a short spear. Wool tunic under a sleeveless leather corselet. Bare calves scarred from barnacles and rigging rope. Moves fast on sand but clumsily on rock."
    stats:
      MIG: 4
      NIM: 4
      TOU: 5
      WIT: 3
      WIL: 4
      WYR: 1
    hp: 9
    skills:
      - name: "Spears"
        rank: 2
      - name: "Axes"
        rank: 1
      - name: "Navigate"
        rank: 2
    gear:
      weapons:
        - name: "Short Spear"
          type: "spear"
          speed: 4
          base_damage: 5
        - name: "Hatchet"
          type: "axe"
          speed: 3
          base_damage: 3
      armor:
        torso: "Leather Corselet"
        head: "None"
    tactics: "Arrives at dawn from the waterline. Rushes in a loose mob toward buildings, grabs everything movable. Fights in pairs with spears. Retreats to boats if resistance stiffens."
    morale_break: "Runs for the boats if more than a third of the raiding party falls."
    group_size: "5-10"
    encounter_conditions:
      terrain: ["coast", "beach", "fishing_village"]
      season: ["spring", "summer"]
    loot:
      silver_range: [5, 25]
      items: ["short_spear", "hatchet", "salted_fish", "rope"]
    image_prompt: |
      A windburnt man in leather corselet splashing through shallow surf, short
      spear raised, hatchet at his belt. Longship silhouette behind him in grey
      morning mist. Wet sand, cold light, salt spray. Muted blues and browns.

  - id: "HUM_RAIDER_02"
    name: "Mounted Raider"
    category: "human"
    subcategory: "raider"
    tier: 3
    description: "Hard-eyed rider on a shaggy steppe horse, wrapped in furs and boiled leather. A composite bow hangs from the saddle. His teeth are filed to points — a steppe custom or a warning."
    stats:
      MIG: 5
      NIM: 6
      TOU: 5
      WIT: 5
      WIL: 4
      WYR: 1
    hp: 11
    skills:
      - name: "Bows"
        rank: 3
      - name: "Spears"
        rank: 2
      - name: "Navigate"
        rank: 2
      - name: "Track"
        rank: 2
    gear:
      weapons:
        - name: "Composite Bow"
          type: "bow"
          speed: 4
          base_damage: 5
        - name: "Cavalry Spear"
          type: "spear"
          speed: 5
          base_damage: 6
      armor:
        torso: "Boiled Leather and Furs"
        head: "Fur-Lined Cap"
    tactics: "Circles at bow range, peppering targets with arrows. Closes with the spear only against isolated or fleeing enemies. Never dismounts willingly. If forced to ground, fights desperately to remount."
    morale_break: "Breaks off and gallops away if horse is injured or if pinned in melee for more than two rounds."
    group_size: "3-6"
    encounter_conditions:
      terrain: ["plains", "steppe", "road", "farmland"]
      season: ["spring", "summer", "autumn"]
    loot:
      silver_range: [10, 40]
      items:
        [
          "composite_bow",
          "arrows",
          "cavalry_spear",
          "horse_tack",
          "filed_tooth_trophy",
        ]
    image_prompt: |
      A fur-wrapped rider on a shaggy dark horse galloping across flat
      grassland, composite bow drawn, quiver bouncing at his hip. Teeth bared
      in a snarl showing filed points. Dust cloud behind. Grey sky, yellow
      grass, muted earth tones.

  - id: "HUM_RAIDER_03"
    name: "Raider Chieftain"
    category: "human"
    subcategory: "raider"
    tier: 4
    description: "Thick-necked man in riveted mail with an arm-ring collection running shoulder to wrist. A heavy bearded axe in each hand. Face cratered with old pox scars. Voice like dragging a chain over rock."
    stats:
      MIG: 8
      NIM: 5
      TOU: 7
      WIT: 5
      WIL: 6
      WYR: 1
    hp: 17
    skills:
      - name: "Axes"
        rank: 4
      - name: "Command"
        rank: 3
      - name: "Intimidate"
        rank: 3
      - name: "Shields"
        rank: 2
    gear:
      weapons:
        - name: "Bearded Axe"
          type: "axe"
          speed: 4
          base_damage: 7
        - name: "Bearded Axe (off-hand)"
          type: "axe"
          speed: 4
          base_damage: 6
      armor:
        torso: "Riveted Mail"
        head: "Iron Helm with Cheek Guards"
    tactics: "Leads from the front. Charges the strongest-looking enemy to establish dominance. Dual-wields axes, hooking shields aside with the beard of one axe while striking with the other. His men follow his example — if he charges, they all charge."
    morale_break: "Does not break. Will fight to the death unless offered a face-saving way out by a worthy enemy."
    group_size: "5-10"
    encounter_conditions:
      terrain: ["coast", "river_crossing", "farmland", "settlement"]
      season: ["spring", "summer", "autumn"]
    loot:
      silver_range: [40, 150]
      items:
        [
          "bearded_axe",
          "riveted_mail",
          "iron_helm",
          "silver_arm_rings",
          "gold_torc",
        ]
    image_prompt: |
      A massive pox-scarred man in riveted mail roaring a war cry, a bearded
      axe in each fist, silver arm-rings glinting. Behind him, a burning
      fishing village and a beached longship. Orange firelight against grey
      smoke. Blood on his forearms.

  # ==========================================================================
  # DESERTERS (HUM_DESER_01 through HUM_DESER_02)
  # ==========================================================================

  - id: "HUM_DESER_01"
    name: "Lone Deserter"
    category: "human"
    subcategory: "deserter"
    tier: 1
    description: "Gaunt man with a thousand-yard stare and a sword he keeps drawing and sheathing. Still wears the remnants of a huskarl's tunic, but the lord's badge has been torn off. Flinches at loud sounds. Talks to someone who isn't there."
    stats:
      MIG: 4
      NIM: 3
      TOU: 3
      WIT: 2
      WIL: 2
      WYR: 1
    hp: 6
    skills:
      - name: "Swords"
        rank: 2
      - name: "Shields"
        rank: 1
    gear:
      weapons:
        - name: "Nicked Sword"
          type: "sword"
          speed: 4
          base_damage: 5
      armor:
        torso: "Torn Gambeson"
        head: "None"
    tactics: "Unpredictable. May charge screaming, freeze mid-fight, or collapse weeping. When he fights, muscle memory takes over — his swordwork is better than his condition suggests. Does not coordinate, does not retreat tactically."
    morale_break: "May break at any moment or may never break at all. Roll each round — equal chance of fleeing, fighting harder, or going catatonic."
    group_size: "1"
    encounter_conditions:
      terrain: ["road", "ruins", "forest_edge", "abandoned_farm"]
      season: ["spring", "summer", "autumn", "winter"]
    loot:
      silver_range: [0, 8]
      items: ["nicked_sword", "torn_gambeson", "empty_water_skin"]
    image_prompt: |
      A hollow-eyed man in a torn gambeson standing alone on an empty road,
      sword half-drawn, staring at nothing. Badge ripped from his chest leaving
      torn fabric. Autumn leaves blowing. Grey overcast. Haunted expression.

  - id: "HUM_DESER_02"
    name: "Deserter Pack"
    category: "human"
    subcategory: "deserter"
    tier: 3
    description: "Six to ten former soldiers who fled the same losing battle and stuck together. They keep military discipline — sentries, formations, rationing — but answer to no jarl. Their gear is mismatched but well-maintained. The ranking man has an arrowhead still lodged in his shoulder."
    stats:
      MIG: 5
      NIM: 5
      TOU: 5
      WIT: 5
      WIL: 4
      WYR: 1
    hp: 11
    skills:
      - name: "Spears"
        rank: 3
      - name: "Shields"
        rank: 2
      - name: "Swords"
        rank: 2
      - name: "Stealth"
        rank: 1
    gear:
      weapons:
        - name: "Spear"
          type: "spear"
          speed: 4
          base_damage: 5
        - name: "Short Sword"
          type: "sword"
          speed: 3
          base_damage: 5
        - name: "Round Shield"
          type: "shield"
          speed: 3
          base_damage: 2
      armor:
        torso: "Padded Gambeson"
        head: "Leather Cap"
    tactics: "Forms a tight shield wall and advances. Will parley first — they prefer to take supplies without fighting. If forced to fight, they hold formation and grind the enemy down. Flankers try to get behind."
    morale_break: "Retreats in order if the ranking man falls or if they take 40% casualties. They survive by knowing when to leave."
    group_size: "5-10"
    encounter_conditions:
      terrain: ["road", "farmland", "ruins", "forest_edge"]
      season: ["spring", "summer", "autumn"]
    loot:
      silver_range: [10, 40]
      items:
        ["spear", "short_sword", "round_shield", "rations", "military_cloak"]
    image_prompt: |
      A tight group of grim-faced men in mismatched armor forming a small
      shield wall on a forest road. Spears leveled, shields overlapping. One
      man with a bandaged shoulder giving hand signals. Muted greens, browns,
      iron grey. Tense standoff atmosphere.

  # ==========================================================================
  # BERSERKERS (HUM_BERSERK_01 through HUM_BERSERK_02)
  # ==========================================================================

  - id: "HUM_BERSERK_01"
    name: "Maddened Berserker"
    category: "human"
    subcategory: "berserker"
    tier: 3
    description: "Bare-chested man covered in self-inflicted scars, pupils blown wide, foam flecking his beard. Bites the rim of his shield until blood runs from his gums. Muscles corded like ship rope. The sounds he makes are not words."
    stats:
      MIG: 7
      NIM: 5
      TOU: 6
      WIT: 2
      WIL: 6
      WYR: 1
    hp: 14
    skills:
      - name: "Axes"
        rank: 3
      - name: "Brawl"
        rank: 3
      - name: "Intimidate"
        rank: 2
    gear:
      weapons:
        - name: "Broad Axe"
          type: "axe"
          speed: 5
          base_damage: 7
      armor:
        torso: "None (bare skin)"
        head: "None"
    tactics: "Charges the nearest enemy and does not stop swinging until everything around him is dead or he is. No feints, no defense. Every attack is a committed overhead or lateral swing aimed to split bone. Will grab and bite if disarmed."
    resistances: ["fear"]
    sim_traits: ["berserker_pain_fury"]
    morale_break: "None. Does not feel fear. Does not flee. Fights until dead or until the rage passes and he collapses from blood loss."
    group_size: "1"
    encounter_conditions:
      terrain: ["battlefield", "road", "settlement", "forest"]
      season: ["spring", "summer", "autumn", "winter"]
    loot:
      silver_range: [5, 20]
      items: ["broad_axe", "bear_tooth_amulet", "shield_splinters"]
    image_prompt: |
      A bare-chested man with ritual scars and a foam-flecked beard mid-swing
      with a broad axe, eyes white and unfocused. Blood on his hands and teeth.
      Broken shield on the ground. Grey smoke, trampled grass. Raw, savage
      energy. No glamour.

  - id: "HUM_BERSERK_02"
    name: "Ulfhednar"
    category: "human"
    subcategory: "berserker"
    tier: 4
    description: "A man wearing a complete wolf skin, head still attached, draped over his skull like a hood. Beneath the fur, his body is lean and scarred, sinew standing out like cables. His eyes track movement like a predator. He has not spoken in years."
    stats:
      MIG: 7
      NIM: 7
      TOU: 6
      WIT: 4
      WIL: 8
      WYR: 1
    hp: 16
    skills:
      - name: "Axes"
        rank: 4
      - name: "Brawl"
        rank: 3
      - name: "Stealth"
        rank: 3
      - name: "Track"
        rank: 2
      - name: "Intimidate"
        rank: 3
    gear:
      weapons:
        - name: "Bearded Axe"
          type: "axe"
          speed: 4
          base_damage: 7
        - name: "Teeth and Claws (Brawl)"
          type: "brawl"
          speed: 2
          base_damage: 4
      armor:
        torso: "Wolf Skin (thick hide)"
        head: "Wolf-Head Hood"
    tactics: "Stalks targets through darkness and terrain before attacking. Enters a trance-state where pain is ignored. Opens with a silent rush from an unexpected angle. Hooks weapons away with the axe beard, then closes to grappling range to bite and gouge. Hunts isolated targets — avoids shield walls."
    resistances: ["fear"]
    sim_traits: ["berserker_pain_fury"]
    morale_break: "None in trance. Does not recognize surrender, retreat, or self-preservation. After the trance passes, may wander away confused."
    group_size: "1"
    encounter_conditions:
      terrain: ["deep_forest", "mountain", "ruins", "battlefield"]
      season: ["autumn", "winter"]
    loot:
      silver_range: [10, 35]
      items: ["bearded_axe", "wolf_skin", "trance_herbs", "human_finger_bones"]
    image_prompt: |
      A lean, scarred man draped in a full wolf skin, wolf's head over his
      skull, crouching at the edge of firelight. Eyes glinting beneath the
      wolf's jaws. Axe in one hand, other hand clawed. Deep forest, snow on
      the ground. Blue-grey moonlight. Predatory stillness.

  # ==========================================================================
  # SELLSWORDS (HUM_SELL_01 through HUM_SELL_03)
  # ==========================================================================

  - id: "HUM_SELL_01"
    name: "Cheap Blade"
    category: "human"
    subcategory: "sellsword"
    tier: 1
    description: "Young man with a borrowed sword too long for him and a bruise-yellow face from last week's beating. No armor. Took the contract because the alternative was starving. His hands shake when he holds the weapon two-handed."
    stats:
      MIG: 3
      NIM: 3
      TOU: 3
      WIT: 2
      WIL: 2
      WYR: 1
    hp: 5
    skills:
      - name: "Swords"
        rank: 1
      - name: "Brawl"
        rank: 1
    gear:
      weapons:
        - name: "Borrowed Sword"
          type: "sword"
          speed: 4
          base_damage: 5
      armor:
        torso: "Wool Tunic"
        head: "None"
    tactics: "Hangs at the back of any group. Follows others into the fight but stays at maximum weapon range. Swings wide, telegraphed cuts. Stumbles on uneven ground. Will switch sides if offered more silver."
    morale_break: "Flees at first blood — his own or anyone else's. Drops weapon while running."
    group_size: "1-3"
    encounter_conditions:
      terrain: ["town", "road", "camp"]
      season: ["spring", "summer", "autumn", "winter"]
    loot:
      silver_range: [1, 5]
      items: ["borrowed_sword", "half_loaf_bread"]
    image_prompt: |
      A scrawny young man in a wool tunic gripping an oversized sword with both
      hands, knuckles white, standing in a muddy yard. Black eye, cracked lip.
      Behind him, a tavern doorway. Overcast light, puddles, rats. Pathetic
      rather than threatening.

  - id: "HUM_SELL_02"
    name: "Seasoned Sellsword"
    category: "human"
    subcategory: "sellsword"
    tier: 2
    description: "Calm woman in well-oiled mail with a sword and shield that show use but no neglect. Short-cropped hair, steady hands, a businesslike expression. Asks what the pay is before she asks what the job is."
    stats:
      MIG: 4
      NIM: 5
      TOU: 4
      WIT: 5
      WIL: 4
      WYR: 1
    hp: 9
    skills:
      - name: "Swords"
        rank: 3
      - name: "Shields"
        rank: 2
      - name: "Bargain"
        rank: 1
    gear:
      weapons:
