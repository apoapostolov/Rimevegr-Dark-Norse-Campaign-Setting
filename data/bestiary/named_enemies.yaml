    lore: "Began as a fish-seller in Stonebay Hamlet. Married a ship captain, outlived him, inherited the ship, bought two more. Built the Fjord Compact from loose trade agreements into a formal economic alliance that controls coastal commerce. She does not want territory. She wants margin. Every conflict is an opportunity to sell supplies to both sides."
