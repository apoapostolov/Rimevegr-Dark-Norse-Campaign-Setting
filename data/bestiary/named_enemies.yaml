enemies:
  # ==========================================================================
  # RIVAL BAND LEADERS (BOS_RIVAL_01 through BOS_RIVAL_07)
  # ==========================================================================

  - id: "BOS_RIVAL_01"
    name: "Sigrid Blackwine"
    category: "boss"
    subcategory: "rival_leader"
    tier: 4
    named: true
    description: "Broad-shouldered woman in her late thirties with a jaw like a ship's prow and pale eyes that measure everything in terms of cost. Black hair cut short at the neck, the left side shaved above a thick scar from ear to temple. Ring mail kept oiled and fitted. A wine-dark cloak — her signature — pinned with a silver wolf's-head brooch. Hands scarred across the knuckles from a decade of close-quarters work. She stands like someone who owns the ground under her."
    stats:
      MIG: 6
      NIM: 5
      TOU: 5
      WIT: 7
      WIL: 6
      WYR: 1
    hp: 16
    skills:
      - name: "Swords"
        rank: 3
      - name: "Command"
        rank: 4
      - name: "Bargain"
        rank: 3
      - name: "Intimidation"
        rank: 3
      - name: "Tactics"
        rank: 3
    gear:
      weapons:
        - name: "Blackwine Blade"
          type: "sword"
          speed: 3
          base_damage: 6
        - name: "Seax"
          type: "knife"
          speed: 2
          base_damage: 3
      armor:
        torso: "Ring Mail"
        head: "Steel Helm"
    tactics: "Commands from the second rank, reading the fight and issuing positioning orders. Enters melee only at the decisive moment or when challenged to a duel she cannot refuse without losing face. Fights with controlled aggression — no wasted swings. Will sacrifice a flank to create an opening at center."
    morale_break: "Retreats if band drops below 40% strength. Will not risk the Three Wolves for personal pride — but will accept a duel if challenged publicly."
    group_size: "1 (with 10-20 Three Wolves)"
    abilities:
      - "Rally: allies within earshot recover 2 morale on her turn"
      - "Blackwine Rage: +2 MIG for 3 rounds when first wounded"
      - "Read the Field: once per combat, force one enemy to reroll a successful attack"
    resistances: []
    weaknesses:
      ["pride — can be goaded into duels", "protective of her second, Torolf"]
    sim_traits: ["blackwine_rage", "read_the_field_once"]
    loot:
      silver_range: [50, 200]
      items: ["blackwine_blade", "ring_mail", "silver_wolf_brooch"]
      special: "Three Wolves war chest if camp taken (300-500 silver)"
    lore: "Born in Vargheim to a tanner and a shield-maiden who never came home. Built the Three Wolves from a handful of unemployed garrison soldiers and a reputation for keeping contracts. Every jarl between Grimholt and Stonebay knows her name. She wants what the player band wants — the next contract, the better reputation, the seat at the jarl's table."
    associated_locations: ["Vargheim", "Grimholt"]
    associated_chains: ["three_wolves", "iron_grip"]
    image_prompt: |
      A broad-shouldered woman in well-maintained ring mail, dark wine-colored
      cloak, silver wolf brooch at the throat. Short black hair shaved on one
      side revealing a scar from ear to temple. Pale calculating eyes. Standing
      with arms crossed on a muddy hillside, mercenary camp behind her.
      Overcast sky. Muted steel and burgundy palette. Realistic, not stylized.

  - id: "BOS_RIVAL_02"
    name: "Hrafn Bone-Gnaw"
    category: "boss"
    subcategory: "rival_leader"
    tier: 4
    named: true
    description: "Massive. Head and shoulders above most men, with a neck like a bull's and hands that could close around a skull. Face cratered with old pox scars, nose broken flat. Wears a necklace of finger bones — some yellowed, some fresh. Grey-streaked beard braided with copper wire. Bare arms sleeved in scar tissue. His eyes are small and bright and perpetually amused, which is worse than if they were angry."
    stats:
      MIG: 8
      NIM: 3
      TOU: 7
      WIT: 4
      WIL: 5
      WYR: 1
    hp: 20
    skills:
      - name: "Axes"
        rank: 4
      - name: "Brawl"
        rank: 3
      - name: "Intimidation"
        rank: 4
      - name: "Command"
        rank: 2
    gear:
      weapons:
        - name: "Gnaw"
          type: "two-handed_axe"
          speed: 2
          base_damage: 8
        - name: "Fists"
          type: "unarmed"
          speed: 1
          base_damage: 5
      armor:
        torso: "Hardened Leather with Bone Plates"
        head: "None"
    tactics: "Walks straight at the strongest-looking enemy and swings. No subtlety. No second plan. His violence is so total it creates its own tactical advantage — the enemy focuses on him while the Bone Pack flanks. Will grapple downed enemies and bite."
    morale_break: "Does not retreat. Fights until physically unable to stand. The Bone Pack scatters when he falls."
    group_size: "1 (with 8-15 Bone Pack)"
    abilities:
      - "Terrifying Presence: enemies within 5m make WIL test or suffer -1 to first attack"
      - "Bone-Gnaw: bites grappled opponent for d4 damage, ignoring armor"
      - "Relentless: ignores first critical wound effect"
    resistances: ["fear", "pain_penalties"]
    weaknesses:
      [
        "slow — NIM-based attacks exploit his poor footwork",
        "cannot resist a challenge to his strength",
      ]
    sim_traits: ["bone_gnaw", "relentless_no_crit", "terrifying_presence"]
    loot:
      silver_range: [20, 80]
      items: ["gnaw_axe", "bone_necklace", "copper_arm_rings"]
      special: "Bone Pack territory markers — worth nothing, but their removal demoralizes survivors"
    lore: "Nobody knows where Hrafn came from. He appeared at Kolvik three winters ago with six men and a reputation that preceded him by a month. The Bone Pack grew because people were more afraid of being his enemy than his follower. He collects finger bones from those he personally kills. There are forty-seven on the necklace."
    associated_locations: ["Kolvik", "Moor's End"]
    associated_chains: ["bone_pack"]
    image_prompt: |
      An enormous man with pox-scarred face and broken nose, bare arms
      covered in scar tissue, wearing hardened leather with bone plates
      riveted on. Necklace of finger bones, grey-streaked beard with copper
      wire. Holding a massive two-handed axe one-handed. Small bright eyes.
      Standing in a burned village. Ash and grey palette, cold light.

  - id: "BOS_RIVAL_03"
    name: "Eerik Stillwater"
    category: "boss"
    subcategory: "rival_leader"
    tier: 3
    named: true
    description: "Lean man with a face like carved driftwood — all planes and no softness. Salt-white hair despite being barely forty. Hands perpetually tar-stained from ship work. Eyes the pale grey of winter sea. Missing the last joint of his right ring finger. Moves with a sailor's economy, never a wasted step. Speaks quietly, which makes people lean in, which is the point."
    stats:
      MIG: 4
      NIM: 6
      TOU: 4
      WIT: 7
      WIL: 5
      WYR: 1
    hp: 12
    skills:
      - name: "Spears"
        rank: 3
      - name: "Seamanship"
        rank: 4
      - name: "Tactics"
        rank: 3
      - name: "Stealth"
        rank: 2
      - name: "Navigate"
        rank: 3
    gear:
      weapons:
        - name: "Stillwater"
          type: "spear"
          speed: 3
          base_damage: 5
        - name: "Boarding Axe"
          type: "axe"
          speed: 3
          base_damage: 4
      armor:
        torso: "Oiled Leather"
        head: "None"
    tactics: "Never engages on unfavorable ground. Prefers ambushes at river crossings, coastal choke points, or fog. Uses his ship for rapid repositioning. In direct combat, fights defensively with the spear, keeping distance, waiting for the opponent to overcommit. Will withdraw from any fight he cannot win and return on his terms."
    morale_break: "Withdraws to sea if outnumbered or outflanked. Will sacrifice crew members to cover his retreat — cold, not cowardly."
    group_size: "1 (with 12-25 Silent Oar)"
    abilities:
      - "Fog-Fighter: no penalties in low visibility conditions"
      - "Tactical Withdrawal: once per combat, disengage without provoking free attacks"
      - "Patient Strike: if he delays his attack one round, +2 base damage on next hit"
    resistances: []
    weaknesses:
      [
        "inland combat — loses advantage away from water",
        "will not risk his ship for anything",
      ]
    sim_traits: ["fog_fighter", "patient_strike", "tactical_withdrawal_once"]
    loot:
      silver_range: [30, 120]
      items: ["stillwater_spear", "boarding_axe", "navigation_charts"]
      special: "The Silent Oar's longship if captured — worth a fortune"
    lore: "Former pilot for a merchant fleet out of Bleakwater Landing. Went independent after the fleet's owner shorted his crew's pay for the third season running. The Silent Oar grew around him because he never lost a ship and never shorted a split. Coastal settlements pay him not to raid them. He considers this a reasonable business arrangement."
    associated_locations: ["Bleakwater Landing", "Stonebay Hamlet"]
    associated_chains: ["silent_oar", "fjord_compact"]
    image_prompt: |
      A lean man with salt-white hair and driftwood face standing at the
      prow of a longship in grey fog. Tar-stained hands resting on a spear
      butt. Oiled leather armor, no helm. Pale grey eyes scanning the
      coastline. Cold blue-grey palette, muted fog, dark water. Realistic
      Norse coastal setting.

  - id: "BOS_RIVAL_04"
    name: "Ylva Ash-Hall"
    category: "boss"
    subcategory: "rival_leader"
    tier: 3
    named: true
    description: "Young — barely twenty-two — with a face still carrying baby fat under fresh scars. Red-brown hair tied back in a functional braid. Burns on the backs of both hands from pulling comrades out of the fire that killed the Hollow Hall's last leader. Wears a dead man's mail coat two sizes too large, cinched with rope at the waist. Eyes that are tired and fierce in equal parts. The set of her jaw says she will not be the second Hollow Hall leader to die this year."
    stats:
      MIG: 4
      NIM: 5
      TOU: 4
      WIT: 5
      WIL: 6
      WYR: 1
    hp: 10
    skills:
      - name: "Swords"
        rank: 2
      - name: "Command"
        rank: 2
      - name: "Survival"
        rank: 3
      - name: "Healing"
        rank: 2
      - name: "Intimidation"
        rank: 1
    gear:
      weapons:
        - name: "Ash-Hall Sword"
          type: "sword"
          speed: 3
          base_damage: 5
      armor:
        torso: "Ill-Fitting Chain Mail"
        head: "Leather Cap"
    tactics: "Cautious — retreats from even fights. Targets supply trains, wounded stragglers, undefended camps. Fights defensively, backing up her few remaining fighters. Takes risks only when starvation forces her hand. If pushed into real combat, she is surprisingly vicious — desperation carves away hesitation."
    morale_break: "Retreats if she loses two fighters. Cannot afford losses. Will surrender if cornered and offered terms."
    group_size: "1 (with 4-8 Hollow Hall survivors)"
    abilities:
      - "Desperate Fury: +2 to all combat rolls when below 50% HP"
      - "Survivor's Instinct: +2 to Survival checks for ambush detection"
      - "Hold Together: her presence prevents Hollow Hall morale collapse for 2 extra rounds"
    resistances: []
    weaknesses:
      [
        "inexperience — predictable tactics",
        "cannot abandon wounded",
        "can be bought off with food and silver",
      ]
    sim_traits: ["desperate_fury"]
    loot:
      silver_range: [5, 30]
      items: ["ash_hall_sword", "chain_mail_ill_fitting", "fire_scarred_shield"]
      special: "Hollow Hall charter — symbolic value, could be used to recruit survivors"
    lore: "Was the Hollow Hall's camp cook three months ago. When Bjarne Ash-Hall burned alive in his own mead tent — set alight by Iron Tide raiders — Ylva dragged two men from the fire and the survivors followed her because no one else stepped forward. She is learning command by doing it badly and correcting. If she survives the year, she will be formidable."
    associated_locations: ["Ashmark", "Feldwick"]
    associated_chains: ["hollow_hall"]
    image_prompt: |
      A young woman in an ill-fitting chain mail coat cinched with rope,
      burn scars on both hands, red-brown hair in a practical braid. Holding
      a sword that looks too new for her scarred hands. Standing in front
      of a ragged group of fighters near a burned longhouse. Exhaustion and
      determination in equal measure. Ash and amber palette.

  - id: "BOS_RIVAL_05"
    name: "Gunnar Iron-Tide"
    category: "boss"
    subcategory: "rival_leader"
    tier: 4
    named: true
    description: "Fifty years old and every one of them carved into his face. Once the most feared band leader north of Grimholt. Now grey-bearded and stiff in the mornings, with a knee that clicks and a shoulder that won't raise past his ear. Still built like an oak stump — short, thick, unmovable. His eyes are the worst part: flat, disappointed, measuring everyone against the men he used to lead and finding them wanting. Wears his old Iron Tide arm ring like a holy relic."
    stats:
      MIG: 6
      NIM: 3
      TOU: 6
      WIT: 6
      WIL: 7
      WYR: 1
    hp: 16
    skills:
      - name: "Swords"
        rank: 4
      - name: "Command"
        rank: 3
      - name: "Tactics"
        rank: 4
      - name: "Intimidation"
        rank: 3
      - name: "History"
        rank: 2
    gear:
      weapons:
        - name: "Tide-Breaker"
          type: "sword"
          speed: 3
          base_damage: 6
        - name: "Round Shield"
          type: "shield"
          speed: 0
          base_damage: 2
      armor:
        torso: "Old Chain Mail"
        head: "Nasal Helm"
    tactics: "Fights from behind a shield wall. His sword work is textbook and lethal — thirty years of practice etched into muscle. Reads an opponent's style within three exchanges and adapts. His weakness is stamina: he fights in bursts, then disengages to breathe. Knows exactly when to commit his reserves."
    morale_break: "Will not retreat — dying in battle is acceptable, losing the last of the Iron Tide is not. Will negotiate if the Remnant is about to be wiped out."
    group_size: "1 (with 5-10 Iron Tide Remnant)"
    abilities:
      - "Veteran's Eye: identifies weakest opponent automatically — +1 to attacks vs that target"
      - "Shield Wall Master: +2 armor when fighting alongside at least 2 allies in formation"
      - "Last Stand: when below 25% HP, all attacks deal +3 damage"
    resistances: ["fear", "intimidation"]
    weaknesses:
      [
        "bad knee — disadvantage on NIM rolls after 5 rounds of combat",
        "bitter — pride can be exploited by invoking Iron Tide's legacy",
      ]
    sim_traits: ["veteran_eye", "last_stand_25", "shield_wall_master"]
    loot:
      silver_range: [30, 100]
      items: ["tide_breaker_sword", "iron_tide_arm_ring", "chain_mail_old"]
      special: "Iron Tide war records — maps and contacts from a decade of campaigns"
    lore: "Twenty years ago, the Iron Tide was sixty strong and took contracts from kings. Then came the ambush at Thornwall — half the band dead in an afternoon, betrayed by a client. Gunnar pulled the survivors out and has been holding the Remnant together by sheer force of will ever since. He hates the new generation of bands. He hates himself for surviving. He still fights because he doesn't know how to stop."
    associated_locations: ["Thornwall", "Deepholm"]
    associated_chains: ["iron_tide_remnant"]
    image_prompt: |
      A short, thick-bodied old warrior in worn chain mail and nasal helm,
      grey beard, flat disappointed eyes. Round shield on one arm, well-used
      sword in the other. Standing on a muddy hill with a handful of ragged
      fighters behind him. An iron arm ring visible on his sword wrist.
      Grey sky, barren heath. Muted iron and brown palette.

  - id: "BOS_RIVAL_06"
    name: "Bryn Ashmouth"
    category: "boss"
    subcategory: "rival_leader"
    tier: 3
    named: true
    description: "Thin man with a face like a hatchet and burn-scar tissue covering the left side of his mouth and jaw, pulling the lip into a permanent sneer. The scar is from a draugr's grave-fire — he'll tell you if you ask, and if you don't. Smells of the herbs he burns to mask barrow stench. Dark eyes that have seen things underground that no one believes. Fingers stained with charcoal from ward-drawing."
    stats:
      MIG: 4
      NIM: 5
      TOU: 4
      WIT: 7
      WIL: 6
      WYR: 2
    hp: 11
    skills:
      - name: "Spears"
        rank: 3
      - name: "Lore"
        rank: 4
      - name: "Stealth"
        rank: 2
      - name: "Survival"
        rank: 3
      - name: "Rune-Craft"
        rank: 2
    gear:
      weapons:
        - name: "Barrow-Spike"
          type: "spear"
          speed: 3
          base_damage: 5
        - name: "Iron-Bound Torch"
          type: "improvised"
          speed: 2
          base_damage: 3
      armor:
        torso: "Studded Leather"
        head: "None"
    tactics: "Specialist. Studies the barrow before entering — reads the stones, checks for ward-signs, counts the dead. Inside, fights from chokepoints with spear and torch. Uses fire aggressively against undead. Never lets the Wardens go deeper than they can retreat from in two minutes. On the surface against living enemies, fights pragmatically and tries to disengage."
    morale_break: "Withdraws if a Warden falls underground — no barrow is worth losing trained people. Against surface enemies, retreats if outnumbered."
    group_size: "1 (with 6-12 Grave Wardens)"
    abilities:
      - "Barrow-Wise: +2 to all rolls involving undead lore, detection, and weaknesses"
      - "Fire-Bearer: torch attacks deal +2 damage vs undead"
      - "Ward-Signs: can spend 10 minutes creating a ward that delays undead crossing a threshold for d6 rounds"
    resistances: ["fear_from_undead"]
    weaknesses:
      [
        "obsessive — will risk too much to clear a barrow he's mapped",
        "socially abrasive — makes enemies easily",
      ]
    sim_traits: ["barrow_wise", "fire_bearer_torchbonus"]
    loot:
      silver_range: [20, 60]
      items: ["barrow_spike_spear", "ward_chalk", "undead_field_guide"]
      special: "Grave Wardens' barrow maps — invaluable for anyone entering the mounds"
    lore: "Former grave-digger's apprentice from Ashmark who dug into a barrow by accident at sixteen and barely survived. He has been going back underground ever since, first alone, then with anyone foolish enough to follow. The Grave Wardens exist because Bryn convinced enough people that dead things are everyone's problem and someone should get paid to deal with them."
    associated_locations: ["Ashmark", "Raven's Perch", "Frostfjord Hollow"]
    associated_chains: ["grave_wardens", "waking_barrows"]
    image_prompt: |
      A thin man with a hatchet face and burn-scar tissue pulling his
      lip into a sneer, holding a spear in one hand and an iron-bound
      torch in the other. Charcoal-stained fingers. Standing at the
      mouth of a barrow, darkness behind him. Studded leather armor,
      herb pouches on his belt. Amber torchlight against grey stone.

  - id: "BOS_RIVAL_07"
    name: "Sven Red-Hand"
    category: "boss"
    subcategory: "rival_leader"
    tier: 4
    named: true
    description: "Medium build, unremarkable face, the kind of man you'd pass on the road without looking twice — until you see his hands. Stained to the wrists in a brownish-red that doesn't wash out, whether from blood or from the dye he uses to maintain the effect. Dead eyes like river stones. Smiles constantly, showing teeth filed to points. Three missing teeth on the left side. Moves with a lazy, rolling gait that shifts to explosive speed without warning."
    stats:
      MIG: 6
      NIM: 6
      TOU: 5
      WIT: 5
      WIL: 4
      WYR: 1
    hp: 16
    skills:
      - name: "Axes"
        rank: 4
      - name: "Knives"
        rank: 3
      - name: "Intimidation"
        rank: 4
      - name: "Stealth"
        rank: 2
      - name: "Brawl"
        rank: 2
    gear:
      weapons:
        - name: "Red-Hand's Axe"
          type: "axe"
          speed: 3
          base_damage: 6
        - name: "Gut-Hook Knife"
          type: "knife"
          speed: 2
          base_damage: 3
      armor:
        torso: "Leather with Iron Plates"
        head: "None"
    tactics: "No formation. No strategy. Sven charges the nearest enemy and starts hacking. His band follows or they don't. He targets the face and hands — fights dirty, bites, throws dirt, headbutts. The Red Tide's only tactic is overwhelming violence applied without hesitation. It works more often than it should."
    morale_break: "Does not break. Fights until dead or physically incapacitated. The Red Tide scatters without him."
    group_size: "1 (with 8-14 Red Tide)"
    abilities:
      - "Frenzy: attacks twice per round at -1 to each roll"
      - "Terror: enemies who see him kill make WIL test or suffer -2 next round"
      - "Filed Teeth: bite attack in grapple for d4 damage"
    resistances: ["fear", "pain_penalties"]
    weaknesses:
      [
        "no tactical thinking — predictable, always charges",
        "cannot resist killing — will murder emissaries and prisoners",
      ]
    loot:
      silver_range: [15, 70]
      items: ["red_hand_axe", "gut_hook_knife", "finger_trophies"]
      special: "Nothing of strategic value — Sven destroys anything useful"
    lore: "Appeared on the road near Icebreak two years ago with a handful of men and a fresh collection of heads. No one knows where he came from. No one's been able to trace his past. The Red Tide attracts the kind of people other bands reject — killers too unstable or too cruel to follow orders. Sven doesn't give orders. He gives permission."
    associated_locations: ["Icebreak", "Kolvik"]
    associated_chains: ["red_tide"]
    image_prompt: |
      A medium-built man with an unremarkable face except for the constant
      smile showing filed-to-point teeth. Hands stained reddish-brown to
      the wrists. Dead eyes like river stones. Leather armor with iron
      plates. Holding a blood-stained axe loosely. Standing in front of a
      burning farmstead. Red and black palette, firelight. Unsettling calm.

  # ==========================================================================
  # FACTION CHAMPIONS (BOS_FACTION_01 through BOS_FACTION_04)
  # ==========================================================================

  - id: "BOS_FACTION_01"
    name: "Ordovast the Iron"
    category: "boss"
    subcategory: "faction_champion"
    tier: 5
    named: true
    description: "Not tall. Not broad. Not the man you'd pick out of a room as dangerous — until he speaks. Square-jawed, clean-shaven, grey hair cropped close to the skull. A face of angles and economy. Dresses in understated dark wool with a single piece of visible wealth: an iron torc chased with silver at the terminals that marks him as overjarl of the Iron Grip. His eyes do not move quickly. They do not need to. Everything in the room has already been assessed. His hands are a politician's hands — uncallused, ink-stained — but the sword scar across his left palm says he was not always behind a desk."
    stats:
      MIG: 4
      NIM: 4
      TOU: 4
      WIT: 9
      WIL: 8
      WYR: 1
    hp: 14
    skills:
      - name: "Command"
        rank: 5
      - name: "Bargain"
        rank: 5
      - name: "Tactics"
        rank: 4
      - name: "Intimidation"
        rank: 4
      - name: "Swords"
        rank: 2
      - name: "Lore"
        rank: 3
    gear:
      weapons:
        - name: "Iron Grip Sword"
          type: "sword"
          speed: 3
          base_damage: 5
      armor:
        torso: "Fine Wool (no armor)"
        head: "None"
    tactics: "Never fights. This is the point. Ordovast wins before swords are drawn — through leverage, debt, supply control, and the implicit threat of the Iron Grip's military resources. If cornered physically, he fights competently but without brilliance, because he never intended to be in this situation. His real weapon is the network. Kill Ordovast and three contingency plans activate."
    morale_break: "Surrenders if personally threatened — then has you killed by proxies within the week. True defeat requires dismantling the Iron Grip's structure, not just reaching the man."
    group_size: "1 (with Tormund and 20-40 Iron Grip garrison)"
    abilities:
      - "Political Web: always has 2-3 contingency plans — killing him triggers retribution"
      - "Master Negotiator: +3 to all Bargain and Command rolls in non-combat encounters"
      - "Iron Grip Authority: can call upon garrison reinforcements within one day's march of Grimholt"
      - "Debt Leverage: knows the debts and secrets of every jarl in the region"
    resistances: ["intimidation — has faced worse threats than the players"]
    weaknesses:
      [
        "physically ordinary — vulnerable if his network is stripped away",
        "arrogance — believes he has accounted for everything",
      ]
    loot:
      silver_range: [200, 500]
      items: ["iron_grip_torc", "fine_sword", "political_correspondence"]
      special: "Iron Grip treasury and records if Grimholt is taken — reshapes regional power"
    lore: "Rose from a clerk's position in Grimholt's garrison to overjarl of the Iron Grip in twelve years through a combination of competence, ruthlessness, and an uncanny ability to be the only reasonable voice in every room. He does not want to rule — he wants to organize. The difference is academic to those being organized. He is the closest thing the region has to a king, and he intends to make it official."
    associated_locations: ["Grimholt"]
    associated_chains: ["iron_grip"]
    image_prompt: |
      A square-jawed, clean-shaven man with grey close-cropped hair in
      dark wool clothing, seated at a heavy oak table covered in
      correspondence and maps. Iron torc with silver terminals at his
      throat. Ink-stained fingers. A sword scar across his left palm.
      Calm, assessing eyes. Grimholt's stone hall background with
      iron fixtures. Dark palette, candlelight. Power without spectacle.

  - id: "BOS_FACTION_02"
    name: "Sigrun of the Compact"
    category: "boss"
    subcategory: "faction_champion"
    tier: 3
    named: true
    description: "Small woman in her fifties with silver-streaked red hair pinned under a linen cap. Face weathered by salt wind, crow's feet deep enough to hold rain. Dressed in good wool and sealskin, no weapons visible, an amber pendant worth more than most fighters earn in a year. Hands rough from a lifetime of rope work and ledger-keeping. She looks like someone's stern aunt. She controls more trade goods than any jarl on the coast."
    stats:
      MIG: 2
      NIM: 3
      TOU: 3
      WIT: 8
