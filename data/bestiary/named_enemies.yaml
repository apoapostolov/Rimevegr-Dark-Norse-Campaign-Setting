    tactics: "Does not fight. Sigrun's combat effectiveness is zero and she knows it. Her power is economic: she can embargo a settlement, redirect trade, hire any band in the region, or simply outbid any opponent for any resource. In a direct confrontation, she has bodyguards. If cornered alone, she negotiates — and her offers are usually good enough to take."
    morale_break: "Offers terms immediately. She can always make another deal. Violence is waste."
    group_size: "1 (with 4 personal guards and access to hired bands)"
    abilities:
