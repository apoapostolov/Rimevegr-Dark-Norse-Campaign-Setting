  - id: "BOS_FACTION_03"
    name: "The Pale Widow"
    category: "boss"
    subcategory: "faction_champion"
    tier: 5
    named: true
    description: "No one agrees on what she looks like. Some say a gaunt woman with white hair and no eyebrows. Others describe a middle-aged beauty with black eyes. The few consistent details: she is always pale — paper-white, bloodless. She wears grey, always. Her voice is quiet but carries. Her hands are cold to the touch. There is a smell around her — not decay, not perfume — something older, like stones after rain. Those with seidr-sight see something else entirely: threads of silver-grey extending from her fingers into the walls, the floor, the people around her."
    stats:
      MIG: 2
      NIM: 4
      TOU: 3
      WIT: 8
      WIL: 9
      WYR: 8
    hp: 10
    skills:
      - name: "Seidr"
        rank: 5
      - name: "Persuasion"
        rank: 4
      - name: "Intimidation"
        rank: 4
      - name: "Lore"
        rank: 4
      - name: "Stealth"
        rank: 3
      - name: "Bargain"
        rank: 3
    gear:
      weapons:
        - name: "Bone Needle"
          type: "seidr_focus"
          speed: 1
          base_damage: 2
      armor:
        torso: "Grey Wool (warded)"
        head: "None"
    tactics: "Does not enter combat. Ever. Her agents, bound spirits, and manipulated pawns do the fighting. If directly confronted, she uses seidr to confuse, terrify, or freeze opponents while she withdraws. Killing her body may not be sufficient — she has contingencies that involve things that should not exist. The real fight is tracing her influence network and severing it before she notices."
    morale_break: "Cannot be cornered through normal means. She knows you're coming before you decide to come. True confrontation requires disrupting her seidr network first."
    group_size: "1 (with bound spirits, 2-4 Whispering Circle agents, and an unknown number of unknowing pawns)"
    abilities:
      - "Veil-Sight: sees through illusions and detects all seidr within 100m"
      - "Thread-Bind: can compel a target to perform one action (WIL contest at -2 to resist)"
      - "Flesh-Shift: can change her appearance — WYR test to see through it"
      - "Spirit-Ward: immune to first seidr attack per encounter — it simply unravels"
      - "Cold Presence: those within arm's reach feel a bone-deep cold — -1 to all physical rolls"
      - "Death Contingency: if her body dies, she re-manifests at a prepared anchor within 7 days"
    resistances:
      ["seidr_first_strike", "physical_weapons_reduced", "cold", "fear"]
    weaknesses:
      [
        "iron — direct contact burns her and disrupts seidr",
        "her anchor sites — destroy them to make death permanent",
        "genuine human connection — she has forgotten how to model unpredictable loyalty",
      ]
    loot:
      silver_range: [0, 50]
      items: ["bone_needle", "grey_thread_spool", "veil_stone"]
      special: "Whispering Circle cipher key — unlocks her entire network of agents and debts"
    lore: "The name is old. Older than the current settlements. Whether she is the original Pale Widow or a successor wearing the title is a question no one has answered. She controls the Whispering Circle from Ashen Reach — a network of informants, blackmail targets, and unwitting puppets that spans the region. Her goals are not territory or wealth. They appear to involve the barrows, the things beneath them, and a door that should stay closed."
    associated_locations: ["Ashen Reach"]
    associated_chains: ["widows_web", "waking_barrows"]
    image_prompt: |
      A paper-white woman in grey wool standing in a dark stone chamber.
      Features indistinct, shifting — gaunt, then beautiful, then wrong.
      Faint silver-grey threads extending from her fingertips into shadow.
      Black eyes without reflection. Bone needle in one hand. Cold light,
      no visible source. Stone walls with condensation. The air around her
      looks thick. Folk horror, not fantasy.

  - id: "BOS_FACTION_04"
    name: "Tormund Gate-Keeper"
    category: "boss"
    subcategory: "faction_champion"
    tier: 4
    named: true
    description: "Built like a longhouse door — broad, flat, and immovable. Six and a half feet of bone and muscle with a face that has never in its life expressed curiosity. Blond hair cropped short, jaw like a shovel blade, small blue eyes set deep under a shelf of brow. Arms thick as most men's thighs, crossed with old white scars. Wears Grimholt garrison plate — maintained to parade standard. Speaks rarely, in short sentences, with long pauses. Follows Ordovast's orders without question because Ordovast has never given him a bad one."
    stats:
      MIG: 8
      NIM: 3
      TOU: 8
      WIT: 3
      WIL: 6
      WYR: 1
    hp: 22
    skills:
      - name: "Swords"
        rank: 4
      - name: "Brawl"
        rank: 3
      - name: "Shields"
        rank: 4
      - name: "Intimidation"
        rank: 3
    gear:
      weapons:
        - name: "Grimholt Broadsword"
          type: "sword"
          speed: 3
          base_damage: 7
        - name: "Tower Shield"
          type: "shield"
          speed: 0
          base_damage: 3
      armor:
        torso: "Garrison Plate"
        head: "Great Helm"
    tactics: "Stands in the way. That's it. Tormund plants himself in a doorway, a gate, a corridor, and nothing gets past. In open field, he advances behind his tower shield and forces opponents to deal with him before they can reach whoever he's protecting. Does not pursue. Does not chase. If you run, he lets you go. If you come back, he is still there."
    morale_break: "Does not flee. Will fight until ordered to withdraw by Ordovast, or until Ordovast is dead."
    group_size: "1 (usually with 4-8 Grimholt garrison soldiers)"
    abilities:
      - "Immovable: MIG contest to push past him at -3"
      - "Shield Fortress: adjacent allies gain +2 armor"
      - "Endurance: ignores first two rounds of fatigue penalties"
      - "Gate-Lock: if positioned in a chokepoint, enemies cannot bypass without defeating him"
    resistances: ["fear", "knockback", "pain_penalties_first_wound"]
    weaknesses:
      [
        "slow — cannot catch a fleeing opponent",
        "no independent thinking — confused without orders",
        "ranged attacks from elevation",
      ]
    loot:
      silver_range: [30, 80]
      items: ["grimholt_broadsword", "tower_shield", "garrison_plate"]
      special: "Grimholt gate keys — literal and figurative access to the fortress"
    lore: "Tormund has guarded Grimholt's main gate for eleven years. Before that, he guarded a sheep pen, which he performed with exactly the same level of dedication. Ordovast recognized in him the rarest quality in a soldier: absolute, unquestioning reliability. Tormund does not think about politics or power. He thinks about the gate and whether it is closed."
    associated_locations: ["Grimholt"]
    associated_chains: ["iron_grip"]
    image_prompt: |
      An enormous blond man in polished garrison plate and great helm
      standing in a stone gateway, tower shield planted in front of him,
      broadsword at rest in his right hand. Small blue eyes visible
      through the helm slit. Immovable stance. Grimholt's stone walls
      behind him. Steel and grey palette, cold daylight. The gate is
      closed.

