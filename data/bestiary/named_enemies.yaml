  - id: "BOS_SUPER_01"
    name: "The Barrow-King of Raven's Perch"
    category: "boss"
    subcategory: "supernatural_boss"
    tier: 5
    named: true
    description: "What sits on the stone throne in the deepest chamber of Raven's Perch barrow was a jarl once. The remnants are there — a gold torc green with age, rings fused to the finger bones, a sword across the knees that has not rusted in three centuries. The body is desiccated to leather over iron-hard bone, but the eyes are not dead. They burn with a pale blue light that follows movement. The jaw moves. It speaks in a language that is almost recognizable — Old Norse degraded by centuries of talking to no one. It remembers being a king. It still expects obedience."
    stats:
      MIG: 8
      NIM: 4
      TOU: 9
      WIT: 6
      WIL: 8
      WYR: 5
    hp: 26
    skills:
      - name: "Swords"
        rank: 5
      - name: "Command"
        rank: 4
      - name: "Intimidation"
        rank: 5
      - name: "Seidr-Sense"
        rank: 3
    gear:
      weapons:
        - name: "King's Blade"
          type: "sword"
          speed: 3
          base_damage: 8
      armor:
        torso: "Ancient Mail (fused to body)"
        head: "Crown of Corroded Gold"
    tactics: "Sits and waits. Commands lesser draugr to deal with intruders. Those who reach the throne room face the Barrow-King's sword — three centuries of unliving practice have made it flawless. Fights without urgency because time is meaningless to it. Will attempt to command the living to kneel — and the command carries supernatural weight."
    morale_break: "Cannot be routed. Can be temporarily driven from its throne by fire or consecrated weapons. Returns within d6 hours. Permanent destruction requires destroying the throne, the torc, and the barrow's keystone."
    group_size: "1 (with 6-12 barrow draugr and 2-4 barrow sentinels)"
    abilities:
      - "King's Command: WIL test at -2 or kneel for one round — affects all within the throne room"
      - "Death-Grip Sword: attacks ignore 2 points of armor"
      - "Raise Dead: once per day, command d4 buried corpses to rise as Restless Dead"
      - "Deathless: regenerates 2 HP per round unless throne is destroyed"
      - "Grave-Cold Aura: all living creatures within the barrow suffer -1 TOU"
    resistances:
      ["cold", "fear", "bleeding", "poison", "physical_weapons_half_damage"]
    weaknesses:
      [
        "fire",
        "consecrated_weapons",
        "destroying the throne and torc ends its binding",
        "sunlight — weakened above ground",
      ]
    loot:
      silver_range: [100, 300]
      items: ["kings_blade", "corroded_gold_torc", "burial_rings"]
      special: "Barrow-King's map stone — reveals locations of connected barrows in the region"
    lore: "Jarl Halvdan of Raven's Perch died during the great plague and was buried with full honors in a barrow meant to keep him comfortable in the afterlife. Something went wrong. Whether it was the manner of death, a flawed binding rite, or something that was already in the hill, Halvdan did not stay dead. The barrow has been sealed and reopened three times in three centuries. Each time, the king is on his throne. Each time, there are more dead in the halls."
    associated_locations: ["Raven's Perch"]
    associated_chains: ["waking_barrows"]
    image_prompt: |
      A desiccated corpse in ancient fused mail sitting on a stone throne
      in a dark underground chamber. A corroded gold torc, rings fused to
      finger bones. A sword across the knees, unrusted. Pale blue light
      burning in the eye sockets. Lesser draugr standing motionless in the
      shadows along the walls. Cold blue and gold palette, damp stone.

  - id: "BOS_SUPER_02"
    name: "The Draugr-Jarl Beneath Frostfjord"
    category: "boss"
    subcategory: "supernatural_boss"
    tier: 5
    named: true
    description: "The oldest barrow in the region lies beneath Frostfjord Hollow. What dwells in its deepest chamber predates the settlement above by centuries. It was not buried gently. The body is pinned to a stone slab with iron stakes through shoulder, hip, and ankle — a binding that has held for five hundred years and is now failing. The iron is flaking. The thing on the slab is moving. Incrementally. Each year, a little more. Its mouth opens and closes on words with no sound. Its eyes are gone — empty sockets that leak a cold so profound it crystallizes the moisture in the air. When the stakes fail, it will stand. It has been thinking about what it will do for a very long time."
    stats:
      MIG: 9
      NIM: 2
      TOU: 10
      WIT: 7
      WIL: 9
      WYR: 6
    hp: 30
    skills:
      - name: "Brawl"
        rank: 5
      - name: "Seidr"
        rank: 4
      - name: "Command"
        rank: 5
      - name: "Intimidation"
        rank: 5
    gear:
      weapons:
        - name: "Grave-Hands"
          type: "unarmed"
          speed: 2
          base_damage: 8
      armor:
        torso: "Petrified Flesh (stone-hard)"
        head: "Iron Stakes (embedded)"
    tactics: "When unbound: moves slowly but with absolute purpose. Grabs and crushes. Calls every dead thing within a mile to defend it. Does not dodge, does not parry — absorbs damage like stone absorbing rain. Its real attack is the cold: standing near it kills. Speaks in a voice that commands the dead to rise. The fight is a race against attrition."
    morale_break: "Cannot be routed or reasoned with. Can be re-bound with the original iron stakes and a binding rite — but the rite requires knowledge no living person has without research."
    group_size: "1 (with all undead within the barrow complex — potentially 20-30 draugr)"
    abilities:
      - "Killing Cold: all living creatures within 5m take 1 damage per round (ignores armor)"
      - "Mass Command: all undead within earshot obey without contest"
      - "Iron-Bound: while stakes remain, cannot move but can still use voice abilities"
      - "Petrified Flesh: physical weapons deal half damage; blunt weapons deal full"
      - "Voice of the Dead: WIL test at -3 or take no action for one round — hearing the voice overwrites thought"
      - "Slow Rise: if unbound, takes d6 rounds to reach full mobility — vulnerable during this time"
    resistances:
      ["cold", "fear", "bleeding", "poison", "edged_weapons_half_damage"]
    weaknesses:
      [
        "fire — full damage",
        "iron stakes — can re-bind with original ritual",
        "the binding rite — knowledge exists in the Grave Wardens' records",
        "blunt weapons — full damage against petrified flesh",
      ]
    loot:
      silver_range: [0, 100]
      items: ["iron_binding_stakes", "bone_dust"]
      special: "The barrow contains a sealed inner vault — its contents are unknown and probably terrible"
    lore: "The settlement of Frostfjord Hollow was built above this barrow by people who did not know it was there. By the time they found it, they had already built the mead hall. The elders decided to keep the secret. They maintained the iron stakes. They passed the knowledge down. Three generations ago, the last elder died before passing the rite. Now the stakes are failing, the cellar of the mead hall gets colder every winter, and no one in Frostfjord understands why."
    associated_locations: ["Frostfjord Hollow"]
    associated_chains: ["waking_barrows"]
    image_prompt: |
      A massive petrified corpse pinned to a stone slab by rusted iron
      stakes through shoulder, hip, and ankle. Empty eye sockets leaking
      crystalline cold. Mouth moving silently. The iron is flaking, the
      body straining against the pins. Frost on every surface. Deep
      underground chamber, stone walls slick with ice. Blue-white and
      iron-black palette. Absolute cold.

  - id: "BOS_SUPER_03"
    name: "The Veil-Walker"
    category: "boss"
    subcategory: "supernatural_boss"
    tier: 5
    named: true
    description: "Not a creature. Not a spirit. Something that exists in the space between the barrow-dark and the living world, pressing against a membrane that should be thicker than it is. Glimpsed only where the veil is thin — barrow mouths at solstice, the edge of fog banks, the space between two mirrors. The shape is wrong in a way that resists description: too many angles, proportions that shift when observed directly. The impression is of something tall and thin and patient, with hands — if they are hands — that reach but do not quite touch. It leaves an aftertaste of copper and the memory of a sound you cannot identify."
    stats:
      MIG: 3
      NIM: 8
      TOU: 5
      WIT: 10
      WIL: 10
      WYR: 9
    hp: 15
    skills:
      - name: "Seidr"
        rank: 5
      - name: "Stealth"
        rank: 5
      - name: "Lore"
        rank: 5
      - name: "Seidr-Sense"
        rank: 5
    gear:
      weapons:
        - name: "Veil-Touch"
          type: "supernatural"
          speed: 4
          base_damage: 4
      armor: {}
    tactics: "Does not fight in any conventional sense. The Veil-Walker manipulates probability, perception, and the boundary between worlds. Targets a person's sense of reality — are you sure that shadow was there before? Was that doorway always on the left? It creates situations where its targets destroy themselves through paranoia, mistrust, or walking into spaces that no longer connect to the world they left."
    morale_break: "Cannot be confronted in the conventional sense. It retreats through the veil when directly engaged. It can be sealed behind the veil by repairing the weak points — but new weak points keep opening."
    group_size: "1"
    abilities:
      - "Veil-Step: can disappear and reappear at any thin-veil location within the region"
      - "Reality Distortion: WIT test at -3 or perceive surroundings incorrectly for d6 minutes"
      - "Veil-Touch: physical contact drains WIL — d4 WIL damage, no armor"
      - "Phase: partially incorporeal — physical weapons have 50% chance of passing through"
      - "Alien Mind: immune to all mental effects — its thoughts are not structured like mortal minds"
      - "Thin the Veil: over time, its presence weakens the barrier — more undead rise, more spirits manifest"
    resistances:
      [
        "physical_weapons_unreliable",
        "cold",
        "fear",
        "fire_reduced",
        "seidr_standard",
      ]
    weaknesses:
      [
        "iron cold-forged — full damage and prevents phase for d6 rounds",
        "sealing the veil locations cuts off its anchor points",
        "bright sunlight — cannot manifest in direct noon sun",
        "it is curious — this can be exploited",
      ]
    loot:
      silver_range: [0, 0]
      items: ["veil_residue"]
      special: "Where the Veil-Walker lingers, the boundary thins permanently — creating new barrow-mouths and spirit-roads"
    lore: "The Pale Widow knows about it. Bryn Ashmouth has seen its traces in four barrows. The oldest sagas mention something that walked between the worlds during the long winters, when the days were short and the dead were close. Whether the Veil-Walker is one entity or a category of entity is unclear. What is clear: the boundary is weakening across the region, and this thing is either the cause or the first symptom."
    associated_locations: ["Frostfjord Hollow", "Raven's Perch", "Ashen Reach"]
    associated_chains: ["waking_barrows", "widows_web"]
    image_prompt: |
      A tall, thin shape with too many angles standing at the mouth of a
      barrow in thick fog. The proportions shift when viewed directly.
      Hands that reach but do not touch. The space around it bends subtly.
      Copper-tinted light at the edges. Fog and stone and wrongness.
      Not fantasy — cosmic folk horror. The shape is patient. The shape
      has been here longer than the barrow.

  - id: "BOS_SUPER_04"
    name: "Runa Veil-Touched"
    category: "boss"
    subcategory: "supernatural_boss"
    tier: 4
    named: true
    description: "Once she had a name people spoke without flinching. Now they call her the Renegade Seidr-Wife and check the locks. She is gaunt — cheekbones like blades under papery skin marbled with blue veins. White hair in matted ropes to her waist. Her fingers are stained black to the second knuckle from working with barrow-things. She wears layers of undyed wool and a belt of small bones that click when she moves. Her eyes are different colors: one brown, one the milky blue-white of the veil-touched. She twitches. She laughs at things no one else can see."
    stats:
      MIG: 2
      NIM: 4
      TOU: 3
      WIT: 7
      WIL: 7
      WYR: 7
    hp: 9
    skills:
      - name: "Seidr"
        rank: 4
      - name: "Lore"
        rank: 4
      - name: "Stealth"
        rank: 3
      - name: "Survival"
        rank: 3
      - name: "Healing"
        rank: 2
    gear:
      weapons:
        - name: "Barrow Bone Staff"
          type: "seidr_focus"
          speed: 2
          base_damage: 3
        - name: "Herb Knife"
          type: "knife"
          speed: 2
          base_damage: 2
      armor:
        torso: "Layered Wool (warded)"
        head: "None"
    tactics: "Avoids combat entirely. Lives in the margins — swamp edges, abandoned barrow entrances, the deep woods nobody enters. If found, she uses confusion seidr and flees. If cornered, she bargains with information — she knows more about the barrows than anyone alive. If truly pressed, she calls bound things from the ground. The bound things are not pleasant."
    morale_break: "Flees at any sign of organized pursuit. Will trade information for safety — including information about the Pale Widow."
    group_size: "1 (with 2-4 bound lesser undead and occasional spirit servants)"
    abilities:
      - "Barrow-Speech: can communicate with undead — not control, communicate"
      - "Confusion Fog: seidr that creates d6 rounds of disorientation in a 10m area"
      - "Death-Sight: can see the recently dead, their manner of death, and what binds draugr"
      - "Bind Minor Dead: can command up to 4 lesser undead (Restless Dead tier)"
      - "Herb-Craft: creates potions, poultices, and poisons from barrow flora"
    resistances: ["cold", "seidr_detection_difficult"]
    weaknesses:
      [
        "physically frail — one solid hit could kill her",
        "unstable — loud noises, bright light, or iron can break her concentration",
        "lonely — can be manipulated through genuine human contact",
      ]
    loot:
      silver_range: [5, 20]
      items: ["barrow_bone_staff", "herb_pouch", "veil_stone_fragment"]
      special: "Her knowledge — barrow locations, undead behaviors, Pale Widow's weaknesses, veil-thin locations"
    lore: "Runa was a respected healer in Skaldhaven until she started going into the barrows alone. She came back different each time — knowing more, sleeping less, talking to people who weren't there. When she started bringing things back from the barrows — bound dead that followed her like dogs — the town drove her out. She has been living in the wild for seven years, going deeper into the barrows, trading with things that should not be traded with. She is not evil. She is a scholar standing at the edge of a cliff and leaning forward."
    associated_locations: ["Skaldhaven", "Frostfjord Hollow"]
    associated_chains: ["waking_barrows", "widows_web"]
    image_prompt: |
      A gaunt woman with white matted hair and mismatched eyes — one brown,
      one milky blue-white — in layered undyed wool. Black-stained fingers
      gripping a staff made from barrow bone. Belt of small clicking bones.
      Standing at the edge of a swamp near a barrow entrance. Two grey
      shapes — lesser draugr — standing motionless behind her. Green-grey
      palette, mist, failing light.

  # ==========================================================================
  # OTHER NAMED ANTAGONISTS (BOS_OTHER_01 through BOS_OTHER_03)
  # ==========================================================================

  - id: "BOS_OTHER_01"
    name: "Iron Inge"
    category: "boss"
    subcategory: "other_named"
    tier: 3
    named: true
    description: "Tall woman with an angular face and grey-blonde hair pulled back so tightly it stretches the skin at her temples. Dresses in black wool, well-made but plain. A single iron ring on each finger — her only adornment and her signature. Voice flat, inflectionless, like she is reading terms from a contract, which she essentially always is. Her eyes track debt the way a hawk tracks a vole. She does not hurry. She does not need to."
    stats:
      MIG: 3
      NIM: 4
      TOU: 4
      WIT: 7
      WIL: 7
      WYR: 1
    hp: 10
    skills:
      - name: "Bargain"
        rank: 4
      - name: "Intimidation"
        rank: 3
      - name: "Knives"
        rank: 2
      - name: "Persuasion"
        rank: 3
      - name: "Lore"
        rank: 2
    gear:
      weapons:
        - name: "Hidden Knife"
          type: "knife"
          speed: 2
          base_damage: 3
      armor:
        torso: "Black Wool (no armor)"
        head: "None"
    tactics: "Does not fight herself. Inge employs two enforcers and maintains a network of informants in every settlement where she holds debts. She corners targets through social and economic pressure — hiring their employers, turning their friends, closing their lines of credit. If physical violence is necessary, her enforcers handle it. She watches."
    morale_break: "Withdraws if enforcers are defeated. Returns with legal backing — a jarl's writ, a thegn's warrant. She does not forget."
    group_size: "1 (with 2 enforcers and a network of informants)"
    abilities:
      - "Debt Register: knows the financial obligations of every mercenary band and most freeholders in the region"
      - "Social Pressure: can apply economic disadvantage — target pays +20% for all goods in settlements where Inge has influence"
      - "Patient Hunter: if target flees, Inge arrives at their next destination within a week"
      - "Iron Rings: her rings are weighted — improvised weapon, d2+1 damage in a surprise punch"
    resistances: ["intimidation — has heard every threat"]
    weaknesses:
      [
        "physically unremarkable — dangerous only through her network",
        "relies on rule of law — in lawless areas her leverage vanishes",
        "obsessive record-keeping — her ledger is her vulnerability",
      ]
    loot:
      silver_range: [30, 100]
      items: ["iron_rings", "debt_ledger", "hidden_knife"]
      special: "Debt ledger — contains the financial secrets of dozens of people, including Kell's history"
    lore: "Inge began as a money-lender's clerk in Grimholt and learned that debt is a more reliable weapon than steel. She operates independently, buying debts from merchants and jarls at discount and collecting at full value. She is hunting one of the player band's members — Kell — for a debt incurred two years ago that has been compounding. She is not cruel. She is relentless. There is a difference that does not matter to the debtor."
    associated_locations: ["Grimholt", "Feldwick", "Stonebay Hamlet"]
    associated_chains: ["kells_debt"]
    image_prompt: |
      A tall angular woman in plain black wool with grey-blonde hair pulled
      back tightly. Iron rings on every finger. Flat expression, hawk eyes.
      Standing in a market square with a leather-bound ledger under one arm.
      Two broad-shouldered men in plain clothes behind her. Muted palette —
      black, grey, iron. Cold daylight.

  - id: "BOS_OTHER_02"
    name: "Halldor the Pure"
    category: "boss"
    subcategory: "other_named"
    tier: 4
    named: true
    description: "Broad-chested man with a shaved head and a beard trimmed to a rigid square. Face mapped with self-inflicted scars — ritual cuts, disciplined rows along jaw and forehead. Wears a white surcoat over chain mail, stained but meticulously mended. An iron hammer pendant the size of a fist hangs at his throat. Eyes like heated metal — conviction without doubt. Moves like a man who has never questioned a single decision. His hands are clean. The hands of his followers are not."
    stats:
      MIG: 6
      NIM: 4
      TOU: 6
      WIT: 5
      WIL: 8
      WYR: 1
    hp: 18
    skills:
      - name: "Axes"
        rank: 3
      - name: "Command"
        rank: 4
      - name: "Intimidation"
        rank: 4
      - name: "Persuasion"
        rank: 3
      - name: "Lore"
        rank: 2
    gear:
      weapons:
        - name: "Purifier"
          type: "axe"
          speed: 3
          base_damage: 6
        - name: "Iron-Bound Shield"
          type: "shield"
          speed: 0
          base_damage: 2
      armor:
        torso: "Chain Mail"
        head: "Iron Half-Helm"
    tactics: "Fights in formation with his followers, shield-wall drill. Targets seidr users first, always. Uses his authority to demand surrender before combat — and means it. Fights with mechanical precision and no joy. In his mind, he is performing a necessary service. He will burn a village to kill one witch if he believes it saves the region."
    morale_break: "Does not flee from seidr-tainted enemies — considers retreat a spiritual failure. Will withdraw from mundane opponents if outmatched. His followers scatter if he falls."
    group_size: "1 (with 8-15 witch-hunter followers)"
    abilities:
      - "Iron Conviction: immune to seidr that targets WIL — his faith is absolute"
      - "Purifying Strike: attacks against seidr users deal +2 damage"
      - "Zealot's Call: once per combat, all followers gain +1 to attack rolls for 3 rounds"
      - "Seidr-Sense: can detect recent seidr use in a location — not precise, but reliable"
    resistances: ["fear", "seidr_wil_based"]
    weaknesses:
      [
        "rigid thinking — cannot adapt to unexpected situations",
        "collateral damage — his methods create enemies",
        "can be turned against other factions by convincing him they harbor seidr users",
      ]
    loot:
      silver_range: [20, 60]
      items: ["purifier_axe", "iron_hammer_pendant", "chain_mail"]
      special: "List of suspected seidr users — some accurate, many not"
    lore: "Halldor lost his family to a seidr-curse three years ago — or believes he did. A fever took his wife and daughter in a single week, and a völva's charm was found under the doorstep. Whether the charm caused the fever or someone placed it after is irrelevant to Halldor. He has since gathered followers who share his conviction that seidr is a corruption to be burned out. The Iron Grip tolerates him because he is useful. The Pale Widow watches him because he is dangerous to her network."
    associated_locations: ["Thornwall", "Grimholt"]
    associated_chains: ["witch_hunts", "widows_web"]
    image_prompt: |
      A broad-chested man with shaved head and ritual scars in rows along
      his jaw and forehead. White surcoat over chain mail, iron hammer
      pendant at his throat. Iron half-helm. Holding an axe and iron-bound
      shield. Standing before a burning pyre. Followers in white behind him.
      Orange firelight against dark sky. Absolute certainty in his face.

  - id: "BOS_OTHER_03"
    name: "Jarl Halvar the Vain"
    category: "boss"
    subcategory: "other_named"
    tier: 3
    named: true
    description: "Handsome in a way that has curdled — features too fine, too maintained, the product of a life spent avoiding anything that might scar. Oiled brown hair, a trimmed beard, soft hands heavy with silver rings. Wears dyed wool and imported linen, fur-trimmed cloak pinned with a gold brooch shaped like a stag. Smells of imported oils. His smile shows too many teeth and never reaches his watery blue eyes. He has the build of a man who eats well and fights never."
    stats:
      MIG: 3
      NIM: 3
      TOU: 3
      WIT: 6
      WIL: 4
      WYR: 1
    hp: 8
    skills:
      - name: "Bargain"
        rank: 4
      - name: "Persuasion"
        rank: 4
      - name: "Command"
        rank: 2
      - name: "Intimidation"
        rank: 1
    gear:
      weapons:
        - name: "Ornamental Sword"
          type: "sword"
          speed: 3
          base_damage: 4
      armor:
        torso: "Fine Wool (no armor)"
        head: "None"
    tactics: "Halvar does not fight. Has never been in a fight. If physically threatened, he offers money, titles, land — whatever it takes to survive the next five minutes. He is most dangerous in political settings, where he lies with fluid ease, makes promises he will break, and sells information about his own people to whoever pays most. His guard contingent fights for pay, not loyalty."
    morale_break: "Surrenders immediately when threatened. Offers bribes. If imprisoned, begins negotiating his release before the cell door closes."
    group_size: "1 (with 4-6 household guards)"
    abilities:
      - "Silver Tongue: +3 to Persuasion and Bargain when lying"
      - "Political Immunity: killing a jarl has consequences — other jarls unite against the killer"
      - "Informant Network: sells information to all factions — knows more than he should"
      - "Slippery: once per scene, avoid consequences of a failed Bargain roll by shifting blame"
    resistances: []
    weaknesses:
      [
        "coward — crumbles under physical threat",
        "vain — can be manipulated through flattery",
        "universally despised — his people would not lift a finger to save him",
      ]
    loot:
      silver_range: [80, 250]
      items: ["gold_stag_brooch", "ornamental_sword", "silver_rings"]
      special: "Jarl's treasury — tax revenue, trade agreements, and a record of every bribe he has taken and given"
    lore: "Halvar inherited the jarldom of Skaldhaven from his father, who earned it by fighting. Halvar has spent his tenure selling timber rights to the Silent Oar, grain contracts to the Iron Grip, and protection promises to the Fjord Compact — all simultaneously, all contradictory. His people starve while he imports southern wine. He is a political obstacle because removing him requires either a legitimate challenger or a willingness to murder a jarl and accept the consequences."
    associated_locations: ["Skaldhaven"]
    associated_chains: ["fjord_compact", "iron_grip"]
    image_prompt: |
      A handsome but soft-featured man in dyed wool and fur-trimmed cloak,
      gold stag brooch, too many silver rings, oiled brown hair. Sitting in
      a carved chair in a longhouse, cups of wine on the table. Watery blue
      eyes, calculating smile. Imported tapestries on the walls while the
      settlement outside looks poor. Warm interior light, rich colors that
      feel wrong. A man who eats while others starve.
