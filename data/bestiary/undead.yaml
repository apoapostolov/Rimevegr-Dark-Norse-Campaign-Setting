enemies:
  # ==========================================================================
  # DRAUGR (UND_DRAUGR_01 through UND_DRAUGR_05)
  # ==========================================================================

  - id: "UND_DRAUGR_01"
    name: "Restless Dead"
    category: "undead"
    subcategory: "draugr"
    tier: 2
    description: "A grey-skinned corpse still wearing its burial tunic, jaw hanging loose on one hinge of tendon. Dirt packed under split fingernails. The eyes are clouded but track movement. Smells of cold earth and something sweetly rotten underneath."
    stats:
      MIG: 5
      NIM: 2
      TOU: 5
      WIT: 1
      WIL: 3
      WYR: 2
    hp: 8
    skills:
      - name: "Brawl"
        rank: 2
      - name: "Intimidation"
        rank: 1
    gear:
      weapons:
        - name: "Grave-Cold Fists"
          type: "unarmed"
          speed: 1
          base_damage: 4
      armor:
        torso: "Burial Shroud"
        head: "None"
    tactics: "Lurches toward the nearest living thing. Grabs and squeezes. No feints, no dodging. Walks through minor wounds without flinching."
    morale_break: "Does not flee. Destroyed at 0 HP."
    group_size: "1-3"
    abilities:
      - "Deathgrip: MIG contest to escape grapple at -1"
      - "Unfeeling: ignores pain penalties from wounds"
    combat_phases:
      pre_battle:
        - name: "Grave Moan"
          description: "Low grinding sound from the earth; WIL test or -1 to initiative from dread."
      maneuvers:
        - name: "Deathgrip Lock"
          description: "On successful grapple, grip tightens automatically — d4 damage per round, MIG test at -2 to break."
          cost: "Replaces attack"
      on_death:
        - name: "Death Rattle"
          description: "Collapses with a final moan; all undead within 30 paces are alerted to the living's presence."
    resistances: ["cold", "fear", "bleeding"]
    weaknesses: ["fire", "decapitation", "sunlight"]
    is_undead: true
    sim_traits: ["unfeeling", "deathgrip_1", "death_rattle", "grave_moan"]
    encounter_conditions:
      season: ["autumn", "winter"]
    loot:
      silver_range: [0, 5]
      items: ["burial_ring", "grave_dirt"]
    image_prompt: |
      A grey-skinned corpse in a torn linen burial shroud, standing in a
      shallow barrow opening. Jaw hangs at an angle, clouded eyes reflecting
      faint torchlight. Dirt under cracked fingernails. Cold blue-grey palette,
      underground stone walls with condensation. Dim amber light from off-frame
      torch.

  - id: "UND_DRAUGR_02"
    name: "Barrow Draugr"
    category: "undead"
    subcategory: "draugr"
    tier: 3
    description: "Centuries in the dark have hardened this thing. Skin like boiled leather stretched over dense bone. Patches of rusted mail fused to the torso where flesh grew around the rings. Moss in the eye sockets. It moves with terrible purpose."
    stats:
      MIG: 6
      NIM: 3
      TOU: 7
      WIT: 2
      WIL: 4
      WYR: 3
    hp: 12
    skills:
      - name: "Brawl"
        rank: 3
      - name: "Intimidation"
        rank: 2
    gear:
      weapons:
        - name: "Corroded Sword"
          type: "sword"
          speed: 2
          base_damage: 5
      armor:
        torso: "Fused Rusted Mail"
        head: "None"
    tactics: "Guards its section of barrow. Stands motionless until intruders cross a threshold, then attacks the closest. Pursues through corridors but will not leave the barrow."
    morale_break: "Does not flee. Destroyed at 0 HP. Returns to resting position if intruders retreat beyond threshold."
    group_size: "1-2"
    abilities:
      - "Deathgrip: MIG contest to escape grapple at -2"
      - "Terrifying Presence: WIL test or -1 to all actions first round"
      - "Dark-Hardened: +1 TOU when inside barrow"
    combat_phases:
      pre_battle:
        - name: "Terrifying Rise"
          description: "Rises from burial position, dust cascading; all witnesses WIL test or lose first action."
      maneuvers:
        - name: "Crushing Embrace"
          description: "MIG contest, on success deals d8 and target cannot breathe — TOU test each round or black out."
          cost: "Replaces attack"
      bloodied:
        - name: "Relentless Advance"
          trigger: "Below 50% HP"
          description: "Ignores all wound penalties, moves toward nearest living target regardless of obstacles, +1 MIG from fury."
      on_death:
        - name: "Burial Curse"
          description: "Anyone who looted the barrow must WIL test or suffer nightmares for d6 nights (no natural healing during that time)."
    resistances: ["cold", "fear", "bleeding", "poison"]
    weaknesses: ["fire", "silver", "sunlight"]
    is_undead: true
    sim_traits:
      [
        "unfeeling",
        "terrifying_presence",
        "deathgrip_2",
        "dark_hardened",
        "relentless_advance",
      ]
    encounter_conditions:
      season: ["any"]
    loot:
      silver_range: [2, 10]
      items: ["corroded_sword", "burial_arm_ring", "tarnished_brooch"]
    image_prompt: |
      A leather-skinned corpse standing in a stone barrow corridor, rusted
      mail rings embedded in dried flesh around the torso. Moss fills the
      eye sockets. A corroded sword hangs in one fist. Tight underground
      space, carved stone walls with crude runes. Single torch guttering
      in the distance. Dark greens and rust-browns.

  - id: "UND_DRAUGR_03"
    name: "Draugr Warrior"
    category: "undead"
    subcategory: "draugr"
    tier: 3
    description: "This one remembers how to fight. The body is withered and stiff but the sword arm moves with drilled precision. Shield still strapped to the left forearm, wood rotted but the iron boss intact. It parries. It counters. It does not tire."
    stats:
      MIG: 5
      NIM: 4
      TOU: 6
      WIT: 3
      WIL: 4
      WYR: 3
    hp: 10
    skills:
      - name: "Swords"
        rank: 3
      - name: "Shields"
        rank: 2
      - name: "Brawl"
        rank: 2
    gear:
      weapons:
        - name: "Notched Long Sword"
          type: "sword"
          speed: 3
          base_damage: 6
      armor:
        torso: "Rotted Leather over Mail Fragments"
        head: "Corroded Helmet"
        shield: "Cracked Round Shield"
    tactics: "Fights with retained martial skill. Uses shield to block, then counterattacks. Targets opponents who turn their backs. Will pursue fleeing enemies within the barrow."
    morale_break: "Does not flee. Destroyed at 0 HP."
    group_size: "1-2"
    abilities:
      - "Combat Memory: retains trained weapon skills from life"
      - "Relentless Pace: ignores movement penalties from wounds"
      - "Shield Bash: can shove opponent back with shield, NIM test or fall prone"
    combat_phases:
      pre_battle:
        - name: "Shield Wall Memory"
          description: "If 2+ draugr warriors present, they instinctively form a shield wall from their living memory."
      maneuvers:
        - name: "Shield Bash Stagger"
          description: "On successful shield bash, target also drops held weapon — NIM test to keep grip."
          cost: "Replaces attack"
        - name: "Combat Memory Riposte"
          description: "After being hit, immediately counter-attacks at +2."
          cost: "Once per encounter"
      bloodied:
        - name: "Last Stand Formation"
          trigger: "Below 50% HP"
          description: "Fights with +1 NIM and +1 to parry from instinctive combat technique, as if remembering its finest battle."
      on_death:
        - name: "Weapon Throw"
          description: "With its last breath, hurls weapon at the nearest living enemy; auto-attack at base damage."
    resistances: ["cold", "fear", "bleeding"]
    weaknesses: ["fire", "silver", "decapitation"]
    is_undead: true
    sim_traits:
      [
        "unfeeling",
        "combat_memory",
        "last_stand",
        "weapon_throw_on_death",
        "shield_wall_memory",
      ]
    encounter_conditions:
      season: ["any"]
    loot:
      silver_range: [3, 12]
      items: ["notched_sword", "corroded_helmet", "shield_boss"]
    image_prompt: |
      A desiccated warrior corpse in a fighting stance inside a barrow
      chamber. Rotted leather armor over fragments of mail. A notched long
      sword held at guard, a cracked round shield with a dull iron boss on
      the other arm. Corroded helmet with nose guard. Tight stone room
      with burial niches in the walls. Amber torchlight on grey dead skin.

  - id: "UND_DRAUGR_04"
    name: "Bloated Draugr"
    category: "undead"
    subcategory: "draugr"
    tier: 2
    description: "Something went wrong in the rotting. The corpse swelled with gas and dark fluid, skin stretched tight and shiny like a drum. Veins visible beneath translucent grey flesh. It moves in lurching steps. The stench is overpowering. When it dies, it bursts."
    stats:
      MIG: 5
      NIM: 1
      TOU: 5
      WIT: 1
      WIL: 3
      WYR: 2
    hp: 8
    skills:
      - name: "Brawl"
        rank: 2
    gear:
      weapons:
        - name: "Swollen Fists"
          type: "unarmed"
          speed: 1
          base_damage: 3
      armor:
        torso: "Distended Skin"
        head: "None"
    tactics: "Shambles toward the nearest target. Tries to grab and hold. When reduced to 0 HP, bursts in a 2-pace radius. Drawn to noise."
    morale_break: "Does not flee. Explodes at 0 HP."
    group_size: "1-2"
    abilities:
      - "Corpse Burst: on death, all within 2 paces take 4 damage (TOU test to halve) and must pass TOU test or be nauseated (-1 to actions for 3 rounds)"
      - "Foul Stench: anyone within 1 pace must pass TOU test each round or suffer -1 to actions"
      - "Slow: always acts last in initiative"
    combat_phases:
      pre_battle:
        - name: "Stench Cloud"
          description: "The smell precedes it by 10 paces; TOU test or nausea (-1 to all actions) while within range."
      maneuvers:
        - name: "Bile Spray"
          description: "Sprays a 3-pace cone of grave-bile; d4 damage and TOU test or blinded for d4 rounds."
          cost: "Replaces attack"
        - name: "Embrace of Rot"
          description: "Grapple attack, coating target in putrid slime — armor corroded, -1 armor value permanently."
          cost: "Replaces attack"
      bloodied:
        - name: "Swelling"
          trigger: "Below 50% HP"
          description: "Body distends grotesquely, expanding; gains +1 TOU but moves at half speed; increases corpse burst damage dice by one step."
    resistances: ["cold", "fear", "bleeding", "piercing"]
    weaknesses: ["fire", "slashing", "decapitation"]
    is_undead: true
    sim_traits:
      [
        "unfeeling",
        "slow_init",
        "foul_stench",
        "corpse_burst_4_2",
        "nauseating_burst",
        "stench_cloud",
      ]
    encounter_conditions:
      season: ["spring", "summer"]
    loot:
      silver_range: [0, 3]
      items: ["grave_dirt", "bloated_organ"]
    image_prompt: |
      A horribly swollen corpse standing in a wet barrow passage. Grey skin
      stretched tight and glossy, dark veins visible beneath. Belly distended,
      limbs puffy. Fluid seeps from cracks in the skin. Mossy stone walls,
      standing water on the floor reflecting a sickly greenish light. Flies
      buzzing in the air.

  - id: "UND_DRAUGR_05"
    name: "Ancient Draugr"
    category: "undead"
    subcategory: "draugr"
    tier: 4
    description: "Older than the barrow it inhabits. The body is nearly mummified, drawn tight over heavy bones, but strength radiates from it like heat from coals. Gold burial jewelry is fused to its neck and wrists. Its eyes glow a faint amber. When it speaks, the words are in a language dead for centuries, but the commands reach every lesser corpse nearby."
    stats:
      MIG: 7
      NIM: 4
      TOU: 7
      WIT: 5
      WIL: 6
      WYR: 5
    hp: 18
    skills:
      - name: "Swords"
        rank: 4
      - name: "Brawl"
        rank: 3
      - name: "Intimidation"
        rank: 3
      - name: "Command"
        rank: 2
    gear:
      weapons:
        - name: "Rune-Etched Sword"
          type: "sword"
          speed: 3
          base_damage: 7
      armor:
        torso: "Ancient Lamellar"
        head: "Bronze Crown-Helm"
    tactics: "Commands lesser undead to engage first while it observes. Identifies the strongest opponent and attacks them directly. Uses commanding voice to raise fallen enemies during the fight. Fights tactically, retreating to chokepoints."
    morale_break: "Does not flee. If reduced below 5 HP, fights with increased ferocity (+1 MIG)."
    group_size: "1 (with 2-4 lesser undead)"
    abilities:
      - "Command Dead: can direct up to 4 lesser undead within earshot as a free action"
      - "Raise Fallen: once per encounter, animate a fresh corpse nearby as a Shambling Corpse"
      - "Terrifying Presence: WIL test at -2 or -2 to all actions for first 2 rounds"
      - "Deathgrip: MIG contest at -2 to escape grapple"
      - "Ancient Resilience: takes half damage from non-magical, non-silver weapons"
    combat_phases:
      pre_battle:
        - name: "Commanding Presence"
          description: "Rises to full height and speaks a single word of power; all lesser undead in earshot activate; living witnesses WIL test at -2 or flee for d4 rounds."
      maneuvers:
        - name: "Galdr Word"
          description: "Barks a rune-word as free action once per 3 rounds; choose: frost bolt (d6 cold damage, 10 paces), terror (force WIL retest on one target), or silence (seidr users cannot cast for 1 round)."
          cost: "Free action"
        - name: "Coordinated Command"
          description: "Directs up to 4 lesser draugr to attack same target this round."
          cost: "Free action"
      bloodied:
        - name: "Ancient Fury"
          trigger: "Below 50% HP"
          description: "+1 MIG, attacks include d4 frost damage on each strike; gains dark sight aura — torches and campfires within 10 paces dim to half brightness."
      on_death:
        - name: "Death Command"
          description: "With final will, commands all remaining undead to focus the one who struck the killing blow; all undead gain +1 MIG for d6 rounds from the fury."
    resistances: ["cold", "fear", "bleeding", "poison", "non-magical weapons"]
    weaknesses: ["fire", "silver", "sunlight", "rune-weapons"]
    is_undead: true
    sim_traits:
      [
        "unfeeling",
        "terrifying_presence",
        "commanding_presence",
        "ancient_resilience",
        "deathgrip_2",
        "ancient_fury",
        "command_dead",
        "raise_fallen_once",
      ]
    encounter_conditions:
      season: ["any"]
    loot:
      silver_range: [20, 80]
      items:
        [
          "rune_etched_sword",
          "gold_arm_ring",
          "bronze_crown_helm",
          "burial_gold",
        ]
    image_prompt: |
      A mummified figure in layered ancient lamellar armor, standing on a
      stone dais in a deep barrow chamber. Gold arm rings fused to withered
      wrists. A bronze crown-helm sits on a skull-tight head. Faint amber
      glow in the eye sockets. A rune-etched sword held point-down. Lesser
      corpses standing motionless in alcoves behind. Carved stone pillars,
      burial offerings at the foot of the dais. Deep shadows, amber and
      cold blue lighting.

  # ==========================================================================
  # HAUGBUI (UND_HAUG_01 through UND_HAUG_03)
  # ==========================================================================

  - id: "UND_HAUG_01"
    name: "Barrow-Bound Spirit"
    category: "undead"
    subcategory: "haugbui"
    tier: 3
    description: "It cannot leave. That is the only mercy. Within the barrow it is absolute — the air thickens when it's near, and the stone seems to lean inward. A figure made of shadow and cold, with the suggestion of a face behind a veil of dark. It hits like a falling wall."
    stats:
      MIG: 6
      NIM: 5
      TOU: 5
      WIT: 4
      WIL: 6
      WYR: 5
    hp: 12
    skills:
      - name: "Brawl"
        rank: 3
      - name: "Intimidation"
        rank: 3
      - name: "Stealth"
        rank: 3
    gear:
      weapons:
        - name: "Grave-Cold Touch"
          type: "supernatural"
          speed: 3
          base_damage: 5
      armor:
        torso: "Incorporeal"
        head: "None"
    tactics: "Waits in the deepest chamber. Attacks intruders who touch burial goods or cross sacred thresholds. Strikes from walls and floor. Retreats into stone if badly wounded, re-emerges when intruders lower their guard."
    morale_break: "Cannot leave barrow. Retreats into stone below 3 HP, re-forms after one hour."
    group_size: "1"
    abilities:
      - "Bound Territory: cannot be lured outside the barrow under any circumstances"
      - "Phase Through Stone: can move through barrow walls and floor"
      - "Grave-Cold Touch: ignores physical armor, deals cold damage directly to HP"
      - "Territorial Fury: +2 MIG when defending the innermost burial chamber"
      - "Choking Darkness: can extinguish all non-magical light sources within 5 paces"
    combat_phases:
      pre_battle:
        - name: "Choking Darkness"
          description: "The torches go out in a radius; supernatural darkness fills the barrow corridor; vision reduced to 1 pace."
      maneuvers:
        - name: "Wall Strike"
          description: "Attacks through solid stone, targeting enemies in adjacent rooms — ignores cover and shield."
          cost: "Replaces attack"
        - name: "Grave-Cold Touch"
          description: "Bypasses armor completely — d6 direct HP damage plus TOU test or -1 NIM from deep cold for 1 hour."
          cost: "Once per encounter"
      bloodied:
        - name: "Desperate Phase"
          trigger: "Below 50% HP"
          description: "Begins phasing rapidly in and out of walls; 50% miss chance on all attacks against it; attacks become erratic but more frequent (2 attacks per round at -2)."
      on_death:
        - name: "Barrow Seal"
          description: "The spirit's destruction destabilizes the local barrow section; doors slam, passages shift; 25% chance a previously open path is now blocked."
    resistances: ["cold", "fear", "bleeding", "physical weapons", "poison"]
    weaknesses: ["fire", "silver", "sunlight", "holy symbols", "rune-weapons"]
    is_undead: true
    sim_traits:
      [
        "unfeeling",
        "phase_through_stone",
        "armor_bypass_supernatural",
        "territorial_fury_barrow",
        "choking_darkness",
      ]
    encounter_conditions:
      terrain: ["barrow"]
      season: ["any"]
    loot:
      silver_range: [5, 20]
      items: ["burial_treasure", "cold_stone_shard"]
    image_prompt: |
      A dark semi-transparent figure coalescing from shadow inside a tight
      barrow chamber. The suggestion of a bearded face and broad shoulders
      behind a veil of darkness. Stone walls glistening with moisture. A
      pile of tarnished burial goods — arm rings, a sword, pottery — on a
      stone shelf behind the figure. No light source visible; the scene
      lit by a faint phosphorescent glow from the walls. Blues, blacks and
      cold greys.

  - id: "UND_HAUG_02"
    name: "Treasure Guardian"
    category: "undead"
    subcategory: "haugbui"
    tier: 4
    description: "Chained to a single object for centuries. The body is gone but the will remains, coiled around a gold torc or a rune-carved blade like smoke around a brand. Touch the treasure and the air splits. A form of compressed rage assembles itself from dust and old bone. It does not negotiate."
    stats:
      MIG: 7
      NIM: 5
      TOU: 6
      WIT: 4
      WIL: 7
      WYR: 6
    hp: 16
    skills:
      - name: "Brawl"
        rank: 4
      - name: "Intimidation"
        rank: 4
    gear:
      weapons:
        - name: "Spectral Fists"
          type: "supernatural"
          speed: 3
          base_damage: 7
      armor:
        torso: "Partially Incorporeal"
        head: "None"
    tactics: "Dormant until its linked artifact is touched or moved. Manifests instantly and attacks the thief. Ignores all others unless they intervene. Will pursue anywhere within the barrow. If artifact is removed from the barrow, follows to the threshold and shrieks."
    morale_break: "Does not flee. If linked artifact is returned to its resting place, immediately goes dormant. Destroyed at 0 HP but re-forms in 1d6 days unless artifact is removed or destroyed."
    group_size: "1"
    abilities:
      - "Artifact Bond: linked to one specific treasure, dormant until it is disturbed"
      - "Manifest Fury: attacks at +2 MIG in the round it first manifests"
      - "Spectral Strike: bypasses physical armor, resisted only by magical protection"
      - "Regeneration: regains 2 HP per round while within 5 paces of linked artifact"
      - "Banshee Shriek: once per encounter, all within 10 paces test WIL at -2 or flee for 1 round"
    combat_phases:
      pre_battle:
        - name: "Artifact Flare"
          description: "The bonded artifact(s) pulse with light; any who touched the treasure feel a burning pain and must drop it (WIL test to resist)."
      maneuvers:
        - name: "Manifest Storm"
          description: "Spectral energy erupts in 5-pace radius — d6 damage to all, WIL test to halve."
          cost: "Replaces attack"
        - name: "Treasure Chain"
          description: "An invisible force drags a stolen artifact back toward its resting place — carrier must MIG test or be pulled 5 paces toward the barrow center."
          cost: "Once per encounter"
      bloodied:
        - name: "Spectral Expansion"
          trigger: "Below 50% HP"
          description: "Form grows larger and more terrible; gains 5-pace Banshee Shriek aura that deals d4 fear damage per round to all living; artifact regeneration doubles."
      on_death:
        - name: "Treasure Curse"
          description: "All artifacts bonded to this guardian become cursed for d6 weeks; holders suffer -1 WIL and hear whispering; only blood sacrifice or seidr ritual breaks the curse."
    resistances: ["cold", "fear", "bleeding", "physical weapons", "poison"]
    weaknesses:
      [
        "fire",
        "silver",
        "rune-weapons",
        "removing the linked artifact from barrow",
      ]
    is_undead: true
    sim_traits:
      [
        "unfeeling",
        "armor_bypass_supernatural",
        "dormant_trigger",
        "deathgrip_2",
      ]
    encounter_conditions:
      terrain: ["barrow"]
      season: ["any"]
    loot:
      silver_range: [20, 50]
      items: ["linked_artifact", "bone_dust", "spectral_residue"]
    image_prompt: |
      A violent spectral form erupting from a gold torc sitting on a stone
      pedestal inside a barrow vault. The figure is half-formed — skull face,
      trailing ribcage, arms ending in claw-like hands reaching outward.
      Dust and bone fragments spiraling in the air. The gold torc glowing
      faintly beneath the apparition. Carved stone vault, other burial goods
      undisturbed on shelves. Violent motion blur, cold blue-white energy,
      dark stone background.

  - id: "UND_HAUG_03"
    name: "Whispering Haugbui"
    category: "undead"
    subcategory: "haugbui"
    tier: 3
    description: "You hear it before you see it. A voice in the dark, speaking your name. Promising warmth, treasure, the way out. The words are reasonable. The voice is your mother's, your brother's, your dead friend's. When you follow the sound to the deepest room, the walls close and the thing in the corner stops pretending."
    stats:
      MIG: 5
      NIM: 4
      TOU: 5
      WIT: 5
      WIL: 6
      WYR: 5
    hp: 10
    skills:
      - name: "Brawl"
        rank: 2
      - name: "Intimidation"
        rank: 3
      - name: "Deception"
        rank: 4
      - name: "Stealth"
        rank: 3
    gear:
      weapons:
        - name: "Cold Grasp"
          type: "supernatural"
          speed: 2
          base_damage: 5
      armor:
        torso: "Semi-Incorporeal"
        head: "None"
    tactics: "Lures intruders deeper into the barrow using mimicked voices of their loved ones. Creates false sounds of treasure or escape. Once victims are isolated and deep, attacks from behind. Prefers to separate groups."
    morale_break: "Does not flee. Retreats into stone if reduced below 3 HP. Cannot leave barrow."
    group_size: "1"
    abilities:
      - "Voice Mimicry: perfectly imitates any voice the target has heard; WIT test at -2 to recognize as false"
      - "Luring Whisper: WIL test or compelled to move toward the voice for 1 round"
      - "Ambush Strike: +3 damage on first attack against an unaware target"
      - "Phase Through Stone: can move through barrow walls"
      - "Bound Territory: cannot leave the barrow"
    combat_phases:
      pre_battle:
        - name: "Mimicry Lure"
          description: "Calls to victims using voices of their dead companions; WIL test to recognize the deception; failure means walking toward the source unguarded."
      maneuvers:
        - name: "Throat Whisper"
          description: "When adjacent, whispers terrible truths — target WIL test or stunned 1 round from psychological shock."
          cost: "Free action"
        - name: "Ambush Strike"
          description: "When attacking from concealment, double base damage on first hit."
          cost: "Replaces attack"
      on_death:
        - name: "Last Secret"
          description: "Whispers a true but terrible secret about one PC (GM's choice of disturbing revelation); WIL test or the PC gains a permanent -1 WIL from the knowledge."
    resistances: ["cold", "fear", "bleeding", "physical weapons"]
    weaknesses: ["fire", "silver", "sunlight", "loud noise", "rune-weapons"]
    encounter_conditions:
      terrain: ["barrow"]
      season: ["any"]
    loot:
      silver_range: [5, 15]
      items: ["cold_stone_shard", "tarnished_brooch", "victim_belongings"]
