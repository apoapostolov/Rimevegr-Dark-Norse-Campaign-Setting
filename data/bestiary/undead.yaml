      season: ["autumn", "winter"]
    loot:
      silver_range: [0, 1]
      items: ["rotten_clothing", "grave_dirt"]
    image_prompt: |
      A slack-jawed corpse in rotten peasant clothing stumbling through
      a moonlit field. One arm hangs at a bad angle. Bare feet dragging
      through mud. Behind it, more shapes moving in the darkness — five,
      six, more. A barrow mound visible on the hill behind. Cold moonlight,
      mist at ankle height, desaturated greens and greys.

  - id: "UND_APT_02"
    name: "Night-Walker"
    category: "undead"
    subcategory: "aptrgangr"
    tier: 2
    description: "Only comes out after dark. By day it lies rigid in whatever shadow it found at dawn — under a cart, in a ditch, behind a woodpile. At night the eyes open and it walks. Faster than the shambling kind. Drawn to firelight and the sound of breathing."
    stats:
      MIG: 4
      NIM: 3
      TOU: 5
      WIT: 2
      WIL: 3
      WYR: 3
    hp: 8
    skills:
      - name: "Brawl"
        rank: 2
      - name: "Stealth"
        rank: 2
    gear:
