          type: "unarmed"
          speed: 2
          base_damage: 4
      armor:
        torso: "Burial Clothes"
        head: "None"
    tactics: "Approaches camps at night, drawn to firelight. Circles the edge of the light before lunging at isolated targets. Avoids groups until it can catch someone alone. Returns to hiding before dawn."
    morale_break: "Does not flee at night. Immediately retreats to nearest shadow if exposed to sunlight or strong firelight (bonfire-sized or larger)."
    group_size: "1-3"
    abilities:
      - "Nocturnal: +1 to all stats at night; paralyzed and helpless during daylight hours"
      - "Light-Shy: takes 2 damage per round in direct sunlight"
      - "Shadow Step: +2 Stealth in darkness"
      - "Drawn to Warmth: always targets the person nearest to a fire first"
    combat_phases:
      pre_battle:
        - name: "Shadow Emergence"
          description: "Steps out of darkness with no warning; first attack if undetected is at +3 to hit."
      maneuvers:
