    image_prompt: |
      A corpse standing at the edge of a campfire's light, just outside
      the circle of warmth. Eyes open and reflecting the fire. Burial
      clothes stained with earth. Hands at its sides, fingers slightly
      curled. The camp behind is abandoned — bedrolls disturbed, a pot
      overturned by the fire. Forest edge behind the figure. Night scene,
      warm firelight on dead grey skin, deep darkness beyond.

  - id: "UND_APT_03"
    name: "Plague Carrier"
