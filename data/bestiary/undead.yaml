      on_death:
        - name: "Face Reveal"
          description: "The familiar features slacken into the true face of death; WIL test or gain a permanent unease about the dead person's memory (RP consequence, -1 when dealing with that person's relatives)."
    resistances: ["cold", "fear", "bleeding"]
    weaknesses: ["fire", "silver", "decapitation", "sunlight"]
    encounter_conditions:
      terrain: ["battlefield", "road", "camp", "field"]
      season: ["any"]
    loot:
      silver_range: [3, 12]
      items:
        ["functional_sword", "mail_shirt", "helm", "shield", "personal_effects"]
    image_prompt: |
      Three dead warriors in dented but functional mail and helms, standing
      in a muddy field at dusk. Blood still wet on their gear. Swords and
      shields held in fighting stances. Wounds visible — a gash across one
      face, a broken arrow shaft in another's shoulder. Behind them, more
      shapes rising from the mud. Battlefield debris — broken spears,
      a fallen banner. Red-orange sunset sky, dark mud, steel grey mail.
      The horror is how normal they look.

  - id: "UND_SPEC_04"
    name: "Grave-Mist"
    category: "undead"
    subcategory: "barrow_special"
    tier: 2
    description: "Not a creature but a presence. A thick grey-green fog that seeps from cracked barrow stones and spreads across the ground. It smells of turned earth and iron. Inside the mist, the cold bites to the bone and the dead stir. Breathing it brings visions of burial and the taste of grave-dirt."
    stats:
      MIG: 1
      NIM: 1
      TOU: 8
      WIT: 1
      WIL: 5
      WYR: 4
    hp: 10
    skills:
      - name: "Stealth"
        rank: 4
    gear:
      weapons:
        - name: "Choking Fog"
          type: "area"
          speed: 0
          base_damage: 2
      armor:
        torso: "Diffuse"
        head: "N/A"
    tactics: "Spreads slowly from a barrow entrance or crack in the earth. Fills low ground. Deals passive damage to anyone breathing inside it. Obscures vision, making unseen undead more dangerous. Cannot be fought conventionally."
    morale_break: "Does not flee. Dissipates in strong wind or direct sunlight. Re-forms at dusk."
    group_size: "1 (area)"
    abilities:
      - "Area Hazard: fills a 10-pace radius; all inside take 2 damage per round (TOU test to halve)"
      - "Vision Obscured: -2 to all ranged attacks and perception within the mist"
      - "Grave Visions: WIL test each round inside or suffer hallucinations (disoriented, -1 WIT)"
      - "Dead Stirring: undead within the mist gain +1 to all stats"
      - "Diffuse: immune to physical and single-target attacks; dispersed by strong wind or fire"
    resistances:
      [
        "cold",
        "fear",
        "bleeding",
        "physical weapons",
        "piercing",
        "slashing",
        "bludgeoning",
      ]
    weaknesses: ["fire", "strong wind", "sunlight"]
    encounter_conditions:
      terrain: ["barrow", "swamp", "graveyard", "moor"]
      season: ["autumn", "winter"]
    loot:
      silver_range: [0, 0]
      items: []
    image_prompt: |
      A thick grey-green fog rolling out of a cracked barrow entrance at
      dusk, spreading across marshy ground. Within the mist, faint shapes
      move — suggestions of reaching hands and hollow faces. The fog hugs
      the ground, knee-deep at the edges, chest-deep near the barrow.
      A dead tree stands half-consumed by the mist. The sky above is
      darkening. Cold greens, greys, and muted earth tones. An oppressive,
      smothering atmosphere.

  # ==========================================================================
  # VEIL-TOUCHED (UND_VEIL_01 through UND_VEIL_04)
  # ==========================================================================

  - id: "UND_VEIL_01"
    name: "Veil-Touched Farmer"
    category: "undead"
    subcategory: "veil_touched"
    tier: 2
    description: "Still alive in the technical sense. A farmstead too close to a barrow, seasons of bad dreams, and now this. Grey skin, black veins visible at the wrists and throat. Doesn't blink anymore. Speaks in fragments, repeating phrases from the dead. Stronger than a farmer should be. Doesn't feel the cold."
    stats:
      MIG: 4
      NIM: 3
      TOU: 5
      WIT: 2
      WIL: 2
      WYR: 3
    hp: 7
    skills:
      - name: "Brawl"
        rank: 2
      - name: "Axes"
        rank: 2
    gear:
      weapons:
        - name: "Wood Axe"
          type: "axe"
          speed: 2
          base_damage: 4
      armor:
        torso: "Wool Tunic"
        head: "None"
    tactics: "Acts on instinct. Protects the nearby barrow as if it were home. Attacks intruders who approach the barrow entrance. Doesn't coordinate but other veil-touched in the area gravitate to the same location."
    morale_break: "Does not flee. Can be subdued. If dragged far from the barrow, becomes confused and docile."
    group_size: "1-3"
    abilities:
      - "Barrow-Drawn: always moves toward the nearest barrow; becomes agitated if restrained"
      - "Unnatural Strength: MIG is 2 higher than a normal farmer"
      - "Dead Whisper: repeats phrases spoken by the barrow dead; WIL test or -1 to actions from unease"
      - "Partially Dead: takes half damage from cold; immune to fear and bleeding below half HP"
    combat_phases:
      pre_battle:
        - name: "Normal Approach"
          description: "Walks toward the party looking like a living person; Deception check vs party's WIT; only close inspection (3 paces) reveals the grey skin and black veins."
      maneuvers:
        - name: "Desperate Swing"
          description: "Wild attack at +2 MIG but -2 NIM; the farming tools make unpredictable weapons."
          cost: "Replaces attack"
      bloodied:
        - name: "Barrow Pull"
          trigger: "Below 50% HP"
          description: "The barrow's influence strengthens; the farmer's eyes go fully amber, +2 MIG, speech becomes the barrow-king's voice giving commands."
      on_death:
        - name: "Release"
          description: "If killed away from the barrow, the body collapses and looks briefly peaceful; the human features return for a moment. Anyone witnessing this loses 1 WIL temporarily from guilt."
    resistances: ["cold", "fear"]
    weaknesses: ["fire", "removal from barrow proximity", "silver"]
    encounter_conditions:
      terrain: ["farm", "field", "barrow_approach", "road"]
      season: ["any"]
    loot:
      silver_range: [1, 5]
      items: ["wood_axe", "farm_tools", "tarnished_amulet"]
    image_prompt: |
      A farmer standing in a muddy field near a barrow mound, holding a
      wood axe. Grey skin, black veins visible on hands and neck. Eyes
      open and unblinking. Wool tunic stained with dirt. The posture is
      wrong — too still, weight slightly forward. A farmstead in the
      background with a cold hearth, no smoke. The barrow visible on
      the hill behind. Overcast, muted colors, an unsettling normalcy.

  - id: "UND_VEIL_02"
    name: "Barrow-Sick Warrior"
    category: "undead"
    subcategory: "veil_touched"
    tier: 3
    description: "A fighter who went into a barrow for treasure and came back different. The body is still warm but the eyes are wrong — too wide, pupils blown. Black veins web across the face and hands. Fights berserk, ignoring wounds that should kill. Talks to people who aren't there between attacks."
    stats:
      MIG: 6
      NIM: 4
      TOU: 6
      WIT: 2
      WIL: 3
      WYR: 4
    hp: 11
    skills:
      - name: "Swords"
        rank: 3
      - name: "Brawl"
        rank: 3
      - name: "Axes"
        rank: 2
    gear:
      weapons:
        - name: "Looted Sword"
          type: "sword"
          speed: 3
          base_damage: 6
      armor:
        torso: "Leather Armor"
        head: "None"
    tactics: "Attacks with berserk fury. Targets anyone who approaches the barrow or tries to take treasure from it. Fights without self-preservation. Talks to invisible presences between swings."
    morale_break: "Does not flee. Fights until dead. Can be knocked unconscious but wakes violent."
    group_size: "1-2"
    abilities:
      - "Berserk: +1 MIG when below half HP; cannot be reasoned with during combat"
      - "Pain Blind: ignores wound penalties until 0 HP"
      - "Barrow-Bound Will: controlled by the barrow's influence; WIL tests against barrow commands automatically fail"
      - "Unnatural Stamina: can act for one additional round after reaching 0 HP before collapsing"
      - "Infected: contact with their blood requires TOU test or gain 1 barrow-corruption"
    combat_phases:
      pre_battle:
        - name: "Berserk Challenge"
          description: "Screams a war-cry from its living days; all within earshot WIL test or -1 to hit for first round from the unnatural volume."
      maneuvers:
        - name: "Reckless Assault"
          description: "+3 to hit, +2 damage, but attacker takes 2 damage from self-inflicted cuts and impacts."
          cost: "Replaces attack"
        - name: "Infected Spray"
          description: "Deliberately reopens own wounds — blood sprays in 2-pace arc, TOU test or gain 1 barrow-corruption."
          cost: "Once per encounter"
      bloodied:
        - name: "Pain Threshold"
          trigger: "Below 50% HP"
          description: "Ignores wound penalties AND gains +1 MIG; begins babbling to invisible presences, pointing at PC positions, potentially directing unseen barrow forces."
      on_death:
        - name: "Corrupted Collapse"
          description: "The body convulses and black blood pools around it; anyone standing in the pool (1-pace radius) must TOU test or gain 1 barrow-corruption; the body cannot be raised as undead — too far corrupted."
    resistances: ["cold", "fear", "pain"]
    weaknesses: ["fire", "silver", "isolation from barrow"]
    encounter_conditions:
      terrain: ["barrow", "barrow_approach", "road", "camp"]
      season: ["any"]
    loot:
      silver_range: [5, 15]
      items:
        ["looted_sword", "leather_armor", "barrow_trinket", "personal_effects"]
    image_prompt: |
      A wild-eyed warrior in leather armor, sword raised, standing at the
      entrance of a barrow. Black veins webbing across the face and hands.
      Pupils fully dilated. Blood on the sword and on the ground around
      bare feet. The posture is aggressive, leaning forward. Mouth open
      as if speaking to someone not visible. Torchlight from inside the
      barrow behind creating a halo. Evening sky. The living and the dead
      blurring together.

  - id: "UND_VEIL_03"
    name: "Corpse-Speaker"
    category: "undead"
    subcategory: "veil_touched"
    tier: 3
    description: "Was human once and may still believe it is. A gaunt figure with ritual scars and blackened fingertips, surrounded by the dead it speaks to. Not a necromancer in the traditional sense — the dead simply obey it because it's closer to their world than to ours. Cult followers treat it as a prophet."
    stats:
      MIG: 3
      NIM: 3
      TOU: 4
      WIT: 5
      WIL: 6
      WYR: 6
    hp: 9
    skills:
      - name: "Command"
        rank: 3
      - name: "Intimidation"
        rank: 3
      - name: "Deception"
        rank: 2
      - name: "Rituals"
        rank: 3
    gear:
      weapons:
        - name: "Bone Staff"
          type: "staff"
          speed: 2
          base_damage: 3
      armor:
        torso: "Ritual Robes"
        head: "None"
    tactics: "Never fights directly. Commands undead servants to intercept while it stays at range. Attempts to animate fresh corpses during combat. If cornered, uses Corpse Shield ability. Surrenders if all undead servants are destroyed and will try to negotiate."
    morale_break: "Attempts to flee if all undead servants are destroyed. Surrenders if caught. Can be reasoned with, unlike true undead."
    group_size: "1 (with 2-6 undead servants)"
    abilities:
      - "Animate Dead: can raise up to 3 Shambling Corpses from available remains as an action"
      - "Command Undead: controls up to 6 lesser undead within earshot"
      - "Corpse Shield: can redirect one melee attack per round to an adjacent undead servant"
      - "Death Speech: can communicate with any undead; learns barrow secrets and trap locations"
      - "Veil Sight: can see in total darkness; senses the presence of undead within 20 paces"
    combat_phases:
      pre_battle:
        - name: "Corpse Vanguard"
          description: "Sends undead servants forward while staying hidden; uses dead scouts to map PC positions."
      maneuvers:
        - name: "Emergency Raise"
          description: "When an undead servant is destroyed, attempt raising it immediately — WIL test at -2, success means it rises again at 1 HP."
          cost: "Free action"
        - name: "Corpse Shield Redirect"
          description: "When targeted by melee, redirect the attack to an adjacent undead servant — automatic, once per round."
          cost: "Free action"
      bloodied:
        - name: "Veil Pulse"
          trigger: "Below 50% HP"
          description: "In desperation, channels Veil energy outward; all corpses within 10 paces animate as Shambling Corpses (regardless of prior state); gains d4 temporary HP."
      on_death:
        - name: "Corpse Cascade"
          description: "All currently controlled undead collapse simultaneously; the Corpse-Speaker's journal reveals barrow layouts and treasure locations."
    resistances: ["cold", "fear"]
    weaknesses:
      ["fire", "silver", "isolation from corpses", "disrupting concentration"]
    encounter_conditions:
      terrain: ["barrow", "graveyard", "ruins", "cave"]
      season: ["any"]
    loot:
      silver_range: [5, 20]
      items: ["bone_staff", "ritual_components", "corpse_journal", "barrow_map"]
    image_prompt: |
      A gaunt figure in dark ritual robes standing in a moonlit graveyard,
      bone staff raised. Blackened fingertips. Ritual scars on the
      exposed forearms. Around the figure, three corpses standing at
      attention — a farmer, a warrior, a child — all grey-skinned and
      still. The Corpse-Speaker's mouth is moving. Behind, crude shelters
      and a fire pit — a camp of living followers watching from the edges.
      Moonlight, cold blue tones, the living and dead together. Unsettling
      calm.

  - id: "UND_VEIL_04"
    name: "Thrall of the Barrow"
    category: "undead"
    subcategory: "veil_touched"
    tier: 4
    description: "Whatever this person was is gone. The barrow-king's will fills the body like a hand in a glove. Skin is cold and grey but the muscles move with terrible strength. The eyes glow the same amber as the ancient draugr that commands it. It speaks with two voices — its own, pleading, underneath the barrow-king's commands."
    stats:
      MIG: 7
      NIM: 5
      TOU: 7
      WIT: 4
      WIL: 2
      WYR: 5
    hp: 15
    skills:
      - name: "Swords"
        rank: 4
      - name: "Brawl"
        rank: 3
      - name: "Shields"
        rank: 3
      - name: "Intimidation"
        rank: 3
    gear:
      weapons:
        - name: "Barrow-King's Blade"
          type: "sword"
          speed: 3
          base_damage: 7
      armor:
        torso: "Ancient Mail, Restored"
        head: "Iron Helm"
        shield: "Heavy Round Shield"
    tactics: "Fights as the barrow-king's champion. Engages the strongest opponent while lesser undead handle the rest. Fights with precision and fury. If the barrow-king is destroyed, the thrall collapses — the host may survive if the body hasn't been pushed past its limits."
    morale_break: "Does not flee while barrow-king lives. If barrow-king is destroyed, collapses immediately."
    group_size: "1"
    abilities:
      - "Barrow-King's Puppet: controlled directly by the barrow-king; shares the king's tactical intelligence"
      - "Superhuman Strength: MIG exceeds normal human limits due to supernatural enhancement"
      - "Two Voices: occasionally the host's personality surfaces; WIL test from the host at a dramatic moment may cause the thrall to hesitate for 1 round"
      - "Fearless: immune to fear, intimidation, and morale effects"
      - "Pain Drain: the barrow-king absorbs the thrall's pain; the thrall ignores all wound penalties"
      - "Kill-Link: if the barrow-king is destroyed, the thrall drops to 0 HP instantly"
    combat_phases:
      pre_battle:
        - name: "Champion's Challenge"
          description: "The barrow-king speaks through the thrall, offering single combat; the thrall's fighting stance reveals master-level swordsmanship."
      maneuvers:
        - name: "King's Precision"
          description: "The barrow-king takes direct control mid-swing — the attack gains +3 to hit and ignores shield; the thrall's own face briefly shows horror."
          cost: "Once per encounter"
        - name: "Bound Shield"
          description: "When the barrow-king's will is exerted, the thrall gains +2 to all defensive rolls for 1 round."
          cost: "Free action"
      bloodied:
        - name: "Host Surfaces"
          trigger: "Below 50% HP"
          description: "The human personality fights through for d4 rounds; the thrall stops attacking and pleads for help; WIL contest between host (WIL 2) and barrow-king (WIL 9) each round to see who controls the body; if PCs help the host in this window, the barrow-king's control can be permanently broken."
      on_death:
        - name: "Will Collapse"
          description: "If killed, the barrow-king's control is severed violently; the host may survive if body HP is above -5; psychic backlash reaches the barrow-king, dealing d6 damage to it; the thrall's equipment remains intact."
    resistances: ["cold", "fear", "bleeding", "pain", "mind control"]
    weaknesses:
      [
        "fire",
        "silver",
        "destroying the barrow-king",
        "reaching the host's personality",
      ]
    encounter_conditions:
      terrain: ["barrow", "barrow_approach", "ruins"]
      season: ["any"]
    loot:
      silver_range: [10, 25]
      items:
        [
          "barrow_kings_blade",
          "ancient_mail",
          "iron_helm",
          "heavy_shield",
          "host_personal_effects",
        ]
    image_prompt: |
      A powerfully built figure in restored ancient mail and an iron helm,
      standing at the entrance to a barrow king's chamber. Grey skin,
      amber glow in the eyes matching the faint glow from deeper in the
      barrow. A long sword in one hand, a heavy round shield in the other.
      The body is tense, veins standing out on the neck. The mouth is
      slightly open — two expressions fighting for the face, one of cold
      command and one of trapped anguish. Dark stone chamber, amber
      light from within, a sense of terrible puppetry.
