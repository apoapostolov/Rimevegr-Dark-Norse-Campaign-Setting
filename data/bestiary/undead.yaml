          description: "Corpse falls in place, the square becomes difficult terrain; anyone moving through must NIM test or stumble."
    resistances: ["cold", "fear", "bleeding"]
    weaknesses: ["fire", "slashing", "decapitation", "sunlight"]
    encounter_conditions:
