    category: "undead"
    subcategory: "aptrgangr"
    tier: 1
    description: "Barely a threat alone. A dead farmer or thrall dragged upright by some residual pull from the barrow. Jaw slack, one arm hanging wrong. Moves like a drunk. The danger is in numbers — when a barrow vomits up a dozen of these at once."
    stats:
      MIG: 3
      NIM: 1
      TOU: 3
      WIT: 1
      WIL: 2
      WYR: 2
    hp: 4
    skills:
      - name: "Brawl"
        rank: 1
    gear:
      weapons:
