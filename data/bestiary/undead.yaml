          type: "unarmed"
          speed: 1
          base_damage: 2
      armor:
        torso: "Rotten Clothing"
        head: "None"
    tactics: "Moves toward nearest living thing. Grabs and holds. No coordination, no tactics. Strength is in numbers — multiple shambling corpses can overwhelm a single fighter by grappling."
    morale_break: "Does not flee. Destroyed at 0 HP. Collapses when the animating force is disrupted."
    group_size: "3-12"
    abilities:
      - "Mob Grapple: for each additional Shambling Corpse grappling the same target, MIG contest penalty increases by -1"
      - "Slow: always acts last in initiative"
      - "Expendable: no penalty to allied undead morale when destroyed"
    combat_phases:
      maneuvers:
